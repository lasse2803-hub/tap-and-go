        effect = { type: 'addCounter', counterType, label: `Add ${counterType} counter` };
      } else if (/draw\s+(\w+)\s+cards?/i.test(effectText)) {
        const countMatch = effectText.match(/draw\s+(\w+)\s+cards?/i);
        const numWord = countMatch[1].toLowerCase();
        const numMap = { a: 1, one: 1, two: 2, three: 3, four: 4 };
        const count = numMap[numWord] || parseInt(numWord) || 1;
        effect = { type: 'draw', count, label: `Draw ${count} card${count > 1 ? 's' : ''}` };
      } else if (/draw a card/i.test(effectText)) {
        effect = { type: 'draw', count: 1, label: 'Draw a card' };
      } else if (/gain\s+(\d+)\s+life/i.test(effectText)) {
        const amt = parseInt(effectText.match(/gain\s+(\d+)\s+life/i)[1]);
        effect = { type: 'gainLife', amount: amt, label: `Gain ${amt} life` };
      } else if (/deals?\s+(\d+)\s+damage/i.test(effectText)) {
        const amt = parseInt(effectText.match(/deals?\s+(\d+)\s+damage/i)[1]);
        if (needsTargetAny) {
          effect = { type: 'damageTarget', amount: amt, label: `Deal ${amt} damage to target`, needsTarget: true };
        } else {
          effect = { type: 'damage', amount: amt, label: `Deal ${amt} damage (manual)` };
        }
      } else if (/create\s+/i.test(effectText)) {
        const shortText = effectText.length > 40 ? effectText.slice(0, 37) + '...' : effectText;
        effect = { type: 'manual', text: effectText, label: shortText };
      // Prevent damage: "prevent the next X damage" or "prevent all damage"
      } else if (/prevent/i.test(effectText)) {
        const shortText = effectText.length > 40 ? effectText.slice(0, 37) + '...' : effectText;
        effect = { type: 'manual', text: effectText, label: shortText, needsTarget };
      } else {
        const shortText = effectText.length > 40 ? effectText.slice(0, 37) + '...' : effectText;
        effect = { type: 'manual', text: effectText, label: shortText, needsTarget };
      }
      abilities.push({ ...effect, manaCost, costStr, requiresTap, fullEffectText: effectText });
    }
    // Deduplicate
    const seen = new Set();
    return abilities.filter(ab => {
      const key = ab.costStr + ':' + ab.label;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  };

  const activatePaidAbility = (pIdx, card, ability) => {
    if (onlineMode && pIdx !== onlinePlayerIndex) return;
    const p = getState(pIdx);
    // Check mana
    if (ability.manaCost && !canPayManaCost(p.manaPool, ability.manaCost)) {
      setCastError({ pIdx, message: 'Not enough mana for ability' });
      setTimeout(() => setCastError(null), 2000);
      return;
    }
    // Check tap
    if (ability.requiresTap && card.tapped) {
      setCastError({ pIdx, message: `${card.name} is already tapped` });
      setTimeout(() => setCastError(null), 2000);
      return;
    }
    // If ability needs a target, enter targeting mode BEFORE paying costs
    if (ability.needsTarget) {
      setAbilityTargeting({ pIdx, card, ability });
      // Only minimize spell stack if there IS a spell on stack; otherwise the targeting bar handles UI
      if (spellStack.length > 0) setStackMinimized(true);
      setCastError({ pIdx, message: `🎯 Select target creature for ${card.name}'s ability`, background: '#1a2a3a' });
      return;
    }
    // Pay costs and execute immediately (no targeting needed)
    executeAbility(pIdx, card, ability, null);
  };

  // Execute a paid ability after optional targeting
  const executeAbility = (pIdx, sourceCard, ability, targetInfo) => {
    const p = getState(pIdx);
    // Pay mana
    let newPool = p.manaPool;
    if (ability.manaCost) {
      newPool = deductManaCost(p.manaPool, ability.manaCost);
    }
    // Tap if required
    SFX.tap();
    setState(pIdx, prev => ({
      ...prev,
      manaPool: newPool,
      battlefield: ability.requiresTap
        ? prev.battlefield.map(c => c.id === sourceCard.id ? { ...c, tapped: true } : c)
        : prev.battlefield,
    }));
    // Execute effect
    if (ability.type === 'monstrosity') {
      if (sourceCard.monstrous) {
        setCastError({ pIdx, message: '\u26a0\ufe0f ' + getDisplayName(sourceCard) + ' is already monstrous!' });
        setTimeout(() => setCastError(null), 2000);
        return;
      }
      setState(pIdx, prev => ({
        ...prev,
        battlefield: prev.battlefield.map(c => {
          if (c.id !== sourceCard.id) return c;
          const counters = { ...(c.counters || {}) };
          counters['+1/+1'] = (counters['+1/+1'] || 0) + ability.counters;
          return { ...c, counters, monstrous: true };
        })
      }));
      const orc = getOracleText(sourceCard);
      const monKwMatch = orc.match(/if .* is monstrous.*has (hexproof|indestructible|flying|trample|deathtouch|lifelink|vigilance)(?: and (hexproof|indestructible|flying|trample|deathtouch|lifelink|vigilance))?/i);
      if (monKwMatch) {
        const kws = [monKwMatch[1], monKwMatch[2]].filter(Boolean).map(k => k.toLowerCase());
        setState(pIdx, prev => ({
          ...prev,
          battlefield: prev.battlefield.map(c => {
            if (c.id !== sourceCard.id) return c;
            const existing = c.keywords ? [...c.keywords] : [];
            kws.forEach(kw => { if (!existing.some(e => e.toLowerCase() === kw)) existing.push(kw); });
            return { ...c, keywords: existing };
          })
        }));
        setCastError({ pIdx, message: '\u{1f981} ' + getDisplayName(sourceCard) + ' is MONSTROUS! Gains ' + kws.join(' + ') });
      } else {
        setCastError({ pIdx, message: '\u{1f981} ' + getDisplayName(sourceCard) + ' is MONSTROUS! +' + ability.counters + ' counters' });
      }
      setTimeout(() => setCastError(null), 3000);
    } else if (ability.type === 'addCounter') {
      addCounter(pIdx, sourceCard.id, ability.counterType);
      // Check for Midnight Clock 12th hour counter trigger
      const currentCount = (sourceCard.counters?.[ability.counterType] || 0) + 1;
      if (sourceCard.name && sourceCard.name.toLowerCase() === 'midnight clock' && ability.counterType === 'hour' && currentCount >= 12) {
        setTimeout(() => triggerMidnightClock(pIdx, sourceCard), 300);
      }
    } else if (ability.type === 'addCounterTarget' && targetInfo) {
      addCounter(targetInfo.pIdx, targetInfo.cardId, ability.counterType);
    } else if (ability.type === 'grantKeyword' && targetInfo) {
      // Apply keyword as tempBuff until end of turn
      setState(targetInfo.pIdx, prev => ({
        ...prev,
        battlefield: prev.battlefield.map(c => {
          if (c.id !== targetInfo.cardId) return c;
          const existing = c.tempBuffs || { power: 0, toughness: 0, keywords: [] };
          const keywords = [...(existing.keywords || [])];
          if (!keywords.includes(ability.keyword)) keywords.push(ability.keyword);
          return { ...c, tempBuffs: { ...existing, keywords } };
        })
      }));
      setCastError({ pIdx, message: `${targetInfo.cardName} gains ${ability.keyword} until end of turn`, background: '#2a2a1a' });
      setTimeout(() => setCastError(null), 2000);
    } else if (ability.type === 'buff' && targetInfo) {
      // Apply +X/+X as tempBuff until end of turn
      setState(targetInfo.pIdx, prev => ({
        ...prev,
        battlefield: prev.battlefield.map(c => {
          if (c.id !== targetInfo.cardId) return c;
          const existing = c.tempBuffs || { power: 0, toughness: 0, keywords: [] };
          return { ...c, tempBuffs: { ...existing, power: (existing.power || 0) + ability.power, toughness: (existing.toughness || 0) + ability.toughness } };
        })
      }));
      setCastError({ pIdx, message: `${targetInfo.cardName} gets ${ability.label}`, background: '#2a2a1a' });
      setTimeout(() => setCastError(null), 2000);
    } else if (ability.type === 'damageTarget' && targetInfo) {
      // Deal damage to target creature — check lethal
      const targetCard = getState(targetInfo.pIdx).battlefield.find(c => c.id === targetInfo.cardId);
      if (targetCard && isCreature(targetCard)) {
        const toughness = getEffectiveToughness(targetCard);
        if (ability.amount >= toughness) {
          // Lethal — move to graveyard
          moveCard(targetInfo.pIdx, targetCard, 'battlefield', 'graveyard');
          setCastError({ pIdx, message: `${sourceCard.name} deals ${ability.amount} damage to ${targetInfo.cardName} — destroyed!`, background: '#3a1a1a' });
        } else {
          // Survives — track damage
          setState(targetInfo.pIdx, prev => ({
            ...prev,
            battlefield: prev.battlefield.map(c => {
              if (c.id !== targetInfo.cardId) return c;
              return { ...c, damage: (c.damage || 0) + ability.amount };
            })
          }));
          SFX.playerDamage();
          setCastError({ pIdx, message: `${sourceCard.name} deals ${ability.amount} damage to ${targetInfo.cardName} (survives: ${toughness} toughness)`, background: '#3a1a1a' });
        }
      } else {
        // Non-creature target or not found — just show message
        setCastError({ pIdx, message: `${sourceCard.name} deals ${ability.amount} damage to ${targetInfo.cardName}`, background: '#3a1a1a' });
      }
      setTimeout(() => setCastError(null), 2500);
    } else if (ability.type === 'draw') {
      for (let i = 0; i < ability.count; i++) {
        setTimeout(() => drawCard(pIdx), i * 100);
      }
    } else if (ability.type === 'gainLife') {
      setState(pIdx, prev => ({ ...prev, life: prev.life + ability.amount }));
    } else if (ability.type === 'manual') {
      const targetStr = targetInfo ? ` → ${targetInfo.cardName}` : '';
      setEtbReminder({ pIdx, card: sourceCard, effects: [{ icon: '⚡', text: `${sourceCard.name}: ${ability.text || ability.label}${targetStr}` }] });
    }
    const targetStr = targetInfo ? ` → ${targetInfo.cardName}` : '';
    addGameLog(pIdx, '⚡', `${sourceCard.name}: ${ability.label}${targetStr}`);
    // Broadcast ability activation to both players
    const cardImg = sourceCard._reskin?.artUrl || sourceCard.image_uris?.art_crop || sourceCard.image_uris?.small || (sourceCard.card_faces?.[0]?.image_uris?.art_crop) || null;
    setAbilityActivated({
      pIdx,
      cardName: sourceCard._reskin?.name || sourceCard.name,
      abilityText: `${ability.text || ability.label}${targetStr}`,
      cardImage: cardImg,
    });
    setTimeout(() => setAbilityActivated(null), 3500);
  };

  // Midnight Clock special trigger: 12th hour counter
  const triggerMidnightClock = (pIdx, card) => {
    SFX.playSpell();
    setState(pIdx, prev => {
      const clockCard = prev.battlefield.find(c => c.id === card.id);
      if (!clockCard) return prev;
      // Combine hand + graveyard + remaining library, shuffle, draw 7
      const allCards = [...prev.hand, ...prev.graveyard, ...prev.library];
      // Fisher-Yates shuffle
      for (let i = allCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allCards[i], allCards[j]] = [allCards[j], allCards[i]];
      }
      const newHand = allCards.slice(0, 7);
      const newLibrary = allCards.slice(7);
      return {
        ...prev,
        hand: newHand,
        graveyard: [],
        library: newLibrary,
        battlefield: prev.battlefield.filter(c => c.id !== card.id),
        exile: [...prev.exile, { ...clockCard, tapped: false, counters: {} }],
      };
    });
    addGameLog(pIdx, '⏰', 'Midnight Clock struck midnight! Shuffled hand and graveyard into library, drew 7 cards, exiled Midnight Clock.');
    setCastError({ pIdx, message: '⏰ Midnight Clock struck midnight! Drew 7 cards.', background: '#1a1a3a' });
    setTimeout(() => setCastError(null), 3000);
  };

  // ===== UPKEEP TRIGGERS (Midnight Clock, etc.) =====
  const processUpkeepTriggers = (pIdx) => {
    const p = getState(pIdx);
    for (const card of p.battlefield) {
      const allText = getOracleText(card);
      // "At the beginning of each upkeep, put a [type] counter on ~"
      const upkeepCounterMatch = allText.match(/at the beginning of (?:each|your) upkeep,?\s*put\s+(?:a|an|one)\s+(\w+)\s+counter\s+on/i);
      if (upkeepCounterMatch) {
        const counterType = upkeepCounterMatch[1];
        addCounter(pIdx, card.id, counterType);
        addGameLog(pIdx, '⏰', `${card.name}: upkeep — added ${counterType} counter`);
        // Check Midnight Clock 12th trigger
        const newCount = (card.counters?.[counterType] || 0) + 1;
        if (card.name && card.name.toLowerCase() === 'midnight clock' && counterType === 'hour' && newCount >= 12) {
          setTimeout(() => triggerMidnightClock(pIdx, card), 500);
        }
      }

      // "At the beginning of your upkeep, this creature deals X damage to you" (Relic Robber tokens, etc.)
      const upkeepDmgMatch = allText.match(/at the beginning of your upkeep,?\s*(?:this creature|~)\s+deals?\s+(\d+)\s+damage to you/i);
      if (upkeepDmgMatch) {
        const dmg = parseInt(upkeepDmgMatch[1]);
        setState(pIdx, prev => ({ ...prev, life: prev.life - dmg }));
        markDealtDamage(pIdx);
        SFX.lifeLoss();
        addGameLog(pIdx, '🔥', `${card.name}: upkeep — deals ${dmg} damage to ${getState(pIdx).name}`);
      }

    }

    // "At the beginning of each player's upkeep, ~ deals X damage to that player" (Roiling Vortex, etc.)
    // Scan ALL players' battlefields for permanents that trigger on each player's upkeep
    // and apply the effect to the player whose upkeep it is (pIdx)
    [0, 1].forEach(ownerIdx => {
      const owner = getState(ownerIdx);
      for (const card of owner.battlefield) {
        const allText = getOracleText(card);
        const eachUpkeepDmgMatch = allText.match(/at the beginning of each player['‘’]?s upkeep,?\s*(?:~|[\w\s,]+)\s+deals?\s+(\d+)\s+damage to that player/i);
        if (eachUpkeepDmgMatch) {
          const dmg = parseInt(eachUpkeepDmgMatch[1]);
          setState(pIdx, prev => ({ ...prev, life: prev.life - dmg }));
          markDealtDamage(pIdx);
          SFX.lifeLoss();
          addGameLog(pIdx, '🔥', `${card.name}: upkeep — deals ${dmg} damage to ${getState(pIdx).name}`);
        }
      }
    });
  };

  const untapAll = (pIdx) => {
    SFX.untapAll();
    setState(pIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c => ({ ...c, tapped: false }))
    }));
  };

  // === Vorinclex, Monstrous Raider: counter modification ===
  // If pIdx controls Vorinclex → counters they place are DOUBLED
  // If opponent controls Vorinclex → counters pIdx places are HALVED (rounded down)
  // sourcePIdx = the player who is CAUSING the counters to be placed
  const applyVorinclexModifier = (sourcePIdx, amount) => {
    if (amount <= 0) return amount;
    const hasVorinclex = (pi) => {
      const st = getState(pi);
      return st.battlefield.some(c =>
        (c.name || '').toLowerCase().includes('vorinclex') &&
        /double|twice/i.test(c.oracle_text || '')
      );
    };
    // Source player controls Vorinclex → double
    if (hasVorinclex(sourcePIdx)) return amount * 2;
    // Opponent controls Vorinclex → halve (rounded down), minimum 0
    const opponentIdx = sourcePIdx === 0 ? 1 : 0;
    if (hasVorinclex(opponentIdx)) return Math.floor(amount / 2);
    return amount;
  };

  const addCounter = (pIdx, cardId, type, sourcePIdx = null) => {
    const source = sourcePIdx !== null ? sourcePIdx : pIdx;
    const finalAmount = applyVorinclexModifier(source, 1);
    if (finalAmount <= 0) {
      // Vorinclex halved to 0 — notify player
      const cardName = (getState(pIdx).battlefield.find(c => c.id === cardId) || {}).name || '?';
      setCastError({ pIdx: source, message: `⚠️ Vorinclex negated ${type} counter on ${cardName}!` });
      setTimeout(() => setCastError(null), 2000);
      return;
    }
    setState(pIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c => {
        if (c.id !== cardId) return c;
        const counters = { ...c.counters };
        counters[type] = (counters[type] || 0) + finalAmount;
        return { ...c, counters };
      })
    }));
    if (type === '-1/-1') checkZeroToughness(pIdx);
  };

  const removeCounter = (pIdx, cardId, type) => {
    setState(pIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c => {
        if (c.id !== cardId) return c;
        const counters = { ...c.counters };
        counters[type] = Math.max(0, (counters[type] || 0) - 1);
        if (counters[type] === 0) delete counters[type];
        return { ...c, counters };
      })
    }));
  };

  const addMultipleCounters = (pIdx, cardId, type, amount, sourcePIdx = null) => {
    const source = sourcePIdx !== null ? sourcePIdx : pIdx;
    const finalAmount = applyVorinclexModifier(source, amount);
    if (finalAmount <= 0) {
      const cardName = (getState(pIdx).battlefield.find(c => c.id === cardId) || {}).name || '?';
      setCastError({ pIdx: source, message: `⚠️ Vorinclex negated ${amount} ${type} counters on ${cardName}!` });
      setTimeout(() => setCastError(null), 2000);
      return;
    }
    setState(pIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c => {
        if (c.id !== cardId) return c;
        const counters = { ...c.counters };
        counters[type] = (counters[type] || 0) + finalAmount;
        return { ...c, counters };
      })
    }));
    if (type === '-1/-1') checkZeroToughness(pIdx);
  };

  const removeAllCounters = (pIdx, cardId) => {
    setState(pIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c => {
        if (c.id !== cardId) return c;
        return { ...c, counters: {} };
      })
    }));
  };

  // State-based action: creatures with 0 or less toughness die
  const checkZeroToughness = (pIdx) => {
    setTimeout(() => {
      const st = getState(pIdx);
      const dying = st.battlefield.filter(c => {
        if (!isCreature(c)) return false;
        const atts = st.battlefield.filter(a => a.attachedTo === c.id);
        const et = getEffectiveToughness(c, atts);
        return et <= 0;
      });
      if (dying.length > 0) {
        setState(pIdx, prev => {
          const dyingIds = new Set(dying.map(c => c.id));
          return {
            ...prev,
            battlefield: prev.battlefield.filter(c => !dyingIds.has(c.id)),
            graveyard: [...prev.graveyard, ...dying.map(c => ({ ...c, tapped: false, counters: {}, tempBuffs: null, damagePrevented: undefined }))],
          };
        });
        dying.forEach(c => {
          setCastError({ pIdx, message: `💀 ${c.name} died — 0 toughness (state-based action)` });
        });
        setTimeout(() => setCastError(null), 2000);
      }
    }, 50);
  };

  // ===== PLANESWALKER ABILITY ACTIVATION =====
  const activatePlaneswalkerAbility = (pIdx, card, ability) => {
    if (onlineMode && pIdx !== onlinePlayerIndex) return;

    // PW abilities can only be activated at sorcery speed: main phase, stack empty, your turn
    // Exception: Wandering Emperor (and similar) — "you may activate loyalty abilities any time you could cast an instant"
    const oracleText = getOracleText(card);
    const hasInstantSpeedLoyalty = card.enteredThisTurn && /activate.*loyalty.*any time.*instant/i.test(oracleText);
    if (!hasInstantSpeedLoyalty) {
      if (currentPhase !== 'main1' && currentPhase !== 'main2') {
        setCastError({ pIdx, message: `⚠️ Planeswalker abilities can only be activated during your main phase` });
        setTimeout(() => setCastError(null), 2500);
        return;
      }
      if (spellStack.length > 0) {
        setCastError({ pIdx, message: `⚠️ Cannot activate planeswalker ability while spells are on the stack` });
        setTimeout(() => setCastError(null), 2500);
        return;
      }
    }

    const costNum = parseInt(ability.cost);
    const currentLoyalty = (card.counters && card.counters['loyalty']) || 0;

    // For minus abilities, check we have enough loyalty
    if (costNum < 0 && currentLoyalty + costNum < 0) {
      setCastError({ pIdx, message: `Not enough loyalty (${currentLoyalty}) for [${ability.cost}]` });
      setTimeout(() => setCastError(null), 2000);
      return;
    }

    // Adjust loyalty counters (Vorinclex doubles + abilities, does NOT affect - costs)
    const loyaltyChange = costNum > 0 ? applyVorinclexModifier(pIdx, costNum) : costNum;
    // Vorinclex feedback: show when counters are modified
    const vorinclexNote = costNum > 0 && loyaltyChange !== costNum
      ? ` (Vorinclex: ${costNum > 0 ? '+' : ''}${costNum} → ${loyaltyChange > 0 ? '+' : ''}${loyaltyChange})`
      : '';
    setState(pIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c => {
        if (c.id !== card.id) return c;
        const counters = { ...c.counters };
        counters['loyalty'] = (counters['loyalty'] || 0) + loyaltyChange;
        return { ...c, counters };
      })
    }));

    // Show ability on "stack" for opponent to see and optionally respond
    setPwAbilityOnStack({ pIdx, card, ability });
    SFX.playSpell();
    addGameLog(pIdx, '⚡', `${getState(pIdx).name} activates ${card.name} [${ability.cost}]${vorinclexNote}: ${ability.text.substring(0, 60)}${ability.text.length > 60 ? '…' : ''}`, [card.id]);
  };

  // ===== EXILE LINKING SYSTEM =====
  const [exileLinkChoice, setExileLinkChoice] = useState(null); // { targetPIdx, card, sourcePIdx }

  const exileLinkedTo = (targetPIdx, cardToExile, sourcePIdx, sourcePermanent) => {
    // Move the card to exile with exiledBy tag
    SFX.toExile();
    setState(targetPIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.filter(c => c.id !== cardToExile.id),
      exile: [...prev.exile, { ...cardToExile, tapped: false, counters: {}, exiledBy: { id: sourcePermanent.id, name: sourcePermanent.name } }]
    }));
    // Tag the source permanent with what it exiled
    setState(sourcePIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c => {
        if (c.id !== sourcePermanent.id) return c;
        const exiledCards = [...(c.exiledCards || []), { id: cardToExile.id, name: cardToExile.name }];
        return { ...c, exiledCards };
      })
    }));
  };

  // ===== ATTACHMENT SYSTEM (Auras & Equipment) =====
  const [attachChoice, setAttachChoice] = useState(null); // { pIdx, card }

  // Clean up attachments when creatures are bulk-removed (board wipes)
  // Call AFTER the main setState that removes creatures
  const cleanupAttachments = (playerIndices) => {
    playerIndices.forEach(pi => {
      setState(pi, prev => {
        const creaturesOnBF = new Set(prev.battlefield.filter(c => isCreature(c)).map(c => c.id));
        let newBF = [...prev.battlefield];
        let newGY = [...prev.graveyard];
        const orphanedAttachments = newBF.filter(c => c.attachedTo && !creaturesOnBF.has(c.attachedTo));
        for (const att of orphanedAttachments) {
          if (isAura(att)) {
            newBF = newBF.filter(c => c.id !== att.id);
            newGY.push({ ...att, tapped: false, counters: {}, attachedTo: null });
          } else {
            newBF = newBF.map(c => c.id === att.id ? { ...c, attachedTo: null } : c);
          }
        }
        return { ...prev, battlefield: newBF, graveyard: newGY };
      });
    });
  };

  const attachCardTo = (pIdx, attachmentCard, targetCreatureId) => {
    // Protection check: can't enchant/equip creature with protection from attachment's color
    const targetCreature = getState(pIdx).battlefield.find(c => c.id === targetCreatureId);
    if (targetCreature) {
      const protColor = hasProtectionFrom(targetCreature, attachmentCard);
      if (protColor) {
        setCastError({ pIdx, message: `❌ ${targetCreature.name} has protection from ${protColor} — can't be enchanted/equipped!` });
        setTimeout(() => setCastError(null), 2500);
        setAttachChoice(null);
        return;
      }
    }
    setState(pIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c =>
        c.id === attachmentCard.id ? { ...c, attachedTo: targetCreatureId } : c
      )
    }));
    setAttachChoice(null);
  };

  const detachCard = (pIdx, attachmentCard) => {
    setState(pIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c =>
        c.id === attachmentCard.id ? { ...c, attachedTo: null } : c
      )
    }));
  };

  // Get all cards attached to a specific creature
  const getAttachments = (pIdx, creatureId) => {
    return getState(pIdx).battlefield.filter(c => c.attachedTo === creatureId);
  };

  const createToken = (pIdx, token, playSound = true, skipLog = false) => {
    if (playSound) SFX.tokenCreate();
    setState(pIdx, prev => ({
      ...prev,
      battlefield: [...prev.battlefield, { ...token, id: uid(), tapped: false, counters: {} }]
    }));
    if (!skipLog) {
      const kw = (token.keywords || []).filter(Boolean);
      addGameLog(pIdx, '✦', `${getState(pIdx).name} created ${token.power || '?'}/${token.toughness || '?'} ${token.name || 'Token'}${kw.length > 0 ? ' with ' + kw.join(', ') : ''}`);
    }
  };

  const cloneToken = (pIdx, token) => {
    createToken(pIdx, { ...token, id: uid() });
  };

  // Create a token copy of a card (e.g. The Scarab God, God-Pharaoh's Gift, Mimic Vat)
  // sourceCard: the card to copy; fromZone: where it currently is; sourcePIdx: who owns the source
  // The source card is exiled as part of the ability. Token goes to active player's battlefield.
  const createTokenCopy = (sourcePIdx, card, fromZone) => {
    const ptOverride = prompt(
      `Create token copy of ${card.name}.\n\nOverride P/T? (e.g. "4/4" for Scarab God/God-Pharaoh's Gift)\nLeave blank to keep original ${card.power || '?'}/${card.toughness || '?'}:`
    );
    let tokenPower = card.power;
    let tokenToughness = card.toughness;
    if (ptOverride && ptOverride.includes('/')) {
      const [p, t] = ptOverride.split('/').map(s => s.trim());
      if (p && t) { tokenPower = p; tokenToughness = t; }
    }
    // Build the token — copy key properties from the source card
    const tokenCopy = {
      name: card.name,
      type_line: card.type_line || 'Creature',
      oracle_text: card.oracle_text || '',
      keywords: [...(card.keywords || [])],
      power: tokenPower,
      toughness: tokenToughness,
      image_uris: card.image_uris || null,
      card_faces: card.card_faces || null,
      colors: card.colors || [],
      mana_cost: card.mana_cost || '',
      isToken: true,
      isTokenCopy: true,
      copiedFrom: card.name,
    };
    // Exile the source card from its zone
    if (fromZone === 'graveyard' || fromZone === 'exile') {
      setState(sourcePIdx, prev => ({
        ...prev,
        [fromZone]: prev[fromZone].filter(c => c.id !== card.id),
        exile: fromZone === 'exile' ? prev.exile.filter(c => c.id !== card.id) : [...prev.exile, card],
      }));
    }
    // Create the token on the active player's battlefield
    createToken(activePlayer, tokenCopy);
    addGameLog(activePlayer, '👻', `${getState(activePlayer).name} created a token copy of ${card.name}${ptOverride ? ` (${tokenPower}/${tokenToughness})` : ''}`);
  };

  // Foretell: exile a card face-down from hand for {2}
  const foretellCard = (pIdx, card) => {
    const foretoldCard = {
      ...card,
      isForetold: true,
      foretoldBy: pIdx,
      foretellCost: getForetellCost(card),
      // In online mode, opponent sees face-down card — we store the real card data
      // but visually it shows as face-down
    };
    setState(pIdx, prev => ({
      ...prev,
      hand: prev.hand.filter(c => c.id !== card.id),
      exile: [...prev.exile, foretoldCard],
    }));
    addGameLog(pIdx, '🔮', `${getState(pIdx).name} foretold a card (exiled face-down)`);
    SFX.draw();
  };

  // Cast a foretold card from exile for its foretell cost
  const castForetold = (pIdx, card) => {
    const isSpell = isSpellCard(card);
    setState(pIdx, prev => ({
      ...prev,
      exile: prev.exile.filter(c => c.id !== card.id),
    }));
    const cleanCard = { ...card };
    delete cleanCard.isForetold;
    delete cleanCard.foretoldBy;
    delete cleanCard.foretellCost;
    if (isSpell) {
      // Instant/Sorcery → graveyard
      setState(pIdx, prev => ({ ...prev, graveyard: [...prev.graveyard, cleanCard] }));
    } else {
      // Permanent → battlefield
      setState(pIdx, prev => ({ ...prev, battlefield: [...prev.battlefield, { ...cleanCard, tapped: false, counters: {}, enteredThisTurn: true }] }));
    }
    addGameLog(pIdx, '🔮', `${getState(pIdx).name} cast ${card.name} from foretell (${card.foretellCost})`);
    SFX.play();
  };

  const millCards = (pIdx, count) => {
    if (onlineMode && pIdx !== onlinePlayerIndex) return;
    SFX.mill();
    setState(pIdx, prev => {
      const milled = prev.library.slice(0, count);
      return {
        ...prev,
        library: prev.library.slice(count),
        graveyard: [...prev.graveyard, ...milled]
      };
    });
  };

  const returnToLibrary = (pIdx, card, from, position = 'top') => {
    if (onlineMode && pIdx !== onlinePlayerIndex) return;
    setState(pIdx, prev => {
      const fromCards = prev[from].filter(c => c.id !== card.id);
      const lib = position === 'top' ? [card, ...prev.library] : [...prev.library, card];
      return { ...prev, [from]: fromCards, library: lib };
    });
  };

  // Helper: add standard zone transfer actions to a context menu
  const addZoneTransferActions = (actions, pIdx, card, fromZone, excludeZones = []) => {
    const transfers = [
      { zone: 'hand', label: '🤚 To Hand' },
      { zone: 'battlefield', label: '▶ To Battlefield' },
      { zone: 'graveyard', label: '💀 To Graveyard' },
      { zone: 'exile', label: '🚫 To Exile' },
    ];
    transfers.forEach(({ zone, label }) => {
      if (zone !== fromZone && !excludeZones.includes(zone)) {
        actions.push({ label, fn: () => moveCard(pIdx, card, fromZone, zone) });
      }
    });
  };

  // ═══════════════════════════════════════════════════════════════
  // §9. CONTEXT MENU ACTIONS
  // ═══════════════════════════════════════════════════════════════
  const getCardActions = (pIdx, card, zone) => {
    const actions = [];
    // Card Info & Rulings always at top — always accessible
    actions.push({ label: '📖 Card Info & Rulings', fn: () => setCardInfoOverlay({ card }) });
    actions.push({ sep: true });
    // Ownership is determined by which player THIS client is
    const isOwner = pIdx === onlinePlayerIndex;
    const isOpponent = !isOwner;

    if (zone === 'hand') {
      // Opponent's hand is hidden — no actions
      if (isOpponent) return actions;
      if (isAdventure(card)) {
        const cFace = getCreatureFace(card);
        const aFace = getAdventureFace(card);
        actions.push({ label: `▶ Cast ${cFace.name} (${cFace.mana_cost})`, fn: () => castCard(pIdx, card, false) });
        actions.push({ label: `⚡ Cast ${aFace.name} (${aFace.mana_cost})`, fn: () => castCard(pIdx, card, true) });
      } else if (isSpellCard(card)) {
        // Check for Spectacle cost
        const cardOracle2 = [card.oracle_text || '', ...(card.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
        const spectacleMatch = cardOracle2.match(/spectacle \{([^}]+)\}/);
        const opponentIdx = pIdx === 0 ? 1 : 0;
        const opponentDealt = getState(opponentIdx).dealtDamageThisTurn;
        if (spectacleMatch && opponentDealt) {
          const spectacleCostStr = '{' + spectacleMatch[1] + '}';
          actions.push({ label: `🔥 Cast — Spectacle (${spectacleCostStr})`, fn: () => castCard(pIdx, card, false, spectacleCostStr) });
          actions.push({ label: `⚡ Cast — Normal (${card.mana_cost || '?'})`, fn: () => castCard(pIdx, card) });
        } else if (spectacleMatch && !opponentDealt) {
          actions.push({ label: `⚡ Cast (${card.mana_cost || '?'})`, fn: () => castCard(pIdx, card) });
          actions.push({ label: '🔥 Spectacle (opponent not damaged)', disabled: true });
        } else {
          actions.push({ label: '⚡ Cast (to Graveyard)', fn: () => castCard(pIdx, card) });
        }
      } else {
        actions.push({ label: '\u25b6 Play to Battlefield', fn: () => playCardFromHand(pIdx, card) });
        // Offspring: "You may pay {cost} additional. If you do, when ETB, create a 1/1 copy."
        const cardKwsHand = (card.keywords || []).map(k => k.toLowerCase());
        const cardOracleHand = getOracleText(card);
        const offspringMatch = cardOracleHand.match(/offspring\s*((?:\{[^}]+\})+)/i) || (cardKwsHand.includes('offspring') ? [null, '{2}'] : null);
        if (offspringMatch) {
          const offspringCost = offspringMatch[1] || '{2}';
          actions.push({
            label: '\u{1f476} Play + Offspring (' + offspringCost + ' extra)',
            fn: () => {
              playCardFromHand(pIdx, card);
              setTimeout(() => {
                const reskin = card._reskin;
                const tokenName = (reskin && reskin.customTokenName) || (reskin && reskin.name) || card.name;
                const token = {
                  id: uid(), name: tokenName + ' (Offspring)', isToken: true,
                  type_line: card.type_line || 'Creature', power: '1', toughness: '1',
                  colors: card.colors || [], oracle_text: card.oracle_text || '',
                  keywords: card.keywords ? card.keywords.slice() : [],
                  tapped: false, enteredThisTurn: true, counters: {},
                };
                if (reskin && reskin.customTokenImage) {
                  token.tokenImageSmall = reskin.customTokenImage;
                  token.tokenImageNormal = reskin.customTokenImage;
                } else if (card.image_uris && card.image_uris.small) {
                  token.tokenImageSmall = card.image_uris.small;
                  token.tokenImageNormal = (card.image_uris.normal || card.image_uris.small);
                }
                setState(pIdx, prev => ({ ...prev, battlefield: [...prev.battlefield, token] }));
                addGameLog(pIdx, '\u{1f476}', 'Offspring: Created 1/1 copy of ' + getDisplayName(card));
                setCastError({ pIdx, message: '\u{1f476} Offspring! Created 1/1 ' + tokenName + ' token' });
                setTimeout(() => setCastError(null), 3000);
                SFX.playCreature();
              }, 600);
            }
          });
        }
      }
      // Cycling option
      const cyclingCost = getCyclingCost(card);
      if (cyclingCost) {
        actions.push({ label: `🔄 Cycle (${cyclingCost})`, fn: () => cycleCard(pIdx, card) });
      }
      // Foretell option — exile face-down for {2}, cast later for foretell cost
      const foretellCost = getForetellCost(card);
      if (foretellCost) {
        actions.push({ label: `🔮 Foretell (pay {2}, exile face-down)`, fn: () => foretellCard(pIdx, card) });
      }
      actions.push({ sep: true });
      addZoneTransferActions(actions, pIdx, card, 'hand', ['hand', 'battlefield']);
      actions.push({ label: '📚 To Top of Library', fn: () => returnToLibrary(pIdx, card, 'hand', 'top') });
      actions.push({ label: '📚 To Bottom of Library', fn: () => returnToLibrary(pIdx, card, 'hand', 'bottom') });
    }

    if (zone === 'battlefield') {
      if (isOwner) {
        // Own cards: full access
        actions.push({ label: card.tapped ? '🔄 Untap' : '↩️ Tap', fn: () => toggleTap(pIdx, card.id) });
        // Creature land activation
        const clData = getCreatureLandData(card);
        if (clData) {
          // Regular creature lands: can only activate when untapped and not already animated
          // Permanent creature lands (Crawling Barrens): can activate multiple times to add counters
          const canActivate = clData.permanent
            ? true // Always allow activation for permanent lands (adds counters each time)
            : (!card.animatedCreature && !card.tapped);
          if (canActivate) {
            if (clData.isXCost) {
              for (let x = 1; x <= 6; x++) {
                const totalMana = x + Object.values(clData.cost).reduce((s, v) => s + v, 0);
                actions.push({ label: `⚡ Activate as ${x}/${x} (${totalMana} mana)`, fn: () => activateCreatureLand(pIdx, card, x) });
              }
            } else if (clData.addCounters && clData.permanent) {
              // "You may" lands like Crawling Barrens: two options
              const costStr = Object.entries(clData.cost).map(([k, v]) => k === 'generic' ? v : `${v}${k}`).join('+');
              const cLabel = `+${clData.addCounters.amount} ${clData.addCounters.type}`;
              actions.push({ label: `⚡ ${cLabel} + become creature (${costStr})`, fn: () => activateCreatureLand(pIdx, card) });
              actions.push({ label: `⚡ ${cLabel} only, stay land (${costStr})`, fn: () => activateCreatureLand(pIdx, card, null, true) });
            } else {
              const costStr = Object.entries(clData.cost).map(([k, v]) => k === 'generic' ? v : `${v}${k}`).join('+');
              const counterLabel = clData.addCounters ? ` (+${clData.addCounters.amount} ${clData.addCounters.type})` : '';
              actions.push({ label: `⚡ Activate ${clData.power}/${clData.toughness}${counterLabel} (${costStr})`, fn: () => activateCreatureLand(pIdx, card) });
            }
          }
        }
        if (card.animatedCreature) {
          actions.push({ label: '🔙 Revert to Land', fn: () => revertCreatureLands(pIdx) });
        }
        // Paid activated abilities (Midnight Clock, etc.)
        if (!isPlaneswalker(card)) {
          const paidAbilities = getPaidAbilities(card);
          if (paidAbilities.length > 0) {
            actions.push({ sep: true });
            paidAbilities.forEach(ab => {
              const canPay = !ab.manaCost || canPayManaCost(getState(pIdx).manaPool, ab.manaCost);
              const tappedBlock = ab.requiresTap && card.tapped;
              actions.push({
                label: `⚡ ${ab.label} (${ab.costStr})`,
                fn: () => activatePaidAbility(pIdx, card, ab),
                disabled: !canPay || tappedBlock
              });
            });
          }
        }
        // Sacrifice abilities (Mind Stone, etc.)
        {
          const sacAbilities = getSacrificeAbilities(card);
          if (sacAbilities.length > 0) {
            actions.push({ sep: true });
            sacAbilities.forEach(ab => {
              const canPay = !ab.manaCost || canPayManaCost(getState(pIdx).manaPool, ab.manaCost);
              const tappedBlock = ab.requiresTap && card.tapped;
              actions.push({
                label: `💀 Sacrifice: ${ab.label} (${ab.costStr})`,
                fn: () => activateSacrificeAbility(pIdx, card, ab),
                disabled: !canPay || tappedBlock
              });
            });
          }
        }
        // Troll Aura sacrifice -> 4/4 Troll Warrior token
        if (card.trollAura) {
          actions.push({ sep: true });
          actions.push({
            label: '\u{1f333} Sacrifice Aura \u2192 Create 4/4 Troll with Trample',
            fn: () => {
              const token = {
                id: uid(), name: 'Troll Warrior Token', isToken: true,
                type_line: 'Creature — Troll Warrior',
                power: '4', toughness: '4',
                colors: ['G'], keywords: ['trample'],
                oracle_text: 'Trample', tapped: false, enteredThisTurn: true, counters: {},
              };
              setState(pIdx, prev => ({
                ...prev,
                battlefield: prev.battlefield.filter(c => c.id !== card.id).concat([token]),
              }));
              addGameLog(pIdx, '\u{1f333}', 'Sacrificed Troll Aura: Created 4/4 Troll Warrior with trample');
              setCastError({ pIdx, message: '\u{1f333} Created 4/4 Troll Warrior token with trample!' });
              setTimeout(() => setCastError(null), 3000);
              SFX.playCreature();
            }
          });
        }
        // Planeswalker abilities
        if (isPlaneswalker(card)) {
          actions.push({ sep: true });
          const pwAbilities = parsePlaneswalkerAbilities(card);
          const currentLoyalty = (card.counters && card.counters['loyalty']) || 0;
          actions.push({ label: `💎 Loyalty: ${currentLoyalty}`, fn: () => {} });
          if (pwAbilities.length > 0) {
            pwAbilities.forEach((ab, i) => {
              const costNum = parseInt(ab.cost);
              const canActivate = costNum >= 0 || (currentLoyalty + costNum >= 0);
              const shortText = ab.text.length > 50 ? ab.text.slice(0, 47) + '...' : ab.text;
              actions.push({
                label: `${canActivate ? '⚡' : '🚫'} [${ab.cost}]: ${shortText}`,
                fn: canActivate ? () => activatePlaneswalkerAbility(pIdx, card, ab) : () => {
                  setCastError({ pIdx, message: `Not enough loyalty (${currentLoyalty}) for [${ab.cost}]` });
                  setTimeout(() => setCastError(null), 2000);
                }
              });
            });
          }
          actions.push({ sep: true });
          actions.push({ label: '➕ Add Loyalty', fn: () => addCounter(pIdx, card.id, 'loyalty') });
          actions.push({ label: '➖ Remove Loyalty', fn: () => removeCounter(pIdx, card.id, 'loyalty') });
        }
        actions.push({ sep: true });
        if (!isPlaneswalker(card)) {
          actions.push({ label: '➕ +1/+1 Counter', fn: () => addCounter(pIdx, card.id, '+1/+1') });
          actions.push({ label: '➖ -1/-1 Counter', fn: () => addCounter(pIdx, card.id, '-1/-1') });
        }
        const counterTypes = Object.keys(card.counters || {}).filter(t => t !== 'loyalty');
        counterTypes.forEach(type => {
          actions.push({ label: `Remove ${type} Counter`, fn: () => removeCounter(pIdx, card.id, type) });
        });
        if (counterTypes.length > 0) {
          actions.push({ label: '🗑️ Remove All Counters', fn: () => removeAllCounters(pIdx, card.id) });
        }
        // Temporary buff options (until end of turn)
        if (isCreature(card) && !isPlaneswalker(card)) {
          actions.push({ sep: true });
          actions.push({ label: '⏳ Temp Buff (until end of turn)', fn: () => {
            const input = prompt('Enter buff (e.g. +3/+3 or -2/-2):');
            if (!input) return;
            const buffMatch = input.match(/([+-]?\d+)\/([+-]?\d+)/);
            if (buffMatch) {
              const pMod = parseInt(buffMatch[1]);
              const tMod = parseInt(buffMatch[2]);
              setState(pIdx, prev => ({
                ...prev,
                battlefield: prev.battlefield.map(c => {
                  if (c.id !== card.id) return c;
                  const existing = c.tempBuffs || { power: 0, toughness: 0, keywords: [] };
                  return { ...c, tempBuffs: { ...existing, power: (existing.power || 0) + pMod, toughness: (existing.toughness || 0) + tMod } };
                })
              }));
              setCastError({ pIdx, message: `${card.name} gets ${input} until end of turn`, background: '#2a2a1a' });
              setTimeout(() => setCastError(null), 1500);
            }
          }});
          actions.push({ label: '⚔️ Temp Keywords (until end of turn)', fn: () => {
            const input = prompt('Enter keywords (e.g. lifelink, trample, flying, deathtouch, haste, vigilance, menace, first strike, double strike, hexproof, indestructible, reach, protection from red):');
            if (!input) return;
            const newKeywords = input.split(',').map(k => k.trim().toLowerCase()).filter(Boolean);
            if (newKeywords.length === 0) return;
            setState(pIdx, prev => ({
              ...prev,
              battlefield: prev.battlefield.map(c => {
                if (c.id !== card.id) return c;
                const existing = c.tempBuffs || { power: 0, toughness: 0, keywords: [] };
                const existingKw = existing.keywords || [];
                const merged = [...new Set([...existingKw, ...newKeywords])];
                return { ...c, tempBuffs: { ...existing, keywords: merged } };
              })
            }));
            setCastError({ pIdx, message: `${card.name} gains ${newKeywords.join(', ')} until end of turn`, background: '#2a2a1a' });
            setTimeout(() => setCastError(null), 2000);
          }});
          const hasTempBuff = card.tempBuffs && (card.tempBuffs.power || card.tempBuffs.toughness || (card.tempBuffs.keywords && card.tempBuffs.keywords.length > 0));
          if (hasTempBuff) {
            actions.push({ label: '⏳ Clear Temp Buffs', fn: () => {
              setState(pIdx, prev => ({
                ...prev,
                battlefield: prev.battlefield.map(c => c.id === card.id ? { ...c, tempBuffs: null } : c)
              }));
            }});
          }
        }
        // Damage prevention on own creature (e.g. protect from combat damage)
        if (isCreature(card) && !isPlaneswalker(card)) {
          if (!card.damagePrevented && card.damagePrevented !== 0) {
            actions.push({ label: '🛡 Prevent all damage until next turn', fn: () => {
              setState(pIdx, prev => ({
                ...prev,
                battlefield: prev.battlefield.map(c => c.id === card.id ? { ...c, damagePrevented: onlinePlayerIndex } : c)
              }));
              addGameLog(pIdx, '🛡', `${card.name}: all damage prevented until ${getState(onlinePlayerIndex).name}'s next turn`);
              setCastError({ pIdx, message: `🛡 ${card.name}: damage prevented until your next turn`, background: '#1a2a1a' });
              setTimeout(() => setCastError(null), 2000);
            }});
          } else {
            actions.push({ label: '🛡 Remove damage prevention', fn: () => {
              setState(pIdx, prev => ({
                ...prev,
                battlefield: prev.battlefield.map(c => c.id === card.id ? { ...c, damagePrevented: undefined } : c)
              }));
              addGameLog(pIdx, '🛡', `${card.name}: damage prevention removed`);
            }});
          }
        }
        // Attachment options for Auras and Equipment
        if (isAura(card) || isEquipment(card)) {
          actions.push({ sep: true });
          if (card.attachedTo) {
            const attached = getState(pIdx).battlefield.find(c => c.id === card.attachedTo);
            actions.push({ label: `📎 Attached to: ${attached?.name || '???'}`, disabled: true });
            actions.push({ label: '📎 Move to other creature...', fn: () => setAttachChoice({ pIdx, card }) });
            actions.push({ label: '📎 Detach', fn: () => detachCard(pIdx, card) });
          } else {
            actions.push({ label: '📎 Attach to creature...', fn: () => setAttachChoice({ pIdx, card }) });
          }
        }
        actions.push({ sep: true });
        // Return to original owner (for stolen cards)
        if (card.originalOwner !== undefined && card.originalOwner !== pIdx) {
          const ownerName = getState(card.originalOwner).name;
          actions.push({ label: `🔙 Return to ${ownerName}`, fn: () => {
            const returnedCard = { ...card, tapped: false };
            delete returnedCard.temporaryControl;
            delete returnedCard.originalOwner;
            if (returnedCard.grantedHaste) {
              returnedCard.keywords = (returnedCard.keywords || []).filter(k => k.toLowerCase() !== 'haste');
              delete returnedCard.grantedHaste;
            }
            setState(pIdx, prev => ({ ...prev, battlefield: prev.battlefield.filter(c => c.id !== card.id) }));
            setState(card.originalOwner, prev => ({ ...prev, battlefield: [...prev.battlefield, returnedCard] }));
            setCastError({ pIdx: card.originalOwner, message: `🔙 ${card.name} returned to ${ownerName}` });
            setTimeout(() => setCastError(null), 2000);
          }});
        }
        // Give to opponent (permanent control change, e.g. Donate)
        const opponentIdx = pIdx === 0 ? 1 : 0;
        if (isCreature(card) && (card.originalOwner === undefined || card.originalOwner === pIdx)) {
          actions.push({ label: `🔀 Give to ${getState(opponentIdx).name}`, fn: () => gainControl(pIdx, opponentIdx, card, false) });
        }
        if (card.isToken) {
          actions.push({ label: '📋 Clone Token', fn: () => cloneToken(pIdx, card) });
          actions.push({ label: '🗑️ Destroy Token (dies)', fn: () => moveCard(pIdx, card, 'battlefield', 'graveyard') });
          actions.push({ label: '🚫 Exile Token', fn: () => moveCard(pIdx, card, 'battlefield', 'exile') });
        } else {
          addZoneTransferActions(actions, pIdx, card, 'battlefield');
          actions.push({ label: '📎 Exile (linked to...)', fn: () => setExileLinkChoice({ targetPIdx: pIdx, card, sourcePIdx: pIdx }) });
          actions.push({ label: '📚 To Top of Library', fn: () => returnToLibrary(pIdx, card, 'battlefield', 'top') });
        }
      } else {
        // Opponent's cards: destructive actions + gain control (spell effects)
        actions.push({ label: '➖ -1/-1 Counter', fn: () => addCounter(pIdx, card.id, '-1/-1') });
        // Damage prevention (Kiora's +1, Fog-like targeted effects)
        // damagePrevented stores the pIdx of the player who set it — cleared when THAT player's next turn starts
        if (!card.damagePrevented && card.damagePrevented !== 0) {
          actions.push({ label: '🛡 Prevent all damage until next turn', fn: () => {
            setState(pIdx, prev => ({
              ...prev,
              battlefield: prev.battlefield.map(c => c.id === card.id ? { ...c, damagePrevented: onlinePlayerIndex } : c)
            }));
            addGameLog(pIdx, '🛡', `${card.name}: all damage prevented until ${getState(onlinePlayerIndex).name}'s next turn`);
            setCastError({ pIdx, message: `🛡 ${card.name}: damage prevented until your next turn`, background: '#1a2a1a' });
            setTimeout(() => setCastError(null), 2000);
          }});
        } else {
          actions.push({ label: '🛡 Remove damage prevention', fn: () => {
            setState(pIdx, prev => ({
              ...prev,
              battlefield: prev.battlefield.map(c => c.id === card.id ? { ...c, damagePrevented: undefined } : c)
            }));
            addGameLog(pIdx, '🛡', `${card.name}: damage prevention removed`);
          }});
        }
        actions.push({ sep: true });
        // Gain control options
        if (isCreature(card)) {
          actions.push({ label: '🔀 Gain Control (permanent)', fn: () => gainControl(pIdx, activePlayer, card, false) });
          actions.push({ label: '🔀 Gain Control (until end of turn)', fn: () => gainControl(pIdx, activePlayer, card, true) });
          actions.push({ sep: true });
        }
        if (card.isToken) {
          actions.push({ label: '🗑️ Destroy Token', fn: () => moveCard(pIdx, card, 'battlefield', 'graveyard') });
          actions.push({ label: '🚫 Exile Token', fn: () => moveCard(pIdx, card, 'battlefield', 'exile') });
        } else {
          actions.push({ label: '🤚 Return to Hand', fn: () => moveCard(pIdx, card, 'battlefield', 'hand') });
          actions.push({ label: '💀 To Graveyard', fn: () => moveCard(pIdx, card, 'battlefield', 'graveyard') });
          actions.push({ label: '🚫 To Exile', fn: () => moveCard(pIdx, card, 'battlefield', 'exile') });
          actions.push({ label: '📎 Exile (linked to...)', fn: () => setExileLinkChoice({ targetPIdx: pIdx, card, sourcePIdx: activePlayer }) });
          actions.push({ label: '📚 To Top of Library', fn: () => returnToLibrary(pIdx, card, 'battlefield', 'top') });
        }
      }
    }

    if (zone === 'graveyard') {
      // Flashback / Jump-start / Escape / Disturb detection
      if (isOwner) {
        const cardKws = (card.keywords || []).map(k => k.toLowerCase());
        const cardOracle = [card.oracle_text || '', ...(card.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();

        if (cardKws.includes('flashback') || cardOracle.includes('flashback')) {
          const fbMatch = cardOracle.match(/flashback\s*((?:\{[^}]+\})+)/);
          const fbCost = fbMatch ? fbMatch[1] : '?';
          actions.push({ label: `🔄 Flashback (${fbCost})`, fn: () => {
            castCard(pIdx, card); // cast normally
            // After casting, exile instead of graveyard
            setTimeout(() => moveCard(pIdx, card, 'graveyard', 'exile'), 50);
          }});
        }
        if (cardKws.includes('jump-start') || cardOracle.includes('jump-start')) {
          actions.push({ label: '🔄 Jump-Start (discard + cast)', fn: () => {
            castCard(pIdx, card);
            setTimeout(() => moveCard(pIdx, card, 'graveyard', 'exile'), 50);
          }});
        }
        if (cardKws.includes('escape') || cardOracle.includes('escape')) {
          const escMatch = cardOracle.match(/escape.*?(\{[^}]+\}(?:\{[^}]+\})*)/);
          const escCost = escMatch ? escMatch[1] : '?';
          actions.push({ label: `🔄 Escape (${escCost} + exile cards)`, fn: () => {
            moveCard(pIdx, card, 'graveyard', 'battlefield');
          }});
        }
        if (cardKws.includes('disturb') || cardOracle.includes('disturb')) {
          actions.push({ label: '🔄 Disturb (cast back face)', fn: () => {
            moveCard(pIdx, card, 'graveyard', 'battlefield');
          }});
        }
        if (cardKws.includes('unearth') || cardOracle.includes('unearth')) {
          const ueMatch = cardOracle.match(/unearth\s*((?:\{[^}]+\})+)/);
          const ueCost = ueMatch ? ueMatch[1] : '?';
          actions.push({ label: `🔄 Unearth (${ueCost})`, fn: () => {
            moveCard(pIdx, card, 'graveyard', 'battlefield');
          }});
        }
        if (cardKws.includes('blitz') || cardOracle.includes('blitz')) {
          const blitzMatch = cardOracle.match(/blitz\s*((?:\{[^}]+\})+)/);
          const blitzCost = blitzMatch ? blitzMatch[1] : '?';
          actions.push({ label: `⚡ Blitz (${blitzCost})`, fn: () => {
            moveCard(pIdx, card, 'graveyard', 'battlefield');
            SFX.playSpell();
            addGameLog(pIdx, '⚡', `${card.name} cast with Blitz — remember: give Haste via buff, sacrifice at end of turn, draw on death`, [card.id]);
            setCastError({ pIdx, message: `⚡ ${card.name} Blitz! Give Haste via right-click → Temp Buff. Sacrifice at end of turn. Draw a card when it dies.` });
            setTimeout(() => setCastError(null), 5000);
          }});
        }
        if (actions.length > 0 && (cardKws.includes('flashback') || cardKws.includes('jump-start') || cardKws.includes('escape') || cardKws.includes('disturb') || cardKws.includes('unearth'))) {
          actions.push({ sep: true });
        }

        actions.push({ label: '🤚 To Hand', fn: () => moveCard(pIdx, card, 'graveyard', 'hand') });
        actions.push({ label: '▶ To Battlefield', fn: () => moveCard(pIdx, card, 'graveyard', 'battlefield') });
      }
      actions.push({ label: '🚫 To Exile', fn: () => moveCard(pIdx, card, 'graveyard', 'exile') });
      // Create Token Copy — for creature cards in graveyard (Scarab God, God-Pharaoh's Gift, etc.)
      if (isCreature(card)) {
        actions.push({ label: '👻 Create Token Copy (exile this)', fn: () => createTokenCopy(pIdx, card, 'graveyard') });
      }
      if (isOwner) {
        actions.push({ label: '📚 To Top of Library', fn: () => returnToLibrary(pIdx, card, 'graveyard', 'top') });
      }
    }

    if (zone === 'exile') {
      // Foretold cards — cast for foretell cost
      if (isOwner && card.isForetold) {
        actions.push({ label: `🔮 Cast from Foretell (${card.foretellCost || '?'})`, fn: () => castForetold(pIdx, card) });
        actions.push({ label: `📋 ${card.name} — ${card.mana_cost || ''}`, disabled: true });
        actions.push({ sep: true });
        actions.push({ label: '🤚 To Hand', fn: () => moveCard(pIdx, card, 'exile', 'hand') });
        actions.push({ label: '💀 To Graveyard', fn: () => moveCard(pIdx, card, 'exile', 'graveyard') });
        return actions; // Foretold cards have their own menu — no need for other exile options
      }
      if (isOwner && card.adventureCast && isAdventure(card)) {
        const cFace = getCreatureFace(card);
        actions.push({ label: `▶ Cast ${cFace.name} (${cFace.mana_cost})`, fn: () => castAdventureFromExile(pIdx, card) });
        actions.push({ sep: true });
      }
      // Jace -8 ultimate: Cast for free from exile
      // castFree without castFreeFor = own exile (owner casts). castFreeFor = opponent's exile (specified player casts).
      // In local mode (!onlineMode), always allow since one person controls both sides.
      const canCastFree = card.castFree && (!onlineMode || (isOwner ? !card.castFreeFor : card.castFreeFor === onlinePlayerIndex));
      if (canCastFree) {
        const castingPIdx = card.castFreeFor !== undefined ? card.castFreeFor : pIdx;
        if (isSpellCard(card)) {
          actions.push({ label: `💫 Cast FREE (${card.name})`, fn: () => {
            castCard(castingPIdx, card, false, '{0}');
          }});
        } else {
          actions.push({ label: `💫 Play FREE to Battlefield`, fn: () => {
            moveCard(castingPIdx, card, 'exile', 'battlefield');
          }});
        }
        actions.push({ sep: true });
      }
      // Light Up the Stage / Act on Impulse — cast from exile
      if (card.exilePlayable && card.exilePlayableBy === pIdx) {
        const expired = card.exilePlayableTurn !== undefined && turnCount > card.exilePlayableTurn;
        if (expired) {
          actions.push({ label: '⏰ Expired — can no longer play this card', disabled: true });
          actions.push({ sep: true });
        } else {
          const cost = card.mana_cost || '';
          const turnsLeft = card.exilePlayableTurn !== undefined ? (card.exilePlayableTurn - turnCount) : '?';
          const isLandCard = isLand(card);
          if (isLandCard) {
            actions.push({ label: `🔥 Play Land from Exile`, fn: () => {
              moveCard(pIdx, card, 'exile', 'battlefield');
            }});
          } else {
            actions.push({ label: `🔥 Cast from Exile (${cost})`, fn: () => {
              castCard(pIdx, card, false, null);
            }});
          }
          if (turnsLeft !== '?') {
            actions.push({ label: `⏳ Playable for ${turnsLeft <= 0 ? 'this turn only' : turnsLeft + ' more turn(s)'}`, disabled: true });
          }
          actions.push({ sep: true });
        }
      }
      if (isOwner) {
        addZoneTransferActions(actions, pIdx, card, 'exile');
      }
      // Create Token Copy — for creature cards in exile (Mimic Vat, Imprint effects, etc.)
      if (isCreature(card) && !card.isForetold) {
        actions.push({ label: '👻 Create Token Copy', fn: () => createTokenCopy(pIdx, card, 'exile') });
      }
    }

    if (zone === 'library') {
      if (isOwner) {
        actions.push({ label: '🤚 To Hand', fn: () => moveCard(pIdx, card, 'library', 'hand') });
        actions.push({ label: '▶ To Battlefield', fn: () => moveCard(pIdx, card, 'library', 'battlefield') });
      }
    }

    return actions;
  };

  const handleContext = (e, card, pIdx, zone) => {
    e.preventDefault();
    // In online mode, block context menu on opponent's hand and library
    if (onlineMode && pIdx !== onlinePlayerIndex && (zone === 'hand' || zone === 'library')) return;
    setContextMenu({
      x: e.clientX, y: e.clientY, card,
      actions: getCardActions(pIdx, card, zone)
    });
  };

  const [castError, setCastError] = useState(null); // { pIdx, message }
  const [etbReminder, setEtbReminder] = useState(null); // { pIdx, card, effects[] }
  const [modalChoice, _setModalChoice] = useState(null); // SYNCED — { pIdx, card, triggerType, choices: [{ label, icon, action }] }
  const setModalChoice = syncSetter(_setModalChoice);
  const [farewellChoice, setFarewellChoice] = useState(null); // { pIdx, card, categories, selected: Set } — Farewell "choose one or more" modal
  const [cardInfoOverlay, setCardInfoOverlay] = useState(null); // { card } — shows card info & rulings overlay
  const [discardChoice, setDiscardChoice] = useState(null); // { pIdx, selected: [cardId, ...] } — cleanup step discard to hand size

  // ===== GAME ACTION LOG =====
  const [gameLog, setGameLog] = useState([]); // [{ id, time, pIdx, icon, text, highlight? }]
  const [gameLogOpen, setGameLogOpen] = useState(false);
  const [highlightCards, setHighlightCards] = useState([]); // [cardId, ...] — cards with visual glow
  const gameLogIdRef = useRef(0);

  const addGameLog = (pIdx, icon, text, highlightCardIds = []) => {
    const entry = { id: ++gameLogIdRef.current, time: Date.now(), pIdx, icon, text, highlightCardIds };
    setGameLog(prev => [...prev.slice(-49), entry]); // keep last 50 entries
    // Visual highlight on targeted cards
    if (highlightCardIds.length > 0) {
      setHighlightCards(highlightCardIds);
      setTimeout(() => setHighlightCards([]), 2200);
    }
    // Queue log entry for next broadcast (bundled with state sync to avoid race conditions)
    if (onlineMode) {
      pendingLogEntriesRef.current.push(entry);
      onlineSyncNeededRef.current = true;
    }
  };

  // Scan battlefield for "whenever another creature enters the battlefield" triggers (Purphoros, Soul Warden, etc.)
  const scanOtherCreatureETBTriggers = (pIdx, enteringCard) => {
    const triggers = [];
    const st = getState(pIdx);
    for (const perm of st.battlefield) {
      if (perm.id === enteringCard.id) continue; // skip the entering card itself
      const oracle = [perm.oracle_text || '', ...(perm.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
      // "whenever another creature enters the battlefield under your control" or "whenever a creature enters the battlefield under your control"
      // Also: "whenever another creature enters the battlefield" (no "under your control" — could be any)
      if (oracle.includes('whenever another creature enters the battlefield') ||
          oracle.includes('whenever a creature enters the battlefield under your control') ||
          oracle.includes('whenever a nontoken creature enters the battlefield') ||
          oracle.includes('whenever another nontoken creature enters the battlefield')) {
        // Check if it's nontoken-only and the entering card is a token
        if ((oracle.includes('nontoken') && enteringCard.isToken)) continue;
        // Extract the effect text
        const effectMatch = oracle.match(/whenever (?:another |a )?(?:nontoken )?creature enters the battlefield[^,]*,\s*([^.]+)/);
        const effectText = effectMatch ? effectMatch[1].trim() : 'creature ETB trigger';
        triggers.push({ icon: '⚡', text: `${perm.name}: ${effectText}` });
      }
    }
    // Also check opponent's battlefield for symmetrical effects (e.g. "whenever a creature enters the battlefield" without "under your control")
    const oppIdx = pIdx === 0 ? 1 : 0;
    const oppSt = getState(oppIdx);
    for (const perm of oppSt.battlefield) {
      const oracle = [perm.oracle_text || '', ...(perm.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
      // Only trigger if it says "whenever a creature enters the battlefield" (any, not just yours)
      if ((oracle.includes('whenever a creature enters the battlefield') || oracle.includes('whenever another creature enters the battlefield'))
          && !oracle.includes('under your control')) {
        if ((oracle.includes('nontoken') && enteringCard.isToken)) continue;
        const effectMatch = oracle.match(/whenever (?:another |a )?(?:nontoken )?creature enters the battlefield[^,]*,\s*([^.]+)/);
        const effectText = effectMatch ? effectMatch[1].trim() : 'creature ETB trigger';
        triggers.push({ icon: '⚡', text: `${perm.name} (opponent): ${effectText}` });
      }
    }
    return triggers;
  };

  // ═══════════════════════════════════════════════════════════════
  // §10. TRIGGER SYSTEM (ETB/LTB)
  // ═══════════════════════════════════════════════════════════════
  // Parse ETB (enters the battlefield) effects from a creature's oracle text
  const parseETBEffects = (card) => {
    const allText = getOracleText(card);
    if (!allText.includes('enters the battlefield') && !allText.includes('enters, ')) return [];
    const effects = [];
    // Damage to target player or planeswalker (Viashino Pyromancer)
    const dmgPlayerPWMatch = allText.match(/enters.*(?:deals?|it deals) (\d+) damage to target (player or planeswalker|opponent or planeswalker)/);
    if (dmgPlayerPWMatch) {
      effects.push({ icon: '🔥', text: `Deal ${dmgPlayerPWMatch[1]} damage to target ${dmgPlayerPWMatch[2]}`, actionType: 'etb_damage_player_pw', damage: parseInt(dmgPlayerPWMatch[1]) });
    }
    // Damage to opponent/player (generic)
    const dmgMatch = !dmgPlayerPWMatch && allText.match(/enters.*(?:deals?|it deals) (\d+) damage to (?:target )?(opponent|player|each opponent|any target)/);
    if (dmgMatch) effects.push({ icon: '🔥', text: `Deal ${dmgMatch[1]} damage to ${dmgMatch[2]}` });
    // Opponent loses life
    const loseLifeMatch = allText.match(/enters.*(?:target )?(?:opponent|player) loses (\d+) life/);
    if (loseLifeMatch) effects.push({ icon: '💀', text: `Target opponent loses ${loseLifeMatch[1]} life` });
    // Each opponent loses life (Gary-style)
    const eachLoseMatch = allText.match(/enters.*each opponent loses (?:life equal to|(\d+) life)/);
    if (eachLoseMatch) effects.push({ icon: '💀', text: eachLoseMatch[1] ? `Each opponent loses ${eachLoseMatch[1]} life` : 'Each opponent loses life equal to devotion' });
    // Gain life
    const lifeMatch = allText.match(/enters.*gain (\d+) life/);
    if (lifeMatch) effects.push({ icon: '💚', text: `Gain ${lifeMatch[1]} life` });
    // Draw cards
    const drawMatch = allText.match(/enters.*draw (\w+|\d+) cards?/);
    if (drawMatch) effects.push({ icon: '📘', text: `Draw ${drawMatch[1]} card(s)` });
    // Destroy/exile target
    if (/enters.*destroy target/.test(allText)) effects.push({ icon: '💀', text: 'Destroy target permanent' });
    if (/enters.*exile target/.test(allText)) effects.push({ icon: '🚫', text: 'Exile target permanent' });
    // Return to hand (bounce)
    if (/enters.*return target.*to.*hand/.test(allText)) effects.push({ icon: '🤚', text: 'Return target to hand' });
    if (/enters.*return up to \w+ target.*to.*hand/.test(allText)) effects.push({ icon: '🤚', text: 'Return target(s) to hand' });
    // +1/+1 counters
    if (/enters.*\+1\/\+1 counter/.test(allText)) effects.push({ icon: '⬆', text: 'Put +1/+1 counter(s)' });
    // Create token
    if (/enters.*create/.test(allText)) {
      const tokenMatch = allText.match(/enters.*create (\w+) ([\d\/]+ )?(\w[\w ]*?) (creature )?token/);
      if (tokenMatch) effects.push({ icon: '✦', text: `Create ${tokenMatch[1]} ${tokenMatch[3]} token(s)` });
      else effects.push({ icon: '✦', text: 'Create token(s)' });
    }
    // Search library for land (Solemn Simulacrum, Farhaven Elf, etc.)
    if (/enters.*search your library for a basic land/i.test(allText)) {
      const tapped = /tapped/.test(allText);
      effects.push({ icon: '🔍', text: `Search library for a basic land${tapped ? ' (tapped)' : ''}`, actionType: 'search_basic_land', tapped });
    } else if (/enters.*search your library for a land/i.test(allText)) {
      const tapped = /tapped/.test(allText);
      effects.push({ icon: '🔍', text: `Search library for a land${tapped ? ' (tapped)' : ''}`, actionType: 'search_land', tapped });
    }
    // Discard
    if (/enters.*discard/.test(allText)) effects.push({ icon: '🗑', text: 'Target discards' });
    // Scry/surveil
    {
        const etbScryMatch = allText.match(/enters.*scry (\d+)/);
        if (etbScryMatch) {
          const scryCount = parseInt(etbScryMatch[1]) || 1;
          effects.push({ icon: '🔮', text: 'Scry ' + scryCount, type: 'scry', count: scryCount });
          if (/scry \d+.*then draw a card/i.test(allText)) {
            effects.push({ icon: '🃏', text: 'Draw a card', type: 'draw', count: 1 });
          }
        }
      }
    // Generic ETB — if none matched but it mentions "enters the battlefield"
    if (effects.length === 0 && (allText.includes('enters the battlefield') || allText.includes('enters, '))) {
      // Extract a short snippet of the ETB ability
      const etbMatch = allText.match(/(when.*?enters.*?(?:\.|$))/);
      if (etbMatch) effects.push({ icon: '⚡', text: etbMatch[1].slice(0, 80) });
    }
    return effects;
  };

  // Parse LTB (Leave the Battlefield) / dies triggers from oracle text
  const parseLTBEffects = (card) => {
    const allText = getOracleText(card);
    const effects = [];
    const cardName = (card.name || '').toLowerCase();

    // "When ~ leaves the battlefield" triggers
    if (allText.includes('leaves the battlefield')) {
      const ltbMatch = allText.match(/(when.*?leaves the battlefield.*?(?:\.|$))/);
      if (ltbMatch) effects.push({ icon: '🚪', text: ltbMatch[1].slice(0, 120) });
    }
    // "When ~ dies" triggers
    if (allText.includes('when') && allText.includes('dies')) {
      if (/when.*dies.*create.*creature token.*where x is the number of creatures you control/i.test(allText)) {
        effects.push({ icon: '\u2726', text: 'DIES \u2192 Create X/X token (X = creatures you control)', actionType: 'death_xx_token' });
      } else {
        const diesMatch = allText.match(/(when.*?dies.*?(?:\.|$))/);
        if (diesMatch && !diesMatch[1].includes('leaves the battlefield')) {
          effects.push({ icon: '\u{1f480}', text: diesMatch[1].slice(0, 120) });
        }
      }
    }
    // "When ~ is put into a graveyard from the battlefield"
    if (allText.includes('put into a graveyard from the battlefield')) {
      const gravMatch = allText.match(/(when.*?put into a graveyard from the battlefield.*?(?:\.|$))/);
      if (gravMatch) effects.push({ icon: '💀', text: gravMatch[1].slice(0, 120) });
    }
    // Undying keyword: return with +1/+1 counter if no +1/+1 counters
    const kw = (card.keywords || []).map(k => k.toLowerCase());
    if (kw.includes('undying')) {
      const has11 = (card.counters?.['+1/+1'] || 0) > 0;
      if (!has11) {
        effects.push({ icon: '♻️', text: 'UNDYING — Return to battlefield with a +1/+1 counter!' });
      } else {
        effects.push({ icon: '♻️', text: 'Undying (already has +1/+1 counter — stays dead)' });
      }
    }
    // Persist keyword: return with -1/-1 counter if no -1/-1 counters
    if (kw.includes('persist')) {
      const hasM1 = (card.counters?.['-1/-1'] || 0) > 0;
      if (!hasM1) {
        effects.push({ icon: '♻️', text: 'PERSIST — Return to battlefield with a -1/-1 counter!' });
      } else {
        effects.push({ icon: '♻️', text: 'Persist (already has -1/-1 counter — stays dead)' });
      }
    }
    // "Return to hand at end step" — e.g. The Scarab God, Reassembling Skeleton variants
    if (allText.includes('return') && allText.includes('hand') && (allText.includes('end step') || allText.includes('next end'))) {
      effects.push({ icon: '🤚', text: '⚠️ REMINDER: Return this card to its owner\'s hand at the beginning of the next end step!' });
    }
    // "Return to the battlefield" at end step — e.g. Norin the Wary, Restoration Angel targets
    if (allText.includes('return') && allText.includes('battlefield') && (allText.includes('end step') || allText.includes('next end')) && !allText.includes('hand')) {
      effects.push({ icon: '▶', text: '⚠️ REMINDER: Return this card to the battlefield at the beginning of the next end step!' });
    }
    return effects;
  };

  // Scan battlefield for "whenever you cast" triggers
  const checkCastTriggers = (pIdx, castCard) => {
    const p = getState(pIdx);
    const castType = (castCard.type_line || '').toLowerCase();
    const castCmc = castCard.cmc !== undefined ? castCard.cmc : (castCard.card_faces?.[0]?.cmc || 0);
    const triggers = [];

    for (const perm of p.battlefield) {
      if (perm.id === castCard.id) continue; // Don't trigger on itself
      const allText = getOracleText(perm);

      // "Whenever you cast a noncreature spell" (Shark Typhoon, Monastery Mentor, Sedgemoor Witch)
      if (allText.includes('whenever you cast a noncreature spell') && !castType.includes('creature')) {
        const triggerMatch = allText.match(/(whenever you cast a noncreature spell[^.]*\.)/);
        triggers.push({ permanent: perm, text: triggerMatch ? triggerMatch[1] : 'Whenever you cast a noncreature spell — triggered!', castCmc });
      }
      // "Whenever you cast an instant or sorcery spell" (Young Pyromancer, Guttersnipe)
      else if (allText.includes('whenever you cast an instant or sorcery') && (castType.includes('instant') || castType.includes('sorcery'))) {
        const triggerMatch = allText.match(/(whenever you cast an instant or sorcery[^.]*\.)/);
        triggers.push({ permanent: perm, text: triggerMatch ? triggerMatch[1] : 'Whenever you cast an instant or sorcery — triggered!' });
      }
      // "Whenever you cast a creature spell" (Beast Whisperer)
      else if (allText.includes('whenever you cast a creature spell') && castType.includes('creature')) {
        const triggerMatch = allText.match(/(whenever you cast a creature spell[^.]*\.)/);
        triggers.push({ permanent: perm, text: triggerMatch ? triggerMatch[1] : 'Whenever you cast a creature spell — triggered!' });
      }
      // "Whenever you cast a spell" (generic, e.g. Aetherflux Reservoir)
      else if (/whenever you cast a spell/.test(allText) && !/whenever you cast a (noncreature|creature|instant|sorcery|enchantment|artifact)/.test(allText)) {
        const triggerMatch = allText.match(/(whenever you cast a spell[^.]*\.)/);
        triggers.push({ permanent: perm, text: triggerMatch ? triggerMatch[1] : 'Whenever you cast a spell — triggered!' });
      }
      // "Whenever you cast an enchantment spell"
      else if (allText.includes('whenever you cast an enchantment') && castType.includes('enchantment')) {
        const triggerMatch = allText.match(/(whenever you cast an enchantment[^.]*\.)/);
        triggers.push({ permanent: perm, text: triggerMatch ? triggerMatch[1] : 'Whenever you cast an enchantment — triggered!' });
      }
    }

    // "Whenever an opponent casts a spell during your turn" (Voice of Resurgence)
    const oppIdx = pIdx === 0 ? 1 : 0;
    const opp = getState(oppIdx);
    if (activePlayer === oppIdx) {
      for (const perm of opp.battlefield) {
        const permText = getOracleText(perm);
        if (/whenever an opponent casts a spell during your turn/i.test(permText)) {
          const trigMatch = permText.match(/(whenever an opponent casts a spell during your turn[^.]*\.)/i);
          triggers.push({ permanent: perm, text: trigMatch ? trigMatch[1] : perm.name + ': Opponent cast during your turn!' });
        }
      }
    }

    // Also check emblems for "whenever you cast a spell" triggers
    for (const emblem of (p.emblems || [])) {
      const emblemText = (emblem.text || '').toLowerCase();
      if (/whenever you cast a spell/.test(emblemText)) {
        triggers.push({ permanent: { name: emblem.name, id: emblem.id }, text: emblem.text });
      }
    }

    if (triggers.length > 0) {
      const effects = triggers.map(t => ({
        icon: '⚡',
        text: `${t.permanent.name}: ${t.text}${t.castCmc !== undefined ? ` (cast spell MV=${t.castCmc})` : ''}`
      }));
      setTimeout(() => setEtbReminder({ pIdx, card: triggers[0].permanent, effects }), 400);
    }
  };

  const [adventureChoice, setAdventureChoice] = useState(null); // { pIdx, card }
  const [gameOver, setGameOver] = useState(null); // { winner, loser, reason }
  const [concedeConfirm, setConcedeConfirm] = useState(false); // show confirmation dialog
  const [spellTargeting, setSpellTargeting] = useState(null); // { pIdx, card, effects, targetMode }
  const [abilityTargeting, setAbilityTargeting] = useState(null); // LOCAL — { pIdx, card, ability } — targeting mode for activated abilities that need a target creature
  const [cycleXChoice, setCycleXChoice] = useState(null); // LOCAL — { pIdx, cardName, creatureType, colors, keywords } — pending X/X token from cycling
  // Pre-cast targeting: when casting a spell with targets, we show the targeting UI
  // BEFORE putting the spell on the stack. This ref stores the cast info until targets are chosen.
  const pendingCastRef = useRef(null); // { pIdx, card, asAdventure, fromExile, displayName, nonTargetedEffects }
  const pendingSpellModalRef = useRef(null); // { pIdx, card, asAdventure, fromExile, displayName, spellToCheck } — for "choose one" spells
  const [spellStack, _setSpellStack] = useState([]); // SYNCED — LIFO stack: [{ pIdx, card, asAdventure, fromExile, displayName, resolvedTargets? }, ...]
  const setSpellStack = syncSetter(_setSpellStack);
  const stackTop = spellStack.length > 0 ? spellStack[spellStack.length - 1] : null;
  const [stackMinimized, setStackMinimized] = useState(false); // LOCAL — temporarily minimize spell stack overlay to interact with battlefield (e.g. sacrifice Cursecatcher)
  const [sacCounterChoice, _setSacCounterChoice] = useState(null); // SYNCED — { sacPIdx, sacCard, targetEntry, payAmount } — "counter unless pays" choice
  const setSacCounterChoice = syncSetter(_setSacCounterChoice);
  // Auto-restore full stack overlay when stack empties or sacCounter overlay appears
  useEffect(() => {
    if (spellStack.length === 0 || sacCounterChoice) {
      setStackMinimized(false);
      setAbilityTargeting(null);
    }
  }, [spellStack.length, sacCounterChoice]);
  const [pwAbilityOnStack, _setPwAbilityOnStack] = useState(null); // SYNCED — { pIdx, card, ability: { cost, text } }
  const setPwAbilityOnStack = syncSetter(_setPwAbilityOnStack);
  const [pwReminder, _setPwReminder] = useState(null); // SYNCED — { pIdx, card, ability, exiledCard?, exileCastDmg? }
  const setPwReminder = syncSetter(_setPwReminder);
  const [searchExile, _setSearchExile] = useState(null); // SYNCED — { pIdx, targetPIdx, cardName } — post-counter search & exile (Test of Talents)
  const setSearchExile = syncSetter(_setSearchExile);
  const [spellResolveRequest, _setSpellResolveRequest] = useState(null); // SYNCED — { timestamp } — opponent signals caster to resolve top spell
  const setSpellResolveRequest = syncSetter(_setSpellResolveRequest);
  const spellResolveHandledRef = useRef(null); // track which resolve request we already processed
  const [abilityActivated, _setAbilityActivated] = useState(null); // SYNCED — { pIdx, cardName, abilityText, cardImage } — broadcast ability activation
  const setAbilityActivated = syncSetter(_setAbilityActivated);
  const [ltbReminder, setLtbReminder] = useState(null); // { pIdx, card, effects[] }

  // ===== IN-GAME CHAT =====
  const [chatMessages, setChatMessages] = useState([]); // [{ sender, text, time }]
  const [chatOpen, setChatOpen] = useState(false);
  const [chatInput, setChatInput] = useState('');
  const chatInputRef = useRef(null);

  // Enter key opens chat, typing + Enter sends message
  useEffect(() => {
    const handleKeyDown = (e) => {
      // Ignore if we're in an input/textarea that's NOT the chat input
      if (e.target.tagName === 'INPUT' && e.target !== chatInputRef.current) return;
      if (e.target.tagName === 'TEXTAREA') return;

      if (e.key === 'Enter' && !chatOpen) {
        e.preventDefault();
        setChatOpen(true);
        setTimeout(() => chatInputRef.current?.focus(), 50);
      } else if (e.key === 'Escape' && chatOpen) {
        setChatOpen(false);
        setChatInput('');
