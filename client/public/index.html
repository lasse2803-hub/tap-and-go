        const handling = getCardHandlingInfo(card);
        const oracleText = [card.oracle_text || '', ...(card.card_faces || []).map(f => f.oracle_text || '')].filter(Boolean).join('\n---\n');
        const scryfallUrl = card.scryfall_uri || `https://scryfall.com/search?q=${encodeURIComponent(card.name)}`;
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            zIndex: 10003, animation: 'fadeIn 0.2s ease',
          }} onClick={() => setCardInfoOverlay(null)}>
            <div style={{
              background: 'linear-gradient(160deg, #1a1a2e, #16213e)', borderRadius: 14, padding: '20px 28px',
              border: '1px solid rgba(100,140,255,0.3)', boxShadow: '0 8px 40px rgba(0,0,0,0.7), 0 0 30px rgba(60,100,220,0.1)',
              maxWidth: 650, width: '95%', maxHeight: '85vh', overflow: 'auto', textAlign: 'left',
            }} onClick={e => e.stopPropagation()}>
              {/* Header */}
              <div style={{ display: 'flex', gap: 16, marginBottom: 16, alignItems: 'flex-start' }}>
                <CardImg card={card} alt={card.name}
                  style={{ height: 140, borderRadius: 8, boxShadow: '0 4px 12px rgba(0,0,0,0.5)', flexShrink: 0 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: '#e8e4dc', marginBottom: 4 }}>{getDisplayName(card)}</div>
                  <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 4 }}>{card.type_line || ''}</div>
                  {card.mana_cost && <div style={{ fontSize: 11, color: 'rgba(180,160,220,0.8)', marginBottom: 8 }}>Mana: {card.mana_cost}</div>}
                  <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', whiteSpace: 'pre-wrap', lineHeight: 1.5,
                    background: 'rgba(0,0,0,0.3)', borderRadius: 6, padding: '8px 10px', border: '1px solid rgba(255,255,255,0.1)',
                    maxHeight: 120, overflow: 'auto',
                  }}>{oracleText || 'No oracle text'}</div>
                </div>
              </div>

              {/* Auto-handled */}
              {handling.auto.length > 0 && (
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(80,200,120,0.8)', marginBottom: 6, fontWeight: 700 }}>
                    Auto-Handled by Game
                  </div>
                  {handling.auto.map((item, i) => (
                    <div key={i} style={{ fontSize: 11, color: 'rgba(255,255,255,0.75)', padding: '2px 0', lineHeight: 1.4 }}>{item}</div>
                  ))}
                </div>
              )}

              {/* Manual actions needed */}
              {handling.manual.length > 0 && (
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(255,180,60,0.8)', marginBottom: 6, fontWeight: 700 }}>
                    Manual Action Required
                  </div>
                  {handling.manual.map((item, i) => (
                    <div key={i} style={{ fontSize: 11, color: 'rgba(255,220,150,0.8)', padding: '2px 0', lineHeight: 1.4 }}>{item}</div>
                  ))}
                </div>
              )}

              {/* Tips */}
              {handling.info.length > 0 && (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(100,160,255,0.8)', marginBottom: 6, fontWeight: 700 }}>
                    Tips
                  </div>
                  {handling.info.map((item, i) => (
                    <div key={i} style={{ fontSize: 11, color: 'rgba(160,200,255,0.8)', padding: '2px 0', lineHeight: 1.4 }}>{item}</div>
                  ))}
                </div>
              )}

              {/* Buttons */}
              <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginTop: 8 }}>
                <button onClick={() => window.open(scryfallUrl, '_blank')} style={{
                  background: 'linear-gradient(180deg, #2a3a5a, #1a2a4a)', border: '1px solid rgba(100,140,255,0.3)',
                  borderRadius: 8, padding: '8px 18px', color: '#a0c0ff', cursor: 'pointer', fontSize: 11, fontWeight: 600,
                }}>🔍 View on Scryfall (Official Rulings)</button>
                <button onClick={() => setCardInfoOverlay(null)} style={{
                  background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.2)',
                  borderRadius: 8, padding: '8px 18px', color: 'rgba(255,255,255,0.6)', cursor: 'pointer', fontSize: 11,
                }}>Close</button>
              </div>
            </div>
          </div>
        );
      })()}

      {pwAbilityOnStack && (
        <div className="pw-ability-overlay">
          <div className="pw-ability-card">
            <div className="pw-ability-caster">
              {getState(pwAbilityOnStack.pIdx).name} activates
            </div>
            <CardImg card={pwAbilityOnStack.card}
              alt={pwAbilityOnStack.card.name}
              style={{ height: 280 }}
            />
            <div className="pw-ability-text">
              <span className="pw-ability-cost">[{pwAbilityOnStack.ability.cost}]</span>
              {pwAbilityOnStack.ability.text}
            </div>
            <div className="pw-ability-buttons">
              {(!onlineMode || onlinePlayerIndex === (pwAbilityOnStack.pIdx === 0 ? 1 : 0)) && (
                <button className="btn-ok" onClick={() => {
                  const entry = pwAbilityOnStack;
                  setPwAbilityOnStack(null);
                  // Auto-apply "until your next turn" attacker debuff (e.g. Jace +1: attackers get -1/-0)
                  const abText = (entry.ability.text || '').toLowerCase();
                  const debuffMatch = abText.match(/until your next turn,?\s+whenever a creature an opponent controls attacks,?\s+it gets (-?\d+)\/(-?\d+)/i);
                  if (debuffMatch) {
                    const debuffEffect = {
                      id: uid(), type: 'attacker_debuff',
                      power: parseInt(debuffMatch[1]), toughness: parseInt(debuffMatch[2]),
                      sourceName: entry.card.name, ownerIdx: entry.pIdx, registeredTurn: turnCount,
                    };
                    setState(entry.pIdx, prev => ({
                      ...prev,
                      untilNextTurnEffects: [...(prev.untilNextTurnEffects || []), debuffEffect],
                    }));
                    setCastError({ pIdx: entry.pIdx, message: `🛡️ ${entry.card.name}: Attackers get ${debuffMatch[1]}/${debuffMatch[2]} until your next turn` });
                    setTimeout(() => setCastError(null), 3000);
                    setPwReminder(null); // No manual step needed
                  } else {
                    setPwReminder({ pIdx: entry.pIdx, card: entry.card, ability: entry.ability });
                  }
                }}>✓ OK</button>
              )}
              {(!onlineMode || onlinePlayerIndex === (pwAbilityOnStack.pIdx === 0 ? 1 : 0)) && (
                <button className="btn-respond" onClick={() => {
                  const entry = pwAbilityOnStack;
                  const opponentPIdx = entry.pIdx === 0 ? 1 : 0;
                  setPwAbilityOnStack(null);
                  // Auto-apply "until your next turn" attacker debuff before respond
                  const abText2 = (entry.ability.text || '').toLowerCase();
                  const debuffMatch2 = abText2.match(/until your next turn,?\s+whenever a creature an opponent controls attacks,?\s+it gets (-?\d+)\/(-?\d+)/i);
                  if (debuffMatch2) {
                    const debuffEffect2 = {
                      id: uid(), type: 'attacker_debuff',
                      power: parseInt(debuffMatch2[1]), toughness: parseInt(debuffMatch2[2]),
                      sourceName: entry.card.name, ownerIdx: entry.pIdx, registeredTurn: turnCount,
                    };
                    setState(entry.pIdx, prev => ({
                      ...prev,
                      untilNextTurnEffects: [...(prev.untilNextTurnEffects || []), debuffEffect2],
                    }));
                    setPwReminder(null);
                  } else {
                    setPwReminder({ pIdx: entry.pIdx, card: entry.card, ability: entry.ability });
                  }
                  setInstantCasting({ pIdx: opponentPIdx });
                }}>⚡ Respond</button>
              )}
              {onlineMode && onlinePlayerIndex === pwAbilityOnStack.pIdx && (
                <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)', padding: '6px 0', fontStyle: 'italic' }}>
                  Waiting for opponent to OK or respond...
                </div>
              )}
            </div>
            <div style={{ fontSize: 10, opacity: 0.4, marginTop: 4, fontStyle: 'italic' }}>
              {(!onlineMode || onlinePlayerIndex !== pwAbilityOnStack.pIdx)
                ? 'Click Respond to cast an instant before this resolves'
                : 'Opponent decides whether to respond'}
            </div>
          </div>
        </div>
      )}

      {etbReminder && (!onlineMode || onlinePlayerIndex === etbReminder.pIdx) && (
        <div style={{
          position: 'fixed', bottom: 80, left: '50%', transform: 'translateX(-50%)',
          zIndex: 1500, animation: 'fadeIn 0.2s ease',
        }}>
          <div style={{
            background: 'linear-gradient(160deg, #1a1830, #14122a)', borderRadius: 12, padding: '14px 20px',
            border: '1px solid rgba(255,180,40,0.3)', boxShadow: '0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(255,180,40,0.08)',
            maxWidth: 400, textAlign: 'center',
          }}>
            <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 1.5, color: 'rgba(255,180,40,0.6)', marginBottom: 6, fontWeight: 700 }}>
              ⚡ ETB Trigger — {etbReminder.card.name}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, marginBottom: 10 }}>
              {etbReminder.effects.map((e, i) => (
                <div key={i} style={{
                  padding: '5px 10px', borderRadius: 6, fontSize: 13, fontWeight: 600,
                  background: 'rgba(255,180,40,0.06)', border: '1px solid rgba(255,180,40,0.1)',
                  color: '#e8e4dc',
                }}>
                  <span style={{ marginRight: 6 }}>{e.icon}</span>{e.text}
                  {e.actionType === 'etb_damage_player_pw' && (
                    <div style={{ display: 'flex', gap: 6, marginTop: 6, justifyContent: 'center' }}>
                      <button className="btn btn-gold" style={{ padding: '4px 12px', fontSize: 11 }}
                        onClick={() => {
                          const oppIdx = etbReminder.pIdx === 0 ? 1 : 0;
                          setState(oppIdx, prev => ({ ...prev, life: prev.life - e.damage }));
                          markDealtDamage(oppIdx);
                          setCastError({ pIdx: etbReminder.pIdx, message: `🔥 ${etbReminder.card.name} deals ${e.damage} to ${getState(oppIdx).name}!` });
                          setTimeout(() => setCastError(null), 2000);
                          setEtbReminder(prev => {
                            const remaining = prev.effects.filter((_, idx) => idx !== i);
                            return remaining.length > 0 ? { ...prev, effects: remaining } : null;
                          });
                        }}>
                        🎯 Opponent
                      </button>
                      {(() => {
                        const oppIdx = etbReminder.pIdx === 0 ? 1 : 0;
                        const oppPWs = getState(oppIdx).battlefield.filter(c => c.type_line && c.type_line.toLowerCase().includes('planeswalker'));
                        return oppPWs.map(pw => (
                          <button key={pw.id} className="btn btn-gold" style={{ padding: '4px 12px', fontSize: 11 }}
                            onClick={() => {
                              const currentLoyalty = parseInt(pw.counters?.loyalty) || 0;
                              const newLoyalty = currentLoyalty - e.damage;
                              if (newLoyalty <= 0) {
                                setState(oppIdx, prev => ({
                                  ...prev,
                                  battlefield: prev.battlefield.filter(c => c.id !== pw.id),
                                  graveyard: [...prev.graveyard, { ...pw, tapped: false, counters: {} }],
                                }));
                                setCastError({ pIdx: etbReminder.pIdx, message: `🔥 ${etbReminder.card.name} kills ${pw.name}!` });
                              } else {
                                setState(oppIdx, prev => ({
                                  ...prev,
                                  battlefield: prev.battlefield.map(c => c.id === pw.id ? { ...c, counters: { ...c.counters, loyalty: newLoyalty } } : c),
                                }));
                                setCastError({ pIdx: etbReminder.pIdx, message: `🔥 ${etbReminder.card.name} deals ${e.damage} to ${pw.name} (${newLoyalty} loyalty)` });
                              }
                              setTimeout(() => setCastError(null), 2000);
                              setEtbReminder(prev => {
                                const remaining = prev.effects.filter((_, idx) => idx !== i);
                                return remaining.length > 0 ? { ...prev, effects: remaining } : null;
                              });
                            }}>
                            🎯 {pw.name}
                          </button>
                        ));
                      })()}
                    </div>
                  )}
                </div>
              ))}
            </div>
            <button className="btn btn-gold" style={{ padding: '6px 20px', fontSize: 12 }}
              onClick={() => setEtbReminder(null)}>
              OK
            </button>
          </div>
        </div>
      )}

      {/* Modal Choice Overlay (Elder Gargaroth "choose one" etc.) */}
      {modalChoice && modalChoice.type !== 'fact_or_fiction' && modalChoice.type !== 'jace_ultimate_opp_search' && (!onlineMode || onlinePlayerIndex === modalChoice.pIdx) && (
        <div style={{
          position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
          background: 'rgba(0,0,0,0.6)', zIndex: 1600,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          animation: 'fadeIn 0.2s ease',
        }}>
          <div style={{
            background: 'linear-gradient(160deg, #1a1830, #14122a)', borderRadius: 16, padding: '20px 28px',
            border: '1px solid rgba(255,180,40,0.4)', boxShadow: '0 12px 48px rgba(0,0,0,0.8), 0 0 30px rgba(255,180,40,0.1)',
            maxWidth: 420, width: '90%', textAlign: 'center',
          }}>
            <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(255,180,40,0.6)', marginBottom: 4, fontWeight: 700 }}>
              {modalChoice.triggerType === 'spell' ? '🃏 Spell — Choose Mode' : modalChoice.triggerType === 'attack' ? '⚔️ Attack Trigger' : '🛡 Block Trigger'}
            </div>
            <div style={{ fontSize: 15, fontWeight: 700, color: '#e8d8a0', marginBottom: 14 }}>
              {getDisplayName(modalChoice.card)} — Choose One
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {modalChoice.choices.map((choice, i) => (
                <button key={i} className="btn" disabled={choice.disabled} style={{
                  padding: '10px 16px', fontSize: 13, fontWeight: 600,
                  background: choice.disabled ? 'rgba(100,100,100,0.1)' : 'rgba(255,180,40,0.08)',
                  border: choice.disabled ? '1px solid rgba(100,100,100,0.2)' : '1px solid rgba(255,180,40,0.25)',
                  borderRadius: 8, color: choice.disabled ? 'rgba(150,150,150,0.5)' : '#e8e4dc',
                  cursor: choice.disabled ? 'not-allowed' : 'pointer',
                  transition: 'all 0.15s ease', textAlign: 'left',
                  display: 'flex', alignItems: 'center', gap: 10,
                  opacity: choice.disabled ? 0.5 : 1,
                }}
                onMouseOver={e => { if (!choice.disabled) { e.currentTarget.style.background = 'rgba(255,180,40,0.2)'; e.currentTarget.style.borderColor = 'rgba(255,180,40,0.5)'; } }}
                onMouseOut={e => { if (!choice.disabled) { e.currentTarget.style.background = 'rgba(255,180,40,0.08)'; e.currentTarget.style.borderColor = 'rgba(255,180,40,0.25)'; } }}
                onClick={() => !choice.disabled && executeModalChoice(choice, modalChoice.pIdx, modalChoice.card)}>
                  <span style={{ fontSize: 20 }}>{choice.icon}</span>
                  <span style={{ textTransform: 'capitalize' }}>{choice.label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Fact or Fiction Modal (Jace -2) — opponent splits cards into 2 piles, then caster picks a pile */}
      {modalChoice && modalChoice.type === 'fact_or_fiction' && (() => {
        const fof = modalChoice;
        const isOpponentSplitting = fof.phase === 'opponent_split';
        const isCasterPicking = fof.phase === 'caster_pick';
        // In opponent_split phase: opponent (1 - pIdx) interacts. In caster_pick: caster (pIdx) interacts.
        const interactingPlayer = isOpponentSplitting ? (1 - fof.pIdx) : fof.pIdx;
        const canInteract = !onlineMode || onlinePlayerIndex === interactingPlayer;
        // Both players should see the modal (as spectators if not their turn to act)
        return (
          <div style={{
            position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
            background: 'rgba(0,0,0,0.7)', zIndex: 1600,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            animation: 'fadeIn 0.2s ease',
          }}>
            <div style={{
              background: 'linear-gradient(160deg, #0a1628, #14122a)', borderRadius: 16, padding: '20px 28px',
              border: '1px solid rgba(100,160,255,0.4)', boxShadow: '0 12px 48px rgba(0,0,0,0.8), 0 0 30px rgba(100,160,255,0.15)',
              maxWidth: 600, width: '95%', textAlign: 'center',
            }}>
              <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(100,160,255,0.7)', marginBottom: 4, fontWeight: 700 }}>
                🔮 {fof.source}
              </div>
              <div style={{ fontSize: 15, fontWeight: 700, color: '#a8c8ff', marginBottom: 6 }}>
                {isOpponentSplitting ? 'Separate Into Two Piles' : 'Choose a Pile'}
              </div>
              <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)', marginBottom: 16, fontStyle: 'italic' }}>
                {isOpponentSplitting
                  ? (canInteract ? 'Click cards to move between piles, then confirm.' : 'Opponent is separating cards into two piles...')
                  : (canInteract ? 'Pick a pile to put into your hand. The other goes to bottom of library.' : 'Opponent is choosing a pile...')}
              </div>

              {/* Show the two piles side by side */}
              <div style={{ display: 'flex', gap: 16, justifyContent: 'center', marginBottom: 16 }}>
                {/* Pile 1 */}
                <div style={{
                  flex: 1, background: 'rgba(100,200,100,0.08)', border: '1px solid rgba(100,200,100,0.3)',
                  borderRadius: 12, padding: '10px 8px', minHeight: 120,
                }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: '#8cd88c', marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>
                    Pile 1 ({fof.pile1.length})
                  </div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, justifyContent: 'center' }}>
                    {fof.cards.filter(c => fof.pile1.includes(c.id)).map(card => (
                      <div key={card.id} style={{
                        cursor: isOpponentSplitting && canInteract ? 'pointer' : 'default',
                        transition: 'transform 0.15s ease',
                      }}
                      onClick={() => {
                        if (!isOpponentSplitting || !canInteract) return;
                        // Move card from pile1 to pile2
                        setModalChoice(prev => ({
                          ...prev,
                          pile1: prev.pile1.filter(id => id !== card.id),
                          pile2: [...prev.pile2, card.id],
                        }));
                      }}
                      onMouseOver={e => { if (isOpponentSplitting && canInteract) e.currentTarget.style.transform = 'scale(1.08)'; }}
                      onMouseOut={e => { e.currentTarget.style.transform = 'scale(1)'; }}>
                        <img src={`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(card.name)}&format=image&version=small`}
                          alt={card.name}
                          style={{ width: 80, height: 112, borderRadius: 6, border: '2px solid rgba(100,200,100,0.5)' }}
                          onError={e => { e.target.style.display='none'; e.target.insertAdjacentHTML('afterend', `<div style="width:80px;height:112px;background:#1a2a1a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#8cd88c;text-align:center;padding:4px;border:2px solid rgba(100,200,100,0.5)">${card.name}</div>`); }}
                        />
                      </div>
                    ))}
                    {fof.pile1.length === 0 && (
                      <div style={{ color: 'rgba(100,200,100,0.3)', fontSize: 11, padding: '30px 10px', fontStyle: 'italic' }}>Empty</div>
                    )}
                  </div>
                </div>

                {/* Pile 2 */}
                <div style={{
                  flex: 1, background: 'rgba(200,100,100,0.08)', border: '1px solid rgba(200,100,100,0.3)',
                  borderRadius: 12, padding: '10px 8px', minHeight: 120,
                }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: '#d88c8c', marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>
                    Pile 2 ({fof.pile2.length})
                  </div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, justifyContent: 'center' }}>
                    {fof.cards.filter(c => fof.pile2.includes(c.id)).map(card => (
                      <div key={card.id} style={{
                        cursor: isOpponentSplitting && canInteract ? 'pointer' : 'default',
                        transition: 'transform 0.15s ease',
                      }}
                      onClick={() => {
                        if (!isOpponentSplitting || !canInteract) return;
                        // Move card from pile2 to pile1
                        setModalChoice(prev => ({
                          ...prev,
                          pile2: prev.pile2.filter(id => id !== card.id),
                          pile1: [...prev.pile1, card.id],
                        }));
                      }}
                      onMouseOver={e => { if (isOpponentSplitting && canInteract) e.currentTarget.style.transform = 'scale(1.08)'; }}
                      onMouseOut={e => { e.currentTarget.style.transform = 'scale(1)'; }}>
                        <img src={`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(card.name)}&format=image&version=small`}
                          alt={card.name}
                          style={{ width: 80, height: 112, borderRadius: 6, border: '2px solid rgba(200,100,100,0.5)' }}
                          onError={e => { e.target.style.display='none'; e.target.insertAdjacentHTML('afterend', `<div style="width:80px;height:112px;background:#2a1a1a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#d88c8c;text-align:center;padding:4px;border:2px solid rgba(200,100,100,0.5)">${card.name}</div>`); }}
                        />
                      </div>
                    ))}
                    {fof.pile2.length === 0 && (
                      <div style={{ color: 'rgba(200,100,100,0.3)', fontSize: 11, padding: '30px 10px', fontStyle: 'italic' }}>Empty</div>
                    )}
                  </div>
                </div>
              </div>

              {/* Action buttons */}
              <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
                {isOpponentSplitting && canInteract && (
                  <button className="btn btn-gold" style={{ padding: '8px 24px', fontSize: 13 }}
                    onClick={() => {
                      // Opponent confirms the split — transition to caster_pick phase
                      setModalChoice(prev => ({ ...prev, phase: 'caster_pick' }));
                      addGameLog(1 - fof.pIdx, '🔮', `Separated cards: Pile 1 (${fof.pile1.length}) / Pile 2 (${fof.pile2.length})`);
                    }}>
                    ✓ Confirm Split
                  </button>
                )}
                {isCasterPicking && canInteract && (
                  <>
                    <button className="btn" style={{
                      padding: '8px 20px', fontSize: 13, fontWeight: 600,
                      background: 'rgba(100,200,100,0.15)', border: '1px solid rgba(100,200,100,0.4)',
                      borderRadius: 8, color: '#8cd88c',
                    }}
                    onClick={() => {
                      // Caster picks Pile 1 → hand. Pile 2 → bottom of library.
                      const handCards = fof.cards.filter(c => fof.pile1.includes(c.id));
                      const bottomCards = fof.cards.filter(c => fof.pile2.includes(c.id));
                      setState(fof.pIdx, prev => ({
                        ...prev,
                        hand: [...prev.hand, ...handCards],
                        library: [...prev.library, ...bottomCards],
                      }));
                      addGameLog(fof.pIdx, '🔮', `Chose Pile 1 (${handCards.length} to hand, ${bottomCards.length} to bottom of library)`);
                      setModalChoice(null);
                    }}>
                      Take Pile 1 ({fof.pile1.length} cards)
                    </button>
                    <button className="btn" style={{
                      padding: '8px 20px', fontSize: 13, fontWeight: 600,
                      background: 'rgba(200,100,100,0.15)', border: '1px solid rgba(200,100,100,0.4)',
                      borderRadius: 8, color: '#d88c8c',
                    }}
                    onClick={() => {
                      // Caster picks Pile 2 → hand. Pile 1 → bottom of library.
                      const handCards = fof.cards.filter(c => fof.pile2.includes(c.id));
                      const bottomCards = fof.cards.filter(c => fof.pile1.includes(c.id));
                      setState(fof.pIdx, prev => ({
                        ...prev,
                        hand: [...prev.hand, ...handCards],
                        library: [...prev.library, ...bottomCards],
                      }));
                      addGameLog(fof.pIdx, '🔮', `Chose Pile 2 (${handCards.length} to hand, ${bottomCards.length} to bottom of library)`);
                      setModalChoice(null);
                    }}>
                      Take Pile 2 ({fof.pile2.length} cards)
                    </button>
                  </>
                )}
                {!canInteract && (
                  <div style={{ padding: '8px 20px', fontSize: 12, color: 'rgba(255,255,255,0.4)', fontStyle: 'italic' }}>
                    ⏳ Waiting for {isOpponentSplitting ? 'opponent' : 'caster'} to decide...
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })()}

      {/* Jace -8 Ultimate: Opponent picks a nonland card from their own library to exile (online mode) */}
      {modalChoice && modalChoice.type === 'jace_ultimate_opp_search' && (() => {
        const jaceUlt = modalChoice;
        const canInteract = !onlineMode || onlinePlayerIndex === jaceUlt.oppPIdx;
        const myLibrary = getState(jaceUlt.oppPIdx).library;
        const nonlands = myLibrary.filter(c => !isLand(c));
        return (
          <div style={{
            position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
            background: 'rgba(0,0,0,0.7)', zIndex: 1600,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            animation: 'fadeIn 0.2s ease',
          }}>
            <div style={{
              background: 'linear-gradient(160deg, #1a0a28, #14122a)', borderRadius: 16, padding: '20px 28px',
              border: '1px solid rgba(180,100,255,0.4)', boxShadow: '0 12px 48px rgba(0,0,0,0.8), 0 0 30px rgba(180,100,255,0.15)',
              maxWidth: 600, width: '95%', textAlign: 'center',
            }}>
              <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(180,100,255,0.7)', marginBottom: 4, fontWeight: 700 }}>
                💫 {jaceUlt.source} — Ultimate
              </div>
              <div style={{ fontSize: 15, fontWeight: 700, color: '#c8a8ff', marginBottom: 6 }}>
                {canInteract ? 'Choose a nonland card from your library to exile' : 'Opponent is choosing a card from their library...'}
              </div>
              {canInteract && (
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'center', maxHeight: 300, overflowY: 'auto', marginBottom: 12 }}>
                  {nonlands.map(card => (
                    <button key={card.id} className="btn" style={{ padding: '4px 10px', fontSize: 10, maxWidth: 150,
                      background: 'rgba(180,100,255,0.08)', border: '1px solid rgba(180,100,255,0.25)', borderRadius: 6, color: '#e8e4dc',
                    }}
                    onMouseOver={e => { e.currentTarget.style.background = 'rgba(180,100,255,0.2)'; }}
                    onMouseOut={e => { e.currentTarget.style.background = 'rgba(180,100,255,0.08)'; }}
                    onClick={() => {
                      // Exile chosen card from own library, marked castFree for opponent (the caster)
                      setState(jaceUlt.oppPIdx, prev => ({
                        ...prev,
                        library: prev.library.filter(c => c.id !== card.id),
                        exile: [...prev.exile, { ...card, castFree: true, castFreeFor: jaceUlt.casterPIdx }],
                      }));
                      shuffleLibrary(jaceUlt.oppPIdx);
                      addGameLog(jaceUlt.casterPIdx, '💫', `${jaceUlt.source}: Exiled ${getDisplayName(card)} from opponent's library`);
                      setModalChoice(null);
                    }}>
                      {getDisplayName(card)}
                    </button>
                  ))}
                  {nonlands.length === 0 && (
                    <button className="btn" style={{ padding: '6px 16px', fontSize: 11 }}
                      onClick={() => {
                        addGameLog(jaceUlt.casterPIdx, '💫', `${jaceUlt.source}: No nonland cards in opponent's library`);
                        setModalChoice(null);
                      }}>
                      No nonlands — Skip
                    </button>
                  )}
                </div>
              )}
              {!canInteract && (
                <div style={{ padding: '20px', fontSize: 12, color: 'rgba(255,255,255,0.4)', fontStyle: 'italic' }}>
                  ⏳ Waiting for opponent to choose...
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* Farewell "Choose One or More" Modal */}
      {farewellChoice && (!onlineMode || onlinePlayerIndex === farewellChoice.pIdx) && (
        <div style={{
          position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
          background: 'rgba(0,0,0,0.7)', zIndex: 1600,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          animation: 'fadeIn 0.2s ease',
        }}>
          <div style={{
            background: 'linear-gradient(160deg, #1a1830, #14122a)', borderRadius: 16, padding: '20px 28px',
            border: '1px solid rgba(255,180,40,0.4)', boxShadow: '0 12px 48px rgba(0,0,0,0.8), 0 0 30px rgba(255,180,40,0.1)',
            maxWidth: 420, width: '90%', textAlign: 'center',
          }}>
            <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(255,180,40,0.6)', marginBottom: 4, fontWeight: 700 }}>
              💫 {getDisplayName(farewellChoice.card)}
            </div>
            <div style={{ fontSize: 15, fontWeight: 700, color: '#e8d8a0', marginBottom: 6 }}>
              Choose One or More
            </div>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.35)', marginBottom: 16, fontStyle: 'italic' }}>
              Select which categories to exile, then confirm.
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
              {farewellChoice.categories.map(cat => {
                const isOn = farewellChoice.selected.has(cat);
                const icons = { artifacts: '⚙️', creatures: '🐉', enchantments: '✨', graveyards: '💀' };
                const labels = { artifacts: 'Exile all artifacts', creatures: 'Exile all creatures', enchantments: 'Exile all enchantments', graveyards: 'Exile all graveyards' };
                return (
                  <button key={cat} className="btn" style={{
                    padding: '10px 16px', fontSize: 13, fontWeight: 600,
                    background: isOn ? 'rgba(255,180,40,0.2)' : 'rgba(255,180,40,0.04)',
                    border: isOn ? '2px solid rgba(255,180,40,0.6)' : '1px solid rgba(255,180,40,0.15)',
                    borderRadius: 8, color: isOn ? '#ffd060' : '#e8e4dc',
                    cursor: 'pointer', transition: 'all 0.15s ease', textAlign: 'left',
                    display: 'flex', alignItems: 'center', gap: 10,
                  }}
                  onClick={() => {
                    setFarewellChoice(prev => {
                      const next = new Set(prev.selected);
                      if (next.has(cat)) next.delete(cat); else next.add(cat);
                      return { ...prev, selected: next };
                    });
                  }}>
                    <span style={{ fontSize: 20 }}>{icons[cat] || '📦'}</span>
                    <span>{labels[cat] || cat}</span>
                    {isOn && <span style={{ marginLeft: 'auto', fontSize: 16 }}>✓</span>}
                  </button>
                );
              })}
            </div>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
              <button className="btn btn-gold" style={{ padding: '8px 24px', fontSize: 13 }}
                disabled={farewellChoice.selected.size === 0}
                onClick={executeFarewellChoice}>
                ✦ Confirm ({farewellChoice.selected.size} selected)
              </button>
              <button className="btn" style={{ padding: '8px 16px', fontSize: 11 }}
                onClick={() => {
                  // Select all
                  setFarewellChoice(prev => ({ ...prev, selected: new Set(prev.categories) }));
                }}>
                Select All
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Ability Activated Notification (visible to BOTH players — creature/enchantment/artifact abilities) */}
      {abilityActivated && (
        <div style={{
          position: 'fixed', top: 80, left: '50%', transform: 'translateX(-50%)',
          zIndex: 1500, animation: 'fadeIn 0.25s ease',
          pointerEvents: 'none',
        }}>
          <div style={{
            background: 'linear-gradient(160deg, #1a1830, #14122a)', borderRadius: 12,
            padding: '12px 20px', display: 'flex', alignItems: 'center', gap: 14,
            border: '1px solid rgba(100,180,255,0.3)', boxShadow: '0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(100,180,255,0.1)',
            maxWidth: 460,
          }}>
            {abilityActivated.cardImage && (
              <img src={abilityActivated.cardImage} alt=""
                style={{ width: 48, height: 48, borderRadius: 8, objectFit: 'cover', border: '1px solid rgba(255,255,255,0.15)' }}
                onError={e => { e.target.style.display = 'none'; }} />
            )}
            <div>
              <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 1.5, color: 'rgba(100,180,255,0.7)', marginBottom: 4, fontWeight: 700 }}>
                ⚡ {players[abilityActivated.pIdx]} — {abilityActivated.cardName}
              </div>
              <div style={{
                fontSize: 12, color: '#e8e4dc', lineHeight: 1.4,
                padding: '4px 10px', borderRadius: 6,
                background: 'rgba(100,180,255,0.06)', border: '1px solid rgba(100,180,255,0.1)',
              }}>
                {abilityActivated.abilityText}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Search & Exile Overlay (Test of Talents — after counter, search opponent's zones and exile copies) */}
      {searchExile && (!onlineMode || onlinePlayerIndex === searchExile.pIdx) && (() => {
        const targetState = getState(searchExile.targetPIdx);
        const cardName = searchExile.cardName;
        // Find matching cards in each zone (cards with the same name)
        const baseName = cardName.split(' //')[0].trim(); // Handle adventure/split cards
        const matchesName = (c) => {
          const n = (c.name || '').split(' //')[0].trim();
          return n.toLowerCase() === baseName.toLowerCase();
        };
        const handMatches = targetState.hand.filter(matchesName);
        const gyMatches = targetState.graveyard.filter(matchesName);
        const libMatches = targetState.library.filter(matchesName);
        const totalMatches = handMatches.length + gyMatches.length + libMatches.length;
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 11000,
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            animation: 'fadeIn 0.2s ease', overflowY: 'auto', padding: 20,
          }}>
            <div style={{
              background: 'linear-gradient(160deg, #1a1830, #14122a)', borderRadius: 16, padding: '24px 32px',
              border: '1px solid rgba(200,100,40,0.5)', boxShadow: '0 12px 48px rgba(0,0,0,0.8)',
              maxWidth: 700, width: '95%', textAlign: 'center',
            }}>
              <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(200,100,40,0.8)', marginBottom: 4, fontWeight: 700 }}>
                Search & Exile — Test of Talents
              </div>
              <div style={{ fontSize: 15, fontWeight: 700, color: '#e8d8a0', marginBottom: 6 }}>
                Search for copies of "{cardName}"
              </div>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginBottom: 16, fontStyle: 'italic' }}>
                Click cards to exile them from {targetState.name}'s hand, graveyard, and library. ({totalMatches} matching card{totalMatches !== 1 ? 's' : ''} found)
              </div>

              {/* Hand */}
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: '#60c8e8', marginBottom: 6, textTransform: 'uppercase', letterSpacing: 1 }}>
                  Hand ({handMatches.length} match{handMatches.length !== 1 ? 'es' : ''})
                </div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center', minHeight: 30 }}>
                  {targetState.hand.map(c => {
                    const isMatch = matchesName(c);
                    return (
                      <div key={c.id} style={{ position: 'relative', opacity: isMatch ? 1 : 0.3, cursor: isMatch ? 'pointer' : 'default',
                        transition: 'all 0.15s ease', border: isMatch ? '2px solid rgba(255,100,40,0.6)' : '1px solid rgba(255,255,255,0.1)', borderRadius: 6 }}
                        onClick={() => {
                          if (!isMatch) return;
                          setState(searchExile.targetPIdx, prev => ({
                            ...prev,
                            hand: prev.hand.filter(h => h.id !== c.id),
                            exile: [...prev.exile, { ...c, tapped: false }],
                          }));
                          addGameLog(searchExile.pIdx, '🔍', `Exiled ${getDisplayName(c)} from ${targetState.name}'s hand`);
                        }}>
                        <CardImg card={c} alt={c.name} style={{ width: 55, borderRadius: 5 }} />
                      </div>
                    );
                  })}
                  {targetState.hand.length === 0 && <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.3)' }}>Empty</span>}
                </div>
              </div>

              {/* Graveyard */}
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: '#c080e0', marginBottom: 6, textTransform: 'uppercase', letterSpacing: 1 }}>
                  Graveyard ({gyMatches.length} match{gyMatches.length !== 1 ? 'es' : ''})
                </div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center', minHeight: 30 }}>
                  {targetState.graveyard.map((c, i) => {
                    const isMatch = matchesName(c);
                    return (
                      <div key={c.id + '-gy-' + i} style={{ position: 'relative', opacity: isMatch ? 1 : 0.3, cursor: isMatch ? 'pointer' : 'default',
                        transition: 'all 0.15s ease', border: isMatch ? '2px solid rgba(255,100,40,0.6)' : '1px solid rgba(255,255,255,0.1)', borderRadius: 6 }}
                        onClick={() => {
                          if (!isMatch) return;
                          setState(searchExile.targetPIdx, prev => ({
                            ...prev,
                            graveyard: prev.graveyard.filter((g, gi) => !(g.id === c.id && gi === i)),
                            exile: [...prev.exile, { ...c, tapped: false }],
                          }));
                          addGameLog(searchExile.pIdx, '🔍', `Exiled ${getDisplayName(c)} from ${targetState.name}'s graveyard`);
                        }}>
                        <CardImg card={c} alt={c.name} style={{ width: 55, borderRadius: 5 }} />
                      </div>
                    );
                  })}
                  {targetState.graveyard.length === 0 && <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.3)' }}>Empty</span>}
                </div>
              </div>

              {/* Library */}
              <div style={{ marginBottom: 18 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: '#e0c060', marginBottom: 6, textTransform: 'uppercase', letterSpacing: 1 }}>
                  Library ({libMatches.length} match{libMatches.length !== 1 ? 'es' : ''} of {targetState.library.length} cards)
                </div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center', minHeight: 30, maxHeight: 180, overflowY: 'auto' }}>
                  {libMatches.map((c, i) => (
                    <div key={c.id + '-lib-' + i} style={{ cursor: 'pointer',
                      transition: 'all 0.15s ease', border: '2px solid rgba(255,100,40,0.6)', borderRadius: 6 }}
                      onClick={() => {
                        setState(searchExile.targetPIdx, prev => {
                          const idx = prev.library.findIndex(l => l.id === c.id);
                          if (idx === -1) return prev;
                          const removed = prev.library[idx];
                          return {
                            ...prev,
                            library: [...prev.library.slice(0, idx), ...prev.library.slice(idx + 1)],
                            exile: [...prev.exile, { ...removed, tapped: false }],
                          };
                        });
                        addGameLog(searchExile.pIdx, '🔍', `Exiled ${getDisplayName(c)} from ${targetState.name}'s library`);
                      }}>
                      <CardImg card={c} alt={c.name} style={{ width: 55, borderRadius: 5 }} />
                    </div>
                  ))}
                  {libMatches.length === 0 && <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.3)' }}>No matches in library</span>}
                </div>
              </div>

              <button className="btn btn-gold" style={{ padding: '10px 36px', fontSize: 13 }}
                onClick={() => setSearchExile(null)}>
                Done
              </button>
            </div>
          </div>
        );
      })()}

      {/* PW Ability Reminder (after overlay closes) */}
      {pwReminder && !modalChoice && (!onlineMode || onlinePlayerIndex === pwReminder.pIdx) && (
        <div style={{
          position: 'fixed', bottom: 80, left: '50%', transform: 'translateX(-50%)',
          zIndex: 1500, animation: 'fadeIn 0.2s ease',
        }}>
          <div style={{
            background: 'linear-gradient(160deg, #1a1830, #14122a)', borderRadius: 12, padding: '14px 20px',
            border: '1px solid rgba(200,170,60,0.3)', boxShadow: '0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(200,170,60,0.08)',
            maxWidth: 420, textAlign: 'center',
          }}>
            <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 1.5, color: 'rgba(200,170,60,0.6)', marginBottom: 6, fontWeight: 700 }}>
              💎 {pwReminder.card.name} — [{pwReminder.ability.cost}]
            </div>
            <div style={{
              padding: '6px 12px', borderRadius: 6, fontSize: 12, fontWeight: 500,
              background: 'rgba(200,170,60,0.06)', border: '1px solid rgba(200,170,60,0.1)',
              color: '#e8e4dc', lineHeight: 1.4, marginBottom: 10,
            }}>
              {pwReminder.ability.text}
            </div>
            {(() => {
              // Check if the PW ability text matches any board wipe pattern we can auto-execute
              const abilityText = (pwReminder.ability.text || '').toLowerCase();
              const pwEffects = [];
              // Destroy patterns
              const powerGteMatch = abilityText.match(/destroy all creatures with power (\d+) or greater/);
              if (powerGteMatch) pwEffects.push({ type: 'board_wipe', subtype: 'destroy_power_gte', threshold: parseInt(powerGteMatch[1]) });
              if (/destroy all creatures/.test(abilityText) && !powerGteMatch) pwEffects.push({ type: 'board_wipe', subtype: 'destroy_all' });
              if (/destroy all nonland permanents/.test(abilityText)) pwEffects.push({ type: 'board_wipe', subtype: 'destroy_all_nonland' });
              const massMinusM = abilityText.match(/all creatures get (-\d+\/-\d+)/);
              if (massMinusM) pwEffects.push({ type: 'board_wipe', subtype: 'minus', amount: massMinusM[1] });
              // Exile patterns
              if (/exile all (creatures|nonland permanents|permanents)/.test(abilityText) && !/exile all.*with/.test(abilityText)) pwEffects.push({ type: 'board_wipe', subtype: 'exile_all' });
              const exPowerGte = abilityText.match(/exile (?:all|each) (?:creature|permanent)s? with power (\d+) or greater/);
              if (exPowerGte) pwEffects.push({ type: 'board_wipe', subtype: 'exile_power_gte', threshold: parseInt(exPowerGte[1]) });
              // Damage to each creature (Blasphemous Act style from PW)
              const pwDmgEach = abilityText.match(/deals? (\d+) damage to each creature/);
              if (pwDmgEach) pwEffects.push({ type: 'board_wipe', subtype: 'damage_each_creature', damage: parseInt(pwDmgEach[1]) });
              // Ugin-style variable X exile
              if (/exile each permanent.*mana value.*or less/.test(abilityText)) pwEffects.push({ type: 'board_wipe', subtype: 'exile_mv_lte_prompt' });
              // Ajani-style: "exile each artifact and each creature your opponents control" with life condition
              if (/exile.*each artifact and each creature your opponents control/.test(abilityText) || /exile each.*your opponents control/.test(abilityText)) {
                const lifeCondMatch = abilityText.match(/at least (\d+) more life than your starting life total/);
                const lifeThreshold = lifeCondMatch ? parseInt(lifeCondMatch[1]) : 0;
                pwEffects.push({ type: 'board_wipe', subtype: 'exile_opponent_artifacts_creatures', lifeThreshold, exileSelf: /exile .+? and each/.test(abilityText) });
              }

              // Emblem detection: "you get an emblem with ..."
              const emblemMatch = abilityText.match(/you get an emblem with [""\u201c]([^""\u201d]+)[""\u201d]/);
              const isEmblem = emblemMatch || abilityText.includes('you get an emblem');
              const emblemText = emblemMatch ? emblemMatch[1] : (abilityText.match(/emblem with [""\u201c]([^""\u201d]+)[""\u201d]/) || [])[1] || abilityText;

              // "Until your next turn" continuous effect detection
              // Matches: "until your next turn, whenever a creature an opponent controls attacks, it gets -X/-Y"
              const untilNextTurnMatch = abilityText.match(/until your next turn,?\s+whenever a creature an opponent controls attacks,?\s+it gets (-?\d+)\/(-?\d+)/i);
              const isUntilNextTurn = !!untilNextTurnMatch;
              const untilNextTurnPower = untilNextTurnMatch ? parseInt(untilNextTurnMatch[1]) : 0;
              const untilNextTurnToughness = untilNextTurnMatch ? parseInt(untilNextTurnMatch[2]) : 0;

              // "Until your next turn, prevent all damage" detection (Kiora's +1)
              const isPreventDamage = /until your next turn,?\s+prevent all damage/i.test(abilityText);

              // "Until your next turn, you may cast sorcery spells as though they had flash" (Teferi, Time Raveler +1)
              const isSorceryFlash = /until your next turn.*cast sorcery spells as though they had flash/i.test(abilityText) ||
                                     /you may cast sorcery spells as though they had flash/i.test(abilityText);

              // Chandra-style: "Exile the top card of your library. You may cast that card. If you don't, [PW] deals N damage to each opponent."
              const exileCastOrDmgMatch = abilityText.match(/exile the top card of your library.*you may cast.*(?:if you don'?t|otherwise).*deals?\s+(\d+)\s+damage/);
              const isExileCastOrDamage = !!exileCastOrDmgMatch;
              const exileCastDmg = exileCastOrDmgMatch ? parseInt(exileCastOrDmgMatch[1]) : 0;

              // Token creation detection: "create [N] X/Y [color] [type] creature token(s) [with keywords]"
              let pwTokenData = null;
              const tokenCountMatch = abilityText.match(/create\s+(?:(\w+)\s+)?(\d+)\/(\d+)\s+([\w\s]+?)\s+creature\s+tokens?\b/);
              const tokenNamedMatch = abilityText.match(/create\s+(\w[\w\s]*?),\s+a\s+(?:legendary\s+)?(\d+)\/(\d+)\s+([\w\s]+?)\s+creature\s+token/);
              if (tokenCountMatch || tokenNamedMatch) {
                const m = tokenNamedMatch || tokenCountMatch;
                let tokenName, tokenPower, tokenToughness, colorType;
                if (tokenNamedMatch) {
                  tokenName = m[1].trim().split(' ').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
                  tokenPower = m[2]; tokenToughness = m[3]; colorType = m[4].trim();
                } else {
                  tokenPower = m[2]; tokenToughness = m[3]; colorType = m[4].trim();
                  tokenName = colorType.split(' ').filter(w => !['white','blue','black','red','green','colorless'].includes(w)).map(w => w[0].toUpperCase() + w.slice(1)).join(' ') || 'Token';
                }
                // Parse quantity: "three" -> 3, "two" -> 2, etc.
                const qtyWord = (abilityText.match(/create\s+(\w+)\s+\d+\/\d+/) || [])[1] || '';
                const wordToNum = { a: 1, an: 1, one: 1, two: 2, three: 3, four: 4, five: 5, six: 6 };
                const qty = wordToNum[qtyWord] || 1;
                // Parse keywords: "with flying", "with vigilance", "with haste and trample"
                const kwMatch = abilityText.match(/creature tokens?\s+with\s+([\w\s,]+?)(?:\.|$)/);
                const keywords = kwMatch ? kwMatch[1].replace(/\band\b/g, ',').split(',').map(k => k.trim()).filter(Boolean) : [];
                // Determine color
                const colorMap = { white: 'W', blue: 'U', black: 'B', red: 'R', green: 'G' };
                const colors = Object.keys(colorMap).filter(c => colorType.includes(c)).map(c => colorMap[c]);
                const creatureType = colorType.split(' ').filter(w => !colorMap[w] && w !== 'colorless').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
                pwTokenData = { name: tokenName, power: tokenPower, toughness: tokenToughness, type_line: `Creature Token — ${creatureType}`, colors, keywords, qty };
              }

              // Draw a card detection (Teferi Hero +1, Kiora -1)
              const hasDrawCard = /draw a card/i.test(abilityText);
              // "You may play an additional land this turn" / "put a land from your hand onto the battlefield" (Kiora -1)
              const hasExtraLand = /(?:play an additional land|put a land.*onto the battlefield)/i.test(abilityText);
              // "Add {mana}" detection (Chandra +1: "Add {R}{R}")
              const addManaMatch = abilityText.match(/add\s+(\{[wubrgc]\}(?:\{[wubrgc]\})*)/i);
              // "Target player loses N life" / "each opponent loses N life" (Liliana +1)
              const loseLifeMatch = abilityText.match(/(?:target player|each opponent) loses? (\d+) life/i);
              // "Target creature gets +X/+X" (Garruk +1) — auto-buff with targeting
              const pwBuffMatch = abilityText.match(/target creature gets? ([+-]\d+\/[+-]\d+)/i);
              const pwBuffKeywords = abilityText.match(/gains? (trample|lifelink|flying|first strike|deathtouch|vigilance|haste|menace|hexproof|indestructible)/gi);
              // "Put target nonland permanent into its owner's library third from the top" (Teferi Hero -3)
              const isTuckToLibrary = /put target.*(?:nonland )?permanent.*(?:owner'?s )?library.*(?:third|second) from the top/i.test(abilityText);
              // "Reveal the top N cards" / "Fact or Fiction" style (Jace -2)
              const revealTopMatch = abilityText.match(/reveal the top (\w+) cards? of your library/i);
              const isFactOrFiction = !!revealTopMatch && /opponent.*separat|pile/i.test(abilityText);
              // "Return target creature...from your graveyard to the battlefield" (Ajani -2)
              const isGraveyardReturn = /return target creature.*from your graveyard to (?:the battlefield|your hand)/i.test(abilityText);
              // "Exile target tapped creature" (Wandering Emperor -2)
              const isExileTapped = /exile target tapped creature/i.test(abilityText);
              const exileTappedLifeMatch = abilityText.match(/you gain (\d+) life/i);
              // "For each player, search that player's library for a nonland card and exile it" (Jace -8 ultimate)
              const isLibraryExileUltimate = /search.*library.*nonland card.*exile/i.test(abilityText) && /cast.*without paying/i.test(abilityText);

              const hasNewPatterns = hasDrawCard || hasExtraLand || addManaMatch || loseLifeMatch || pwBuffMatch || isTuckToLibrary || isFactOrFiction || isGraveyardReturn || isExileTapped || isLibraryExileUltimate;

              if (pwEffects.length > 0 || isEmblem || isUntilNextTurn || pwTokenData || isExileCastOrDamage || isPreventDamage || isSorceryFlash || hasNewPatterns) {
                return (
                  <div style={{ display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
                    {isExileCastOrDamage && !pwReminder.exiledCard && (
                      <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                        onClick={() => {
                          const pIdx = pwReminder.pIdx;
                          const st = getState(pIdx);
                          if (st.library.length === 0) {
                            setCastError({ pIdx, message: '⚠️ Library is empty!' });
                            setTimeout(() => setCastError(null), 2000);
                            setPwReminder(null);
                            return;
                          }
                          const topCard = st.library[0];
                          // Exile the top card
                          setState(pIdx, prev => ({
                            ...prev,
                            library: prev.library.slice(1),
                            exile: [...prev.exile, { ...topCard, chandraExiled: true }],
                          }));
                          addGameLog(pIdx, '🔥', `${pwReminder.card.name}: Exiled ${topCard.name}`);
                          // Update pwReminder to show the exiled card and choice buttons
                          setPwReminder(prev => ({ ...prev, exiledCard: topCard, exileCastDmg }));
                        }}>
                        📖 Exile Top Card
                      </button>
                    )}
                    {isExileCastOrDamage && pwReminder.exiledCard && (
                      <>
                        <div style={{ width: '100%', textAlign: 'center', marginBottom: 6 }}>
                          <div style={{ fontSize: 11, color: 'rgba(200,170,60,0.8)', marginBottom: 4 }}>Exiled: <strong>{pwReminder.exiledCard.name}</strong></div>
                          {getCardSmall(pwReminder.exiledCard) && (
                            <CardImg card={pwReminder.exiledCard} size="small" alt={pwReminder.exiledCard.name}
                              style={{ height: 100, borderRadius: 4, border: '1px solid rgba(200,170,60,0.3)' }} />
                          )}
                          <div style={{
                            fontSize: 10, color: 'rgba(255,200,100,0.7)', marginTop: 6, padding: '4px 8px',
                            background: 'rgba(200,170,60,0.08)', borderRadius: 4, lineHeight: 1.5,
                          }}>
                            ⚠️ Du kan kun caste dette kort hvis du har mana nok.
                            {(pwReminder.exiledCard.type_line || '').toLowerCase().includes('land')
                              ? ' Lands kræver at du ikke allerede har spillet et land denne tur.'
                              : ` Mana cost: ${pwReminder.exiledCard.mana_cost || '?'}`}
                            {' '}Hvis du ikke kan eller vil caste det, vælg damage.
                          </div>
                        </div>
                        <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                          onClick={() => {
                            addGameLog(pwReminder.pIdx, '🔥', `${pwReminder.card.name}: Cast ${pwReminder.exiledCard.name} from exile`);
                            setCastError({ pIdx: pwReminder.pIdx, message: `📖 Cast ${pwReminder.exiledCard.name} from exile — pay its mana cost` });
                            setTimeout(() => setCastError(null), 4000);
                            setPwReminder(null);
                          }}>
                          📖 Cast {pwReminder.exiledCard.name}
                        </button>
                        <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                          onClick={() => {
                            const pIdx = pwReminder.pIdx;
                            const oppIdx = pIdx === 0 ? 1 : 0;
                            setState(oppIdx, prev => ({ ...prev, life: prev.life - pwReminder.exileCastDmg }));
                            markDealtDamage(oppIdx);
                            SFX.lifeLoss();
                            addGameLog(pIdx, '🔥', `${pwReminder.card.name}: Didn't cast ${pwReminder.exiledCard.name} — deals ${pwReminder.exileCastDmg} damage to ${getState(oppIdx).name}`);
                            setPwReminder(null);
                          }}>
                          🔥 Don't cast — Deal {exileCastDmg} Damage
                        </button>
                      </>
                    )}
                    {pwEffects.length > 0 && (
                      <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                        onClick={() => {
                          applyNonTargetedEffects(pwReminder.pIdx, pwReminder.card, pwEffects);
                          setPwReminder(null);
                        }}>
                        ✦ Execute Effect
                      </button>
                    )}
                    {pwTokenData && (
                      <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                        onClick={() => {
                          const td = pwTokenData;
                          for (let i = 0; i < td.qty; i++) {
                            const token = {
                              name: td.name, power: td.power, toughness: td.toughness,
                              type_line: td.type_line, colors: td.colors, keywords: td.keywords,
                              isToken: true, oracle_text: td.keywords.length > 0 ? td.keywords.join(', ') : '',
                            };
                            createToken(pwReminder.pIdx, token, i === 0, true);
                          }
                          addGameLog(pwReminder.pIdx, '✦', `${pwReminder.card.name}: Created ${td.qty > 1 ? td.qty + 'x ' : ''}${td.power}/${td.toughness} ${td.name}${td.keywords.length > 0 ? ' with ' + td.keywords.join(', ') : ''}`);
                          // Fetch Scryfall token art asynchronously
                          (async () => {
                            try {
                              const searchName = td.name.toLowerCase();
                              const res = await fetch('https://api.scryfall.com/cards/search?q=' + encodeURIComponent('t:token ' + searchName) + '&unique=art&order=released&dir=desc');
                              if (res.ok) {
                                const data = await res.json();
                                const match = data.data?.find(c => c.image_uris && (c.name || '').toLowerCase().includes(searchName));
                                if (match?.image_uris) {
                                  setState(pwReminder.pIdx, prev => ({
                                    ...prev,
                                    battlefield: prev.battlefield.map(c =>
                                      c.isToken && c.name === td.name && !c.tokenImageSmall
                                        ? { ...c, image_uris: match.image_uris, tokenImageSmall: match.image_uris.small, tokenImageNormal: match.image_uris.normal }
                                        : c
                                    )
                                  }));
                                }
                              }
                            } catch(e) { /* fallback to text rendering */ }
                          })();
                          setPwReminder(null);
                        }}>
                        ✦ Create {pwTokenData.qty > 1 ? `${pwTokenData.qty}x ` : ''}{pwTokenData.name}
                      </button>
                    )}
                    {isEmblem && (
                      <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                        onClick={() => {
                          const emblem = {
                            id: uid(),
                            name: `${pwReminder.card.name} Emblem`,
                            text: emblemText,
                            sourceName: pwReminder.card.name,
                            sourceImage: getCardSmall(pwReminder.card),
                          };
                          setState(pwReminder.pIdx, prev => ({ ...prev, emblems: [...(prev.emblems || []), emblem] }));
                          setCastError({ pIdx: pwReminder.pIdx, message: `🏷️ Emblem created: "${emblemText.slice(0, 60)}${emblemText.length > 60 ? '...' : ''}"` });
                          setTimeout(() => setCastError(null), 3000);
                          setPwReminder(null);
                        }}>
                        🏷️ Create Emblem
                      </button>
                    )}
                    {isUntilNextTurn && (
                      <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                        onClick={() => {
                          const effect = {
                            id: uid(),
                            type: 'attacker_debuff',
                            power: untilNextTurnPower,
                            toughness: untilNextTurnToughness,
                            sourceName: pwReminder.card.name,
                            ownerIdx: pwReminder.pIdx,
                            registeredTurn: turnCount,
                          };
                          setState(pwReminder.pIdx, prev => ({
                            ...prev,
                            untilNextTurnEffects: [...(prev.untilNextTurnEffects || []), effect],
                          }));
                          setCastError({ pIdx: pwReminder.pIdx, message: `🛡️ ${pwReminder.card.name}: Attackers get ${untilNextTurnPower}/${untilNextTurnToughness} until your next turn` });
                          setTimeout(() => setCastError(null), 3000);
                          setPwReminder(null);
                        }}>
                        🛡️ Activate Effect
                      </button>
                    )}
                    {isSorceryFlash && (
                      <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                        onClick={() => {
                          const effect = {
                            id: uid(),
                            type: 'sorcery_flash',
                            sourceName: pwReminder.card.name,
                            ownerIdx: pwReminder.pIdx,
                            registeredTurn: turnCount,
                          };
                          setState(pwReminder.pIdx, prev => ({
                            ...prev,
                            untilNextTurnEffects: [...(prev.untilNextTurnEffects || []), effect],
                          }));
                          addGameLog(pwReminder.pIdx, '⚡', `${pwReminder.card.name}: Sorceries can be cast as though they had flash until next turn`);
                          setCastError({ pIdx: pwReminder.pIdx, message: `⚡ ${pwReminder.card.name}: You may cast sorcery spells as though they had flash until your next turn` });
                          setTimeout(() => setCastError(null), 3000);
                          setPwReminder(null);
                        }}>
                        ⚡ Activate Sorcery Flash
                      </button>
                    )}
                    {/* Draw a card (Teferi Hero +1, Kiora -1 first part) */}
                    {hasDrawCard && (
                      <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                        onClick={() => {
                          drawCard(pwReminder.pIdx);
                          addGameLog(pwReminder.pIdx, '📖', `${pwReminder.card.name}: Drew a card`);
                          // If also has extra land, keep reminder open for land choice
                          if (hasExtraLand) {
                            const playerHand = getState(pwReminder.pIdx).hand;
                            const landsInHand = playerHand.filter(c => isLand(c));
                            if (landsInHand.length > 0) {
                              setPutLandFromHand({ pIdx: pwReminder.pIdx, source: pwReminder.card.name });
                            } else {
                              setCastError({ pIdx: pwReminder.pIdx, message: '🌿 No land cards in hand to put onto the battlefield' });
                              setTimeout(() => setCastError(null), 2500);
                            }
                            setPwReminder(null);
                          } else if (!hasExtraLand) {
                            // Teferi Hero: untap reminder after draw
                            setCastError({ pIdx: pwReminder.pIdx, message: `📖 Drew a card. Untap up to two lands manually at end step.` });
                            setTimeout(() => setCastError(null), 4000);
                            setPwReminder(null);
                          }
                        }}>
                        📖 Draw a Card{hasExtraLand ? ' + Put Land' : ''}
                      </button>
                    )}
                    {/* Add mana (Chandra +1: "Add {R}{R}") */}
                    {addManaMatch && (
                      <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                        onClick={() => {
                          const manaStr = addManaMatch[1].toUpperCase();
                          const manaSymbols = manaStr.match(/\{([WUBRGC])\}/g) || [];
                          setState(pwReminder.pIdx, prev => {
                            const newPool = { ...prev.manaPool };
                            manaSymbols.forEach(s => {
                              const color = s.slice(1, -1);
                              newPool[color] = (newPool[color] || 0) + 1;
                            });
                            return { ...prev, manaPool: newPool };
                          });
                          addGameLog(pwReminder.pIdx, '🔥', `${pwReminder.card.name}: Added ${manaStr}`);
                          setCastError({ pIdx: pwReminder.pIdx, message: `🔥 Added ${manaStr} to mana pool` });
                          setTimeout(() => setCastError(null), 2000);
                          setPwReminder(null);
                        }}>
                        🔥 Add {addManaMatch[1].toUpperCase()}
                      </button>
                    )}
                    {/* Target player loses life (Liliana +1) */}
                    {loseLifeMatch && (
                      <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                        onClick={() => {
                          const amount = parseInt(loseLifeMatch[1]);
                          const oppIdx = pwReminder.pIdx === 0 ? 1 : 0;
                          setState(oppIdx, prev => ({ ...prev, life: prev.life - amount }));
                          markDealtDamage(oppIdx);
                          SFX.lifeLoss();
                          addGameLog(pwReminder.pIdx, '💀', `${pwReminder.card.name}: ${getState(oppIdx).name} loses ${amount} life`);
                          setPwReminder(null);
                        }}>
                        💀 Opponent loses {loseLifeMatch[1]} life
                      </button>
                    )}
                    {/* Target creature gets +X/+X and gains keyword (Garruk +1) */}
                    {pwBuffMatch && (() => {
                      const buffStr = pwBuffMatch[1];
                      const bm = buffStr.match(/([+-]\d+)\/([+-]\d+)/);
                      const pMod = bm ? parseInt(bm[1]) : 0;
                      const tMod = bm ? parseInt(bm[2]) : 0;
                      const kws = pwBuffKeywords ? pwBuffKeywords.map(k => k.replace(/gains?\s+/i, '').trim().toLowerCase()) : [];
                      const myCreatures = getState(pwReminder.pIdx).battlefield.filter(c => isCreature(c));
                      return myCreatures.map(creature => (
                        <button key={creature.id} className="btn btn-gold" style={{ padding: '5px 12px', fontSize: 11, maxWidth: 200 }}
                          onClick={() => {
                            setState(pwReminder.pIdx, prev => ({
                              ...prev,
                              battlefield: prev.battlefield.map(c => {
                                if (c.id !== creature.id) return c;
                                const existing = c.tempBuffs || { power: 0, toughness: 0, keywords: [] };
                                const keywords = [...(existing.keywords || []), ...kws.filter(k => !(existing.keywords || []).includes(k))];
                                return { ...c, tempBuffs: { ...existing, power: (existing.power || 0) + pMod, toughness: (existing.toughness || 0) + tMod, keywords } };
                              })
                            }));
                            addGameLog(pwReminder.pIdx, '⚡', `${pwReminder.card.name}: ${creature.name} gets ${buffStr}${kws.length > 0 ? ' and gains ' + kws.join(', ') : ''}`);
                            setPwReminder(null);
                          }}>
                          ⚡ {creature.name} {buffStr}
                        </button>
                      ));
                    })()}
                    {/* Exile target tapped creature + gain life (Wandering Emperor -2) */}
                    {isExileTapped && (() => {
                      const oppIdx = pwReminder.pIdx === 0 ? 1 : 0;
                      const tappedCreatures = getState(oppIdx).battlefield.filter(c => isCreature(c) && c.tapped);
                      const lifeGain = exileTappedLifeMatch ? parseInt(exileTappedLifeMatch[1]) : 0;
                      if (tappedCreatures.length === 0) {
                        return (
                          <div style={{ fontSize: 11, color: 'rgba(255,100,100,0.8)', fontStyle: 'italic' }}>
                            No tapped creatures to exile.
                          </div>
                        );
                      }
                      return tappedCreatures.map(creature => (
                        <button key={creature.id} className="btn btn-gold" style={{ padding: '5px 12px', fontSize: 11, maxWidth: 200 }}
                          onClick={() => {
                            moveCard(oppIdx, creature, 'battlefield', 'exile');
                            if (lifeGain > 0) {
                              setState(pwReminder.pIdx, prev => ({ ...prev, life: prev.life + lifeGain }));
                              SFX.lifeGain();
                            }
                            addGameLog(pwReminder.pIdx, '🚫', `${pwReminder.card.name}: Exiled ${creature.name}${lifeGain > 0 ? `, gained ${lifeGain} life` : ''}`);
                            setPwReminder(null);
                          }}>
                          🚫 Exile {creature.name}{lifeGain > 0 ? ` (+${lifeGain} life)` : ''}
                        </button>
                      ));
                    })()}
                    {/* Return creature from graveyard (Ajani -2) */}
                    {isGraveyardReturn && (() => {
                      const gy = getState(pwReminder.pIdx).graveyard.filter(c => isCreature(c));
                      const mvLimit = abilityText.match(/mana value (\d+) or less/i);
                      const maxMV = mvLimit ? parseInt(mvLimit[1]) : 999;
                      const validCards = gy.filter(c => (c.cmc || c.card_faces?.[0]?.cmc || 0) <= maxMV);
                      if (validCards.length === 0) {
                        return <div style={{ fontSize: 11, color: 'rgba(255,100,100,0.8)', fontStyle: 'italic' }}>No valid creatures in graveyard{maxMV < 999 ? ` (MV ≤ ${maxMV})` : ''}.</div>;
                      }
                      const toBf = /to the battlefield/i.test(abilityText);
                      return validCards.map(card => (
                        <button key={card.id} className="btn btn-gold" style={{ padding: '5px 12px', fontSize: 11, maxWidth: 200 }}
                          onClick={() => {
                            moveCard(pwReminder.pIdx, card, 'graveyard', toBf ? 'battlefield' : 'hand');
                            addGameLog(pwReminder.pIdx, '✦', `${pwReminder.card.name}: Returned ${card.name} to ${toBf ? 'battlefield' : 'hand'}`);
                            setPwReminder(null);
                          }}>
                          ✦ {card.name} (MV {card.cmc || '?'}) → {toBf ? 'Battlefield' : 'Hand'}
                        </button>
                      ));
                    })()}
                    {/* Teferi Hero -3: Tuck target nonland permanent into library 3rd from top */}
                    {isTuckToLibrary && (() => {
                      const oppIdx = pwReminder.pIdx === 0 ? 1 : 0;
                      // Can target any nonland permanent on either side (exclude tokens — they cease to exist)
                      const allNonlands = [
                        ...getState(oppIdx).battlefield.filter(c => !isLand(c) && !c.isToken).map(c => ({ ...c, ownerIdx: oppIdx })),
                        ...getState(pwReminder.pIdx).battlefield.filter(c => !isLand(c) && !c.isToken).map(c => ({ ...c, ownerIdx: pwReminder.pIdx })),
                      ];
                      if (allNonlands.length === 0) {
                        return <div style={{ fontSize: 11, color: 'rgba(255,100,100,0.8)', fontStyle: 'italic' }}>No nonland permanents to target.</div>;
                      }
                      return (
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'center', maxHeight: 200, overflowY: 'auto' }}>
                          {allNonlands.map(perm => (
                            <button key={perm.id} className="btn btn-gold" style={{ padding: '4px 10px', fontSize: 10, maxWidth: 180 }}
                              onClick={() => {
                                const ownerIdx = perm.ownerIdx;
                                // Remove from battlefield
                                setState(ownerIdx, prev => ({
                                  ...prev,
                                  battlefield: prev.battlefield.filter(c => c.id !== perm.id),
                                }));
                                // Insert into library 3rd from top (index 2)
                                setState(ownerIdx, prev => {
                                  const lib = [...prev.library];
                                  const cleanCard = { ...perm, tapped: false, counters: {}, tempBuffs: null, damagePrevented: undefined };
                                  delete cleanCard.ownerIdx;
                                  const insertIdx = Math.min(2, lib.length);
                                  lib.splice(insertIdx, 0, cleanCard);
                                  return { ...prev, library: lib };
                                });
