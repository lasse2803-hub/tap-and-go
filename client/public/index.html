      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [chatOpen]);

  const sendChat = () => {
    if (!chatInput.trim()) { setChatOpen(false); return; }
    const sender = getState(activePlayer).name;
    setChatMessages(prev => [...prev.slice(-49), { sender, text: chatInput.trim(), time: Date.now() }]);
    setChatInput('');
    setChatOpen(false);
  };

  // Re-render to fade out old chat messages — only update when messages actually expire
  useEffect(() => {
    if (chatMessages.length === 0) return;
    // Find the next message that will expire
    const now = Date.now();
    const nextExpiry = chatMessages.reduce((earliest, m) => {
      const expiresAt = m.time + 8000;
      return expiresAt > now && expiresAt < earliest ? expiresAt : earliest;
    }, Infinity);
    if (nextExpiry === Infinity) return;
    const timer = setTimeout(() => {
      setChatMessages(prev => prev.filter(m => Date.now() - m.time < 8000));
    }, nextExpiry - now + 100);
    return () => clearTimeout(timer);
  }, [chatMessages]);

  // Apply a spell effect to a target card on the battlefield
  // Apply pre-selected targets stored at cast time (used by online spell stack)
  const applyResolvedTargets = (casterIdx, card, targetedEffects, resolvedTargets) => {
    if (resolvedTargets.type === 'creature') {
      // Find the target creature on the battlefield by card ID
      const targetPIdx = resolvedTargets.pIdx;
      const targetCard = getState(targetPIdx).battlefield.find(c => c.id === resolvedTargets.cardId);
      if (targetCard) {
        applySpellEffect(casterIdx, targetPIdx, targetCard, targetedEffects);
        addGameLog(casterIdx, '🎯', `${getDisplayName(card)} → ${targetCard.name}`);
      } else {
        // Target creature is no longer on the battlefield (removed/sacrificed) — fizzle
        setCastError({ pIdx: casterIdx, message: `${getDisplayName(card)} fizzles — ${resolvedTargets.cardName || 'target'} is no longer on the battlefield`, background: '#4a1a1a' });
        setTimeout(() => setCastError(null), 2500);
        addGameLog(casterIdx, '💨', `${getDisplayName(card)} fizzles (target gone)`);
      }
    } else if (resolvedTargets.type === 'player') {
      const targetPIdx = resolvedTargets.pIdx;
      const dmg = resolvedTargets.damage || 0;
      if (dmg > 0) {
        setState(targetPIdx, prev => ({ ...prev, life: prev.life - dmg }));
        markDealtDamage(targetPIdx);
        SFX.playerDamage();
        addGameLog(casterIdx, '🔥', `${getDisplayName(card)}: ${dmg} damage to ${getState(targetPIdx).name}`);
      }
    }
    setCastError({ pIdx: casterIdx, message: `Resolved ${getDisplayName(card)}`, background: '#1a3320' });
    setTimeout(() => setCastError(null), 1500);
  };

  const applySpellEffect = (casterIdx, targetPIdx, targetCard, effects) => {
    for (const effect of effects) {
      switch (effect.type) {
        case 'destroy':
          moveCard(targetPIdx, targetCard, 'battlefield', 'graveyard');
          break;
        case 'exile':
          moveCard(targetPIdx, targetCard, 'battlefield', 'exile');
          break;
        case 'bounce':
          moveCard(targetPIdx, targetCard, 'battlefield', 'hand');
          break;
        case 'damage': {
          const dmg = effect.amount || 0;
          if (isCreature(targetCard)) {
            const toughness = getEffectiveToughness(targetCard);
            if (dmg >= toughness) {
              moveCard(targetPIdx, targetCard, 'battlefield', 'graveyard');
            } else {
              SFX.playerDamage();
              setCastError({ pIdx: casterIdx, message: `${dmg} damage to ${targetCard.name} (survives: ${toughness} toughness)` });
              setTimeout(() => setCastError(null), 2000);
            }
          } else if (isPlaneswalker(targetCard)) {
            // Damage to planeswalker — remove loyalty counters
            // IMPORTANT: Use counters.loyalty (current in-game value) first, NOT card.loyalty (printed starting value)
            const currentLoyalty = (targetCard.counters && targetCard.counters.loyalty != null) ? targetCard.counters.loyalty : (parseInt(targetCard.loyalty) || 0);
            const newLoyalty = currentLoyalty - dmg;
            if (newLoyalty <= 0) {
              // Planeswalker dies (loyalty reaches 0)
              moveCard(targetPIdx, targetCard, 'battlefield', 'graveyard');
              addGameLog(casterIdx, '💀', `${dmg} damage to ${targetCard.name} — destroyed (loyalty 0)`);
            } else {
              setState(targetPIdx, prev => ({
                ...prev,
                battlefield: prev.battlefield.map(c => c.id === targetCard.id ? { ...c, loyalty: newLoyalty, counters: { ...(c.counters || {}), loyalty: newLoyalty } } : c)
              }));
              SFX.playerDamage();
              addGameLog(casterIdx, '🔥', `${dmg} damage to ${targetCard.name} (loyalty: ${currentLoyalty} → ${newLoyalty})`);
            }
            setCastError({ pIdx: casterIdx, message: `${dmg} damage to ${targetCard.name} (loyalty: ${newLoyalty <= 0 ? 'destroyed' : newLoyalty})` });
            setTimeout(() => setCastError(null), 2500);
          } else {
            // Non-creature, non-PW permanent — just show message
            SFX.playerDamage();
            setCastError({ pIdx: casterIdx, message: `${dmg} damage to ${targetCard.name}` });
            setTimeout(() => setCastError(null), 2000);
          }
          // Also deal damage to player if "any target" and clicking player area
          break;
        }
        case 'boost': {
          // e.g. "+2/+2" or "-3/-3" — applied as temporary buff (until end of turn)
          SFX.playSpell();
          const match = effect.amount.match(/([+-]\d+)\/([+-]\d+)/);
          if (match) {
            const pMod = parseInt(match[1]);
            const tMod = parseInt(match[2]);
            setState(targetPIdx, prev => ({
              ...prev,
              battlefield: prev.battlefield.map(c => {
                if (c.id !== targetCard.id) return c;
                const existing = c.tempBuffs || { power: 0, toughness: 0 };
                return { ...c, tempBuffs: { power: existing.power + pMod, toughness: existing.toughness + tMod } };
              })
            }));
            // Check if creature dies from negative toughness buff
            if (tMod < 0) {
              setTimeout(() => {
                const updated = getStateRef(targetPIdx).battlefield.find(c => c.id === targetCard.id);
                if (updated && getEffectiveToughness(updated) <= 0) {
                  moveCard(targetPIdx, updated, 'battlefield', 'graveyard');
                }
              }, 100);
            }
          }
          break;
        }
        case 'counter_add':
          addCounter(targetPIdx, targetCard.id, effect.counterType || '+1/+1');
          break;
        case 'fight': {
          // Fight: both creatures deal damage equal to their power to each other
          const myPower = getEffectivePower(targetCard);
          // Need a second target — for simplicity, mark that we need another click
          setCastError({ pIdx: casterIdx, message: `Fight: select your creature to fight ${targetCard.name}` });
          setTimeout(() => setCastError(null), 3000);
          break;
        }
        default:
          break;
      }
    }
    setSpellTargeting(null);
  };

  // Apply non-targeted spell effects (draw, gain life, board wipes)
  const applyNonTargetedEffects = (pIdx, card, effects) => {
    const opponentIdx = pIdx === 0 ? 1 : 0;

    // Check if scry/surveil comes before draw — if so, defer draw until scry completes
    const scryIdx = effects.findIndex(e => e.type === 'scry');
    const drawIdx = effects.findIndex(e => e.type === 'draw');
    const hasScryBeforeDraw = scryIdx !== -1 && drawIdx !== -1 && scryIdx < drawIdx;

    for (let ei = 0; ei < effects.length; ei++) {
      const effect = effects[ei];
      switch (effect.type) {
        case 'draw':
          for (let i = 0; i < (effect.amount || 1); i++) drawCard(pIdx);
          break;
        case 'extra_land_drop':
          // Growth Spiral / Explore: "you may put a land card from your hand onto the battlefield"
          // This is a spell EFFECT (not a land play action), so it works even when it's not your turn.
          // Show a modal to let the player pick a land from their hand.
          {
            const playerHand = getState(pIdx).hand;
            const landsInHand = playerHand.filter(c => isLand(c));
            if (landsInHand.length > 0) {
              setPutLandFromHand({ pIdx, source: card.name || 'Spell' });
            } else {
              setCastError({ pIdx, message: '🌿 No land cards in hand to put onto the battlefield' });
              setTimeout(() => setCastError(null), 2500);
            }
          }
          break;
        case 'scry': {
          // Collect remaining effects after scry to run on complete
          const remainingEffects = hasScryBeforeDraw ? effects.slice(ei + 1) : [];
          const onComplete = remainingEffects.length > 0 ? () => {
            applyNonTargetedEffects(pIdx, card, remainingEffects);
          } : null;
          setScryView({ pIdx, count: effect.count || 1, mode: effect.mode || 'scry', onComplete });
          return; // Stop processing — remaining effects will fire via onComplete

        setState(pi, prev => {
          totalExiled += prev.graveyard.length;
          return { ...prev, exile: [...prev.exile, ...prev.graveyard], graveyard: [] };
        });
      });
    }

    SFX.toExile();
    const chosen = [...selected].map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(', ');
    addGameLog(pIdx, '💫', `Farewell: Exiled ${chosen} (${totalExiled} cards)`);
    setCastError({ pIdx, message: `Farewell: Exiled ${chosen} — ${totalExiled} card(s)` });
    setTimeout(() => setCastError(null), 3000);
    setTimeout(() => cleanupAttachments([0, 1]), 50);
    setFarewellChoice(null);
  };

  const getAdventureFace = (card) => card.card_faces?.[1]; // The adventure (instant/sorcery) face
  const getCreatureFace = (card) => card.card_faces?.[0]; // The creature face

  // Cast a specific face of an adventure card, or cast a normal card
  // Resolve a spell that was on the stack (called after opponent clicks "Resolve")
  // ═══════════════════════════════════════════════════════════════
  // §6. SPELL CASTING & STACK
  // ═══════════════════════════════════════════════════════════════
  const resolveSpellFromStack = (stackEntry) => {
    // NOTE: The card has ALREADY been removed from hand/exile when it was cast
    // (in castCard / castAdventureFromExile). This is critical for online mode:
    // the opponent resolves spells on their client but can't modify the caster's hand.
    const { pIdx, card, asAdventure, fromExile, resolvedTargets } = stackEntry;

    // ===== OVERLOAD RESOLUTION =====
    // When overloaded, "target" becomes "each" — apply mass effect instead of single-target
    if (stackEntry.overloadMode) {
      // NOTE: No SFX.playSpell() here — overload effects play their own sounds
      // (SFX.massReturn, SFX.creatureDeath, etc.) to avoid double-sound overlap.
      // Move spell to graveyard
      setState(pIdx, prev => ({
        ...prev,
        graveyard: [...prev.graveyard, { ...card, tapped: false }],
      }));
      // Parse the overloaded oracle text: replace "target" with "each" to understand the mass effect
      const oracle = (card.oracle_text || '').toLowerCase();
      const opponentIdx = pIdx === 0 ? 1 : 0;
      // Cyclonic Rift: "Return target nonland permanent you don't control to its owner's hand"
      // → Overloaded: Return each nonland permanent you don't control to its owner's hand
      if (/return.*nonland permanent.*to its owner's hand/i.test(oracle)) {
        let bounced = 0;
        setState(opponentIdx, prev => {
          const toBounce = prev.battlefield.filter(c => !isLand(c));
          const rest = prev.battlefield.filter(c => isLand(c));
          bounced = toBounce.length;
          return { ...prev, battlefield: rest, hand: [...prev.hand, ...toBounce.map(c => ({ ...c, tapped: false, counters: {}, tempBuffs: null, damagePrevented: undefined }))] };
        });
        SFX.massReturn();
        setCastError({ pIdx, message: `🌊 Overload! Bounced ${bounced} nonland permanent(s) to hand` });
        setTimeout(() => setCastError(null), 2500);
        addGameLog(pIdx, '🌊', `${getDisplayName(card)} (Overload): Returned all opponent nonland permanents to hand`);
        setTimeout(() => cleanupAttachments([opponentIdx]), 50);
      } else if (/return.*creature.*to its owner's hand/i.test(oracle)) {
        // Generic creature bounce overload
        let bounced = 0;
        [0, 1].forEach(pi => {
          setState(pi, prev => {
            const toBounce = prev.battlefield.filter(c => isCreature(c));
            const rest = prev.battlefield.filter(c => !isCreature(c));
            bounced += toBounce.length;
            return { ...prev, battlefield: rest, hand: [...prev.hand, ...toBounce.map(c => ({ ...c, tapped: false, counters: {}, tempBuffs: null, damagePrevented: undefined }))] };
          });
        });
        SFX.massReturn();
        setCastError({ pIdx, message: `🌊 Overload! Bounced ${bounced} creature(s) to hand` });
        setTimeout(() => setCastError(null), 2500);
      } else if (/deals?\s+(\d+)\s+damage\s+to\s+(?:target|any target)/i.test(oracle)) {
        // Damage overload (e.g. "deal X damage to target creature" → each creature)
        const dmgMatch = oracle.match(/deals?\s+(\d+)\s+damage/i);
        const damage = dmgMatch ? parseInt(dmgMatch[1]) : 0;
        if (damage > 0) {
          [0, 1].forEach(pi => {
            setState(pi, prev => ({
              ...prev,
              battlefield: prev.battlefield.map(c => isCreature(c) ? { ...c, damage: (c.damage || 0) + damage } : c)
            }));
          });
          SFX.playerDamage();
          setCastError({ pIdx, message: `🌊 Overload! Dealt ${damage} damage to each creature` });
          setTimeout(() => setCastError(null), 2500);
        }
      } else {
        // Fallback — just log it for manual resolution
        SFX.playSpell();
        setCastError({ pIdx, message: `🌊 Overloaded ${getDisplayName(card)} — resolve manually` });
        setTimeout(() => setCastError(null), 3000);
      }
      checkCastTriggers(pIdx, card);
      return;
    }

    if (asAdventure && isAdventure(card)) {
      // Adventure: move to exile (card already removed from hand on cast)
      // NOTE: No SFX.playSpell() here — effect handlers (applyResolvedTargets/applySpellEffect)
      // play their own context-specific sounds. Only play fallback if no targeted effects.
      setState(pIdx, prev => ({
        ...prev,
        exile: [...prev.exile, { ...card, tapped: false, adventureCast: true }],
      }));

      const advFace = getAdventureFace(card);
      const advEffects = parseSpellEffects({ ...card, oracle_text: advFace.oracle_text, type_line: advFace.type_line });
      const advTargeted = advEffects.filter(e => ['destroy', 'exile', 'bounce', 'damage', 'boost', 'counter_add', 'fight'].includes(e.type));
      const advNonTargeted = advEffects.filter(e => !['destroy', 'exile', 'bounce', 'damage', 'boost', 'counter_add', 'fight'].includes(e.type));

      // Fallback: if no effects will produce their own sound, play generic spell sound
      if (advNonTargeted.length === 0 && advTargeted.length === 0) SFX.playSpell();

      if (advNonTargeted.length > 0) applyNonTargetedEffects(pIdx, card, advNonTargeted);

      // Apply pre-selected targets from cast time (or fall back to targeting UI for local mode)
      if (resolvedTargets) {
        applyResolvedTargets(pIdx, card, advTargeted, resolvedTargets);
      } else if (advTargeted.length > 0) {
        const advTargetMode = getSpellTargetMode(advEffects);
        setSpellTargeting({ pIdx, card, effects: advTargeted, targetMode: advTargetMode });
        setCastError({ pIdx, message: `${advFace.name}: Choose a target` });
      }
      if (!resolvedTargets) {
        setCastError({ pIdx, message: `Cast ${advFace.name} (Adventure)` });
        setTimeout(() => setCastError(null), 1500);
      }
      checkCastTriggers(pIdx, card);
      return;
    }

    if (isSpellCard(card)) {
      // Move spell to graveyard (card already removed from hand/exile on cast)
      setState(pIdx, prev => ({
        ...prev,
        graveyard: [...prev.graveyard, { ...card, tapped: false }],
      }));

      const effects = parseSpellEffects(card);
      const targetedEffects = effects.filter(e => ['destroy', 'exile', 'bounce', 'damage', 'boost', 'counter_add', 'fight'].includes(e.type));
      const nonTargetedEffects = effects.filter(e => !['destroy', 'exile', 'bounce', 'damage', 'boost', 'counter_add', 'fight'].includes(e.type));

      // Apply non-targeted effects (scry, draw, gain life, etc.) — also for pre-targeted spells
      // NOTE: Non-targeted effects from pendingCast were stored, apply them here
      const ntEffects = stackEntry.nonTargetedEffects || nonTargetedEffects;

      // SFX: Only play generic playSpell() if the spell has NO effects that produce their own sounds.
      // Effect handlers (applyResolvedTargets, applyNonTargetedEffects, moveCard) each play
      // context-specific sounds (playerDamage, creatureDeath, toGraveyard, lifeGain, draw, etc.)
      // Playing playSpell() AND an effect sound causes audible overlap.
      const hasEffectSounds = ntEffects.length > 0 || targetedEffects.length > 0;
      if (!hasEffectSounds) SFX.playSpell();

      if (ntEffects.length > 0) {
        applyNonTargetedEffects(pIdx, card, ntEffects);
      }

      // Apply pre-selected targets from cast time (or fall back to targeting UI for local mode)
      if (resolvedTargets) {
        applyResolvedTargets(pIdx, card, targetedEffects, resolvedTargets);
      } else if (targetedEffects.length > 0) {
        const targetMode = getSpellTargetMode(effects);
        setSpellTargeting({ pIdx, card, effects: targetedEffects, targetMode });
        setCastError({ pIdx, message: `${card.name}: Choose a target` });
      } else {
        setCastError({ pIdx, message: `Cast ${card.name}` });
        setTimeout(() => setCastError(null), 1500);
      }
      checkCastTriggers(pIdx, card);
      return;
    }

    // Creature / permanent — put on battlefield (card already removed from hand/exile on cast)
    // We still use moveCard for ETB triggers, attachment cleanup, etc. — pass the original
    // source zone; moveCard's filter is a no-op since the card is already gone from there.
    const resolveFromZone = fromExile ? 'exile' : 'hand';
    moveCard(pIdx, card, resolveFromZone, 'battlefield');
    // NOTE: moveCard already plays the appropriate SFX (planeswalkerEnters, playCreature, etc.)
    const etbEffects = parseETBEffects(card);

    // Check battlefield for "whenever another creature enters" triggers (Purphoros, Soul Warden, etc.)
    if (isCreature(card)) {
      const otherCreatureETBs = scanOtherCreatureETBTriggers(pIdx, card);
      etbEffects.push(...otherCreatureETBs);
    }

    // Auto-apply ETB damage to opponent in 1v1 (Viashino Pyromancer, etc.)
    // In 1v1 there's only one valid target, so auto-deal the damage instead of requiring manual click.
    const dmgPlayerPwEffect = etbEffects.find(e => e.actionType === 'etb_damage_player_pw');
    if (dmgPlayerPwEffect) {
      const oppIdx = pIdx === 0 ? 1 : 0;
      const oppPWs = getState(oppIdx).battlefield.filter(c => isPlaneswalker(c));
      if (oppPWs.length === 0) {
        // No planeswalkers — auto-deal damage to opponent
        setTimeout(() => {
          setState(oppIdx, prev => ({ ...prev, life: prev.life - dmgPlayerPwEffect.damage }));
          markDealtDamage(oppIdx);
          SFX.playerDamage();
          addGameLog(pIdx, '🔥', `${card.name} deals ${dmgPlayerPwEffect.damage} damage to ${getState(oppIdx).name}`, [card.id]);
        }, 500);
        // Remove this effect from the reminder (keep others if any)
        const remainingEffects = etbEffects.filter(e => e !== dmgPlayerPwEffect);
        if (remainingEffects.length > 0) {
          setEtbReminder({ pIdx, card, effects: remainingEffects });
        }
      } else {
        // Has planeswalkers — show targeting popup so player can choose
        setEtbReminder({ pIdx, card, effects: etbEffects });
      }
    } else {
      // Auto-trigger library search ETB effects (Solemn Simulacrum, Farhaven Elf, etc.)
      const searchEffect = etbEffects.find(e => e.actionType === 'search_basic_land' || e.actionType === 'search_land');
      if (searchEffect) {
        const filter = searchEffect.actionType === 'search_basic_land' ? 'basicLand' : 'land';
        setTimeout(() => {
          setLibrarySearch({ pIdx, filter, tapped: searchEffect.tapped || false, source: card.name });
        }, 300);
      }

      if (etbEffects.length > 0) {
        const scryEffect = etbEffects.find(e => e.type === 'scry');
        const drawEffect = etbEffects.find(e => e.type === 'draw');
        if (scryEffect) {
          const onScryComplete = drawEffect ? () => { drawCard(pIdx); addGameLog(pIdx, '🃏', getState(pIdx).name + ' drew a card'); } : null;
          setTimeout(() => { setScryView({ pIdx, count: scryEffect.count || 1, mode: 'scry', onComplete: onScryComplete }); }, 400);
        } else if (drawEffect) {
          drawCard(pIdx);
          addGameLog(pIdx, '🃏', getState(pIdx).name + ' drew a card');
        }
        const manualEffects = etbEffects.filter(e => e.type !== 'scry' && e.type !== 'draw');
        if (manualEffects.length > 0) {
          setEtbReminder({ pIdx, card, effects: manualEffects });
        }
      }
    }
    checkCastTriggers(pIdx, card);
  };

  // Counter a spell on the stack
  const counterSpellOnStack = (stackEntry) => {
    const { pIdx, card } = stackEntry;
    SFX.counterspell();
    // Countered spell goes to graveyard (card already removed from hand/exile on cast)
    setState(pIdx, prev => ({
      ...prev,
      graveyard: [...prev.graveyard, { ...card, tapped: false, counters: {} }],
    }));
    setCastError({ pIdx, message: `${getDisplayName(card)} was countered!` });
    setTimeout(() => setCastError(null), 2000);
    addGameLog(pIdx, '🚫', `${getDisplayName(card)} was countered`);
  };

  // Helper: detect if a card is a counterspell based on oracle text
  const isCounterSpellCard = (card) => {
    const oracle = [card.oracle_text || '', ...(card.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
    return oracle.includes('counter target spell') || oracle.includes('counter target nonland') || oracle.includes('counter that spell')
      || /counter target.*spell/.test(oracle); // Also matches "counter target instant or sorcery spell"
  };

  // Helper: detect if a card has "can't be countered"
  const cardCantBeCountered = (card) => {
    const oracle = [card.oracle_text || '', ...(card.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
    const kw = (card.keywords || []).map(k => k.toLowerCase());
    return oracle.includes("can't be countered") || oracle.includes("this spell can't be countered") || kw.includes("can't be countered");
  };

  // Resolve the top spell on the stack with auto-counter logic
  const resolveTopOfStack = () => {
    if (spellStack.length === 0) return;
    const topSpell = spellStack[spellStack.length - 1];
    const spellBelow = spellStack.length > 1 ? spellStack[spellStack.length - 2] : null;

    // For modal "choose one" spells (e.g. Decisive Denial), only counter if user chose counter mode
    const shouldActAsCounter = isCounterSpellCard(topSpell.card) && spellBelow &&
      (!topSpell.chosenMode || topSpell.chosenMode === 'counter');
    if (shouldActAsCounter) {
      // Check counter type restrictions (e.g. "counter target instant or sorcery spell" can't counter creatures)
      const counterOracle = (topSpell.card.oracle_text || '').toLowerCase();
      const targetTypeLine = (spellBelow.card.type_line || '').toLowerCase();
      let counterTypeValid = true;
      if (/counter target instant or sorcery spell/.test(counterOracle)) {
        counterTypeValid = targetTypeLine.includes('instant') || targetTypeLine.includes('sorcery');
      } else if (/counter target noncreature spell/.test(counterOracle)) {
        counterTypeValid = !targetTypeLine.includes('creature');
      } else if (/counter target instant spell/.test(counterOracle)) {
        counterTypeValid = targetTypeLine.includes('instant');
      }

      if (!counterTypeValid) {
        // Target doesn't match counter's type restriction — counterspell fizzles
        setSpellStack(prev => prev.slice(0, -1));
        setState(topSpell.pIdx, prev => ({
          ...prev,
          graveyard: [...prev.graveyard, { ...topSpell.card, tapped: false }],
        }));
        SFX.playSpell();
        const opponentPIdx = topSpell.pIdx === 0 ? 1 : 0;
        setCastError({ pIdx: opponentPIdx, message: `⚠️ ${topSpell.displayName} can only counter ${/instant or sorcery/.test(counterOracle) ? 'instants/sorceries' : 'matching spells'}! Fizzles.` });
        setTimeout(() => setCastError(null), 3000);
        addGameLog(topSpell.pIdx, '⚠️', `${topSpell.displayName} fizzled — ${spellBelow.displayName} is not a valid target`);
      } else if (cardCantBeCountered(spellBelow.card)) {
        // Target can't be countered — counterspell fizzles, target stays on stack
        setSpellStack(prev => prev.slice(0, -1)); // remove only top
        // Move the counterspell to graveyard (card already removed from hand on cast)
        setState(topSpell.pIdx, prev => ({
          ...prev,
          graveyard: [...prev.graveyard, { ...topSpell.card, tapped: false }],
        }));
        SFX.playSpell();
        const opponentPIdx = topSpell.pIdx === 0 ? 1 : 0;
        setCastError({ pIdx: opponentPIdx, message: `⚠️ ${spellBelow.displayName} can't be countered! ${topSpell.displayName} fizzles.` });
        setTimeout(() => setCastError(null), 3000);
        addGameLog(topSpell.pIdx, '⚠️', `${topSpell.displayName} fizzled — ${spellBelow.displayName} can't be countered`);
      } else {
        // Counter succeeds — remove both top and target from stack
        setSpellStack(prev => prev.slice(0, -2));
        // Move counterspell to graveyard (card already removed from hand on cast)
        setState(topSpell.pIdx, prev => ({
          ...prev,
          graveyard: [...prev.graveyard, { ...topSpell.card, tapped: false }],
        }));
        SFX.playSpell();
        // Counter the target spell
        counterSpellOnStack(spellBelow);
        const opponentPIdx = topSpell.pIdx === 0 ? 1 : 0;
        setCastError({ pIdx: opponentPIdx, message: `✕ ${spellBelow.displayName} was countered by ${topSpell.displayName}!` });
        setTimeout(() => setCastError(null), 2500);
        // Handle counterspell additional effects (Absorb gain life, Undermine lose life, etc.)
        if (/you gain (\d+) life/i.test(counterOracle)) {
          const lifeGain = parseInt(RegExp.$1, 10);
          setState(topSpell.pIdx, prev => ({ ...prev, life: prev.life + lifeGain }));
          addGameLog(topSpell.pIdx, 'heart', topSpell.displayName + ' gained ' + lifeGain + ' life');
        }
        if (/(?:opponent|that player|controller) loses (\d+) life/i.test(counterOracle)) {
          const lifeLoss = parseInt(RegExp.$1, 10);
          setState(spellBelow.pIdx, prev => ({ ...prev, life: prev.life - lifeLoss }));
          addGameLog(spellBelow.pIdx, 'skull', topSpell.displayName + ' lost ' + lifeLoss + ' life');
        }
        // Post-counter search & exile (Test of Talents: "search...exile cards with the same name")
        if (/search.*(?:graveyard|hand|library).*exile/i.test(counterOracle) ||
            /exile.*cards? with the same name/i.test(counterOracle)) {
          const counteredName = spellBelow.card.name || getDisplayName(spellBelow.card);
          setSearchExile({ pIdx: topSpell.pIdx, targetPIdx: spellBelow.pIdx, cardName: counteredName });
        }
      }
    } else {
      // Not a counterspell (or nothing below) — resolve normally
      setSpellStack(prev => prev.slice(0, -1));
      resolveSpellFromStack(topSpell);
    }
  };

  const castCard = (pIdx, card, asAdventure = false, altCostStr = null, overloadMode = false) => {
    const p = getState(pIdx);

    // ===== OVERLOAD DETECTION (e.g. Cyclonic Rift) =====
    // Overload: alternative cost that changes "target" → "each" (mass effect)
    if (!altCostStr && !overloadMode && !asAdventure) {
      const cardOracle = (card.oracle_text || '').toLowerCase();
      const overloadMatch = cardOracle.match(/overload\s*(\{[^}]+(?:\}\{[^}]+)*\})/);
      if (overloadMatch) {
        const overloadCostStr = overloadMatch[1];
        const normalCostStr = card.mana_cost || '';
        const overloadCost = parseManaCost(overloadCostStr);
        const canAffordOverload = canPayManaCost(p.manaPool, overloadCost);
        const displayName = getDisplayName(card);
        const choices = [
          { label: `Normal (${normalCostStr})`, icon: '🎯', action: 'overload_mode', modeText: 'normal', costStr: normalCostStr },
          { label: `Overload (${overloadCostStr})${!canAffordOverload ? ' — Not enough mana' : ''}`, icon: '🌊', action: 'overload_mode', modeText: 'overload', costStr: overloadCostStr,
            disabled: !canAffordOverload },
        ];
        pendingSpellModalRef.current = { pIdx, card, asAdventure: false, fromExile: false, displayName, spellToCheck: card, originalManaPool: { ...p.manaPool } };
        setModalChoice({ pIdx, card, triggerType: 'spell', choices });
        return;
      }
    }

    // Calculate mana cost
    let manaCostStr;
    if (altCostStr) {
      manaCostStr = altCostStr; // Alternative cost (Spectacle, etc.)
    } else if (asAdventure && isAdventure(card)) {
      manaCostStr = getAdventureFace(card).mana_cost;
    } else if (isAdventure(card)) {
      manaCostStr = getCreatureFace(card).mana_cost;
    } else {
      manaCostStr = card.mana_cost;
    }
    const cost = parseManaCost(manaCostStr);
    if (!asAdventure && isCommander && isPlayerCommander(pIdx, card)) {
      cost.generic = (cost.generic || 0) + (p.commanderCastCount * 2);
    }
    if (!canPayManaCost(p.manaPool, cost)) {
      setCastError({ pIdx, message: asAdventure ? 'Not enough mana for adventure' : 'Not enough mana' });
      setTimeout(() => setCastError(null), 2000);
      return;
    }

    // Pay mana immediately
    const newPool = deductManaCost(p.manaPool, cost);

    // Check if card is being cast from exile (foretell, adventure)
    const isFromExile = getState(pIdx).exile.some(c => c.id === card.id);
    const sourceZone = isFromExile ? 'exile' : 'hand';

    // Remove card from source zone NOW (not on resolve) — this is critical for online
    // mode because the opponent resolves spells on their client, which can't modify
    // the caster's hand (server blocks it). Also matches MTG rules: card moves to
    // stack on cast, not on resolve.
    setState(pIdx, prev => ({
      ...prev,
      manaPool: newPool,
      [sourceZone]: prev[sourceZone].filter(c => c.id !== card.id),
    }));

    // Determine if this spell needs targeting BEFORE going on the stack
    // In MTG, targets are chosen at cast time. In online mode, this is critical:
    // the caster must select targets, not the opponent who clicks "Resolve".
    const displayName = asAdventure ? getAdventureFace(card).name + ' (Adventure)' : getDisplayName(card);
    const spellToCheck = asAdventure && isAdventure(card)
      ? { ...card, oracle_text: getAdventureFace(card).oracle_text, type_line: getAdventureFace(card).type_line }
      : card;

    if (isSpellCard(card) || (asAdventure && isAdventure(card))) {
      // ===== MODAL SPELL DETECTION ("choose one" — e.g. Decisive Denial) =====
      const spellOracle = (spellToCheck.oracle_text || '').toLowerCase();
      if (/choose one/i.test(spellOracle)) {
        const choicesRaw = spellOracle.match(/[•\-]\s*([^•\-]+)/g) || [];
        if (choicesRaw.length > 1) {
          const choices = choicesRaw.map(raw => {
            const text = raw.replace(/^[•\-]\s*/, '').trim().replace(/\.$/, '');
            let icon = '✦';
            if (/counter/i.test(text)) icon = '🛡';
            if (/fight/i.test(text)) icon = '⚔️';
            if (/destroy/i.test(text)) icon = '💀';
            if (/damage/i.test(text)) icon = '🔥';
            if (/draw/i.test(text)) icon = '🃏';
            if (/gain.*life/i.test(text)) icon = '💚';
            if (/return/i.test(text)) icon = '↩️';
            return { label: text, icon, action: 'spell_mode', modeText: text };
          });
          pendingSpellModalRef.current = { pIdx, card, asAdventure, fromExile: isFromExile, displayName, spellToCheck, originalManaPool: { ...p.manaPool } };
          setModalChoice({ pIdx, card: spellToCheck, triggerType: 'spell', choices });
          addGameLog(pIdx, '🃏', `${getState(pIdx).name} casts ${displayName}`);
          SFX.playSpell();
          return;
        }
      }

      const effects = parseSpellEffects(spellToCheck);
      const targetMode = getSpellTargetMode(effects);
      const targetedEffects = effects.filter(e => ['destroy', 'exile', 'bounce', 'damage', 'boost', 'counter_add', 'fight'].includes(e.type));
      const nonTargetedEffects = effects.filter(e => !['destroy', 'exile', 'bounce', 'damage', 'boost', 'counter_add', 'fight'].includes(e.type));

      if (overloadMode) {
        // Overload mode — skip targeting, goes directly on stack as mass effect
        setInstantCasting(null); // Safe to clear now — spell is going on stack
        setSpellStack(prev => [...prev, { pIdx, card, asAdventure, fromExile: isFromExile, displayName, overloadMode: true }]);
        addGameLog(pIdx, '🌊', `${getState(pIdx).name} casts ${displayName} with OVERLOAD`);
        return;
      }

      if (targetedEffects.length > 0 && (targetMode === 'battlefield' || targetedEffects.some(e => e.type === 'damage'))) {
        // Spell needs targeting — show targeting UI to the CASTER before putting on stack
        pendingCastRef.current = { pIdx, card, asAdventure, fromExile: isFromExile, displayName, nonTargetedEffects, originalManaPool: { ...p.manaPool } };
        setSpellTargeting({ pIdx, card: spellToCheck, effects: targetedEffects, targetMode });
        setCastError({ pIdx, message: `${displayName}: Choose a target` });
        addGameLog(pIdx, '🃏', `${getState(pIdx).name} casts ${displayName}`);
        return;
      }
    }

    // No targeting needed — put directly on the stack
    setInstantCasting(null); // Safe to clear now — spell is going on stack
    setSpellStack(prev => [...prev, { pIdx, card, asAdventure, fromExile: isFromExile, displayName }]);
    addGameLog(pIdx, '🃏', `${getState(pIdx).name} casts ${displayName}`);
  };

  // Cast adventure card from exile (as creature)
  const castAdventureFromExile = (pIdx, card) => {
    const p = getState(pIdx);
    const creatureFace = getCreatureFace(card);
    const cost = parseManaCost(creatureFace.mana_cost);
    if (isCommander && isPlayerCommander(pIdx, card)) {
      cost.generic = (cost.generic || 0) + (p.commanderCastCount * 2);
    }
    if (!canPayManaCost(p.manaPool, cost)) {
      setCastError({ pIdx, message: 'Not enough mana' });
      setTimeout(() => setCastError(null), 2000);
      return;
    }
    const newPool = deductManaCost(p.manaPool, cost);
    // Remove card from exile NOW (on cast, not resolve) — required for online mode
    setState(pIdx, prev => ({
      ...prev,
      manaPool: newPool,
      exile: prev.exile.filter(c => c.id !== card.id),
    }));
    // Put on stack — mark as fromExile so resolve knows destination
    setSpellStack(prev => [...prev, { pIdx, card, asAdventure: false, fromExile: true, displayName: creatureFace.name }]);
  };

  // ===== CREATURE LAND ACTIVATION =====
  // countersOnly: if true, only add counters without becoming a creature ("You may" choice)
  const activateCreatureLand = (pIdx, card, xValue = null, countersOnly = false) => {
    const data = getCreatureLandData(card);
    if (!data) return;

    const p = getState(pIdx);

    // Check mana cost
    let cost;
    if (data.isXCost && xValue !== null) {
      // X cost: {X}{G} means total = X + 1G
      cost = { ...data.cost, generic: xValue };
    } else {
      cost = { ...data.cost };
    }

    if (!canPayManaCost(p.manaPool, cost)) {
      setCastError({ pIdx, message: 'Not enough mana to activate' });
      setTimeout(() => setCastError(null), 2000);
      return;
    }

    const newPool = deductManaCost(p.manaPool, cost);

    // Determine power/toughness (X/X for Lair of the Hydra)
    const power = data.isXCost ? (xValue || 0) : data.power;
    const toughness = data.isXCost ? (xValue || 0) : data.toughness;

    const isPermanent = data.permanent || false;
    const shouldTap = !data.noTap;

    // countersOnly mode: just add counters, don't transform into creature ("You may" clause)
    if (countersOnly && data.addCounters) {
      setState(pIdx, prev => ({
        ...prev,
        manaPool: newPool,
        battlefield: prev.battlefield.map(c => {
          if (c.id !== card.id) return c;
          const counters = { ...(c.counters || {}) };
          const modAmt = applyVorinclexModifier(pIdx, data.addCounters.amount);
          counters[data.addCounters.type] = (counters[data.addCounters.type] || 0) + modAmt;
          return { ...c, tapped: shouldTap ? true : c.tapped, counters };
        }),
      }));
      SFX.playSpell();
      const modAmt = applyVorinclexModifier(pIdx, data.addCounters.amount);
      setCastError({ pIdx, message: `${card.name}: +${modAmt} ${data.addCounters.type} counters (stays land)`, background: '#1a3320' });
      setTimeout(() => setCastError(null), 1500);
      addGameLog(pIdx, '🏔️', `${getState(pIdx).name} puts ${modAmt} ${data.addCounters.type} counters on ${card.name} (stays land)`, [card.id]);
      return;
    }

    setState(pIdx, prev => ({
      ...prev,
      manaPool: newPool,
      battlefield: prev.battlefield.map(c => {
        if (c.id !== card.id) return c;
        const updated = {
          ...c,
          tapped: shouldTap ? true : c.tapped,
          animatedCreature: !isPermanent, // Only set animatedCreature for temporary animations
          permanentCreature: isPermanent || c.permanentCreature, // Permanent transformation flag
          animatedData: isPermanent ? null : {
            power, toughness,
            type_line: data.type_line,
            keywords: data.keywords,
            attackTrigger: data.attackTrigger,
            originalTypeLine: c.type_line,
          },
          power: String(power),
          toughness: String(toughness),
          type_line: c.permanentCreature || isPermanent
            ? (c.type_line && c.type_line.includes('Creature') ? c.type_line : c.type_line + ' Creature — Elemental')
            : c.type_line + ' ' + data.type_line,
          keywords: [...(c.keywords || []), ...data.keywords],
          enteredThisTurn: false,
        };
        // Add counters if specified (Crawling Barrens: +1/+1 counters) — Vorinclex modifies
        if (data.addCounters) {
          const counters = { ...updated.counters };
          const modAmt = applyVorinclexModifier(pIdx, data.addCounters.amount);
          counters[data.addCounters.type] = (counters[data.addCounters.type] || 0) + modAmt;
          updated.counters = counters;
        }
        return updated;
      }),
    }));

    SFX.playSpell();
    const modCounterAmt = data.addCounters ? applyVorinclexModifier(pIdx, data.addCounters.amount) : 0;
    const counterMsg = data.addCounters ? ` (+${modCounterAmt} ${data.addCounters.type} counters)` : '';
    addGameLog(pIdx, '🏔️', `${getState(pIdx).name} animates ${card.name} → ${power}/${toughness}${counterMsg}`, [card.id]);
    // Broadcast creature land activation to both players
    setAbilityActivated({
      pIdx,
      cardName: card._reskin?.name || card.name,
      abilityText: `Becomes a ${power}/${toughness} creature${counterMsg}`,
      cardImage: card._reskin?.artUrl || card.image_uris?.art_crop || card.image_uris?.small || null,
    });
    setTimeout(() => setAbilityActivated(null), 3500);
  };

  // Revert animated creature lands back to normal lands
  const revertCreatureLands = (playerIdx) => {
    setState(playerIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c => {
        if (!c.animatedCreature) return c;
        const orig = c.animatedData;
        return {
          ...c,
          animatedCreature: false,
          animatedData: null,
          power: undefined,
          toughness: undefined,
          type_line: orig.originalTypeLine,
          keywords: (c.keywords || []).filter(k => !(orig.keywords || []).includes(k)),
        };
      }),
    }));
  };

  // Check if a player has the sorcery-flash effect (Teferi +1: cast sorceries as though they had flash)
  const hasSorceryFlash = (pIdx) => {
    const effects = getState(pIdx).untilNextTurnEffects || [];
    return effects.some(e => e.type === 'sorcery_flash');
  };

  // Cast an instant (or flash) from hand — works for both active and non-active player
  const castInstantFromHand = (pIdx, card) => {
    // Allow sorcery-speed cards if player has sorcery_flash effect (e.g. Teferi, Time Raveler +1)
    const isSorcery = (card.type_line || '').toLowerCase().includes('sorcery');
    const canCastViaSorceryFlash = isSorcery && hasSorceryFlash(pIdx);
    if (!canCastAtInstantSpeed(card) && !canCastViaSorceryFlash) {
      setCastError({ pIdx, message: 'Can only cast instants or flash cards at instant speed' });
      setTimeout(() => setCastError(null), 2000);
      return;
    }
    // NOTE: Do NOT clear instantCasting here! It must stay set until the spell is
    // fully on the stack (or targeting is cancelled). Clearing it prematurely causes
    // the endOfTurnRespond overlay to flash on both clients, blocking targeting UI
    // and causing state desync between players. instantCasting is cleared in:
    // - castCard() when spell goes on stack (no targeting / overload)
    // - Pre-cast targeting completion (creature/player target selected)
    // - cancelSpellTargeting()
    // - Modal spell mode handlers
    // Adventure cards with instant adventure face: ALWAYS cast as adventure at instant speed
    // (e.g. Bonecrusher Giant → Stomp). Note: can't use !isInstant(card) because the combined
    // type_line includes "Instant" from the adventure face, making isInstant() return true.
    if (isAdventureCard(card)) {
      const advFace = card.card_faces?.[1];
      if (advFace && advFace.type_line && advFace.type_line.toLowerCase().includes('instant')) {
        castCard(pIdx, card, true); // asAdventure = true
        return;
      }
    }
    castCard(pIdx, card);
  };

  // Cycling: discard card from hand → draw a card
  const cycleCard = (pIdx, card) => {
    // Move card from hand to graveyard
    setState(pIdx, prev => ({
      ...prev,
      hand: prev.hand.filter(c => c.id !== card.id),
      graveyard: [...prev.graveyard, { ...card, tapped: false }],
    }));
    // Draw a card
    drawCard(pIdx);
    SFX.playSpell();
    setCastError({ pIdx, message: `Cycled ${getDisplayName(card)} — drew a card`, background: '#1a2a33' });
    setTimeout(() => setCastError(null), 1500);

    // Check for cycling triggers (e.g. Shark Typhoon: "When you cycle ~, create an X/X blue Shark creature token with flying")
    const allText = getOracleText(card);
    if (allText.includes('when you cycle') || allText.includes('cycling this card')) {
      // Auto-detect "create an X/X [color] [type] creature token [with keywords]"
      const cycleTokenMatch = allText.match(/create an? x\/x\s+([\w\s]+?)\s+creature token\s*(?:with\s+([\w\s,]+?)(?:\.|,\s*where|$))?/);
      if (cycleTokenMatch) {
        const colorType = cycleTokenMatch[1].trim();
        const kwStr = cycleTokenMatch[2] || '';
        const keywords = kwStr ? kwStr.replace(/\band\b/g, ',').split(',').map(k => k.trim()).filter(Boolean) : [];
        const colorMap = { white: 'W', blue: 'U', black: 'B', red: 'R', green: 'G' };
        const colors = Object.keys(colorMap).filter(c => colorType.includes(c)).map(c => colorMap[c]);
        const creatureType = colorType.split(' ').filter(w => !colorMap[w] && w !== 'colorless').map(w => w[0].toUpperCase() + w.slice(1)).join(' ') || 'Token';
        // Show X-value picker modal (replaces browser prompt() for better UX)
        setCycleXChoice({ pIdx, cardName: getDisplayName(card), creatureType, colors, keywords });
      } else {
        // Generic cycling trigger — show reminder
        const triggerMatch = allText.match(/(when you cycle[^.]*\.)/);
        if (triggerMatch) {
          setTimeout(() => {
            setEtbReminder({ pIdx, card, effects: [{ icon: '🔄', text: triggerMatch[1] }] });
          }, 300);
        }
      }
    }
  };

  const playCardFromHand = (pIdx, card) => {
    // Only active player can play cards from their own hand (non-active uses castInstantFromHand)
    if (onlineMode && pIdx !== onlinePlayerIndex) return;
    if (pIdx !== activePlayer) return;
    const p = getState(pIdx);

    // Lands: free to play, but max 1 per turn
    if (isLand(card)) {
      if (p.landPlayedThisTurn) {
        setCastError({ pIdx, message: 'Already played a land this turn' });
        setTimeout(() => setCastError(null), 2000);
        return;
      }
      moveCard(pIdx, card, 'hand', 'battlefield');
      setState(pIdx, prev => ({ ...prev, landPlayedThisTurn: true }));
      // Landfall: scan battlefield for "whenever a land enters the battlefield" triggers
      setTimeout(() => {
        const st = getState(pIdx);
        const landfallTriggers = [];
        for (const bf of st.battlefield) {
          const oracle = [bf.oracle_text || '', ...(bf.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
          const kw = (bf.keywords || []).map(k => k.toLowerCase());
          if (kw.includes('landfall') || oracle.includes('whenever a land enters the battlefield') || oracle.includes('whenever a land enters the battlefield under your control')) {
            // Extract the effect text after the trigger
            const triggerMatch = oracle.match(/whenever a land enters the battlefield[^,.]*, ([^.]+)/);
            const effectText = triggerMatch ? triggerMatch[1].trim() : 'landfall trigger';
            landfallTriggers.push({ name: bf.name, effect: effectText });
          }
        }
        if (landfallTriggers.length > 0) {
          const triggerText = landfallTriggers.map(t => `${t.name}: ${t.effect}`).join(' | ');
          setEtbReminder({ pIdx, card, effects: landfallTriggers.map(t => ({ icon: '🌍', text: `LANDFALL — ${t.name}: ${t.effect}` })) });
        }
      }, 200);
      return;
    }

    // Adventure cards: show choice modal
    if (isAdventure(card)) {
      setAdventureChoice({ pIdx, card });
      return;
    }

    // Normal card: cast directly
    castCard(pIdx, card);
  };

  const handleCardClick = (card, pIdx, zone) => {
    if (zone === 'battlefield') {
      // Spell targeting mode: click a target to apply spell effect
      if (spellTargeting) {
        const casterIdx = spellTargeting.pIdx;
        const isTargetingOpponent = pIdx !== casterIdx;

        // Hexproof: opponent's creatures can't be targeted
        if (isTargetingOpponent && hasHexproof(card)) {
          setCastError({ pIdx: casterIdx, message: `❌ ${card.name} has hexproof — can't be targeted!`, background: '#4a1a1a' });
          setTimeout(() => setCastError(null), 2500);
          return;
        }
        // Ward: warn about ward cost when targeting opponent's creature
        if (isTargetingOpponent) {
          const cardOracle = [card.oracle_text || '', ...(card.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
          const wardKw = (card.keywords || []).some(k => k.toLowerCase().startsWith('ward'));
          if (wardKw || cardOracle.includes('ward')) {
            const wardMatch = cardOracle.match(/ward\s*(?:\{([^}]+)\}|(\d+))/);
            const wardCost = wardMatch ? (wardMatch[1] || wardMatch[2]) : '?';
            setCastError({ pIdx: casterIdx, message: `⚠️ ${card.name} has Ward {${wardCost}} — opponent must pay or spell is countered!` });
            setTimeout(() => setCastError(null), 3000);
            // Don't return — allow targeting, just warn
          }
        }
        // Shroud: no one can target
        if (hasShroud(card)) {
          setCastError({ pIdx: casterIdx, message: `❌ ${card.name} has shroud — can't be targeted!`, background: '#4a1a1a' });
          setTimeout(() => setCastError(null), 2500);
          return;
        }
        // Protection from color
        const protColor = isTargetingOpponent ? hasProtectionFrom(card, spellTargeting.card) : null;
        if (protColor) {
          setCastError({ pIdx: casterIdx, message: `❌ ${card.name} has protection from ${protColor}!`, background: '#4a1a1a' });
          setTimeout(() => setCastError(null), 2500);
          return;
        }
        // Indestructible: warn (don't block) for destroy effects
        const hasDestroyEffect = spellTargeting.effects.some(e => e.type === 'destroy');
        if (hasDestroyEffect && card.keywords?.some(k => k.toLowerCase() === 'indestructible')) {
          setCastError({ pIdx: casterIdx, message: `⚠️ ${card.name} is indestructible — destroy has no effect!`, background: '#4a3a1a' });
          setTimeout(() => setCastError(null), 2500);
          return;
        }
        // MV restriction on destroy: Fatal Push (CMC ≤ 2), similar cards
        if (hasDestroyEffect) {
          const spellText = (spellTargeting.card.oracle_text || '').toLowerCase();
          const faces = spellTargeting.card.card_faces || [];
          const allSpellText = [spellText, ...faces.map(f => (f.oracle_text || '').toLowerCase())].join('\n');
          const mvMatch = allSpellText.match(/destroy target creature.*(?:mana value|converted mana cost) (\d+) or less/);
          if (mvMatch) {
            const maxMV = parseInt(mvMatch[1]);
            const targetMV = card.cmc !== undefined ? card.cmc : (card.card_faces?.[0]?.cmc || 0);
            if (targetMV > maxMV) {
              setCastError({ pIdx: casterIdx, message: `❌ ${card.name} has mana value ${targetMV} — ${getDisplayName(spellTargeting.card)} only hits MV ${maxMV} or less!`, background: '#4a1a1a' });
              setTimeout(() => setCastError(null), 2500);
              return;
            }
          }
        }

        if (pendingCastRef.current) {
          // PRE-CAST TARGETING: store target, then put spell on stack for opponent to respond
          const pc = pendingCastRef.current;
          pendingCastRef.current = null;
          setSpellTargeting(null);
          setInstantCasting(null); // Safe to clear now — spell is going on stack
          setSpellStack(prev => [...prev, {
            ...pc, resolvedTargets: { type: 'creature', pIdx, cardId: card.id, cardName: card.name },
          }]);
          setCastError({ pIdx: pc.pIdx, message: `${pc.displayName} → ${card.name}`, background: '#1a3320' });
          setTimeout(() => setCastError(null), 1500);
        } else {
          // POST-RESOLVE TARGETING (local/legacy): apply immediately
          applySpellEffect(spellTargeting.pIdx, pIdx, card, spellTargeting.effects);
          setCastError(prev => prev ? { ...prev, message: `${getDisplayName(spellTargeting.card)} → ${card.name}`, background: '#1a3320' } : null);
          setTimeout(() => setCastError(null), 1500);
          SFX.playSpell();
        }
        return;
      }
      // Ability targeting mode: click a target creature for activated ability
      if (abilityTargeting) {
        if (!isCreature(card)) {
          setCastError({ pIdx: abilityTargeting.pIdx, message: `❌ ${card.name} is not a creature!`, background: '#4a1a1a' });
          setTimeout(() => setCastError(null), 2000);
          return;
        }
        // "Another target creature" — can't target the source card itself
        if (abilityTargeting.ability.fullEffectText && /another\s+target/i.test(abilityTargeting.ability.fullEffectText) && card.id === abilityTargeting.card.id) {
          setCastError({ pIdx: abilityTargeting.pIdx, message: `❌ Must target another creature (not ${card.name} itself)!`, background: '#4a1a1a' });
          setTimeout(() => setCastError(null), 2000);
          return;
        }
        // Hexproof check (can't target opponent's hexproof creatures)
        const isOpponent = pIdx !== abilityTargeting.pIdx;
        if (isOpponent && hasHexproof(card)) {
          setCastError({ pIdx: abilityTargeting.pIdx, message: `❌ ${card.name} has hexproof!`, background: '#4a1a1a' });
          setTimeout(() => setCastError(null), 2000);
          return;
        }
        // Shroud check
        if (hasShroud(card)) {
          setCastError({ pIdx: abilityTargeting.pIdx, message: `❌ ${card.name} has shroud!`, background: '#4a1a1a' });
          setTimeout(() => setCastError(null), 2000);
          return;
        }
        // Protection from color check
        if (isOpponent) {
          const protColor = hasProtectionFrom(card, abilityTargeting.card);
          if (protColor) {
            setCastError({ pIdx: abilityTargeting.pIdx, message: `❌ ${card.name} has protection from ${protColor}!`, background: '#4a1a1a' });
            setTimeout(() => setCastError(null), 2000);
            return;
          }
        }
        // Valid target — pay costs and execute
        const targetInfo = { pIdx, cardId: card.id, cardName: card.name };
        const { pIdx: srcPIdx, card: srcCard, ability } = abilityTargeting;
        setAbilityTargeting(null);
        setStackMinimized(false);
        setCastError(null);
        executeAbility(srcPIdx, srcCard, ability, targetInfo);
        return;
      }
      // Combat mode: declare attackers
      if (combatState && combatState.phase === 'attackers' && pIdx === activePlayer && isCreature(card)) {
        toggleAttacker(card.id);
        return;
      }
      // Combat mode: select YOUR creature as blocker first (defender clicks own creature)
      if (combatState && combatState.phase === 'blockers' && pIdx !== activePlayer && isCreature(card) && !card.tapped) {
        selectBlocker(card.id);
        return;
      }
      // Combat mode: then click an attacker to assign the blocker to
      if (combatState && combatState.phase === 'blockers' && pIdx === activePlayer && combatState.attackers.includes(card.id) && combatState.selectedBlocker) {
        assignBlockerToAttacker(card.id);
        return;
      }
      // Tap/untap: in online mode, you can always tap/untap your own cards
      // In hotseat, active player can tap anything; non-active can only tap lands/dorks (instant-speed mana)
      if (onlineMode) {
        if (pIdx === onlinePlayerIndex) toggleTap(pIdx, card.id);
      } else {
        if (pIdx === activePlayer || (pIdx !== activePlayer && (isLand(card) || getManaDorkColors(card)))) {
          toggleTap(pIdx, card.id);
        }
      }
    }
  };

  // Handle clicking on a player area during spell targeting (for damage spells)
  const handlePlayerTarget = (targetPIdx) => {
    if (!spellTargeting) return;

    if (pendingCastRef.current) {
      // PRE-CAST TARGETING: store player target, then put spell on stack
      const pc = pendingCastRef.current;
      pendingCastRef.current = null;
      setSpellTargeting(null);
      setInstantCasting(null); // Safe to clear now — spell is going on stack
      const dmgEffects = spellTargeting.effects.filter(e => e.type === 'damage');
      const dmg = dmgEffects.length > 0 ? (dmgEffects[0].amount || 0) : 0;
      setSpellStack(prev => [...prev, {
        ...pc, resolvedTargets: { type: 'player', pIdx: targetPIdx, damage: dmg },
      }]);
      setCastError({ pIdx: pc.pIdx, message: `${pc.displayName}: ${dmg} damage → ${getState(targetPIdx).name}`, background: '#1a3320' });
      setTimeout(() => setCastError(null), 1500);
      return;
    }

    // POST-RESOLVE TARGETING (local/legacy): apply immediately
    const dmgEffects = spellTargeting.effects.filter(e => e.type === 'damage');
    if (dmgEffects.length > 0) {
      const dmg = dmgEffects[0].amount || 0;
      if (dmg > 0) {
        setState(targetPIdx, prev => ({ ...prev, life: prev.life - dmg }));
        markDealtDamage(targetPIdx);
        SFX.playerDamage();
        setCastError({ pIdx: spellTargeting.pIdx, message: `${getDisplayName(spellTargeting.card)}: ${dmg} damage to ${getState(targetPIdx).name}`, background: '#1a3320' });
        setTimeout(() => setCastError(null), 1500);
      }
    }
    setSpellTargeting(null);
  };

  const cancelSpellTargeting = () => {
    // If cancelling during pre-cast targeting, undo mana payment and return card to source zone
    if (pendingCastRef.current) {
      const pc = pendingCastRef.current;
      pendingCastRef.current = null;
      const fromZone = pc.fromExile ? 'exile' : 'hand';
      setState(pc.pIdx, prev => ({
        ...prev,
        [fromZone]: [...prev[fromZone], pc.card],
        // Restore the original mana pool from before payment (if stored)
        manaPool: pc.originalManaPool || prev.manaPool,
      }));
      addGameLog(pc.pIdx, '↩️', `${getState(pc.pIdx).name} cancels casting ${pc.displayName}`);
    }
    setInstantCasting(null); // Clear instant casting state (was kept alive during targeting)
    setSpellTargeting(null);
    setCastError(null);
  };

  // ═══════════════════════════════════════════════════════════════
  // §8. TURN & PHASE MANAGEMENT
  // ═══════════════════════════════════════════════════════════════
  const [turnCount, _setTurnCount] = useState(1); // SYNCED
  const [currentPhase, _setCurrentPhase] = useState('main1'); // SYNCED
  const setTurnCount = syncSetter(_setTurnCount);
  const setCurrentPhase = syncSetter(_setCurrentPhase);

  // Combat system state — versioned to prevent stale sync overwrites
  const [combatState, __setCombatState] = useState(null); // SYNCED
  const combatStateVersionRef = useRef(0);
  const _setCombatState = (v) => __setCombatState(v); // raw setter for receiving
  const setCombatState = (v) => {
    combatStateVersionRef.current++;
    const ver = combatStateVersionRef.current;
    if (typeof v === 'function') {
      __setCombatState(prev => {
        const next = v(prev);
        return next ? { ...next, _v: ver } : null;
      });
    } else {
      __setCombatState(v ? { ...v, _v: ver } : null);
    }
    if (onlineMode && onlineSyncNeededRef) onlineSyncNeededRef.current = true;
  };

    // Safety net: auto-clear stuck 'damage' phase after 5 seconds.
    // This prevents "Resolving Damage..." from getting stuck on screen.
    useEffect(() => {
      if (combatState && combatState.phase === 'damage') {
        const timer = setTimeout(() => {
          if (combatStateRef.current && combatStateRef.current.phase === 'damage') {
            setCombatState(null);
            setCurrentPhase('main2');
          }
        }, 5000);
        return () => clearTimeout(timer);
      }
    }, [combatState]);
  const combatStateRef = useRef(combatState);
  combatStateRef.current = combatState;
  const [combatLog, setCombatLog] = useState(null);
  const [preventCombatDamage, _setPreventCombatDamage] = useState(false); // SYNCED
  const setPreventCombatDamage = syncSetter(_setPreventCombatDamage);
  // { phase: 'attackers'|'pw-targets'|'combat-respond'|'blockers'|'damage', attackers: [cardId], attackTargets: { attackerId: 'player'|pwCardId }, blocks: { attackerId: [blockerId] }, selectedBlocker: cardId|null }

  // Auto-log ETB/LTB reminders to the game log
  useEffect(() => {
    if (etbReminder) {
      const effectText = etbReminder.effects.map(e => e.text).join(', ');
      addGameLog(etbReminder.pIdx, '✨', `${etbReminder.card?.name || 'Trigger'}: ${effectText.substring(0, 80)}${effectText.length > 80 ? '…' : ''}`, etbReminder.card ? [etbReminder.card.id] : []);
    }
  }, [etbReminder]);

  useEffect(() => {
    if (ltbReminder) {
      const effectText = ltbReminder.effects.map(e => e.text).join(', ');
      addGameLog(ltbReminder.pIdx, '💀', `${ltbReminder.card?.name || 'Trigger'}: ${effectText.substring(0, 80)}${effectText.length > 80 ? '…' : ''}`, ltbReminder.card ? [ltbReminder.card.id] : []);
    }
  }, [ltbReminder]);

  // Auto-clear combat log after 3 seconds
  useEffect(() => {
    if (combatLog) {
      const timer = setTimeout(() => setCombatLog(null), 3000);
      return () => clearTimeout(timer);
    }
  }, [combatLog]);

  // Check win/loss conditions when life totals change (with delay so player sees final actions)
  useEffect(() => {
    if (gameOver) return;
    for (let i = 0; i < 2; i++) {
      const p = getState(i);
      const opponent = getState(i === 0 ? 1 : 0);
      if (p.life <= 0) {
        const winner = opponent.name, loser = p.name, reason = `${p.name} reached ${p.life} life`;
        setEndOfTurnRespond(false); setInstantCasting(null); setSpellTargeting(null); setAbilityTargeting(null); setModalChoice(null);
        const timer = setTimeout(() => setGameOver({ winner, loser, reason }), 2000);
        return () => clearTimeout(timer);
      }
      if (p.poison >= GAME_CONSTANTS.POISON_LETHAL) {
        const winner = opponent.name, loser = p.name, reason = `${p.name} reached ${p.poison} poison counters`;
        setEndOfTurnRespond(false); setInstantCasting(null); setSpellTargeting(null); setAbilityTargeting(null); setModalChoice(null);
        const timer = setTimeout(() => setGameOver({ winner, loser, reason }), 2000);
        return () => clearTimeout(timer);
      }
      if (isCommander) {
        const cmdDmg = p.commanderDamageReceived || {};
        for (const [fromPlayer, dmg] of Object.entries(cmdDmg)) {
          if (dmg >= 21) {
            const winner = opponent.name, loser = p.name, reason = `${p.name} took ${dmg} commander damage`;
            const timer = setTimeout(() => setGameOver({ winner, loser, reason }), 2000);
            return () => clearTimeout(timer);
          }
        }
      }
    }
  }, [p1.life, p2.life, p1.poison, p2.poison, p1.commanderDamageReceived, p2.commanderDamageReceived]);

  // Handle concession from either player
  const concessionHandledRef = useRef(null);
  useEffect(() => {
    if (!concession || gameOver) return;
    if (concessionHandledRef.current === concession) return; // already handled
    const winner = players[concession.winnerIndex];
    const loser = concession.loserName || players[concession.loserIndex];
    const isBo3 = matchInfo && matchInfo.type === 'bo3';
    // For Bo3 mid-match: don't show gameOver — the betweenGames overlay handles it
    // For single game or Bo3 match-winning concession: show gameOver
    const matchWon = matchInfo && matchInfo.winner !== null && matchInfo.winner !== undefined;
    if (!isBo3 || matchWon) {
      setGameOver({ winner, loser, reason: `${loser} conceded the game`, conceded: true });
    }
    addGameLog(concession.loserIndex, '🏳️', `${loser} conceded`);
    concessionHandledRef.current = concession;
  }, [concession, matchInfo]);

  // ═══════════════════════════════════════════════════════════════
  // §7. COMBAT SYSTEM
  // ═══════════════════════════════════════════════════════════════
  const enterCombat = () => {
    setCurrentPhase('combat');
    setCombatState({ phase: 'attackers', attackers: [], attackTargets: {}, blocks: {}, selectedBlocker: null });
  };

  const toggleAttacker = (cardId) => {
    if (!combatState || combatState.phase !== 'attackers') return;
    // Online mode: only attacker can select attackers
    if (onlineMode && onlinePlayerIndex !== activePlayer) return;
    const p = getState(activePlayer);
    const card = p.battlefield.find(c => c.id === cardId);
    if (!card || card.tapped) return;
    if (!isCreature(card)) return;
    // Defender: warn (but allow override for Assault Formation etc.)
    const cardKw = (card.keywords || []).map(k => k.toLowerCase());
    const cardOracle = (card.oracle_text || '').toLowerCase();
    // Check if "can't attack" refers to THIS creature (not "that creature can't attack" which refers to something else)
    const nameLc = (card.name || '').toLowerCase();
    const selfCantAttack = cardOracle.includes(nameLc + " can't attack") ||
      cardOracle.match(/^[^.]*can't attack(?! or block for as long| or block unless)/) ||
      (cardOracle.includes("can't attack") && !cardOracle.includes("that creature can't attack") && !cardOracle.includes("it can't attack"));
    if (cardKw.includes('defender') || selfCantAttack) {
      // Check if there's an effect on battlefield that allows defenders to attack
      const hasDefenderOverride = getState(activePlayer).battlefield.some(c => {
        const o = [c.oracle_text || '', ...(c.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
        return o.includes('defender can attack') || o.includes('as though it didn\'t have defender') || o.includes('can attack as though');
      });
      if (!hasDefenderOverride) {
        setCastError({ pIdx: activePlayer, message: `⚠️ ${card.name} has defender — can't attack! (override with effect on battlefield)` });
        setTimeout(() => setCastError(null), 2000);
        return;
      }
    }
    // Conditional attack restriction: "can't attack or block unless you control another creature with power N or greater"
    const cantAttackUnless = cardOracle.match(/can't attack or block unless you control another creature with power (\d+) or greater/);
    if (cantAttackUnless) {
      const requiredPower = parseInt(cantAttackUnless[1]);
      const hasQualifier = p.battlefield.some(c =>
        c.id !== card.id && isCreature(c) && (parseInt(c.power) || 0) >= requiredPower
      );
      if (!hasQualifier) {
        setCastError({ pIdx: activePlayer, message: `⚠️ ${card.name} can't attack unless you control another creature with power ${requiredPower}+!` });
        setTimeout(() => setCastError(null), 2500);
        return;
      }
    }
    // Summoning sickness check (unless haste)
    const hasHaste = cardKw.includes('haste');
    if (card.enteredThisTurn && !hasHaste) return;

    setCombatState(prev => {
      const isAttacking = prev.attackers.includes(cardId);
      return { ...prev, attackers: isAttacking ? prev.attackers.filter(id => id !== cardId) : [...prev.attackers, cardId] };
    });
  };

  // ===== COMBAT TRIGGER PARSER (shared by attack & block triggers) =====
  // Parses oracle text for "whenever X attacks [or blocks]" triggers.
  // Returns { card, trigger } with modal choices if "choose one" is detected,
  // or a simple token trigger if it's a plain token-creation trigger.
  const parseCombatTrigger = (creature, oracle, triggerType) => {
    // Extract effect text after "attacks" or "blocks"
    const effectMatch = oracle.match(/(?:enters the battlefield or )?(?:attacks|blocks)(?:\s+or\s+(?:attacks|blocks))?,?\s*(?:choose one\s*[-—]?\s*)?(.+)/s);
    const effectText = effectMatch ? effectMatch[1].trim() : 'combat trigger';
    const triggerLabel = triggerType === 'attack' ? 'ATTACK' : 'BLOCK';

    // Detect "choose one" modal triggers (Elder Gargaroth pattern)
    if (/choose one/i.test(oracle)) {
      // Parse bullet-point choices from oracle text
      // Oracle format: "choose one —\n• Choice 1.\n• Choice 2.\n• Choice 3."
      const choicesRaw = oracle.match(/[•\-]\s*([^•\-]+)/g) || [];
      const choices = [];
      for (const raw of choicesRaw) {
        const text = raw.replace(/^[•\-]\s*/, '').trim().replace(/\.$/, '');
        // Detect token creation choice
        const tokenMatch = text.match(/create\s+(?:a|an)\s+(\d+)\/(\d+)\s+([\w\s]+?)\s+creature\s+token/);
        if (tokenMatch) {
          const tp = tokenMatch[1], tt = tokenMatch[2];
          const colorType = tokenMatch[3].trim();
          const colorMap = { white: 'W', blue: 'U', black: 'B', red: 'R', green: 'G' };
          const tokenColor = Object.keys(colorMap).filter(c => colorType.includes(c)).map(c => colorMap[c]).join('') || '';
          const creatureType = colorType.split(' ').filter(w => !colorMap[w]).map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
          choices.push({ label: text, icon: '🐾', action: 'token', token: {
            name: creatureType || 'Token', power: tp, toughness: tt,
            type_line: `Creature — ${creatureType}`, color: tokenColor, keywords: []
          }});
          continue;
        }
        // Detect life gain choice
        const lifeMatch = text.match(/you gain (\d+) life/);
        if (lifeMatch) {
          choices.push({ label: text, icon: '💚', action: 'life', amount: parseInt(lifeMatch[1]) });
          continue;
        }
        // Detect draw card choice
        if (/draw a card/i.test(text)) {
          choices.push({ label: text, icon: '🃏', action: 'draw', amount: 1 });
          continue;
        }
        // Generic/unknown choice — add as manual reminder
        choices.push({ label: text, icon: '✨', action: 'manual' });
      }

      if (choices.length > 0) {
        return {
          card: creature,
          trigger: {
            icon: '⚔️', text: `${triggerLabel} — ${creature.name}: Choose one`,
            modalChoices: choices, isModal: true,
          }
        };
      }
    }

    // Non-modal: try to auto-parse token creation
    let parsedToken = null;
    // Pattern 1: "create [Name], a [legendary] P/T [color] [type] creature token"
    const namedTokenMatch = oracle.match(/create\s+(\w[\w\s]*?),\s+a\s+(?:legendary\s+)?(\d+)\/(\d+)\s+([\w\s]+?)\s+creature\s+token/);
    if (namedTokenMatch) {
      const tokenName = namedTokenMatch[1].trim().split(' ').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
      const tp = namedTokenMatch[2], tt = namedTokenMatch[3];
      const colorType = namedTokenMatch[4].trim();
      const colorMap = { white: 'W', blue: 'U', black: 'B', red: 'R', green: 'G' };
      const tokenColor = Object.keys(colorMap).filter(c => colorType.includes(c)).map(c => colorMap[c]).join('') || '';
      const creatureType = colorType.split(' ').filter(w => !colorMap[w]).map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
      parsedToken = { name: tokenName, power: tp, toughness: tt,
        type_line: `Creature — ${creatureType}`, color: tokenColor, keywords: [] };
    }
    // Pattern 2: "create a/an [P/T] [color] [type] creature token"
    if (!parsedToken) {
      const genericTokenMatch = oracle.match(/create\s+(?:a|an)\s+(\d+)\/(\d+)\s+([\w\s]+?)\s+creature\s+token/);
      if (genericTokenMatch) {
        const tp = genericTokenMatch[1], tt = genericTokenMatch[2];
        const colorType = genericTokenMatch[3].trim();
        const colorMap = { white: 'W', blue: 'U', black: 'B', red: 'R', green: 'G' };
        const tokenColor = Object.keys(colorMap).filter(c => colorType.includes(c)).map(c => colorMap[c]).join('') || '';
        const creatureType = colorType.split(' ').filter(w => !colorMap[w]).map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
        parsedToken = { name: creatureType || 'Token', power: tp, toughness: tt,
          type_line: `Creature — ${creatureType}`, color: tokenColor, keywords: [] };
      }
    }
    // Parse keywords from token description
    if (parsedToken) {
      const withKwMatch = oracle.match(/creature token[^.]*?\s+with\s+([\w\s,]+?)(?:\.|that|$)/);
      if (withKwMatch) {
        parsedToken.keywords = withKwMatch[1].replace(/\band\b/g, ',').split(',').map(k => k.trim()).filter(Boolean);
      }
    }

    const trigger = { icon: '⚔️', text: `${triggerLabel} — ${creature.name}: ${effectText}` };
    if (parsedToken) trigger.token = parsedToken;
    return { card: creature, trigger };
  };

  // ===== MODAL CHOICE EXECUTOR =====
  // Executes a chosen option from a "choose one" trigger (Elder Gargaroth, etc.)
  const executeModalChoice = (choice, pIdx, sourceCard) => {
    const reskin = sourceCard._reskin;
    if (choice.action === 'token') {
      const tk = choice.token;
      const tokenName = reskin?.customTokenName || tk.name;
      const tokenCard = {
        id: uid(), name: tokenName, isToken: true,
        type_line: tk.type_line, power: tk.power, toughness: tk.toughness,
        keywords: tk.keywords || [], tapped: false, counters: {}, enteredThisTurn: true,
      };
      if (reskin?.customTokenImage) {
        tokenCard.tokenImageSmall = reskin.customTokenImage;
        tokenCard.tokenImageNormal = reskin.customTokenImage;
      }
      setState(pIdx, prev => ({
        ...prev,
        battlefield: [...prev.battlefield, tokenCard],
      }));
      addGameLog(pIdx, '🐾', `${getDisplayName(sourceCard)}: Create ${tokenName} ${tk.power}/${tk.toughness}`, [sourceCard.id]);
      SFX.playCreature();
      // Fetch Scryfall token art if no reskin image
      if (!reskin?.customTokenImage) {
        ((tName, pI) => {
          (async () => {
            try {
              const res = await fetch('https://api.scryfall.com/cards/search?q=' + encodeURIComponent('t:token ' + tName.toLowerCase()) + '&unique=art&order=released&dir=desc');
              if (res.ok) {
                const data = await res.json();
                const match = data.data?.find(c => c.image_uris && (c.name || '').toLowerCase().includes(tName.toLowerCase()));
                if (match?.image_uris) {
                  setState(pI, prev => ({
                    ...prev,
                    battlefield: prev.battlefield.map(c =>
                      c.isToken && c.name === tName && !c.tokenImageSmall ? { ...c, image_uris: match.image_uris, tokenImageSmall: match.image_uris.small, tokenImageNormal: match.image_uris.normal } : c
                    )
                  }));
                }
              }
            } catch(e) {}
          })();
        })(tokenName, pIdx);
      }
    } else if (choice.action === 'life') {
      const amount = choice.amount || 3;
      setState(pIdx, prev => ({ ...prev, life: prev.life + amount }));
      addGameLog(pIdx, '💚', `${getDisplayName(sourceCard)}: Gain ${amount} life`, [sourceCard.id]);
      SFX.lifeGain();
    } else if (choice.action === 'draw') {
      const amount = choice.amount || 1;
      setState(pIdx, prev => {
        if (prev.library.length === 0) return prev;
        const drawn = prev.library.slice(0, amount);
        return { ...prev, library: prev.library.slice(amount), hand: [...prev.hand, ...drawn] };
      });
      addGameLog(pIdx, '🃏', `${getDisplayName(sourceCard)}: Draw ${amount} card${amount > 1 ? 's' : ''}`, [sourceCard.id]);
      SFX.draw();
    } else if (choice.action === 'overload_mode') {
      // ===== OVERLOAD MODE CHOICE (Cyclonic Rift, etc.) =====
      const pending = pendingSpellModalRef.current;
      if (!pending) { setModalChoice(null); return; }
      pendingSpellModalRef.current = null;
      setModalChoice(null);
      if (choice.modeText === 'overload') {
        // Re-cast with overload cost and overloadMode flag
        castCard(pending.pIdx, pending.card, false, choice.costStr, true);
      } else {
        // Normal mode — just cast normally
        castCard(pending.pIdx, pending.card, false);
      }
      return;
    } else if (choice.action === 'spell_mode') {
      // ===== MODAL SPELL MODE CHOICE (Decisive Denial, etc.) =====
      const pending = pendingSpellModalRef.current;
      if (!pending) { setModalChoice(null); return; }
      pendingSpellModalRef.current = null;

      // Create a temp card with only the chosen mode's oracle text for effect parsing
      const modeCard = { ...pending.spellToCheck, oracle_text: choice.modeText };
      const effects = parseSpellEffects(modeCard);
      const targetMode = getSpellTargetMode(effects);
      const targetedEffects = effects.filter(e => ['destroy', 'exile', 'bounce', 'damage', 'boost', 'counter_add', 'fight'].includes(e.type));
      const nonTargetedEffects = effects.filter(e => !['destroy', 'exile', 'bounce', 'damage', 'boost', 'counter_add', 'fight'].includes(e.type));

      if (targetedEffects.length > 0 && (targetMode === 'battlefield' || targetedEffects.some(e => e.type === 'damage'))) {
        // Targeted mode (fight, damage, etc.) — show targeting UI
        pendingCastRef.current = { pIdx: pending.pIdx, card: pending.card, asAdventure: pending.asAdventure, fromExile: pending.fromExile, displayName: pending.displayName, nonTargetedEffects, chosenMode: choice.modeText, originalManaPool: pending.originalManaPool };
        setSpellTargeting({ pIdx: pending.pIdx, card: modeCard, effects: targetedEffects, targetMode });
        setCastError({ pIdx: pending.pIdx, message: `${pending.displayName}: Choose a target` });
      } else if (effects.some(e => e.type === 'counter_spell')) {
        // Counter mode — put on stack as counterspell
        setInstantCasting(null); // Safe to clear now — spell is going on stack
        setSpellStack(prev => [...prev, {
          pIdx: pending.pIdx, card: pending.card, asAdventure: pending.asAdventure,
          fromExile: pending.fromExile, displayName: pending.displayName, chosenMode: 'counter',
        }]);
      } else {
        // Other mode — put on stack
        setInstantCasting(null); // Safe to clear now — spell is going on stack
        setSpellStack(prev => [...prev, {
          pIdx: pending.pIdx, card: pending.card, asAdventure: pending.asAdventure,
          fromExile: pending.fromExile, displayName: pending.displayName, chosenMode: choice.modeText,
        }]);
      }
      setModalChoice(null);
      return; // Don't fall through to the combat trigger setModalChoice(null) below
    } else {
      // Manual — just log the reminder
      addGameLog(pIdx, '✨', `${getDisplayName(sourceCard)}: ${choice.label}`, [sourceCard.id]);
    }
    setModalChoice(null);
  };

  const confirmAttackers = () => {
    if (!combatState) return;
    const p = getState(activePlayer);
    const defendingPlayer = activePlayer === 0 ? 1 : 0;
    // Tap attackers (except those with vigilance)
    setState(activePlayer, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c => {
        if (!combatState.attackers.includes(c.id)) return c;
        const hasVigilance = c.keywords?.some(k => k.toLowerCase() === 'vigilance');
        return hasVigilance ? c : { ...c, tapped: true };
      }),
    }));
    SFX.tap();

    // Apply "until next turn" attacker debuffs (e.g. Jace's +1: attackers get -1/-0)
    const defender = getState(defendingPlayer);
    const attackerDebuffs = (defender.untilNextTurnEffects || []).filter(e => e.type === 'attacker_debuff');
    if (attackerDebuffs.length > 0 && combatState.attackers.length > 0) {
      let totalPower = 0, totalToughness = 0;
      attackerDebuffs.forEach(e => { totalPower += e.power; totalToughness += e.toughness; });
      setState(activePlayer, prev => ({
        ...prev,
        battlefield: prev.battlefield.map(c => {
          if (!combatState.attackers.includes(c.id) || !isCreature(c)) return c;
          const existing = c.tempBuffs || { power: 0, toughness: 0, keywords: [] };
          return {
            ...c,
            tempBuffs: {
              ...existing,
              power: (existing.power || 0) + totalPower,
              toughness: (existing.toughness || 0) + totalToughness,
            },
          };
        }),
      }));
