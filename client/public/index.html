  * { margin: 0; padding: 0; box-sizing: border-box; cursor: pointer; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a14; color: #e8e4dc; overflow: hidden; height: 100vh;
  }

  /* Arena-style dark atmospheric background */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(30,25,45,0.9) 0%, transparent 70%),
      radial-gradient(ellipse at 20% 80%, rgba(25,15,10,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(15,20,35,0.4) 0%, transparent 50%),
      linear-gradient(180deg, #080810 0%, #0d0d1a 30%, #12101e 50%, #0d0d1a 70%, #080810 100%);
  }

  /* Scrollbar — subtle gold */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(180,150,80,0.15); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(180,150,80,0.3); }

  /* ===== CARD STYLES — Arena-like ===== */
  .card-img {
    border-radius: 6px; cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.6), 0 0 1px rgba(0,0,0,0.8);
    transition: transform 0.18s ease, box-shadow 0.18s ease, margin 0.18s ease;
  }
  .card-img:hover {
    transform: translateY(-8px) scale(1.06);
    box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 0 12px rgba(200,170,60,0.2);
    z-index: 10;
  }
  .card-img.tapped {
    transform: rotate(90deg) scale(0.88); margin: 12px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  .card-img.tapped:hover {
    transform: rotate(90deg) scale(0.92);
    box-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 0 8px rgba(200,170,60,0.15);
  }

  /* ===== ZONES ===== */
  .zone { min-height: 80px; border-radius: 6px; padding: 6px; display: flex; flex-wrap: wrap; gap: 4px; align-items: flex-start; overflow-y: auto; }
  .zone-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.35; margin-bottom: 2px; font-weight: 600; }

  /* ===== PLAYER AREAS ===== */
  .player-area { display: flex; flex-direction: column; gap: 2px; padding: 2px 6px; }
  .player-area.top { flex-direction: column-reverse; }

  /* ===== BATTLEFIELD — Arena layout ===== */
  .battlefield { display: flex; gap: 4px; flex: 1; min-height: 0; }
  .bf-main { display: flex; flex-direction: column; gap: 3px; flex: 1; min-height: 0; }

  .bf-row {
    display: flex; flex-wrap: wrap; gap: 8px; min-height: 36px; padding: 4px 10px;
    border-radius: 6px; align-items: flex-start; flex: 1;
    position: relative; justify-content: center;
  }

  /* Creatures — near center, warm red tint */
  .bf-creatures {
    background: linear-gradient(180deg, rgba(140,40,40,0.06), rgba(140,40,40,0.02));
    border: 1px solid rgba(140,50,50,0.08);
  }

  /* Lands — earthy green/brown, near player */
  .bf-lands {
    background: linear-gradient(180deg, rgba(40,100,40,0.06), rgba(50,80,30,0.02));
    border: 1px solid rgba(50,100,50,0.08);
  }

  /* Planeswalkers — sidebar column with golden tint */
  .bf-planeswalkers {
    display: flex; flex-direction: column; gap: 3px; padding: 4px;
    min-width: 80px; max-width: 100px; align-items: center; justify-content: flex-start;
    background: linear-gradient(180deg, rgba(200,170,60,0.1), rgba(200,170,60,0.03));
    border: 1px solid rgba(200,170,60,0.15); border-radius: 6px;
    overflow-y: auto;
  }
  .bf-planeswalkers:empty { display: none; }

  /* Other permanents — enchantments, artifacts, non-creature tokens */
  .bf-other {
    background: linear-gradient(180deg, rgba(100,60,180,0.06), rgba(100,60,180,0.02));
    border: 1px solid rgba(100,60,180,0.08);
    min-height: 40px; padding: 5px 10px;
  }

  /* ===== HAND — Arena style with overlap ===== */
  .hand-zone {
    display: flex; gap: -2px; overflow-x: auto; padding: 3px 12px 4px;
    background: linear-gradient(180deg, rgba(20,18,30,0.8), rgba(15,13,22,0.95));
    border-radius: 8px; min-height: 55px; max-height: 100px; align-items: center;
    justify-content: center; position: relative;
    border: 1px solid rgba(255,255,255,0.03);
    box-shadow: inset 0 2px 12px rgba(0,0,0,0.3), 0 -1px 0 rgba(255,255,255,0.02);
    flex-shrink: 0;
  }
  .hand-zone > div { margin-right: -4px; transition: margin 0.15s ease; }
  .hand-zone > div:hover { margin-right: 4px; z-index: 20; }
  .hand-zone > div:last-child { margin-right: 0; }

  .card-back {
    width: 60px; height: 84px; border-radius: 6px;
    background: linear-gradient(135deg, #2a1a3e 0%, #1a1028 50%, #2a1a3e 100%);
    border: 2px solid rgba(120,90,50,0.5);
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.4);
    position: relative; overflow: hidden;
  }
  .card-back::after {
    content: '✦'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 22px; color: rgba(200,170,60,0.25);
  }
  .hand-hidden-label {
    font-size: 10px; color: rgba(255,255,255,0.25); padding: 4px 12px;
    font-style: italic; letter-spacing: 0.5px;
  }

  /* ===== SIDE ZONES (Graveyard/Exile/Library) ===== */
  .side-zones { display: flex; gap: 3px; align-items: stretch; }
  .side-zone {
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border-radius: 6px; padding: 5px 3px; min-width: 52px; text-align: center;
    cursor: pointer; position: relative;
    border: 1px solid rgba(255,255,255,0.04);
    transition: all 0.2s ease;
  }
  .side-zone:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(200,170,60,0.2);
    box-shadow: 0 0 10px rgba(200,170,60,0.06);
  }
  .zone-count { font-size: 17px; font-weight: 700; color: rgba(255,255,255,0.8); }

  /* ===== CONTEXT MENU — dark glass ===== */
  .context-menu {
    position: fixed; z-index: 1000; min-width: 200px;
    max-height: 80vh; overflow-y: auto;
    background: linear-gradient(160deg, rgba(30,28,45,0.97), rgba(20,18,32,0.98));
    border: 1px solid rgba(200,170,60,0.12);
    border-radius: 8px; padding: 4px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.7), 0 0 1px rgba(200,170,60,0.2);
    backdrop-filter: blur(16px);
  }
  .context-menu button {
    display: block; width: 100%; text-align: left; padding: 8px 14px;
    background: none; border: none; color: #ccc; cursor: pointer;
    border-radius: 5px; font-size: 13px; transition: all 0.1s;
  }
  .context-menu button:hover { background: rgba(200,170,60,0.12); color: #fff; }
  .context-menu .sep { height: 1px; background: rgba(255,255,255,0.06); margin: 3px 10px; }

  /* ===== LIFE COUNTER — Arena prominent style ===== */
  .life-counter { display: flex; align-items: center; gap: 4px; }
  .life-counter button {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03); color: #ccc;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .life-counter button:hover { background: rgba(200,170,60,0.15); border-color: rgba(200,170,60,0.3); color: #fff; }
  .life-value {
    font-size: 28px; font-weight: 800; min-width: 44px; text-align: center;
    color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.08);
    font-variant-numeric: tabular-nums;
  }

  /* ===== PLAYER BAR — Arena inspired ===== */
  .player-bar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px;
    padding: 5px 10px;
    background: linear-gradient(90deg, rgba(20,18,30,0.7), rgba(25,22,38,0.8), rgba(20,18,30,0.7));
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.03);
    flex-shrink: 0;
  }
  .player-bar.active {
    background: linear-gradient(90deg, rgba(180,140,40,0.05), rgba(200,160,50,0.1), rgba(180,140,40,0.05));
    border: 1px solid rgba(200,170,60,0.15);
    box-shadow: 0 0 24px rgba(200,170,60,0.04), inset 0 0 20px rgba(200,170,60,0.02);
  }
  .player-name {
    font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
    text-transform: uppercase; color: rgba(255,255,255,0.7);
  }
  .player-bar.active .player-name { color: rgba(230,200,100,0.9); }

  /* ===== BUTTONS — refined ===== */
  .btn {
    padding: 5px 10px; border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04); color: #aaa;
    cursor: pointer; font-size: 11px; font-weight: 500;
    transition: all 0.15s ease; letter-spacing: 0.2px;
  }
  .btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.15); }
  .btn-primary { background: rgba(60,100,220,0.12); border-color: rgba(60,100,220,0.25); color: #8aadff; }
  .btn-primary:hover { background: rgba(60,100,220,0.25); color: #b0ccff; box-shadow: 0 0 10px rgba(60,100,220,0.1); }
  .btn-gold { background: rgba(200,170,60,0.08); border-color: rgba(200,170,60,0.2); color: #d4b44a; }
  .btn-gold:hover { background: rgba(200,170,60,0.18); color: #e8cc6a; box-shadow: 0 0 12px rgba(200,170,60,0.08); }
  .btn-danger { background: rgba(200,50,50,0.08); border-color: rgba(200,50,50,0.15); color: #e06060; }
  .btn-danger:hover { background: rgba(200,50,50,0.18); box-shadow: 0 0 8px rgba(200,50,50,0.08); }

  /* ===== MODAL — dark glass panel ===== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(5,5,10,0.82);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: linear-gradient(160deg, #1e1c2d, #17152a);
    border-radius: 12px; padding: 22px;
    max-width: 700px; width: 95%; max-height: 85vh; overflow-y: auto;
    border: 1px solid rgba(200,170,60,0.06);
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 1px rgba(200,170,60,0.15);
  }
  .modal h2 { margin-bottom: 12px; font-size: 17px; font-weight: 700; color: #ddd; }
  .modal input, .modal select {
    padding: 8px 12px; border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.35); color: #eee; font-size: 14px; width: 100%;
  }
  .modal input:focus, .modal select:focus { outline: none; border-color: rgba(200,170,60,0.35); }

  /* ===== DECK BUILDER ===== */
  .deck-builder { display: flex; gap: 16px; height: 100vh; padding: 16px; }
  .search-panel { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .search-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; overflow-y: auto; flex: 1; padding: 4px; }
  .search-card { position: relative; cursor: pointer; border-radius: 8px; overflow: hidden; transition: transform 0.15s; }
  .search-card:hover { transform: scale(1.04); }
  .search-card img { width: 100%; display: block; border-radius: 8px; }
  .search-card .add-btn {
    position: absolute; bottom: 6px; right: 6px; width: 28px; height: 28px;
    border-radius: 50%; background: rgba(40,160,40,0.9); border: none;
    color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    transition: all 0.15s;
  }
  .search-card .add-btn:hover { background: rgba(60,200,60,1); transform: scale(1.1); }

  .deck-panel { width: 280px; display: flex; flex-direction: column; gap: 8px; background: rgba(255,255,255,0.02); border-radius: 10px; padding: 12px; border: 1px solid rgba(255,255,255,0.03); }
  .deck-list { flex: 1; overflow-y: auto; }
  .deck-entry { display: flex; align-items: center; gap: 4px; padding: 3px 6px; border-radius: 4px; font-size: 13px; }
  .deck-entry:hover { background: rgba(255,255,255,0.06); }
  .deck-entry .qty { color: #d4b44a; min-width: 22px; text-align: center; font-weight: 700; }
  .deck-entry .qty-btn { width: 20px; height: 20px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: #999; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; padding: 0; }
  .deck-entry .qty-btn:hover { background: rgba(200,170,60,0.15); border-color: rgba(200,170,60,0.3); color: #d4b44a; }
  .deck-entry .remove { opacity: 0.25; cursor: pointer; margin-left: 2px; font-size: 11px; }
  .deck-entry .remove:hover { opacity: 1; color: #e06060; }

  /* ===== MANA SYMBOLS ===== */
  .mana { display: inline-flex; gap: 1px; }
  .mana-sym { width: 16px; height: 16px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
  .mana-W { background: #f9faf4; color: #333; }
  .mana-U { background: #0e68ab; color: #fff; }
  .mana-B { background: #150b00; color: #ccc; border: 1px solid #555; }
  .mana-R { background: #d3202a; color: #fff; }
  .mana-G { background: #00733e; color: #fff; }
  .mana-C { background: #ccc; color: #333; }
  .mana-generic { background: #888; color: #fff; }

  /* ===== CARD PREVIEW TOOLTIP ===== */
  /* Reskin art overlay — base styles; position set inline by CardImg (card-type-aware) */
  .reskin-art-overlay {
    position: absolute;
    object-fit: cover;
    pointer-events: none;
    z-index: 2;
  }
  .card-preview { position: fixed; z-index: 900; pointer-events: none; }
  .card-preview img {
    width: 260px; border-radius: 12px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.8), 0 0 1px rgba(200,170,60,0.2);
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* ===== TOKEN DISPLAY ===== */
  .token-card {
    position: relative; width: 70px; height: 98px; border-radius: 6px;
    background: linear-gradient(145deg, #2a2840, #1e1c30);
    border: 2px solid rgba(200,170,60,0.2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; font-size: 10px; text-align: center; padding: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .token-card:hover {
    transform: translateY(-8px) scale(1.06);
    box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 10px rgba(200,170,60,0.15);
  }
  .token-card.tapped { transform: rotate(90deg) scale(0.88); margin: 12px 18px; }
  .token-card .token-pt { font-size: 14px; font-weight: 800; color: #d4b44a; text-shadow: 0 0 8px rgba(200,170,60,0.3); }
  .token-card .token-name { font-size: 9px; margin-top: 2px; opacity: 0.8; }
  .token-card .token-types { font-size: 8px; opacity: 0.4; }

  /* ===== ZONE VIEWER ===== */
  .zone-viewer { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; padding: 8px; }
  .zone-viewer img { width: 100%; border-radius: 6px; cursor: pointer; transition: transform 0.15s; }
  .zone-viewer img:hover { transform: scale(1.04); }

  /* ===== VERSION PICKER ===== */
  .version-picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; overflow-y: auto; max-height: 55vh; padding: 4px; }
  .version-card { position: relative; cursor: pointer; border-radius: 8px; overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; border: 2px solid transparent; }
  .version-card:hover { transform: scale(1.04); box-shadow: 0 0 14px rgba(200,170,60,0.2); }
  .version-card img { width: 100%; display: block; border-radius: 6px; }
  .version-info { padding: 6px 4px 4px; text-align: center; }
  .version-set { font-size: 11px; font-weight: 700; color: #d4b44a; }
  .version-details { font-size: 10px; opacity: 0.4; }

  /* ===== COUNTERS ON CARDS ===== */
  .card-wrapper { position: relative; display: inline-block; z-index: auto; }
  .card-counters { position: absolute; top: 2px; left: 2px; display: flex; gap: 2px; flex-wrap: wrap; z-index: 5; }
  .counter-badge {
    background: rgba(0,0,0,0.9); color: #d4b44a;
    font-size: 10px; padding: 2px 6px; border-radius: 8px;
    border: 1px solid rgba(200,170,60,0.4);
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    text-shadow: 0 0 4px rgba(200,170,60,0.3);
    font-weight: 700;
  }

  .pt-badge {
    position: relative; z-index: 5;
    background: rgba(0,0,0,0.92); color: #e8e4dc;
    font-size: 10px; padding: 1px 5px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 1px 4px rgba(0,0,0,0.6);
    font-weight: 800; letter-spacing: 0.5px;
    font-family: 'Courier New', monospace;
    pointer-events: none;
  }
  .pt-badge.pt-modified { border-color: rgba(200,170,60,0.5); }
  .pt-badge .boosted { color: #5ddb5d; }
  .pt-badge .reduced { color: #ef5555; }

  /* ===== SETUP SCREEN ===== */
  .setup-screen { max-width: 560px; margin: 40px auto; padding: 24px; overflow-y: auto; max-height: calc(100vh - 40px); }
  .setup-screen h1 { font-size: 28px; margin-bottom: 6px; letter-spacing: -0.5px; font-weight: 800; color: #e8e4dc; }
  .setup-screen p { opacity: 0.4; margin-bottom: 28px; line-height: 1.6; font-size: 14px; }
  .player-setup {
    background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border-radius: 10px; padding: 16px; margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .player-setup h3 { margin-bottom: 10px; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
  .player-setup input { margin-bottom: 8px; padding: 10px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.3); color: #eee; font-size: 15px; width: 100%; }
  .player-setup input:focus { outline: none; border-color: rgba(200,170,60,0.3); }

  /* ===== BOARD DIVIDER — Arena center line ===== */
  .board-divider {
    height: 2px; flex-shrink: 0; margin: 0 8px; position: relative;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(200,170,60,0.15) 15%,
      rgba(200,170,60,0.35) 40%,
      rgba(220,190,80,0.5) 50%,
      rgba(200,170,60,0.35) 60%,
      rgba(200,170,60,0.15) 85%,
      transparent 100%
    );
  }
  .board-divider::before {
    content: ''; position: absolute; inset: -4px 0; z-index: -1;
    background: linear-gradient(90deg, transparent, rgba(200,170,60,0.04), transparent);
    filter: blur(6px);
  }

  /* ===== PHASE INDICATOR ===== */
  .phase-strip {
    display: flex; flex-direction: column; gap: 1px; padding: 4px 2px;
    width: 28px; flex-shrink: 0; align-items: center; justify-content: center;
  }
  .phase-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.08); transition: all 0.3s ease;
    cursor: pointer; position: relative;
  }
  .phase-dot:hover { background: rgba(255,255,255,0.2); }
  .phase-dot.active-phase {
    background: rgba(200,170,60,0.6);
    box-shadow: 0 0 8px rgba(200,170,60,0.3);
    width: 8px; height: 8px;
  }
  .phase-dot::after {
    content: attr(data-label); position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-size: 9px; color: rgba(255,255,255,0.5); white-space: nowrap;
    opacity: 0; transition: opacity 0.15s; pointer-events: none;
  }
  .phase-dot:hover::after { opacity: 1; }

  /* ===== COMBAT MODE ===== */
  .combat-bar {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 6px 16px; flex-shrink: 0;
    background: linear-gradient(90deg, rgba(180,40,40,0.08), rgba(200,60,40,0.15), rgba(180,40,40,0.08));
    border: 1px solid rgba(200,60,40,0.2);
    border-radius: 8px; margin: 0 8px;
    animation: combatPulse 2s ease-in-out infinite;
  }
  @keyframes combatPulse {
    0%, 100% { border-color: rgba(200,60,40,0.2); box-shadow: 0 0 8px rgba(200,60,40,0.05); }
    50% { border-color: rgba(200,60,40,0.4); box-shadow: 0 0 16px rgba(200,60,40,0.12); }
  }
  .combat-bar .combat-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: rgba(220,80,60,0.9);
  }
  .combat-bar .combat-hint {
    font-size: 10px; opacity: 0.5; font-style: italic;
  }

  /* ===== SPELL TARGETING MODE ===== */
  .spell-target-bar {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 6px 16px; flex-shrink: 0;
    background: linear-gradient(90deg, rgba(60,120,200,0.08), rgba(80,140,220,0.18), rgba(60,120,200,0.08));
    border: 1px solid rgba(80,140,220,0.3);
    border-radius: 8px; margin: 0 8px;
    animation: targetPulse 2s ease-in-out infinite;
  }
  @keyframes targetPulse {
    0%, 100% { border-color: rgba(80,140,220,0.3); box-shadow: 0 0 8px rgba(80,140,220,0.05); }
    50% { border-color: rgba(80,140,220,0.5); box-shadow: 0 0 16px rgba(80,140,220,0.15); }
  }
  .spell-target-bar .target-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: rgba(100,170,255,0.9);
  }
  .spell-target-bar .target-hint {
    font-size: 10px; opacity: 0.6; font-style: italic;
  }
  /* ===== SPELL STACK OVERLAY ===== */
  .spell-stack-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
    overflow-y: auto; padding: 20px 0;
  }
  .spell-stack-card {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    animation: stackSlideIn 0.3s ease;
  }
  @keyframes stackSlideIn {
    from { transform: translateY(40px) scale(0.9); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  .spell-stack-card > .spell-stack-main-card {
    width: 280px; height: auto; border-radius: 12px;
    box-shadow: 0 0 40px rgba(200,170,60,0.3), 0 8px 32px rgba(0,0,0,0.5);
    object-fit: contain; max-height: 60vh;
  }
  .spell-stack-card img {
    border-radius: 8px; object-fit: contain;
  }
  .spell-stack-caster {
    font-size: 13px; color: rgba(255,255,255,0.7);
    letter-spacing: 0.5px; font-weight: 600;
  }
  .spell-stack-label {
    font-size: 16px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 3px; color: #d4b44a;
  }
  .spell-stack-buttons {
    display: flex; gap: 12px; margin-top: 4px;
  }
  .spell-stack-buttons button {
    padding: 10px 28px; border-radius: 8px; font-size: 14px;
    font-weight: 700; cursor: pointer; border: 2px solid;
    transition: all 0.15s ease; text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn-resolve {
    background: rgba(60,160,60,0.2); border-color: rgba(60,160,60,0.5);
    color: #6ddb6d;
  }
  .btn-resolve:hover { background: rgba(60,160,60,0.35); box-shadow: 0 0 16px rgba(60,160,60,0.3); }
  .btn-counter {
    background: rgba(80,120,220,0.2); border-color: rgba(80,120,220,0.5);
    color: #7ab8ff;
  }
  .btn-counter:hover { background: rgba(80,120,220,0.35); box-shadow: 0 0 16px rgba(80,120,220,0.3); }

  /* Loyalty badge on Planeswalker cards */
  .loyalty-badge {
    position: absolute; bottom: 4px; right: 4px; z-index: 5;
    background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
    color: #d4b44a; font-size: 13px; font-weight: 900;
    padding: 2px 8px; border-radius: 50%;
    border: 2px solid rgba(200,170,60,0.6);
    font-family: 'Courier New', monospace;
    box-shadow: 0 0 8px rgba(200,170,60,0.3), 0 2px 6px rgba(0,0,0,0.5);
    pointer-events: none; min-width: 24px; text-align: center;
  }

  /* Planeswalker ability overlay */
  .pw-ability-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .pw-ability-card {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    max-width: 420px;
    animation: stackSlideIn 0.3s ease;
  }
  .pw-ability-card img {
    width: 260px; border-radius: 12px;
    box-shadow: 0 0 40px rgba(200,170,60,0.3), 0 8px 32px rgba(0,0,0,0.5);

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ============ SOUND ENGINE (Web Audio API) — Arena-Inspired ============
const SFX = (() => {
  let ctx = null;

  // === WAV file playback system ===
  const wavCache = {}; // url -> AudioBuffer
  const wavFiles = {
    tap: '/sounds/Tap.wav',
    playLand: '/sounds/Mana_Enters.wav',
    combatDamage: '/sounds/Creatures_Hit.wav',
    lifeLoss: '/sounds/Life_Loss_Spells.wav',
    playerDamage: '/sounds/Life_Loss_Spells.wav',
    counterspell: '/sounds/Counterspell.wav',
    planeswalkerEnters: '/sounds/Planeswalker_Enters.wav',
    playerWins: '/sounds/Player_Wins.wav',
    massReturn: '/sounds/Return_All_Creatures.wav',
    playCreature: '/sounds/Creature_Enters.wav',
  };

  const playWav = (key, volume = 0.5) => {
    const c = getCtx();
    const url = wavFiles[key];
    if (!url) return false;
    if (wavCache[url]) {
      const src = c.createBufferSource();
      const gain = c.createGain();
      gain.gain.value = volume;
      src.buffer = wavCache[url];
      src.connect(gain);
      gain.connect(c.destination);
      src.start(0);
      return true;
    }
    // Load and play async (first time)
    fetch(url).then(r => r.arrayBuffer()).then(buf => c.decodeAudioData(buf)).then(decoded => {
      wavCache[url] = decoded;
      const src = c.createBufferSource();
      const gain = c.createGain();
      gain.gain.value = volume;
      src.buffer = decoded;
      src.connect(gain);
      gain.connect(c.destination);
      src.start(0);
    }).catch(() => {});
    return true;
  };

  // Preload all WAV files on first interaction
  let preloaded = false;
  const preloadWavs = () => {
    if (preloaded) return;
    preloaded = true;
    const c = getCtx();
    Object.values(wavFiles).forEach(url => {
      if (!wavCache[url]) {
        fetch(url).then(r => r.arrayBuffer()).then(buf => c.decodeAudioData(buf)).then(decoded => {
          wavCache[url] = decoded;
        }).catch(() => {});
      }
    });
  };

  const getCtx = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    preloadWavs();
    return ctx;
  };

  // Wrap all methods to be error-safe — callers no longer need try/catch
  const safe = (fn) => (...args) => { try { fn(...args); } catch(e) {} };

  return {
    // WAV-based sounds (user-requested)
    tap: safe(() => playWav('tap', 0.6)),
    playLand: safe(() => playWav('playLand', 0.5)),
    combatDamage: safe(() => playWav('combatDamage', 0.5)),
    lifeLoss: safe(() => playWav('lifeLoss', 0.5)),
    playerDamage: safe(() => playWav('playerDamage', 0.5)),
    counterspell: safe(() => playWav('counterspell', 0.6)),
    planeswalkerEnters: safe(() => playWav('planeswalkerEnters', 0.5)),
    playerWins: safe(() => playWav('playerWins', 0.5)),
    massReturn: safe(() => playWav('massReturn', 0.5)),

    // No-op stubs for removed synthesized sounds (prevents runtime errors)
    draw: safe(() => {}),
    untap: safe(() => {}),
    untapAll: safe(() => {}),
    playCreature: safe(() => playWav('playCreature', 0.5)),
    playSpell: safe(() => {}),
    lifeGain: safe(() => {}),
    damage: safe(() => {}),
    toGraveyard: safe(() => {}),
    toExile: safe(() => {}),
    shuffle: safe(() => {}),
    tokenCreate: safe(() => {}),
    mill: safe(() => {}),
    attack: safe(() => {}),
    block: safe(() => {}),
    creatureDeath: safe(() => {}),
    commanderCast: safe(() => {}),
    passTurn: safe(() => {}),
  };
})();

// ============ GAME CONSTANTS ============
const GAME_CONSTANTS = {
  STARTING_LIFE: 20,
  COMMANDER_LIFE: 40,
  HAND_SIZE: 7,
  POISON_LETHAL: 10,
  LOG_MAX: 50,
  TIMEOUT: {
    CAST_ERROR: 1500,
    REMINDER: 2000,
    PHASE_ADVANCE: 300,
    TRIGGER_POPUP: 3000,
  },
};

// ============ SCRYFALL API ============
const scryfallSearch = async (query) => {
  if (!query || query.length < 2) return [];
  try {
    const fullQuery = query.includes('f:') || query.includes('format:') || query.includes('legal:')
      ? query + ' lang:en'
      : `${query} f:historic lang:en`;
    const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(fullQuery)}&order=name&unique=cards`);
    if (!res.ok) return [];
    const data = await res.json();
    return data.data || [];
  } catch { return []; }
};

const scryfallAutocomplete = async (query) => {
  if (!query || query.length < 2) return [];
  try {
    const res = await fetch(`https://api.scryfall.com/cards/autocomplete?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    return data.data || [];
  } catch { return []; }
};

const scryfallSearchTokens = async (query) => {
  if (!query || query.length < 2) return [];
  try {
    // Try with lang:en first
    let res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent('t:token ' + query + ' lang:en')}&unique=art&order=released&dir=desc`);
    let data = res.ok ? await res.json() : null;
    let results = (data?.data || []).filter(c => getCardSmall(c));
    // Fallback: search without lang:en if no results (some tokens lack language tags)
    if (results.length === 0) {
      res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent('t:token ' + query)}&unique=art&order=released&dir=desc`);
      data = res.ok ? await res.json() : null;
      results = (data?.data || []).filter(c => getCardSmall(c) && (c.lang === 'en' || !c.printed_name));
    }
    return results.slice(0, 3);
  } catch { return []; }
};

const scryfallGetPrintings = async (card) => {
  try {
    const uri = card.prints_search_uri;
    if (!uri) return [card];
    const res = await fetch(uri + '&unique=prints');
    if (!res.ok) return [card];
    const data = await res.json();
    // Filter to English prints only to avoid Chinese/other language cards
    const enOnly = (data.data || []).filter(c => !c.lang || c.lang === 'en');
    return enOnly.length > 0 ? enOnly : [card];
  } catch { return [card]; }
};

const getCardImage = (card, size = 'normal') => {
  // Always return the ORIGINAL card image (with frame, text, stats visible)
  // Reskin art is overlaid on top of the art box — see ReskinArtOverlay component
  if (card.image_uris) return card.image_uris[size] || card.image_uris.normal;
  if (card.card_faces && card.card_faces[0].image_uris) return card.card_faces[0].image_uris[size] || card.card_faces[0].image_uris.normal;
  return null;
};

const getCardSmall = (card) => getCardImage(card, 'small');
const getCardNormal = (card) => getCardImage(card, 'normal');

// Get the custom reskin art URL (if any) — displayed as overlay on the card art box
const getReskinArt = (card) => card._reskin?.customImage || null;

// Get display name (custom or original)
const getDisplayName = (card) => card._reskin?.customName || card.name;

// ============ AVATAR DEFINITIONS ============
const AVATAR_CARDS = [
  { name: 'Rhox', set: '10e', label: 'Rhox', objectPosition: '15% 10%', scale: 1.5 },
  { name: 'Serra Angel', set: 'lea', label: 'Serra Angel' },
  { name: 'Shivan Dragon', set: 'lea', label: 'Shivan Dragon', objectPosition: '95% 0%', scale: 1.6 },
  { name: 'Sengir Vampire', set: 'lea', label: 'Sengir Vampire' },
  { name: 'Mahamoti Djinn', set: '7ed', label: 'Mahamoti Djinn' },
];

const fetchAvatarImages = async () => {
  const results = [];
  for (const av of AVATAR_CARDS) {
    try {
      const setParam = av.set ? `&set=${av.set}` : '';
      const res = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(av.name)}${setParam}`);
      if (res.ok) {
        const data = await res.json();
        const artCrop = data.image_uris?.art_crop || (data.card_faces?.[0]?.image_uris?.art_crop);
        results.push({ ...av, artCrop: artCrop || null });
      } else {
        results.push({ ...av, artCrop: null });
      }
      // Scryfall rate limit: 50ms between requests
      await new Promise(r => setTimeout(r, 80));
    } catch {
      results.push({ ...av, artCrop: null });
    }
  }
  return results;
};

// ============ SAVED DECKS (localStorage) ============
const SAVED_DECKS_KEY = 'tapAndGo_savedDecks';

const getSavedDecks = () => {
  try {
    const raw = localStorage.getItem(SAVED_DECKS_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
};

const saveDeckToStorage = (name, listText) => {
  const decks = getSavedDecks();
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  decks.push({ id, name, listText, createdAt: Date.now() });
  localStorage.setItem(SAVED_DECKS_KEY, JSON.stringify(decks));
  return id;
};

const deleteDeckFromStorage = (id) => {
  const decks = getSavedDecks().filter(d => d.id !== id);
  localStorage.setItem(SAVED_DECKS_KEY, JSON.stringify(decks));
};

const renameDeckInStorage = (id, newName) => {
  const decks = getSavedDecks().map(d => d.id === id ? { ...d, name: newName } : d);
  localStorage.setItem(SAVED_DECKS_KEY, JSON.stringify(decks));
};

// Convert loaded deck cards back to Arena-format text for storage
const deckToArenaText = (deck, sideboard) => {
  const lines = [];
  // Group by card name to consolidate quantities
  const mainMap = new Map();
  for (const entry of deck) {
    const card = entry.card || entry;
    const name = card.name;
    const set = card.set ? `(${card.set.toUpperCase()})` : '';
    const cn = card.collector_number || '';
    const reskin = card._reskin ? ` >> ${[card._reskin.customName || '', card._reskin.customImage || '', card._reskin.customTokenName || '', card._reskin.customTokenImage || '', card._reskin.fullCardImage || ''].join('|')}` : '';
    const key = `${name}|${set}|${cn}|${reskin}`;
    mainMap.set(key, (mainMap.get(key) || 0) + (entry.qty || 1));
  }
  for (const [key, qty] of mainMap) {
    const [name, set, cn, reskin] = key.split('|');
    let line = `${qty} ${name}`;
    if (set && cn) line += ` ${set} ${cn}`;
    else if (set) line += ` ${set}`;
    if (reskin) line += reskin;
    lines.push(line);
  }
  if (sideboard && sideboard.length > 0) {
    lines.push('');
    lines.push('Sideboard');
    const sbMap = new Map();
    for (const entry of sideboard) {
      const card = entry.card || entry;
      const name = card.name;
      const set = card.set ? `(${card.set.toUpperCase()})` : '';
      const cn = card.collector_number || '';
      const key = `${name}|${set}|${cn}`;
      sbMap.set(key, (sbMap.get(key) || 0) + (entry.qty || 1));
    }
    for (const [key, qty] of sbMap) {
      const [name, set, cn] = key.split('|');
      let line = `${qty} ${name}`;
      if (set && cn) line += ` ${set} ${cn}`;
      else if (set) line += ` ${set}`;
      lines.push(line);
    }
  }
  return lines.join('\n');
};
