// Parse Arena-format decklist: "4 Lightning Bolt" per line
const parseArenaDecklist = (text) => {
  const lines = text.trim().split('\n');
  const entries = [];
  let inSideboard = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    // Check for "Sideboard" header (case-insensitive)
    if (trimmed.toLowerCase() === 'sideboard') {
      inSideboard = true;
      continue;
    }

    // Check for blank line separator (indicates main deck end if not already in sideboard)
    if (!trimmed && !inSideboard && i > 0 && i < lines.length - 1) {
      // Check if next non-empty line looks like a card
      let nextIdx = i + 1;
      while (nextIdx < lines.length && !lines[nextIdx].trim()) nextIdx++;
      if (nextIdx < lines.length) {
        const nextLine = lines[nextIdx].trim();
        if (nextLine && !nextLine.toLowerCase().startsWith('sideboard') && /^\d+\s+/.test(nextLine)) {
          // Found blank line with card after — likely deck/sideboard separator
          inSideboard = true;
          continue;
        }
      }
    }

    if (!trimmed || trimmed.startsWith('//') || trimmed.startsWith('#')) continue;

    // Split on ">>" for reskin
    let cardPart = trimmed;
    let reskin = null;
    const reskinIdx = trimmed.indexOf('>>');
    if (reskinIdx !== -1) {
      cardPart = trimmed.substring(0, reskinIdx).trim();
      const reskinStr = trimmed.substring(reskinIdx + 2).trim();
      const parts = reskinStr.split('|').map(s => s.trim());
      reskin = {
        customName: parts[0] || null,
        customImage: parts[1] || null,
        customTokenName: parts[2] || null,
        customTokenImage: parts[3] || null,
        fullCardImage: parts[4] || null,
      };
    }

    // Supports: "4 Lightning Bolt", "4 Island (ZNR) 271", "4 Island (ZNR)", "4 Card (SET) 1★"
    const match = cardPart.match(/^(\d+)\s+(.+?)(?:\s+\(([A-Za-z0-9]+)\)(?:\s+(\S+))?)?$/);
    if (match) {
      entries.push({
        qty: parseInt(match[1], 10),
        name: match[2].trim(),
        set: match[3] ? match[3].toLowerCase() : null,
        collectorNumber: match[4] || null,
        reskin: reskin,
        inSideboard: inSideboard,
      });
    }
  }
  return entries;
};

// Fetch full card data from Scryfall for a parsed decklist. Returns { deck, sideboard, skipped }
const loadDeckFromList = async (entries, onProgress) => {
  const deck = [];
  const sideboard = [];
  const skipped = [];
  let loaded = 0;
  for (const entry of entries) {
    try {
      let res;
      // Strategy: try most specific lookup first, fall back to less specific
      // 1) Set + collector number → exact API path
      if (entry.set && entry.collectorNumber) {
        res = await fetch(`https://api.scryfall.com/cards/${encodeURIComponent(entry.set)}/${encodeURIComponent(entry.collectorNumber)}`);
      }
      // 2) If that failed or no collector number: try exact name + set
      if ((!res || !res.ok) && entry.set) {
        res = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(entry.name)}&set=${entry.set}`);
      }
      // 3) If that failed or no set: try exact name (any set)
      if (!res || !res.ok) {
        res = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(entry.name)}`);
      }
      // 4) Last resort: fuzzy name search
      if (!res || !res.ok) {
        res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(entry.name)}`);
      }
      if (res.ok) {
        const card = await res.json();
        // Filter out Saga cards — they require complex chapter tracking not supported
        if (card.type_line && card.type_line.includes('Saga')) {
          skipped.push({ name: card.name, reason: 'Saga (not supported)', qty: entry.qty });
          loaded++;
          if (onProgress) onProgress(loaded, entries.length);
          continue;
        }
        // Attach reskin data if present
        if (entry.reskin) {
          card._reskin = entry.reskin;
        }
        const cardEntry = { card, qty: entry.qty };
        // Add to main deck or sideboard
        if (entry.inSideboard) {
          sideboard.push(cardEntry);
        } else {
          deck.push(cardEntry);
        }
      } else {
        console.warn(`[Deck] Failed to load card: ${entry.name} (set: ${entry.set}, cn: ${entry.collectorNumber})`);
        skipped.push({ name: entry.name, reason: 'Not found on Scryfall', qty: entry.qty });
      }
      loaded++;
      if (onProgress) onProgress(loaded, entries.length);
      await new Promise(r => setTimeout(r, 80)); // rate limit
    } catch (err) {
      console.warn(`[Deck] Error loading card: ${entry.name}`, err);
      skipped.push({ name: entry.name, reason: 'Load error', qty: entry.qty });
      loaded++;
      if (onProgress) onProgress(loaded, entries.length);
    }
  }
  return { deck, sideboard, skipped };
};

// ============ MANA SYSTEM ============
// Parse mana cost string like "{2}{R}{R}" into { generic: 2, R: 2 }
const parseManaCost = (manaCostStr) => {
  if (!manaCostStr) return { generic: 0 };
  const result = { generic: 0 };
  const matches = manaCostStr.match(/\{([^}]+)\}/g);
  if (!matches) return result;
  for (const m of matches) {
    const val = m.slice(1, -1); // strip { }
    if (/^\d+$/.test(val)) {
      result.generic += parseInt(val, 10);
    } else if (val === 'X') {
      // X costs — ignore for validation, player chooses
    } else if (['W', 'U', 'B', 'R', 'G', 'C'].includes(val)) {
      result[val] = (result[val] || 0) + 1;
    } else if (val.includes('/')) {
      // Hybrid mana like {W/U} — store as hybrid
      if (!result._hybrid) result._hybrid = [];
      result._hybrid.push(val.split('/'));
    }
  }
  return result;
};

// Check if mana pool can pay a parsed cost
const canPayManaCost = (pool, cost) => {
  const available = { ...pool };
  // Pay colored costs first
  for (const color of ['W', 'U', 'B', 'R', 'G', 'C']) {
    const needed = cost[color] || 0;
    if (available[color] < needed) return false;
    available[color] -= needed;
  }
  // Pay hybrid costs
  if (cost._hybrid) {
    for (const options of cost._hybrid) {
      const canPay = options.some(c => (available[c] || 0) > 0);
      if (!canPay) {
        // Try generic
        const totalAvailable = Object.values(available).reduce((s, v) => s + v, 0);
        if (totalAvailable < 1) return false;
        // Deduct from largest pool
        const maxColor = Object.entries(available).sort((a, b) => b[1] - a[1])[0];
        if (maxColor) available[maxColor[0]]--;
      } else {
        // Pay with first available option
        for (const c of options) {
          if ((available[c] || 0) > 0) { available[c]--; break; }
        }
      }
    }
  }
  // Pay generic cost with remaining mana
  const totalRemaining = Object.values(available).reduce((s, v) => s + v, 0);
  return totalRemaining >= (cost.generic || 0);
};

// Deduct mana cost from pool, returns new pool
const deductManaCost = (pool, cost) => {
  const result = { ...pool };
  // Deduct colored
  for (const color of ['W', 'U', 'B', 'R', 'G', 'C']) {
    result[color] -= (cost[color] || 0);
  }
  // Deduct hybrid
  if (cost._hybrid) {
    for (const options of cost._hybrid) {
      for (const c of options) {
        if ((result[c] || 0) > 0) { result[c]--; break; }
      }
    }
  }
  // Deduct generic from largest pools first
  let generic = cost.generic || 0;
  while (generic > 0) {
    const maxEntry = Object.entries(result).filter(([,v]) => v > 0).sort((a, b) => b[1] - a[1])[0];
    if (!maxEntry) break;
    result[maxEntry[0]]--;
    generic--;
  }
  return result;
};

// Get mana produced by a land card
const getLandManaColors = (card) => {
  if (card.produced_mana && card.produced_mana.length > 0) {
    return card.produced_mana.filter(c => ['W', 'U', 'B', 'R', 'G', 'C'].includes(c));
  }
  // Fallback: check type line for basic land types
  const tl = (card.type_line || '').toLowerCase();
  const colors = [];
  if (tl.includes('plains')) colors.push('W');
  if (tl.includes('island')) colors.push('U');
  if (tl.includes('swamp')) colors.push('B');
  if (tl.includes('mountain')) colors.push('R');
  if (tl.includes('forest')) colors.push('G');
  return colors.length > 0 ? colors : ['C'];
};

// Mana color display symbols
const MANA_SYMBOLS = { W: '☀', U: '💧', B: '💀', R: '🔥', G: '🌿', C: '◇' };
const MANA_COLORS_CSS = { W: '#f9faf4', U: '#0e67ab', B: '#150b00', R: '#d3202a', G: '#00733e', C: '#ccc2c0' };

// Calculate devotion: count colored mana symbols among permanents on battlefield
const calculateDevotion = (battlefield) => {
  const devotion = { W: 0, U: 0, B: 0, R: 0, G: 0 };
  for (const card of battlefield) {
    if (isLand(card)) continue; // Lands don't contribute to devotion
    let costStr = card.mana_cost || '';
    if (card.layout === 'adventure' && card.card_faces?.[0]) {
      costStr = card.card_faces[0].mana_cost || '';
    }
    const symbols = costStr.match(/\{([WUBRG])\}/g) || [];
    for (const sym of symbols) {
      const color = sym.charAt(1);
      if (devotion.hasOwnProperty(color)) devotion[color]++;
    }
    // Hybrid mana counts for both colors
    const hybrids = costStr.match(/\{([WUBRG])\/([WUBRG])\}/g) || [];
    for (const h of hybrids) {
      const c1 = h.charAt(1);
      const c2 = h.charAt(3);
      if (devotion.hasOwnProperty(c1)) devotion[c1]++;
      if (devotion.hasOwnProperty(c2)) devotion[c2]++;
    }
  }
  return devotion;
};

// Check if a card's oracle text references devotion, and extract the color + threshold
const getDevotionInfo = (card) => {
  const text = card.oracle_text || '';
  if (card.card_faces) {
    for (const face of card.card_faces) {
      if ((face.oracle_text || '').toLowerCase().includes('devotion')) {
        return parseDevotionText(face.oracle_text);
      }
    }
  }
  if (!text.toLowerCase().includes('devotion')) return null;
  return parseDevotionText(text);
};

const parseDevotionText = (text) => {
  const colorMap = { white: 'W', blue: 'U', black: 'B', red: 'R', green: 'G' };
  const match = text.match(/devotion to (\w+)/i);
  if (!match) return null;
  const color = colorMap[match[1].toLowerCase()];
  if (!color) return null;
  const numWords = { one: 1, two: 2, three: 3, four: 4, five: 5, six: 6, seven: 7, eight: 8, nine: 9, ten: 10 };
  const thresholdMatch = text.match(/devotion to \w+ is (\w+) or more/i);
  let threshold = null;
  if (thresholdMatch) {
    const val = thresholdMatch[1].toLowerCase();
    threshold = numWords[val] || parseInt(val) || null;
  }
  return { color, colorName: match[1], threshold };
};

// ============ SPELL EFFECT PARSER ============
// Parses oracle text to identify what a spell does, returning a list of effects
const parseSpellEffects = (card) => {
  const oracle = card.oracle_text || '';
  // For adventure cards, check adventure face
  const faces = card.card_faces || [];
  const texts = [oracle, ...faces.map(f => f.oracle_text || '')].filter(Boolean);
  const allText = texts.join('\n').toLowerCase();
  const effects = [];

  // === TARGETED EFFECTS (require clicking a target) ===

  // Destroy target creature/permanent (longer patterns first to avoid partial matches)
  if (/destroy target (creature or planeswalker|nonland permanent|permanent|creature|artifact|enchantment)/.test(allText)) {
    const match = allText.match(/destroy target (creature or planeswalker|nonland permanent|permanent|creature|artifact|enchantment)/);
    effects.push({ type: 'destroy', targetType: match[1], description: `Destroy target ${match[1]}` });
  }

  // Exile target (longer patterns first)
  if (/exile target (creature or planeswalker|nonland permanent|permanent|creature|artifact|enchantment)/.test(allText) ||
      /exile (target|it).*with (converted )?mana (cost|value)/.test(allText)) {
    const match = allText.match(/exile target (creature or planeswalker|nonland permanent|permanent|creature|artifact|enchantment|\w+[\w ]*?)(?:\.|,| with)/);
    effects.push({ type: 'exile', targetType: match?.[1] || 'permanent', description: `Exile target ${match?.[1] || 'permanent'}` });
  }

  // Deal damage to any target / target creature / target player
  const dmgMatch = allText.match(/deals? (\d+|x) damage to (any target|target (creature or planeswalker|player or planeswalker|creature or player|creature|player|opponent))/);
  if (dmgMatch) {
    const amount = dmgMatch[1] === 'x' ? 0 : parseInt(dmgMatch[1]);
    const targetDesc = dmgMatch[2];
    effects.push({ type: 'damage', amount, targetDesc, description: `Deal ${dmgMatch[1]} damage to ${targetDesc}` });
  }

  // Return target to hand (bounce)
  if (/return target (creature|nonland permanent|permanent|artifact|enchantment)[\w ']*to its owner's hand/.test(allText)) {
    const match = allText.match(/return target (creature|nonland permanent|permanent|artifact|enchantment)/);
    effects.push({ type: 'bounce', targetType: match[1], description: `Return target ${match[1]} to hand` });
  }

  // Target player/opponent discards
  if (/target (player|opponent) (reveals|discards|loses)/.test(allText)) {
    effects.push({ type: 'discard', description: 'Target opponent discards' });
  }

  // Give target creature +X/+X or counters
  const boostMatch = allText.match(/target creature gets? ([+-]\d+\/[+-]\d+)/);
  if (boostMatch) {
    effects.push({ type: 'boost', amount: boostMatch[1], description: `Target creature gets ${boostMatch[1]}` });
  }
  if (/put.*\+1\/\+1 counter.*on target/.test(allText)) {
    effects.push({ type: 'counter_add', counterType: '+1/+1', description: 'Put +1/+1 counter on target' });
  }

  // Fight (target creature fights another)
  if (/target creature.*fights? (another target|target)/.test(allText) || /fights? target creature/.test(allText)) {
    effects.push({ type: 'fight', description: 'Fight target creature' });
  }

  // === NON-TARGETED / SELF EFFECTS ===

  // Draw cards
  const drawMatch = allText.match(/draw (\w+|\d+) cards?/);
  if (drawMatch) {
    const numWords = { a: 1, one: 1, two: 2, three: 3, four: 4, five: 5 };
    const num = numWords[drawMatch[1]] || parseInt(drawMatch[1]) || 1;
    effects.push({ type: 'draw', amount: num, description: `Draw ${num} card${num > 1 ? 's' : ''}` });
  }
  // "You may put a land card from your hand onto the battlefield" (Growth Spiral, Explore)
  if (/you may put a land card from your hand onto the battlefield/.test(allText)) {
    effects.push({ type: 'extra_land_drop', description: 'You may put a land onto the battlefield' });
  }
  // Scry / Surveil / Look at top
  const scryMatch = allText.match(/scry (\d+)/);
  if (scryMatch) {
    const scryCount = parseInt(scryMatch[1]) || 1;
    effects.push({ type: 'scry', count: scryCount, mode: 'scry', description: `Scry ${scryCount}` });
  }
  const surveilMatch = allText.match(/surveil (\d+)/);
  if (surveilMatch && !scryMatch) {
    const surveilCount = parseInt(surveilMatch[1]) || 1;
    effects.push({ type: 'scry', count: surveilCount, mode: 'surveil', description: `Surveil ${surveilCount}` });
  }

  // "Look at the top X cards" + "put N into your hand/onto the battlefield" (Memory Deluge, Dig Through Time, Collected Company, etc.)
  const lookTopMatch = allText.match(/look at the top (\d+|x|seven|six|five|four|three|two) cards? of your library/);
  if (lookTopMatch) {
    const numWords = { two: 2, three: 3, four: 4, five: 5, six: 6, seven: 7 };
    let lookCount = numWords[lookTopMatch[1]] || parseInt(lookTopMatch[1]);
    if (isNaN(lookCount) || lookTopMatch[1] === 'x') lookCount = -1; // variable X → prompt
    // Check if cards go to battlefield or hand
    const toBattlefieldMatch = allText.match(/put (?:up to )?(\d+|one|two|three).*?onto the battlefield/);
    const putMatch = allText.match(/put (\d+|one|two|three) of them into your hand/);
    const hw = { one: 1, two: 2, three: 3 };
    if (toBattlefieldMatch) {
      const toField = hw[toBattlefieldMatch[1]] || parseInt(toBattlefieldMatch[1]) || 1;
      // Collected Company filter: "creature cards with mana value 3 or less"
      const creatureMVMatch = allText.match(/creature cards? with (?:mana value|converted mana cost) (\d+) or less/);
      const selectFilter = creatureMVMatch ? { type: 'creature', maxMV: parseInt(creatureMVMatch[1]) } : null;
      effects.push({ type: 'look_top_battlefield', count: lookCount, toField, selectFilter, description: `Look at top ${lookCount === -1 ? 'X' : lookCount}, put ${toField} onto battlefield` });
    } else {
      let toHand = 1;
      if (putMatch) {
        toHand = hw[putMatch[1]] || parseInt(putMatch[1]) || 1;
      }
      effects.push({ type: 'look_top', count: lookCount, toHand, description: `Look at top ${lookCount === -1 ? 'X' : lookCount}, put ${toHand} into hand` });
    }
  }

  // Counter target spell (special — targets stack, not battlefield)
  // Matches: "counter target spell", "counter target noncreature spell", "counter target instant or sorcery spell"
  if (/counter target [\w\s]*spell/.test(allText)) {
    const counterDesc = (allText.match(/counter target ([\w\s]*spell)/)?.[0] || 'counter target spell');
    effects.push({ type: 'counter_spell', description: counterDesc.charAt(0).toUpperCase() + counterDesc.slice(1) });
  }

  // Gain life
  const lifeMatch = allText.match(/gain (\d+) life/);
  if (lifeMatch) {
    effects.push({ type: 'gain_life', amount: parseInt(lifeMatch[1]), description: `Gain ${lifeMatch[1]} life` });
  }

  // You lose X life (e.g. Thoughtseize)
  const loseLifeMatch = allText.match(/you lose (\d+) life/);
  if (loseLifeMatch) {
    effects.push({ type: 'lose_life', amount: parseInt(loseLifeMatch[1]), description: `You lose ${loseLifeMatch[1]} life` });
  }

  // Look at / reveal opponent's hand (e.g. Thoughtseize, Duress)
  if (/target (player|opponent) reveals (their|his or her) hand/.test(allText) ||
      /look at target (player|opponent)'?s? hand/.test(allText)) {
    effects.push({ type: 'peek_hand', description: 'Look at opponent\'s hand' });
  }

  // === BOARD WIPES / MASS EFFECTS ===

  // Destroy all creatures
  if (/destroy all creatures/.test(allText) && !/destroy all creatures with/.test(allText)) {
    effects.push({ type: 'board_wipe', subtype: 'destroy_all', description: 'Destroy all creatures' });
  }
  // Destroy all creatures with power X or greater (Elspeth, Sun's Champion -3)
  const destroyPowerMatch = allText.match(/destroy all creatures with power (\d+) or greater/);
  if (destroyPowerMatch) {
    effects.push({ type: 'board_wipe', subtype: 'destroy_power_gte', threshold: parseInt(destroyPowerMatch[1]), description: `Destroy all creatures with power ${destroyPowerMatch[1]}+` });
  }
  // Destroy all creatures with toughness X or greater
  const destroyToughMatch = allText.match(/destroy all creatures with toughness (\d+) or greater/);
  if (destroyToughMatch) {
    effects.push({ type: 'board_wipe', subtype: 'destroy_toughness_gte', threshold: parseInt(destroyToughMatch[1]), description: `Destroy all creatures with toughness ${destroyToughMatch[1]}+` });
  }
  // Destroy all creatures with mana value X or less/greater
  const destroyMVMatch = allText.match(/destroy all creatures with (mana value|converted mana cost) (\d+) or (less|greater)/);
  if (destroyMVMatch) {
    effects.push({ type: 'board_wipe', subtype: destroyMVMatch[3] === 'less' ? 'destroy_mv_lte' : 'destroy_mv_gte', threshold: parseInt(destroyMVMatch[2]), description: `Destroy creatures with MV ${destroyMVMatch[2]} or ${destroyMVMatch[3]}` });
  }
  // Destroy all nonland permanents
  if (/destroy all nonland permanents/.test(allText)) {
    effects.push({ type: 'board_wipe', subtype: 'destroy_all_nonland', description: 'Destroy all nonland permanents' });
  }
  // All creatures get -X/-X
  const massMinusMatch = allText.match(/all creatures get (-\d+\/-\d+)/);
  if (massMinusMatch) {
    effects.push({ type: 'board_wipe', subtype: 'minus', amount: massMinusMatch[1], description: `All creatures get ${massMinusMatch[1]}` });
  }
  // Exile all creatures/permanents (but not Farewell "choose one or more" cards)
  if (/exile all (creatures|nonland permanents|permanents)/.test(allText) && !/exile all.*with/.test(allText) && !/choose one or more/i.test(allText)) {
    effects.push({ type: 'board_wipe', subtype: 'exile_all', description: 'Exile all creatures' });
  }
  // Exile each permanent with power X or greater
  const exilePowerMatch = allText.match(/exile (?:all|each) (?:creature|permanent)s? with power (\d+) or greater/);
  if (exilePowerMatch) {
    effects.push({ type: 'board_wipe', subtype: 'exile_power_gte', threshold: parseInt(exilePowerMatch[1]), description: `Exile all with power ${exilePowerMatch[1]}+` });
  }
  // Exile each permanent with mana value/CMC X or less (Ugin -X style)
  const exileMVLessMatch = allText.match(/exile (?:all|each) (?:permanent|nonland permanent|creature)s?.*(?:mana value|converted mana cost) (\d+) or less/);
  if (exileMVLessMatch) {
    effects.push({ type: 'board_wipe', subtype: 'exile_mv_lte', threshold: parseInt(exileMVLessMatch[1]), description: `Exile permanents with MV ${exileMVLessMatch[1]} or less` });
  }
  // Ugin-style: "exile each permanent with mana value X or less" — variable X, prompt needed
  if (/exile each permanent.*mana value.*or less/.test(allText) && !exileMVLessMatch) {
    const isColorRestricted = /color/.test(allText);
    effects.push({ type: 'board_wipe', subtype: 'exile_mv_lte_prompt', colorOnly: isColorRestricted, description: `Exile ${isColorRestricted ? 'colored ' : ''}permanents with MV ≤ X (choose X)` });
  }
  // Shadow's Verdict style: "exile all creatures and planeswalkers with mana value X or less from the battlefield and from all graveyards"
  const shadowsVerdictMatch = allText.match(/exile all creatures and planeswalkers with (?:mana value|converted mana cost) (\d+) or less.*(?:from the battlefield and from all graveyards|from all graveyards)/);
  if (shadowsVerdictMatch) {
    effects.push({ type: 'shadows_verdict', threshold: parseInt(shadowsVerdictMatch[1]), description: `Exile creatures & PWs with MV ≤ ${shadowsVerdictMatch[1]} from battlefield + graveyards` });
  }

  // Farewell-style: "choose one or more" with exile categories (artifacts, creatures, enchantments, graveyards)
  if (/choose one or more/i.test(allText) && /exile all/i.test(allText)) {
    const categories = [];
    if (/exile all artifacts/i.test(allText)) categories.push('artifacts');
    if (/exile all creatures/i.test(allText)) categories.push('creatures');
    if (/exile all enchantments/i.test(allText)) categories.push('enchantments');
    if (/exile all cards from all graveyards/i.test(allText)) categories.push('graveyards');
    if (categories.length > 0) {
      effects.push({ type: 'farewell', categories, description: `Choose: exile ${categories.join(', ')}` });
    }
  }
  // Exile all artifacts (standalone)
  if (/exile all artifacts/.test(allText) && !/choose one or more/i.test(allText)) {
    effects.push({ type: 'board_wipe', subtype: 'exile_all_artifacts', description: 'Exile all artifacts' });
  }
  // Exile all enchantments (standalone)
  if (/exile all enchantments/.test(allText) && !/choose one or more/i.test(allText)) {
    effects.push({ type: 'board_wipe', subtype: 'exile_all_enchantments', description: 'Exile all enchantments' });
  }
  // One-sided exile: "exile each artifact and each creature your opponents control"
  if (/exile.*each artifact and each creature your opponents control/.test(allText) || /exile each.*your opponents control/.test(allText)) {
    const lifeCondMatch2 = allText.match(/at least (\d+) more life than your starting life total/);
    const lifeThreshold2 = lifeCondMatch2 ? parseInt(lifeCondMatch2[1]) : 0;
    effects.push({ type: 'board_wipe', subtype: 'exile_opponent_artifacts_creatures', lifeThreshold: lifeThreshold2, exileSelf: false, description: 'Exile opponent\'s artifacts & creatures' });
  }
  // Return all creatures to owners' hands (Whelming Wave, Evacuation, etc.)
  const bounceAllMatch = allText.match(/return all (creatures|nonland permanents|permanents)(?:\s+(?:you don't control\s+))?to their owners?[''']?s? hands?/);
  if (bounceAllMatch) {
    const whatToBounce = bounceAllMatch[1]; // 'creatures', 'nonland permanents', 'permanents'
    // Check for exceptions: "except for Krakens, Leviathans, Octopuses, and Serpents"
    const exceptMatch = allText.match(/except (?:for )?(.+?)(?:\.|$)/);
    const exceptions = exceptMatch ? exceptMatch[1].split(/,\s*(?:and\s+)?/).map(s => s.trim().toLowerCase()) : [];
    const opponentOnly = /you don't control/.test(allText);
    effects.push({
      type: 'board_wipe', subtype: 'bounce_all',
      target: whatToBounce, exceptions, opponentOnly,
      description: opponentOnly
        ? `Return all ${whatToBounce} you don't control to hand`
        : `Return all ${whatToBounce} to hand${exceptions.length ? ` (except ${exceptions.join(', ')})` : ''}`
    });
  }
  // Deals X damage to each creature (Blasphemous Act, Anger of the Gods, etc.)
  const dmgEachCreatureMatch = allText.match(/deals? (\d+) damage to each creature/);
  if (dmgEachCreatureMatch) {
    effects.push({ type: 'board_wipe', subtype: 'damage_each_creature', damage: parseInt(dmgEachCreatureMatch[1]), description: `Deal ${dmgEachCreatureMatch[1]} damage to each creature` });
  }
  // Deals X damage to each creature and each player/planeswalker (Star of Extinction etc.)
  const dmgEachAllMatch = allText.match(/deals? (\d+) damage to each creature and each (?:player|planeswalker)/);
  if (dmgEachAllMatch && !dmgEachCreatureMatch) {
    effects.push({ type: 'board_wipe', subtype: 'damage_each_creature', damage: parseInt(dmgEachAllMatch[1]), description: `Deal ${dmgEachAllMatch[1]} damage to each creature & player` });
  }
  // Exile top N cards and play them (Light Up the Stage, Act on Impulse, etc.)
  const exileTopPlayMatch = allText.match(/exile the top (\w+) cards? of your library\.?\s*(?:until the end of your next turn|until end of turn),? you may (?:play|cast) (?:those cards|that card|them)/);
  if (exileTopPlayMatch) {
    const numWords = { one: 1, two: 2, three: 3, four: 4, five: 5 };
    const count = numWords[exileTopPlayMatch[1]] || parseInt(exileTopPlayMatch[1]) || 2;
    const untilNextTurn = /until the end of your next turn/.test(allText);
    effects.push({ type: 'exile_top_play', count, untilNextTurn, description: `Exile top ${count} and play them` });
  }

  // Prevent all combat damage (Fog, Tangle, Settle the Wreckage-style)
  if (/prevent all combat damage/.test(allText)) {
    effects.push({ type: 'prevent_combat_damage', description: 'Prevent all combat damage this turn' });
  }

  // Add mana to mana pool (Dark Ritual, Seething Song, Pyretic Ritual, etc.)
  // Matches patterns like "add {B}{B}{B}", "add {R}{R}{R}{R}{R}", "add {C}{C}", "add three mana of any one color"
  const addManaMatch = allText.match(/add\s+(\{[wubrgc]\}(?:\{[wubrgc]\})*)/);
  if (addManaMatch) {
    const manaStr = addManaMatch[1];
    const manaToAdd = { W: 0, U: 0, B: 0, R: 0, G: 0, C: 0 };
    const symbolMatches = manaStr.match(/\{([wubrgc])\}/g) || [];
    for (const sym of symbolMatches) {
      const color = sym.replace(/[{}]/g, '').toUpperCase();
      if (manaToAdd[color] !== undefined) manaToAdd[color]++;
    }
    const totalMana = Object.values(manaToAdd).reduce((a, b) => a + b, 0);
    if (totalMana > 0) {
      const manaDesc = symbolMatches.map(s => s.toUpperCase()).join('');
      effects.push({ type: 'add_mana', mana: manaToAdd, description: `Add ${manaDesc}` });
    }
  }
  // "add X mana of any one color" / "add X mana of any color" (e.g. Irencrag Feat)
  if (!addManaMatch) {
    const addAnyMatch = allText.match(/add (\w+) mana of any (?:one )?color/);
    if (addAnyMatch) {
      const numWords = { one: 1, two: 2, three: 3, four: 4, five: 5, six: 6, seven: 7 };
      const amount = numWords[addAnyMatch[1]] || parseInt(addAnyMatch[1]) || 1;
      effects.push({ type: 'add_mana_choice', amount, description: `Add ${amount} mana of any one color` });
    }
  }

  // Each opponent loses life (e.g. Gary)
  const eachLoseMatch = allText.match(/each opponent loses (?:that much|(\d+)) life/);
  if (eachLoseMatch || /each opponent loses.*life.*equal/.test(allText)) {
    effects.push({ type: 'each_opponent_loses_life', description: 'Each opponent loses life' });
  }

  // Create token (e.g. Advent of the Wurm "Create a 5/5 green Wurm creature token with trample")
  const createTokenMatch = allText.match(/create\s+(?:a|an|two|three|four)\s+(\d+)\/(\d+)\s+([\w\s,/]+?)\s+creature\s+token(?:\s+with\s+([\w\s,]+))?/i);
  if (createTokenMatch) {
    const count = /^(two|three|four)/i.test(allText.match(/create\s+(two|three|four)/i)?.[1] || '') ?
      ({ two: 2, three: 3, four: 4 })[allText.match(/create\s+(two|three|four)/i)[1].toLowerCase()] : 1;
    const power = parseInt(createTokenMatch[1]);
    const toughness = parseInt(createTokenMatch[2]);
    const colorAndType = createTokenMatch[3].trim();
    const keywordsStr = createTokenMatch[4] || '';
    const keywords = keywordsStr ? keywordsStr.split(/,\s*| and /).map(k => k.trim()).filter(Boolean) : [];
    // Extract the token creature type (last word of colorAndType, e.g. "green Wurm" → "Wurm")
    const parts = colorAndType.split(/\s+/);
    const tokenTypeName = parts[parts.length - 1];
    effects.push({
      type: 'create_token',
      count,
      tokenData: {
        name: tokenTypeName,
        isToken: true,
        type_line: `Token Creature — ${tokenTypeName}`,
        power, toughness,
        keywords,
        tapped: false,
        counters: {},
        enteredThisTurn: true,
      },
      description: `Create ${count > 1 ? count + ' ' : 'a '}${power}/${toughness} ${tokenTypeName} token${keywords.length ? ' with ' + keywords.join(', ') : ''}`,
    });
  }

  return effects;
};

// Determine what targets a spell needs based on its effects
const getSpellTargetMode = (effects) => {
  for (const e of effects) {
    if (['destroy', 'exile', 'bounce', 'damage', 'boost', 'counter_add', 'fight'].includes(e.type)) {
      return 'battlefield'; // needs a target on the battlefield
    }
    if (e.type === 'discard') return 'player';
    if (e.type === 'counter_spell') return 'stack'; // not applicable in our game
  }
  return 'none'; // self-effect, no target needed
};

// ============ CARD INFO & HANDLING GUIDE ============
// Analyzes a card and reports what the game auto-handles vs what requires manual action
const getCardHandlingInfo = (card) => {
  const auto = [];   // things the game handles automatically
  const manual = []; // things the player must do manually via right-click
  const info = [];   // general info/tips

  const oracle = [card.oracle_text || '', ...(card.card_faces || []).map(f => f.oracle_text || '')].join('\n');
  const oracleLower = oracle.toLowerCase();
  const typeLine = (card.type_line || '').toLowerCase();
  const keywords = (card.keywords || []).map(k => k.toLowerCase());

  // --- Card type ---
  const isCreatureCard = typeLine.includes('creature');
  const isLandCard = typeLine.includes('land');
  const isPW = typeLine.includes('planeswalker');
  const isSpell = typeLine.includes('instant') || typeLine.includes('sorcery');
  const isEnch = typeLine.includes('enchantment');
  const isArt = typeLine.includes('artifact');

  // --- Spell effects ---
  if (isSpell) {
    const effects = parseSpellEffects(card);
    if (effects.length > 0) {
      effects.forEach(e => {
        if (['destroy', 'exile', 'bounce', 'damage', 'boost', 'counter_add', 'fight', 'counter_spell',
             'prevent_combat_damage', 'draw', 'scry', 'surveil', 'look_at_top', 'discard',
             'each_opponent_loses_life', 'board_wipe_destroy', 'board_wipe_exile', 'board_wipe_bounce',
             'board_wipe_damage'].includes(e.type)) {
          auto.push('✅ ' + e.description);
        }
      });
    }
    if (effects.length === 0) {
      manual.push('⚠️ Spell effects not auto-parsed — resolve manually via right-click actions');
    }
  }

  // --- Counterspell detection ---
  if (/counter target (spell|nonland|noncreature)|counter that spell/i.test(oracle)) {
    auto.push('✅ Counterspell: auto-detected, appears as option when spells are on the stack');
  }

  // --- Can\'t be countered ---
  if (/can't be countered/i.test(oracle) || keywords.includes("can't be countered")) {
    auto.push('✅ Cannot be countered: opponents see this restriction');
  }

  // --- ETB effects ---
  if (isCreatureCard || isEnch || isArt) {
    const etbPatterns = [
      [/when .* enters the battlefield.*deal.*damage/i, 'ETB: deals damage'],
      [/when .* enters the battlefield.*lose.*life/i, 'ETB: opponent loses life'],
      [/when .* enters the battlefield.*gain.*life/i, 'ETB: gain life'],
      [/when .* enters the battlefield.*draw/i, 'ETB: draw cards'],
      [/when .* enters the battlefield.*destroy/i, 'ETB: destroy target'],
      [/when .* enters the battlefield.*exile/i, 'ETB: exile target'],
      [/when .* enters the battlefield.*return.*hand/i, 'ETB: bounce to hand'],
      [/when .* enters the battlefield.*\+1\/\+1 counter/i, 'ETB: +1/+1 counters'],
      [/when .* enters the battlefield.*create.*token/i, 'ETB: create token'],
      [/when .* enters the battlefield.*search.*library/i, 'ETB: search library'],
      [/when .* enters the battlefield.*scry/i, 'ETB: scry'],
      [/when .* enters the battlefield.*surveil/i, 'ETB: surveil'],
      [/when .* enters the battlefield.*discard/i, 'ETB: opponent discards'],
    ];
    etbPatterns.forEach(([pat, desc]) => {
      if (pat.test(oracle)) auto.push('✅ ' + desc + ' (auto-triggered)');
    });
    if (/when .* enters the battlefield/i.test(oracle) && !etbPatterns.some(([pat]) => pat.test(oracle))) {
      manual.push('⚠️ ETB trigger detected but not auto-parsed — resolve manually');
    }
  }

  // --- LTB / Dies effects ---
  if (/when .* dies|when .* leaves the battlefield|when .* is put into a graveyard/i.test(oracle)) {
    manual.push('⚠️ Dies/LTB trigger: reminder shown, resolve manually');
  }
  if (keywords.includes('undying')) auto.push('✅ Undying: returns with +1/+1 counter (reminder shown)');
  if (keywords.includes('persist')) auto.push('✅ Persist: returns with -1/-1 counter (reminder shown)');

  // --- Planeswalker abilities ---
  if (isPW) {
    auto.push('✅ Planeswalker abilities: parsed automatically, activate via right-click');
    auto.push('✅ Loyalty counters: tracked automatically');
    if (/create.*token/i.test(oracle)) auto.push('✅ Token creation: auto-detected from abilities');
    info.push('💡 Click ability buttons in the right-click menu to activate');
    info.push('💡 Loyalty adjusts automatically when you activate an ability');
  }

  // --- Creature land ---
  if (isLandCard && typeof getCreatureLandData === 'function') {
    const clData = getCreatureLandData(card);
    if (clData) {
      auto.push(`✅ Creature land: activate via right-click (becomes ${clData.power}/${clData.toughness})`);
    }
  }

  // --- Keywords ---
  const autoKeywords = ['flying', 'trample', 'deathtouch', 'lifelink', 'first strike', 'double strike',
    'haste', 'vigilance', 'menace', 'reach', 'indestructible', 'hexproof', 'infect', 'toxic'];
  autoKeywords.forEach(kw => {
    if (keywords.includes(kw) || oracleLower.includes(kw)) {
      auto.push(`✅ ${kw.charAt(0).toUpperCase() + kw.slice(1)}: applied in combat automatically`);
    }
  });
  if (keywords.includes('defender') || oracleLower.includes('defender')) {
    auto.push('✅ Defender: cannot be declared as attacker');
  }
  if (/protection from/i.test(oracle)) {
    auto.push('✅ Protection: damage prevention and blocking restrictions applied');
  }

  // --- Cycling ---
  if (keywords.includes('cycling') || oracleLower.includes('cycling')) {
    auto.push('✅ Cycling: available via right-click in hand (pay cost, draw a card)');
    if (/when you cycle/i.test(oracle)) {
      auto.push('✅ Cycling trigger: auto-detected');
    }
  }

  // --- Foretell ---
  if (keywords.includes('foretell') || oracleLower.includes('foretell')) {
    auto.push('✅ Foretell: exile face-down from hand, then cast for foretell cost from exile');
  }

  // --- Alternative casting from graveyard ---
  if (keywords.includes('flashback') || oracleLower.includes('flashback')) {
    auto.push('✅ Flashback: cast from graveyard via right-click, then exiled');
  }
  if (keywords.includes('jump-start') || oracleLower.includes('jump-start')) {
    auto.push('✅ Jump-Start: cast from graveyard via right-click');
  }
  if (keywords.includes('escape') || oracleLower.includes('escape')) {
    auto.push('✅ Escape: cast from graveyard via right-click (manually exile cards)');
  }
  if (keywords.includes('disturb') || oracleLower.includes('disturb')) {
    auto.push('✅ Disturb: cast back face from graveyard via right-click');
  }
  if (keywords.includes('unearth') || oracleLower.includes('unearth')) {
    auto.push('✅ Unearth: return from graveyard via right-click');
  }

  // --- Spectacle ---
  if (oracleLower.includes('spectacle')) {
    auto.push('✅ Spectacle: alternative cost shown in hand when opponent dealt damage this turn');
  }

  // --- Adventure ---
  if (card.layout === 'adventure' && card.card_faces) {
    auto.push('✅ Adventure: both faces castable from hand via right-click');
    auto.push('✅ After adventure spell resolves, creature goes to exile (castable later)');
  }

  // --- Combat triggers ---
  if (/whenever .* deals combat damage to (a player|an opponent)/i.test(oracle)) {
    auto.push('✅ Combat damage trigger: auto-detected after combat');
  }
  if (/whenever .* attacks/i.test(oracle)) {
    if (/create.*token/i.test(oracle)) {
      auto.push('✅ Attack trigger (token): auto-creates tokens when attacking');
    } else {
      manual.push('⚠️ Attack trigger detected — may need manual resolution');
    }
  }

  // --- Upkeep triggers ---
  if (/at the beginning of .* upkeep.*counter/i.test(oracle)) {
    auto.push('✅ Upkeep trigger: counter added automatically');
  }
  if (/at the beginning of .* upkeep.*damage|deals.*damage to you/i.test(oracle)) {
    auto.push('✅ Upkeep trigger: self-damage applied automatically');
  }

  // --- Activated abilities ---
  if (/\{[^}]*\}.*:(?!:)/i.test(oracle) && !isPW) {
    manual.push('⚠️ Activated ability: some are auto-detected via right-click, others need manual resolution');
    info.push('💡 Check right-click menu for available activated abilities');
  }

  // --- Sacrifice abilities ---
  if (/sacrifice ~.*:/i.test(oracle)) {
    auto.push('✅ Sacrifice ability: available via right-click on battlefield');
  }

  // --- Enters tapped ---
  if (/enters the battlefield tapped/i.test(oracle)) {
    auto.push('✅ Enters tapped: automatically enters the battlefield tapped');
  }

  // --- Damage prevention ---
  if (/prevent all combat damage/i.test(oracle)) {
    auto.push('✅ Prevent combat damage: applied via spell resolution');
  }
  if (/prevent all damage .* would deal/i.test(oracle)) {
    info.push('💡 Use right-click "Prevent all damage until next turn" on the target creature');
  }

  // --- Token creation ---
  if (!isPW && /create.*token/i.test(oracle) && !/when .* enters/i.test(oracle)) {
    info.push('💡 Token creation: may be auto-detected, or create manually via "Create Token" button');
  }

  // --- Equipment / Aura ---
  if (typeLine.includes('equipment')) {
    auto.push('✅ Equipment: attach via right-click on battlefield');
    info.push('💡 Right-click → "Attach to creature..." to equip');
  }
  if (typeLine.includes('aura')) {
    auto.push('✅ Aura: attach via right-click on battlefield');
  }

  // --- Counters ---
  if (/\+1\/\+1 counter|\-1\/\-1 counter/i.test(oracle)) {
    info.push('💡 Counters: add/remove via right-click or +/− buttons on card');
  }

  // --- General tips ---
  if (isCreatureCard) {
    info.push('💡 Tap/untap, counters, temp buffs, and keywords all available via right-click');
  }
  if (isLandCard) {
    info.push('💡 Tap for mana via the mana buttons or right-click');
  }

  // Deduplicate
  return {
    auto: [...new Set(auto)],
    manual: [...new Set(manual)],
    info: [...new Set(info)],
  };
};

// ============ HELPERS ============
const uid = () => Math.random().toString(36).substr(2, 9);

const getOracleText = (card) => {
  const main = card.oracle_text || '';
  const faces = (card.card_faces || []).map(f => f.oracle_text || '');
  return [main, ...faces].filter(Boolean).join('\n').toLowerCase();
};

const isCreature = (card) => card.type_line && card.type_line.toLowerCase().includes('creature');
const isLand = (card) => card.type_line && card.type_line.toLowerCase().includes('land');
const isEnchantment = (card) => card.type_line && card.type_line.toLowerCase().includes('enchantment');
const isArtifact = (card) => card.type_line && card.type_line.toLowerCase().includes('artifact');
const isPlaneswalker = (card) => card.type_line && card.type_line.toLowerCase().includes('planeswalker');
// Check if a card enters the battlefield tapped, respecting "unless" and "if" conditions
const checkSelfEntersTapped = (card, battlefield) => {
  const oracle = [card.oracle_text || '', ...(card.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
  const cardName = (card.name || '').toLowerCase();

  // Check if THIS card enters tapped — not some other object mentioned in oracle text.
  // Valid patterns: "[card name] enters tapped", "[card name] enters the battlefield tapped",
  //                 "it enters tapped", or standalone at start of sentence.
  // Must NOT match things like "Ragavan enters tapped" when the card is Kari Zev.
  const nameEsc = cardName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const selfEntersPattern = new RegExp(
    '(?:' + nameEsc + '|~|it|this (?:creature|permanent|land|card))\\s+enters (?:the battlefield )?tapped'
  );
  // Also match standalone: "enters the battlefield tapped" at start of a sentence (after period/newline)
  const standalonePattern = /(?:^|[.\n])\s*enters (?:the battlefield )?tapped/;

  const selfEnters = selfEntersPattern.test(oracle) || standalonePattern.test(oracle);
  if (!selfEnters) return false;

  // "If you control two or more other lands, ~ enters tapped" (Den of the Bugbear, etc.)
  const ifLandsMatch = oracle.match(/if you control (\w+) or more other lands,.*enters (?:the battlefield )?tapped/);
  if (ifLandsMatch) {
    const numWords = { one: 1, two: 2, three: 3, four: 4, five: 5 };
    const threshold = numWords[ifLandsMatch[1]] || parseInt(ifLandsMatch[1]) || 2;
    const isLand = (c) => c.type_line && c.type_line.toLowerCase().includes('land');
    const otherLandCount = battlefield.filter(c => isLand(c) && c.id !== card.id).length;
    return otherLandCount >= threshold; // Only tapped if you have enough other lands
  }

  // "enters tapped unless you control two or fewer other lands" (fast lands: Inspiring Vantage, etc.)
  const fewerLandsMatch = oracle.match(/enters (?:the battlefield )?tapped unless you control (\w+) or fewer other lands/);
  if (fewerLandsMatch) {
    const numWords = { one: 1, two: 2, three: 3, four: 4, five: 5 };
    const threshold = numWords[fewerLandsMatch[1]] || parseInt(fewerLandsMatch[1]) || 2;
    const isLand = (c) => c.type_line && c.type_line.toLowerCase().includes('land');
    const otherLandCount = battlefield.filter(c => isLand(c) && c.id !== card.id).length;
    return otherLandCount > threshold; // Tapped only if you control MORE than the threshold
  }

  // "enters tapped unless you control a [type]" (checklands, Castle Locthwain, etc.)
  // Supports both old format "enters the battlefield tapped unless" and new format "enters tapped unless"
  const unlessMatch = oracle.match(/enters (?:the battlefield )?tapped unless you control an? (.+?)(?:\.|$)/);
  if (unlessMatch) {
    const condition = unlessMatch[1].trim();
    const hasCondition = battlefield.some(c => {
      const tl = (c.type_line || '').toLowerCase();
      const subs = tl.split('—').pop()?.trim() || '';
      return subs.includes(condition) || tl.includes(condition);
    });
    if (hasCondition) return false; // Condition met, enters untapped
  }

  // "enters tapped unless you paid/pay {X}" / "unless you pay 3 life" (shocklands, etc.)
  if (/enters (?:the battlefield )?tapped unless you pay/.test(oracle)) {
    return false; // Let the player decide — don't auto-tap
  }

  return true; // No condition, or condition not met — enters tapped
};
const isInstant = (card) => card.type_line && card.type_line.toLowerCase().includes('instant');
const isSorcery = (card) => card.type_line && card.type_line.toLowerCase().includes('sorcery');
const isSpellCard = (card) => isInstant(card) || isSorcery(card);
const hasFlash = (card) => {
  const allText = getOracleText(card);
  return card.keywords?.includes('Flash') || card.keywords?.includes('flash') || allText.includes('flash') || (card.tempBuffs?.keywords || []).includes('flash');
};
const isAdventureCard = (card) => card.layout === 'adventure' && card.card_faces && card.card_faces.length >= 2;
const canCastAtInstantSpeed = (card) => {
  if (isInstant(card) || hasFlash(card)) return true;
  // Adventure cards where the adventure face is an instant (e.g. Bonecrusher Giant → Stomp)
  if (isAdventureCard(card)) {
    const advFace = card.card_faces?.[1];
    if (advFace && advFace.type_line && advFace.type_line.toLowerCase().includes('instant')) return true;
  }
  return false;
};
const hasHexproof = (card) => {
  const allText = getOracleText(card);
  return card.keywords?.includes('Hexproof') || card.keywords?.includes('hexproof') || allText.includes('hexproof') || (card.tempBuffs?.keywords || []).includes('hexproof');
};
const hasShroud = (card) => {
  return card.keywords?.includes('Shroud') || card.keywords?.includes('shroud') || (card.tempBuffs?.keywords || []).includes('shroud');
};
const hasProtectionFrom = (card, spellCard) => {
  const allText = getOracleText(card);
  const spellColors = spellCard.colors || spellCard.card_faces?.[0]?.colors || [];
  const colorNames = { W: 'white', U: 'blue', B: 'black', R: 'red', G: 'green' };
  for (const c of spellColors) {
    if (allText.includes(`protection from ${colorNames[c]}`)) return colorNames[c];
  }
  return null;
};
const isAura = (card) => {
  const tl = (card.type_line || '').toLowerCase();
  const allOracle = getOracleText(card);
  return tl.includes('enchantment') && (tl.includes('aura') || allOracle.includes('enchant creature') || allOracle.includes('enchant permanent'));
};
const isEquipment = (card) => {
  const tl = (card.type_line || '').toLowerCase();
  return tl.includes('equipment');
};

// Parse stat bonuses and keywords granted by an Aura or Equipment
// Returns { power: number, toughness: number, keywords: string[] }
const parseAttachmentBonuses = (card) => {
  const allText = getOracleText(card);
  const result = { power: 0, toughness: 0, keywords: [] };

  // Skip dynamic/conditional bonuses that we can't auto-calculate
  const isDynamic = /gets? [+-]\d+\/[+-]\d+ for each/.test(allText) ||
      /gets? [+-]x\/[+-]x/.test(allText) ||
      /gets? [+-]\d+\/[+-]\d+ where/.test(allText) ||
      /gets? [+-]\d+\/[+-]\d+,? where/.test(allText);
  if (isDynamic) {
    // Still try to parse keywords even if stats are dynamic (handled below)
  } else {
    // Static stat bonuses: "enchanted/equipped creature gets +2/+2"
    const statMatch = allText.match(/(?:enchanted|equipped) creature gets? ([+-]\d+)\/([+-]\d+)/);
    if (statMatch) {
      result.power = parseInt(statMatch[1]);
      result.toughness = parseInt(statMatch[2]);
    }
  }

  // Keywords: "enchanted/equipped creature has/gains [keyword list]"
  const kwMatch = allText.match(/(?:enchanted|equipped) creature (?:has|gains?) ([^.]+?)(?:\.|$)/);
  if (kwMatch) {
    const kwText = kwMatch[1]
      .replace(/([+-]\d+\/[+-]\d+\s*(?:and\s*)?)/g, '') // remove stat references
      .replace(/^and\s+/i, '');
    const knownKeywords = [
      'flying', 'first strike', 'double strike', 'deathtouch', 'trample', 'lifelink',
      'vigilance', 'haste', 'hexproof', 'indestructible', 'menace', 'reach', 'flash',
      'shroud', 'fear', 'intimidate', 'defender', 'horsemanship', 'shadow', 'wither',
      'infect', 'ward', 'skulk', 'prowess',
    ];
    // Also match "protection from X"
    const protMatch = allText.match(/(?:enchanted|equipped) creature (?:has|gains?) (protection from \w+)/);
    if (protMatch) {
      result.keywords.push(protMatch[1]);
    }
    // Split on commas and "and" to find individual keywords
    const parts = kwText.split(/,\s*|\s+and\s+/).map(p => p.trim()).filter(Boolean);
    for (const part of parts) {
      const found = knownKeywords.find(kw => part.includes(kw));
      if (found && !result.keywords.includes(found)) {
        result.keywords.push(found);
      }
    }
  }

  // Also handle the combined pattern: "gets +X/+X and has [keywords]"
  const combinedMatch = allText.match(/(?:enchanted|equipped) creature gets? [+-]\d+\/[+-]\d+ and (?:has|gains?) ([^.]+?)(?:\.|$)/);
  if (combinedMatch) {
    const kwText2 = combinedMatch[1];
    const knownKeywords = [
      'flying', 'first strike', 'double strike', 'deathtouch', 'trample', 'lifelink',
      'vigilance', 'haste', 'hexproof', 'indestructible', 'menace', 'reach', 'flash',
      'shroud', 'fear', 'intimidate', 'defender', 'horsemanship', 'shadow', 'wither',
      'infect', 'ward', 'skulk', 'prowess',
    ];
    const parts2 = kwText2.split(/,\s*|\s+and\s+/).map(p => p.trim()).filter(Boolean);
    for (const part of parts2) {
      const found = knownKeywords.find(kw => part.includes(kw));
      if (found && !result.keywords.includes(found)) {
        result.keywords.push(found);
      }
    }
  }

  // Fallback: scan for "and has [keyword]" anywhere in text (covers dynamic stat cards like Ethereal Armor)
  if (result.keywords.length === 0) {
    const andHasMatch = allText.match(/and (?:has|gains?) ([^.]+?)(?:\.|$)/);
    if (andHasMatch) {
      const knownKeywords2 = [
        'flying', 'first strike', 'double strike', 'deathtouch', 'trample', 'lifelink',
        'vigilance', 'haste', 'hexproof', 'indestructible', 'menace', 'reach', 'flash',
        'shroud', 'fear', 'intimidate', 'defender', 'horsemanship', 'shadow', 'wither',
        'infect', 'ward', 'skulk', 'prowess',
      ];
      const parts3 = andHasMatch[1].split(/,\s*|\s+and\s+/).map(p => p.trim()).filter(Boolean);
      for (const part of parts3) {
        const found = knownKeywords2.find(kw => part.includes(kw));
        if (found && !result.keywords.includes(found)) result.keywords.push(found);
      }
    }
  }

  return result;
};

// Conditional static buffs: "As long as [condition], gets +X/+Y and [keyword]"
// e.g. Thieves' Guild Enforcer / Soaring Thought-Thief
const getConditionalBuffs = (card) => {
  const oracle = getOracleText(card);
  const allStates = _starPTAllStatesGetter ? _starPTAllStatesGetter() : [];
  let powerBuff = 0, toughnessBuff = 0;
  const extraKeywords = [];
  const gyMatch = oracle.match(/as long as an opponent has (?:eight|(\d+)) or more cards in their graveyard.*?gets? \+(\d+)\/\+(\d+)(?: and has (\w[\w ]*?))?(?:\.|$)/i);
  if (gyMatch) {
    const threshold = gyMatch[1] ? parseInt(gyMatch[1]) : 8;
    let ownerIdx = -1;
    for (let i = 0; i < allStates.length; i++) {
      if (allStates[i] && allStates[i].battlefield && allStates[i].battlefield.some(function(c) { return c.id === card.id; })) { ownerIdx = i; break; }
    }
    if (ownerIdx >= 0) {
      const oppIdx = ownerIdx === 0 ? 1 : 0;
      const oppGy = (allStates[oppIdx] && allStates[oppIdx].graveyard && allStates[oppIdx].graveyard.length) || 0;
      if (oppGy >= threshold) {
        powerBuff += parseInt(gyMatch[2]);
        toughnessBuff += parseInt(gyMatch[3]);
        if (gyMatch[4]) {
          gyMatch[4].split(/\s+and\s+/).forEach(function(kw) { extraKeywords.push(kw.trim().toLowerCase()); });
        }
      }
    }
  }
  return { power: powerBuff, toughness: toughnessBuff, keywords: extraKeywords };
};

// Get all keywords for a creature including base, temp, and attachment keywords
const getCreatureKeywords = (card, attachments = []) => {
  const base = (card.keywords || []).map(k => k.toLowerCase());
  const temp = card.tempBuffs?.keywords || [];
  const fromAttachments = [];
  for (const att of attachments) {
    const bonuses = parseAttachmentBonuses(att);
    for (const kw of bonuses.keywords) {
      if (!fromAttachments.includes(kw)) fromAttachments.push(kw);
    }
  }
  const condKw = getConditionalBuffs(card).keywords;
  return [...new Set([...base, ...temp, ...fromAttachments, ...condKw])];
};

// Cycling detection — returns cycling cost string or null
const getCyclingCost = (card) => {
  // Check keywords first
  if (card.keywords?.some(k => k.toLowerCase().startsWith('cycling'))) {
    // Try to extract cost from oracle text
    const allText = getOracleText(card);
    const cycleMatch = allText.match(/cycling\s*(\{[^}]+\}(?:\{[^}]+\})*)/);
    return cycleMatch ? cycleMatch[1] : '{2}'; // default to {2} if can't parse
  }
  return null;
};

// Foretell: detect foretell keyword and parse the foretell cost
const getForetellCost = (card) => {
  const kws = (card.keywords || []).map(k => k.toLowerCase());
  if (!kws.includes('foretell')) return null;
  const allText = getOracleText(card);
  // Foretell cost pattern: "Foretell {W}{W}" or "Foretell {2}{U}"
  const ftMatch = allText.match(/foretell\s+((?:\{[^}]+\})+)/);
  return ftMatch ? ftMatch[1] : '{2}'; // default {2} if can't parse
};

// ============ DYNAMIC HAND CARD VALUE ============
// Calculates dynamic values for cards in hand based on game state (e.g. Zenith Flare)
const getHandCardDynamicValue = (card, playerState) => {
  const allText = getOracleText(card);

  // Zenith Flare pattern: "X damage ... where X is the number of cards with a cycling ability in your graveyard"
  if (allText.includes('cycling ability') && allText.includes('graveyard')) {
    const count = playerState.graveyard.filter(c => getCyclingCost(c)).length;
    return { value: count, label: `⚡${count} dmg`, color: count > 0 ? '#e8a030' : '#888' };
  }

  // Generic "cards in your graveyard" scaling (e.g. Crackling Drake "power equal to instant/sorcery in GY")
  if (allText.includes('number of instant') && allText.includes('sorcery') && allText.includes('graveyard')) {
    const count = playerState.graveyard.filter(c => {
      const tl = (c.type_line || '').toLowerCase();
      return tl.includes('instant') || tl.includes('sorcery');
    }).length;
    return { value: count, label: `⚡${count}`, color: count > 0 ? '#60a0e0' : '#888' };
  }

  // Devotion-based hand cards (e.g. Gray Merchant)
  if (allText.includes('devotion to black') && allText.includes('each opponent loses')) {
    const devotion = playerState.battlefield.reduce((sum, c) => {
      const mc = c.mana_cost || c.card_faces?.[0]?.mana_cost || '';
      return sum + (mc.match(/\{B\}/g) || []).length;
    }, 0);
    return { value: devotion, label: `💀${devotion}`, color: devotion > 0 ? '#a060c0' : '#888' };
  }

  // Creature count scaling (e.g. Craterhoof - "creatures you control get +X/+X where X is number of creatures")
  if (allText.includes('number of creatures you control') && (allText.includes('+x/+x') || allText.includes('gets +x'))) {
    const count = playerState.battlefield.filter(c => isCreature(c)).length;
    return { value: count, label: `🦏${count}`, color: count > 0 ? '#60c060' : '#888' };
  }

  return null;
};

// ============ COST MODIFIER DETECTION ============
// Scans battlefield for permanents that modify spell costs
const getCostModifiers = (yourBattlefield, opponentBattlefield) => {
  const modifiers = []; // { source, text, affectsWho: 'you'|'opponent'|'both', icon }

  const scanCard = (card, isYours) => {
    const allText = getOracleText(card);
    const name = card.name || '';

    // "Noncreature spells cost {N} more" (Thalia, Guardian of Thraben)
    const noncreatureMore = allText.match(/noncreature spells? (?:your opponents cast )?cost (?:\{(\d+)\}|(\w+)) more/);
    if (noncreatureMore) {
      const n = noncreatureMore[1] || noncreatureMore[2];
      const affectsOpponent = allText.includes('your opponents cast') || allText.includes('opponents\' spells');
      modifiers.push({
        source: name, icon: '⚖️',
        text: `Noncreature spells cost {${n}} more`,
        affectsWho: affectsOpponent ? (isYours ? 'opponent' : 'you') : 'both'
      });
      return;
    }

    // "Spells your opponents cast cost {N} more" (God-Pharaoh's Statue, Thorn of Amethyst)
    const opponentMore = allText.match(/spells? your opponents? cast cost (?:\{(\d+)\}|(\w+)) more/);
    if (opponentMore) {
      const n = opponentMore[1] || opponentMore[2];
      modifiers.push({
        source: name, icon: '🏛️',
        text: `Opponent's spells cost {${n}} more`,
        affectsWho: isYours ? 'opponent' : 'you'
      });
      return;
    }

    // "Spells cost {N} more to cast" (generic taxing)
    const allMore = allText.match(/spells cost (?:\{(\d+)\}|(\w+)) more to cast/);
    if (allMore && !allText.includes('noncreature') && !allText.includes('your opponents')) {
      const n = allMore[1] || allMore[2];
      modifiers.push({
        source: name, icon: '⚖️',
        text: `All spells cost {${n}} more`,
        affectsWho: 'both'
      });
      return;
    }

    // "Spells cost {N} less to cast" — your own cost reduction (Baral, Goblin Electromancer)
    const lessMatch = allText.match(/(instant and sorcery|noncreature|creature)?\s*spells? (?:you cast )?cost (?:\{(\d+)\}|(\w+)) less/);
    if (lessMatch) {
      const type = lessMatch[1] || 'all';
      const n = lessMatch[2] || lessMatch[3];
      modifiers.push({
        source: name, icon: '💎',
        text: `${type.charAt(0).toUpperCase() + type.slice(1)} spells cost {${n}} less`,
        affectsWho: isYours ? 'you' : 'opponent'
      });
      return;
    }

    // "Creatures you cast cost {N} less" / "creature spells cost less"
    const creatureLess = allText.match(/creature spells? (?:you cast )?cost (?:\{(\d+)\}|(\w+)) less/);
    if (creatureLess) {
      const n = creatureLess[1] || creatureLess[2];
      modifiers.push({
        source: name, icon: '💎',
        text: `Creature spells cost {${n}} less`,
        affectsWho: isYours ? 'you' : 'opponent'
      });
      return;
    }

    // "Spells can't be countered" (Teferi, Time Raveler partial; Cavern of Souls)
    if (allText.includes("spells can't be countered") || allText.includes("can't be countered by spells")) {
      modifiers.push({
        source: name, icon: '🛡️',
        text: `Spells can't be countered`,
        affectsWho: isYours ? 'you' : 'opponent'
      });
    }

    // "Your opponents can't cast spells during your turn" (Teferi, Time Raveler)
    if (allText.includes("each opponent can only cast spells any time they could cast a sorcery") ||
        allText.includes("opponents can't cast spells during your turn")) {
      modifiers.push({
        source: name, icon: '⏳',
        text: `Opponents can only cast at sorcery speed`,
        affectsWho: isYours ? 'opponent' : 'you'
      });
    }
  };

  yourBattlefield.forEach(c => scanCard(c, true));
  opponentBattlefield.forEach(c => scanCard(c, false));
  return modifiers;
};

  },

  },

    keywords: [],
    attackTrigger: null,
    permanent: true, // Does NOT revert at end of turn
    addCounters: { type: '+1/+1', amount: 2 }, // Also adds two +1/+1 counters
    noTap: true, // Activation does NOT tap the land
  },
  'castle locthwain': null, // Not a creature land
};

const getCreatureLandData = (card) => {
  const name = (card.name || '').toLowerCase();
  return CREATURE_LAND_DATA[name] || null;
};

// Get base power/toughness (handles transform/flip cards with card_faces)
const getBasePower = (card) => {
  if (card.power !== undefined && card.power !== null) return card.power;
  if (card.card_faces && card.card_faces[0]) return card.card_faces[0].power;
  return undefined;
};
const getBaseToughness = (card) => {
  if (card.toughness !== undefined && card.toughness !== null) return card.toughness;
  if (card.card_faces && card.card_faces[0]) return card.card_faces[0].toughness;
  return undefined;
};
const hasBasePT = (card) => getBasePower(card) !== undefined;

let _starPTStateGetter = null; // Set at runtime in the component
let _starPTAllStatesGetter = null; // fn() => [state0, state1]

const resolveStarPT = (card) => {
  const rawP = getBasePower(card);
  const rawT = getBaseToughness(card);
  const pIsStar = rawP !== undefined && String(rawP).includes('*');
  const tIsStar = rawT !== undefined && String(rawT).includes('*');
  if (!pIsStar && !tIsStar) return { power: parseInt(rawP) || 0, toughness: parseInt(rawT) || 0 };

  const oracle = [card.oracle_text || '', ...(card.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
  let resolvedP = parseInt(rawP) || 0;
  let resolvedT = parseInt(rawT) || 0;

  // Helper: get all states
  const allStates = _starPTAllStatesGetter ? _starPTAllStatesGetter() : [];
  // Find which player owns this card (check battlefield, hand, graveyard)
  let ownerState = allStates[0] || null;
  for (const s of allStates) {
    if (s && [...(s.battlefield || []), ...(s.hand || []), ...(s.graveyard || [])].some(c => c.id === card.id)) {
      ownerState = s;
      break;
    }
  }

  // Pattern: "power/toughness is/are equal to your devotion to [color]"
  const devMatch = oracle.match(/(?:power and toughness are|toughness is|power is).*?(?:equal to|each equal to) (?:your )?devotion to (\w+)/);
  if (devMatch && ownerState) {
    const colorMap = { white: 'W', blue: 'U', black: 'B', red: 'R', green: 'G' };
    const color = colorMap[devMatch[1]] || devMatch[1].toUpperCase();
    const devotion = calculateDevotion(ownerState.battlefield);
    const devValue = devotion[color] || 0;
    if (pIsStar) resolvedP = devValue;
    if (tIsStar) resolvedT = devValue;
  }

  // Pattern: "equal to the number of creature cards in all graveyards" (Nighthowler)
  if (oracle.includes('number of creature cards in all graveyards')) {
    const count = allStates.reduce((sum, s) => sum + (s?.graveyard || []).filter(c => isCreature(c)).length, 0);
    if (pIsStar) resolvedP = count;
    if (tIsStar) resolvedT = count;
  }

  // Pattern: "equal to the number of card types among cards in all graveyards" (Tarmogoyf)
  if (oracle.includes('number of card types among cards in all graveyards')) {
    const types = new Set();
    const typeKeywords = ['creature', 'instant', 'sorcery', 'artifact', 'enchantment', 'land', 'planeswalker', 'tribal', 'battle', 'kindred'];
    for (const s of allStates) {
      for (const c of (s?.graveyard || [])) {
        const tl = (c.type_line || '').toLowerCase();
        for (const tk of typeKeywords) { if (tl.includes(tk)) types.add(tk); }
      }
    }
    const count = types.size;
    if (pIsStar) resolvedP = count;
    // Tarmogoyf: "toughness is equal to that number plus 1"
    if (tIsStar) resolvedT = oracle.includes('plus 1') ? count + 1 : count;
  }

  // Pattern: "equal to the number of cards in your hand" (Maro, etc.)
  if (oracle.includes('number of cards in your hand') && ownerState) {
    const count = (ownerState.hand || []).length;
    if (pIsStar) resolvedP = count;
    if (tIsStar) resolvedT = count;
  }

  // Pattern: "equal to the number of [type]s you control" (e.g. Crusader of Odric)
  const controlMatch = oracle.match(/equal to the number of (\w+)s? you control/);
  if (controlMatch && ownerState) {
    const what = controlMatch[1];
    let count = 0;
    if (what === 'creature') count = ownerState.battlefield.filter(c => isCreature(c)).length;
    else if (what === 'land') count = ownerState.battlefield.filter(c => isLand(c)).length;
    else count = ownerState.battlefield.filter(c => (c.type_line || '').toLowerCase().includes(what)).length;
    if (pIsStar) resolvedP = count;
    if (tIsStar) resolvedT = count;
  }

  return { power: resolvedP, toughness: resolvedT };
};

// Calculate effective power/toughness including counters, temp buffs, attachment bonuses, and star (*) resolution
const getEffectivePower = (card, attachments = []) => {
  const resolved = resolveStarPT(card);
  let p = resolved.power;
  if (card.counters) {
    p += (card.counters['+1/+1'] || 0);
    p -= (card.counters['-1/-1'] || 0);
  }
  if (card.tempBuffs) {
    p += (card.tempBuffs.power || 0);
  }
  for (const att of attachments) {
    const bonuses = parseAttachmentBonuses(att);
    p += bonuses.power;
  }
  p += getConditionalBuffs(card).power;
  return Math.max(0, p);
};
const getEffectiveToughness = (card, attachments = []) => {
  const resolved = resolveStarPT(card);
  let t = resolved.toughness;
  if (card.counters) {
    t += (card.counters['+1/+1'] || 0);
    t -= (card.counters['-1/-1'] || 0);
  }
  if (card.tempBuffs) {
    t += (card.tempBuffs.toughness || 0);
  }
  for (const att of attachments) {
    const bonuses = parseAttachmentBonuses(att);
    t += bonuses.toughness;
  }
  t += getConditionalBuffs(card).toughness;
  return Math.max(0, t);
};

// Parse Planeswalker loyalty abilities from oracle text
// Returns array of { cost: "+1" / "-2" / "0", text: "ability description" }
const parsePlaneswalkerAbilities = (card) => {
  const oracle = card.oracle_text || '';
  const faces = card.card_faces || [];
  const allText = [oracle, ...faces.map(f => f.oracle_text || '')].filter(Boolean).join('\n');
  const abilities = [];
  // Try format 1: with brackets [+1]:, [-2]:, [0]:, [−6]:
  const bracketRegex = /\[([+\-\u2212]?\d+)\]:\s*([^\n]+(?:\n(?!\[)[^\n]*)*)/g;
  let match;
  while ((match = bracketRegex.exec(allText)) !== null) {
    const cost = match[1].replace('\u2212', '-'); // normalize unicode minus
    const text = match[2].trim();
    abilities.push({ cost, text });
  }
  // Fallback format 2: without brackets — +1:, −2:, 0: (Scryfall sometimes omits brackets)
  if (abilities.length === 0) {
    const noBracketRegex = /(?:^|\n)([+\-\u2212]\d+|0):\s*([^\n]+(?:\n(?![+\-\u2212]\d+:|0:|\[)[^\n]*)*)/g;
    while ((match = noBracketRegex.exec(allText)) !== null) {
      const cost = match[1].replace('\u2212', '-');
      const text = match[2].trim();
      abilities.push({ cost, text });
    }
  }
  if (abilities.length === 0 && isPlaneswalker(card)) {
    console.warn('PW ability parse failed for:', card.name, 'oracle:', allText.substring(0, 200));
  }
  return abilities;
};

// Get starting loyalty for a Planeswalker card
const getPlaneswalkerStartingLoyalty = (card) => {
  if (card.loyalty) return parseInt(card.loyalty) || 0;
  const faces = card.card_faces || [];
  for (const face of faces) {
    if (face.loyalty) return parseInt(face.loyalty) || 0;
  }
  return 0;
};

const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

// ============ CARD IMAGE WITH RESKIN OVERLAY ============
// Shows the original card (frame, text, stats) with custom art overlaid in the art box
function CardImg({ card, alt, style, className, onClick, size }) {
  const src = card.isToken
    ? (size === 'small' ? card.tokenImageSmall : card.tokenImageNormal) || null
    : (size === 'small' ? getCardSmall(card) : getCardNormal(card));
  // Full card image replacement — shows the custom card frame instead of Scryfall card
  const fullCardImg = !card.isToken && card._reskin?.fullCardImage;
  if (fullCardImg) {
    return <img src={fullCardImg} alt={alt || getDisplayName(card)} style={style} className={className} onClick={onClick} />;
  }
  const reskinArt = !card.isToken ? getReskinArt(card) : null;
  if (!reskinArt) {
    return <img src={src} alt={alt || getDisplayName(card)} style={style} className={className} onClick={onClick} />;
  }
  // Card-type-aware art box positioning (different card layouts have different art boxes)
  const typeLine = (card.type_line || '').toLowerCase();
  const isPW = typeLine.includes('planeswalker');
  const isSaga = typeLine.includes('saga');
  // Reskin config can override positioning: _reskin: { artTop, artHeight }
  const reskinCfg = card._reskin || {};
  const artTop = reskinCfg.artTop != null ? reskinCfg.artTop + '%' : isPW ? '8.5%' : isSaga ? '11%' : '11.5%';
  const artHeight = reskinCfg.artHeight != null ? reskinCfg.artHeight + '%' : isPW ? '48%' : isSaga ? '70%' : '44%';
  const artLeft = reskinCfg.artLeft != null ? reskinCfg.artLeft + '%' : '6%';
  const artWidth = reskinCfg.artWidth != null ? reskinCfg.artWidth + '%' : '88%';
  // When reskin is active, apply className (incl. tapped rotation) to the wrapper
  // so both the card image and the art overlay rotate together
  return (
    <div className={className} style={{ position: 'relative', display: 'inline-block', ...style }} onClick={onClick}>
      <img src={src} alt={alt || getDisplayName(card)}
        style={{ width: '100%', height: '100%', display: 'block' }} />
      <img className="reskin-art-overlay" src={reskinArt} alt=""
        style={{
          top: artTop, left: artLeft, width: artWidth, height: artHeight,
          borderRadius: style?.height > 200 ? 10 : style?.height > 80 ? 6 : 3,
          objectPosition: reskinCfg.objectPosition || 'center 25%',
        }} />
    </div>
  );
}

// ============ CARD PREVIEW ============
function CardPreview({ card, position }) {
  if (!card) return null;
  const imgUrl = card.isToken ? (card.tokenImageNormal || null) : getCardNormal(card);
  if (!imgUrl) return null;

  const style = {
    left: Math.min(position.x + 15, window.innerWidth - 280),
    top: Math.min(position.y - 100, window.innerHeight - 390),
  };

  return ReactDOM.createPortal(
    <div className="card-preview" style={style}>
      <CardImg card={card} alt={card.name} style={{ height: 363 }} />
    </div>,
    document.body
  );
}

// ============ TOKEN CREATOR MODAL ============
function TokenCreator({ onClose, onCreate }) {
  const [name, setName] = useState('');
  const [types, setTypes] = useState('Creature');
  const [subtypes, setSubtypes] = useState('');
  const [power, setPower] = useState('1');
  const [toughness, setToughness] = useState('1');
  const [colors, setColors] = useState([]);
  const [keywords, setKeywords] = useState('');
  const [loyalty, setLoyalty] = useState('');
  const [quantity, setQuantity] = useState(1);
  const [tokenImages, setTokenImages] = useState([]);
  const [selectedImage, setSelectedImage] = useState(null);
  const [imageLoading, setImageLoading] = useState(false);
  const searchTimeout = useRef(null);

  const isCreatureToken = types.toLowerCase().includes('creature');
  const isPWToken = types.toLowerCase().includes('planeswalker');

  const toggleColor = (c) => {
    setColors(prev => prev.includes(c) ? prev.filter(x => x !== c) : [...prev, c]);
  };

  // Auto-search for token images when name or subtypes change
  const searchTokenImages = useCallback((searchName) => {
    if (searchTimeout.current) clearTimeout(searchTimeout.current);
    if (!searchName || searchName.length < 2) { setTokenImages([]); return; }
    searchTimeout.current = setTimeout(async () => {
      setImageLoading(true);
      const results = await scryfallSearchTokens(searchName);
      setTokenImages(results);
      setImageLoading(false);
    }, 400);
  }, []);

  const handleNameChange = (val) => {
    setName(val);
    searchTokenImages(val);
  };

  const handleSubtypeChange = (val) => {
    setSubtypes(val);
    if (val.length >= 2) searchTokenImages(val);
  };

  const handleCreate = () => {
    for (let i = 0; i < quantity; i++) {
      const token = {
        id: uid(),
        isToken: true,
        name: name || 'Token',
        type_line: `Token ${types}${subtypes ? ' — ' + subtypes : ''}`,
        power: isCreatureToken ? power : undefined,
        toughness: isCreatureToken ? toughness : undefined,
        loyalty: isPWToken ? loyalty : undefined,
        colors: colors,
        keywords: keywords ? keywords.split(',').map(k => k.trim()) : [],
        tokenImageSmall: selectedImage ? getCardSmall(selectedImage) : null,
        tokenImageNormal: selectedImage ? getCardNormal(selectedImage) : null,
        tapped: false,
        counters: {},
      };
      onCreate(token, i === 0); // only play sound on first token
    }
    onClose();
  };

  const colorBtns = [
    { code: 'W', label: 'W', bg: '#f9faf4', fg: '#333' },
    { code: 'U', label: 'U', bg: '#0e68ab', fg: '#fff' },
    { code: 'B', label: 'B', bg: '#150b00', fg: '#ccc' },
    { code: 'R', label: 'R', bg: '#d3202a', fg: '#fff' },
    { code: 'G', label: 'G', bg: '#00733e', fg: '#fff' },
  ];

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{ maxWidth: 800 }} onClick={e => e.stopPropagation()}>
        <h2>Create Token</h2>
        <div style={{ display: 'flex', gap: 16 }}>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div>
              <label className="text-xs opacity-50">Name</label>
              <input value={name} onChange={e => handleNameChange(e.target.value)} placeholder="e.g. Shark, Zombie, Treasure" />
            </div>
            <div className="flex gap-2">
              <div style={{ flex: 1 }}>
                <label className="text-xs opacity-50">Type</label>
                <input value={types} onChange={e => setTypes(e.target.value)} placeholder="Creature, Artifact..." />
              </div>
              <div style={{ flex: 1 }}>
                <label className="text-xs opacity-50">Subtypes</label>
                <input value={subtypes} onChange={e => handleSubtypeChange(e.target.value)} placeholder="Shark, Zombie..." />
              </div>
            </div>
            <div>
              <label className="text-xs opacity-50">Colors</label>
              <div className="flex gap-1" style={{ marginTop: 4 }}>
                {colorBtns.map(c => (
                  <button key={c.code} onClick={() => toggleColor(c.code)}
                    style={{ width: 30, height: 30, borderRadius: '50%', background: c.bg, color: c.fg,
                      border: colors.includes(c.code) ? '3px solid #ffd700' : '2px solid #555',
                      cursor: 'pointer', fontWeight: 'bold', fontSize: 12 }}>
                    {c.label}
                  </button>
                ))}
              </div>
            </div>
            {isCreatureToken && (
              <div className="flex gap-2">
                <div style={{ flex: 1 }}>
                  <label className="text-xs opacity-50">Power</label>
                  <input value={power} onChange={e => setPower(e.target.value)} placeholder="*" />
                </div>
                <div style={{ flex: 1 }}>
                  <label className="text-xs opacity-50">Toughness</label>
                  <input value={toughness} onChange={e => setToughness(e.target.value)} placeholder="*" />
                </div>
              </div>
            )}
            {isPWToken && (
              <div>
                <label className="text-xs opacity-50">Loyalty</label>
                <input value={loyalty} onChange={e => setLoyalty(e.target.value)} />
              </div>
            )}
            <div>
              <label className="text-xs opacity-50">Keywords (comma separated)</label>
              <input value={keywords} onChange={e => setKeywords(e.target.value)} placeholder="Flying, Haste, Lifelink" />
            </div>
            <div>
              <label className="text-xs opacity-50">Quantity</label>
              <div className="flex items-center gap-2" style={{ marginTop: 4 }}>
                <button className="btn" style={{ width: 32, padding: '4px 0' }} onClick={() => setQuantity(Math.max(1, quantity - 1))}>−</button>
                <span style={{ fontSize: 20, fontWeight: 'bold', minWidth: 30, textAlign: 'center', color: '#ffd700' }}>{quantity}</span>
                <button className="btn" style={{ width: 32, padding: '4px 0' }} onClick={() => setQuantity(quantity + 1)}>+</button>
                <button className="btn text-xs" onClick={() => setQuantity(5)} style={{ opacity: quantity === 5 ? 1 : 0.5 }}>5x</button>
                <button className="btn text-xs" onClick={() => setQuantity(10)} style={{ opacity: quantity === 10 ? 1 : 0.5 }}>10x</button>
              </div>
            </div>
            <div className="flex gap-2" style={{ marginTop: 4 }}>
              <button className="btn btn-gold" style={{ flex: 1 }} onClick={handleCreate}>
                Create {quantity > 1 ? `${quantity} Tokens` : 'Token'}
              </button>
              <button className="btn" onClick={onClose}>Cancel</button>
            </div>
          </div>

          <div style={{ width: 280, display: 'flex', flexDirection: 'column', gap: 6 }}>
            <label className="text-xs opacity-50">Token Art {imageLoading ? '— searching...' : tokenImages.length > 0 ? `— ${tokenImages.length} found` : '— type a name to search'}</label>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 6, overflowY: 'auto', maxHeight: 380, padding: 2 }}>
              {tokenImages.map(img => (
                <div key={img.id}
                  onClick={() => setSelectedImage(selectedImage?.id === img.id ? null : img)}
                  style={{
                    borderRadius: 8, overflow: 'hidden', cursor: 'pointer',
                    border: selectedImage?.id === img.id ? '2px solid #ffd700' : '2px solid transparent',
                    transition: 'all 0.15s', opacity: selectedImage && selectedImage.id !== img.id ? 0.5 : 1,
                  }}>
                  <img src={getCardSmall(img)} alt={img.name} style={{ width: '100%', display: 'block', borderRadius: 6 }} loading="lazy" />
                </div>
              ))}
              {!imageLoading && tokenImages.length === 0 && name.length >= 2 && (
                <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: 20, opacity: 0.3, fontSize: 12 }}>
                  No token art found for "{name}"
                </div>
              )}
              {!imageLoading && name.length < 2 && (
                <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: 20, opacity: 0.3, fontSize: 12 }}>
                  Type a token name to find art
                </div>
              )}
            </div>
            {selectedImage && (
              <div className="text-xs" style={{ textAlign: 'center', color: '#ffd700', opacity: 0.7 }}>
                {selectedImage.set_name}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}
