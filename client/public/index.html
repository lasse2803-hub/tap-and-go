                  <div onClick={() => onCardAction && onCardAction(card)}
                    style={{ width: '100%', height: 180, borderRadius: 8, cursor: 'pointer',
                      background: 'linear-gradient(135deg, #2a1a4a 0%, #1a0a3a 50%, #2a1a4a 100%)',
                      border: '2px solid rgba(130,80,220,0.4)', display: 'flex', alignItems: 'center',
                      justifyContent: 'center', flexDirection: 'column', gap: 6 }}>
                    <span style={{ fontSize: 32 }}>🔮</span>
                    <span style={{ color: '#b090e0', fontSize: 11, fontWeight: 600 }}>Foretold</span>
                  </div>
                ) : card.isToken ? (
                  card.tokenImageSmall ? (
                    <img src={card.tokenImageSmall} alt={card.name}
                      onClick={() => onCardAction && onCardAction(card)}
                      style={{ width: '100%', borderRadius: 8, cursor: 'pointer' }} />
                  ) : (
                    <div className="token-card" style={{ width: '100%', height: 180 }}
                      onClick={() => onCardAction && onCardAction(card)}>
                      <div className="token-pt">{card.power}/{card.toughness}</div>
                      <div className="token-name">{card.name}</div>
                      <div className="token-types">{card.type_line}</div>
                    </div>
                  )
                ) : (
                  <CardImg card={card} size="small" alt={card.name}
                    onClick={() => onCardAction && onCardAction(card)}
                    style={{ width: '100%', ...(card.exilePlayable ? { boxShadow: '0 0 12px rgba(255,120,40,0.7)', borderRadius: 8 } : {}) }} />
                )}
                {card.exilePlayable && (
                  <div style={{ position: 'absolute', top: 4, right: 4, background: 'rgba(220,80,20,0.9)', color: '#fff', borderRadius: 6, padding: '1px 6px', fontSize: 9, fontWeight: 700 }}>
                    🔥 Playable
                  </div>
                )}
                {card.isForetold && !card.isHiddenForetold && (
                  <div style={{ position: 'absolute', top: 4, right: 4, background: 'rgba(100,60,200,0.9)', color: '#fff', borderRadius: 6, padding: '1px 6px', fontSize: 9, fontWeight: 700 }}>
                    🔮 Foretold
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ============ CARD COMPONENT ============
function CardDisplay({ card, size = 60, onClick, onContext, showPreview, extraClass = '', devotionData = null, onCounterChange = null, dynamicBadge = null, attachments = [] }) {
  const previewElRef = useRef(null);
  const isHovering = useRef(false);
  const lastPos = useRef({ x: 0, y: 0 });

  // Use direct DOM manipulation for preview to avoid re-render issues
  const updatePreview = (x, y) => {
    lastPos.current = { x, y };
    if (!previewElRef.current) return;
    const el = previewElRef.current;
    el.style.display = 'block';
    el.style.left = Math.min(x + 15, window.innerWidth - 280) + 'px';
    el.style.top = Math.min(y - 100, window.innerHeight - 390) + 'px';
  };
  const hidePreview = () => {
    if (previewElRef.current) previewElRef.current.style.display = 'none';
  };

  // Restore preview visibility after re-render if still hovering
  useEffect(() => {
    if (isHovering.current && previewElRef.current) {
      updatePreview(lastPos.current.x, lastPos.current.y);
    }
  });

  const handleMouseEnter = (e) => {
    if (showPreview) {
      isHovering.current = true;
      updatePreview(e.clientX, e.clientY);
    }
  };
  const handleMouseMove = (e) => {
    if (isHovering.current) updatePreview(e.clientX, e.clientY);
  };
  const handleMouseLeave = () => {
    isHovering.current = false;
    hidePreview();
  };

  const tappedClass = card.tapped ? ' tapped' : '';
  const ec = extraClass ? ' ' + extraClass : '';
  const counterEntries = card.counters ? Object.entries(card.counters).filter(([,v]) => v > 0) : [];

  // Check if this card uses devotion
  const devInfo = devotionData ? getDevotionInfo(card) : null;
  const devBadge = devInfo && devotionData ? (() => {
    const currentDev = devotionData[devInfo.color] || 0;
    const met = devInfo.threshold ? currentDev >= devInfo.threshold : false;
    return { color: devInfo.color, current: currentDev, threshold: devInfo.threshold, met };
  })() : null;

  return (
    <div className="card-wrapper"
      data-card-id={card.id}
      onMouseEnter={handleMouseEnter}
      onMouseMove={handleMouseMove}
      onMouseLeave={handleMouseLeave}
      onContextMenu={e => { e.preventDefault(); onContext && onContext(e, card); }}
      style={{ position: 'relative' }}>
      {counterEntries.length > 0 && (
        <div className="card-counters">
          {counterEntries.filter(([type]) => type !== 'loyalty').map(([type, count]) => (
            <span key={type} className="counter-badge">{count > 1 ? count : ''}{type === '+1/+1' ? '+1' : type === '-1/-1' ? '-1' : type.charAt(0).toUpperCase()}</span>
          ))}
        </div>
      )}
      {card.counters && card.counters['loyalty'] !== undefined && (
        <div className="loyalty-badge">{card.counters['loyalty']}</div>
      )}
      {card.exiledBy && (
        <div className="exile-link-badge" title={`Exiled by ${card.exiledBy.name}`}>📎 {card.exiledBy.name}</div>
      )}
      {card.exiledCards && card.exiledCards.length > 0 && (
        <div className="exiled-count-badge" title={`Exiled: ${card.exiledCards.map(c => c.name).join(', ')}`}>📎 {card.exiledCards.length}</div>
      )}
      {(card.damagePrevented !== undefined && card.damagePrevented !== false) && (
        <div style={{
          position: 'absolute', top: -4, right: -4, zIndex: 6,
          background: 'rgba(40,120,200,0.95)', color: '#fff', fontSize: 8, padding: '1px 5px',
          borderRadius: 6, fontWeight: 700, whiteSpace: 'nowrap',
          boxShadow: '0 1px 4px rgba(0,0,0,0.5)', border: '1px solid rgba(100,180,255,0.5)',
        }} title="All damage prevented until next turn">🛡 No Dmg</div>
      )}
      {card.originalOwner !== undefined && (
        <div style={{
          position: 'absolute', top: -4, left: -4, zIndex: 6,
          background: card.temporaryControl ? 'rgba(220,60,60,0.95)' : 'rgba(60,60,220,0.95)',
          color: '#fff', fontSize: 8, padding: '1px 5px', borderRadius: 6,
          fontWeight: 700, whiteSpace: 'nowrap',
          boxShadow: '0 1px 4px rgba(0,0,0,0.5)',
          border: card.temporaryControl ? '1px solid rgba(255,100,100,0.4)' : '1px solid rgba(100,100,255,0.4)',
        }} title={card.temporaryControl ? 'Temporary control — returns at end of turn' : 'Permanent control change'}>
          {card.temporaryControl ? '⏳ Stolen' : '🔀 Controlled'}
        </div>
      )}
      {devBadge && (
        <div style={{
          position: 'absolute', bottom: 2, left: 2, zIndex: 5,
          background: devBadge.met ? 'rgba(60,180,60,0.95)' : 'rgba(0,0,0,0.9)',
          color: devBadge.met ? '#fff' : (devBadge.color === 'B' ? '#a090b0' : MANA_COLORS_CSS[devBadge.color]),
          fontSize: 9, padding: '1px 5px', borderRadius: 6,
          border: devBadge.met ? '1px solid rgba(100,220,100,0.5)' : `1px solid ${devBadge.color === 'B' ? 'rgba(160,140,180,0.4)' : MANA_COLORS_CSS[devBadge.color] + '66'}`,
          fontWeight: 700, whiteSpace: 'nowrap',
          boxShadow: devBadge.met ? '0 0 6px rgba(60,180,60,0.4)' : '0 1px 3px rgba(0,0,0,0.5)',
        }}
          title={`Devotion to ${devBadge.color}: ${devBadge.current}${devBadge.threshold ? ' / ' + devBadge.threshold + ' needed' : ''}`}>
          {MANA_SYMBOLS[devBadge.color]}{devBadge.current}{devBadge.threshold ? `/${devBadge.threshold}` : ''}{devBadge.met ? ' ✓' : ''}
        </div>
      )}
      {card.isToken ? (
        card.tokenImageSmall ? (
          <img
            className={`card-img${tappedClass}${ec}`}
            src={card.tokenImageSmall}
            alt={getDisplayName(card)}
            style={{ height: size * 1.4, width: size }}
            onClick={() => onClick && onClick(card)}
          />
        ) : (
          <div className={`token-card${tappedClass}${ec}`}
            style={{ width: size, height: size * 1.4 }}
            onClick={() => onClick && onClick(card)}>
            {card.power !== undefined && <div className="token-pt">{card.power}/{card.toughness}</div>}
            <div className="token-name">{getDisplayName(card)}</div>
            <div className="token-types">{card.keywords?.join(', ')}</div>
          </div>
        )
      ) : (
        <CardImg card={card} size="normal"
          className={`card-img${tappedClass}${ec}`}
          alt={getDisplayName(card)}
          style={{ height: size * 1.4, width: size }}
          onClick={() => onClick && onClick(card)}
        />
      )}
      {card._reskin?.customName && (
        <div style={{
          position: 'absolute',
          bottom: card.isToken ? 2 : (showPreview && hasBasePT(card) ? 18 : (isPlaneswalker(card) ? 22 : 2)),
          left: 2, right: 2, zIndex: 15,
          background: 'rgba(0,0,0,0.8)', color: '#f0d890',
          padding: '1px 4px', borderRadius: 4, fontSize: 8, fontWeight: 700,
          border: '1px solid rgba(200,170,60,0.3)', textAlign: 'center',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          pointerEvents: 'none',
        }}>{card._reskin.customName}</div>
      )}
      {showPreview && hasBasePT(card) && isCreature(card) && (() => {
        const ep = getEffectivePower(card, attachments);
        const et = getEffectiveToughness(card, attachments);
        const rawP = String(getBasePower(card) || '0');
        const rawT = String(getBaseToughness(card) || '0');
        const pIsStar = rawP.includes('*');
        const tIsStar = rawT.includes('*');
        const bp = parseInt(rawP) || 0;
        const bt = parseInt(rawT) || 0;
        // Star stats always show as "boosted" style (dynamic), otherwise compare to base
        const pMod = pIsStar ? 'boosted' : (ep > bp ? 'boosted' : ep < bp ? 'reduced' : '');
        const tMod = tIsStar ? 'boosted' : (et > bt ? 'boosted' : et < bt ? 'reduced' : '');
        const anyMod = pMod || tMod;
        const hasTempBuff = card.tempBuffs && (card.tempBuffs.power || card.tempBuffs.toughness);
        const tempKeywords = card.tempBuffs?.keywords || [];
        const attKeywords = attachments.flatMap(a => parseAttachmentBonuses(a).keywords);
        const allExtraKw = [...new Set([...tempKeywords, ...attKeywords])];
        const attStatParts = attachments.map(a => { const b = parseAttachmentBonuses(a); return b.power || b.toughness ? `${a.name}: ${b.power >= 0 ? '+' : ''}${b.power}/${b.toughness >= 0 ? '+' : ''}${b.toughness}` : null; }).filter(Boolean);
        const tempTitle = [
          hasTempBuff ? `Temp: ${card.tempBuffs.power >= 0 ? '+' : ''}${card.tempBuffs.power}/${card.tempBuffs.toughness >= 0 ? '+' : ''}${card.tempBuffs.toughness} (until end of turn)` : '',
          ...attStatParts,
          allExtraKw.length > 0 ? `Keywords: ${allExtraKw.join(', ')}` : '',
        ].filter(Boolean).join(' | ');
        return (
          <div style={{ position: 'absolute', bottom: 0, right: 0, display: 'flex', alignItems: 'center', gap: 1, zIndex: 10 }}>
            {onCounterChange && (
              <button onClick={(e) => { e.stopPropagation(); onCounterChange('-1/-1'); }}
                style={{ width: 14, height: 14, fontSize: 9, lineHeight: '12px', padding: 0, border: '1px solid rgba(220,80,80,0.4)',
                  background: 'rgba(30,20,20,0.9)', color: '#e06060', borderRadius: 3, cursor: 'pointer', fontWeight: 700 }}
                title="Remove +1/+1 or add -1/-1">−</button>
            )}
            <div className={`pt-badge${anyMod ? ' pt-modified' : ''}`}
              style={{
                position: 'relative', bottom: 'auto', right: 'auto',
                ...((hasTempBuff || tempKeywords.length > 0) ? { boxShadow: '0 0 6px rgba(255,200,60,0.6)', borderColor: 'rgba(255,200,60,0.5)' } : {})
              }}
              title={tempTitle}>
              <span className={pMod}>{ep}</span>/<span className={tMod}>{et}</span>
            </div>
            {onCounterChange && (
              <button onClick={(e) => { e.stopPropagation(); onCounterChange('+1/+1'); }}
                style={{ width: 14, height: 14, fontSize: 9, lineHeight: '12px', padding: 0, border: '1px solid rgba(80,180,80,0.4)',
                  background: 'rgba(20,30,20,0.9)', color: '#60c060', borderRadius: 3, cursor: 'pointer', fontWeight: 700 }}
                title="Add +1/+1 counter">+</button>
            )}
          </div>
        );
      })()}
      {/* Keywords badge (temp + from attachments) */}
      {(() => {
        const tempKw = card.tempBuffs?.keywords || [];
        const attKw = attachments.flatMap(a => parseAttachmentBonuses(a).keywords);
        const allKw = [...new Set([...tempKw, ...attKw])];
        if (allKw.length === 0) return null;
        const hasAttKw = attKw.length > 0;
        return (
          <div style={{
            position: 'absolute', bottom: 16, left: 1, right: 1, zIndex: 11,
            background: 'rgba(0,0,0,0.92)', color: hasAttKw ? '#b0e0ff' : '#ffd740',
            padding: '1px 3px', borderRadius: 3, fontSize: 8, fontWeight: 700,
            border: `1px solid ${hasAttKw ? 'rgba(100,180,255,0.4)' : 'rgba(255,215,64,0.4)'}`,
            lineHeight: '11px', pointerEvents: 'none', textAlign: 'center',
            textTransform: 'capitalize', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>{allKw.join(', ')}</div>
        );
      })()}
      {dynamicBadge && (
        <div style={{
          position: 'absolute', top: 2, left: 2, zIndex: 12,
          background: 'rgba(0,0,0,0.88)', color: dynamicBadge.color || '#e8a030',
          padding: '1px 5px', borderRadius: 4, fontSize: 10, fontWeight: 700,
          border: `1px solid ${dynamicBadge.color || '#e8a030'}44`,
          lineHeight: '14px', pointerEvents: 'none',
        }}>{dynamicBadge.label}</div>
      )}
      {showPreview && ReactDOM.createPortal(
        <div className="card-preview" ref={previewElRef} style={{ display: 'none' }}>
          <CardImg card={card} alt={getDisplayName(card)} style={{ height: 363 }} />
          {card._reskin?.customName && (
            <div style={{ textAlign: 'center', color: '#f0d890', fontSize: 13, fontWeight: 700, marginTop: 4 }}>
              {card._reskin.customName}
              <div style={{ fontSize: 10, opacity: 0.5, fontWeight: 400 }}>({card.name})</div>
            </div>
          )}
        </div>,
        document.body
      )}
    </div>
  );
}

// ============ CONTEXT MENU ============
function ContextMenu({ x, y, card, actions, onClose }) {
  const ref = useRef();

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) onClose();
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [onClose]);

  const menuStyle = {
    left: Math.min(x, window.innerWidth - 200),
    top: Math.min(y, window.innerHeight - 300),
  };

  return (
    <div className="context-menu" style={menuStyle} ref={ref}>
      <div style={{ padding: '4px 12px', fontSize: 11, opacity: 0.5 }}>{getDisplayName(card)}{card._reskin ? ` (${card.name})` : ''}</div>
      <div className="sep" />
      {actions.map((action, i) =>
        action.sep ? <div key={i} className="sep" /> :
        <button key={i} onClick={() => { action.fn(); onClose(); }}>{action.label}</button>
      )}
    </div>
  );
}

// ============ VERSION PICKER ============
function VersionPicker({ card, onSelect, onClose }) {
  const [printings, setPrintings] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    scryfallGetPrintings(card).then(data => {
      if (!cancelled) {
        setPrintings(data.filter(p => getCardSmall(p)));
        setLoading(false);
      }
    });
    return () => { cancelled = true; };
  }, [card.id]);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{ maxWidth: 850 }} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-2">
          <div>
            <h2>{card.name}</h2>
            <p className="text-xs opacity-50" style={{ marginTop: 2 }}>
              {loading ? 'Loading printings...' : `${printings.length} versions available — click to add`}
            </p>
          </div>
          <button className="btn" onClick={onClose}>Cancel</button>
        </div>
        {loading ? (
          <div style={{ textAlign: 'center', padding: 40, opacity: 0.5 }}>Loading all printings...</div>
        ) : (
          <div className="version-picker-grid">
            {printings.map(printing => (
              <div key={printing.id} className="version-card" onClick={() => { onSelect(printing); onClose(); }}>
                <img src={getCardSmall(printing)} alt={printing.name} loading="lazy" />
                <div className="version-info">
                  <div className="version-set">{printing.set_name}</div>
                  <div className="version-details">
                    {printing.collector_number} · {printing.rarity?.charAt(0).toUpperCase()}{printing.rarity?.slice(1)}
                    {printing.frame_effects?.includes('extendedart') ? ' · Extended' : ''}
                    {printing.border_color === 'borderless' ? ' · Borderless' : ''}
                    {printing.promo ? ' · Promo' : ''}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ============ DECK BUILDER ============
function DeckChooser({ playerName, onChoosePreset, onPasteList, onBuildCustom, onBack }) {
  const [tab, setTab] = useState('presets'); // presets | paste | saved
  const [pasteText, setPasteText] = useState('');
  const [loadingDeck, setLoadingDeck] = useState(null); // deck name or 'paste'
  const [progress, setProgress] = useState('');
  const [savedDecks, setSavedDecks] = useState(() => getSavedDecks());
  const [confirmDelete, setConfirmDelete] = useState(null); // deck id awaiting delete confirm

  const handleLoadPreset = async (preset) => {
    setLoadingDeck(preset.name);
    setProgress('Parsing...');
    const entries = parseArenaDecklist(preset.list);
    setProgress(`Loading cards: 0/${entries.length}`);
    const { deck, sideboard, skipped } = await loadDeckFromList(entries, (loaded, total) => {
      setProgress(`Loading cards: ${loaded}/${total}`);
    });
    if (skipped.length > 0) {
      setProgress(`Skipped ${skipped.length} unsupported card${skipped.length > 1 ? 's' : ''}: ${skipped.map(s => s.name).join(', ')}`);
      await new Promise(r => setTimeout(r, 2500));
    }
    setLoadingDeck(null);
    onChoosePreset({ deck, sideboard });
  };

  const handleLoadSaved = async (saved) => {
    setLoadingDeck(saved.name);
    setProgress('Parsing...');
    const entries = parseArenaDecklist(saved.listText);
    setProgress(`Loading cards: 0/${entries.length}`);
    const { deck, sideboard, skipped } = await loadDeckFromList(entries, (loaded, total) => {
      setProgress(`Loading cards: ${loaded}/${total}`);
    });
    if (skipped.length > 0) {
      setProgress(`Skipped ${skipped.length} unsupported card${skipped.length > 1 ? 's' : ''}: ${skipped.map(s => s.name).join(', ')}`);
      await new Promise(r => setTimeout(r, 2500));
    }
    setLoadingDeck(null);
    onChoosePreset({ deck, sideboard });
  };

  const handleDeleteSaved = (id) => {
    deleteDeckFromStorage(id);
    setSavedDecks(getSavedDecks());
    setConfirmDelete(null);
  };

  const handlePaste = async () => {
    const entries = parseArenaDecklist(pasteText);
    if (entries.length === 0) return;
    setLoadingDeck('paste');
    setProgress(`Loading cards: 0/${entries.length}`);
    const { deck, sideboard, skipped } = await loadDeckFromList(entries, (loaded, total) => {
      setProgress(`Loading cards: ${loaded}/${total}`);
    });
    if (skipped.length > 0) {
      setProgress(`Skipped ${skipped.length} unsupported card${skipped.length > 1 ? 's' : ''}: ${skipped.map(s => s.name).join(', ')}`);
      await new Promise(r => setTimeout(r, 2500));
    }
    setLoadingDeck(null);
    onPasteList({ deck, sideboard });
  };

  const totalPasteCards = (() => {
    const entries = parseArenaDecklist(pasteText);
    return entries.reduce((s, e) => s + e.qty, 0);
  })();

  return (
    <div className="setup-screen" style={{ maxWidth: 600 }}>
      {onBack && <button className="btn text-xs" onClick={onBack} style={{ marginBottom: 8, opacity: 0.6 }}>← Back</button>}
      <h2 style={{ marginBottom: 4 }}>Choose Deck — {playerName}</h2>
      <p className="text-sm opacity-50" style={{ marginBottom: 16 }}>Pick a preset deck, paste an Arena decklist, or build your own from scratch.</p>

      <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
        <button className={`btn text-xs ${tab === 'presets' ? 'btn-gold' : ''}`}
          onClick={() => setTab('presets')}>Preset Decks</button>
        <button className={`btn text-xs ${tab === 'saved' ? 'btn-gold' : ''}`}
          onClick={() => { setSavedDecks(getSavedDecks()); setTab('saved'); }}>
          My Decks {savedDecks.length > 0 && <span style={{ opacity: 0.5 }}>({savedDecks.length})</span>}
        </button>
        <button className={`btn text-xs ${tab === 'paste' ? 'btn-gold' : ''}`}
          onClick={() => setTab('paste')}>Paste Decklist</button>
      </div>

      {loadingDeck && (
        <div style={{ padding: 20, textAlign: 'center' }}>
          <div style={{ fontSize: 14, color: '#d4b44a', marginBottom: 6 }}>
            {loadingDeck === 'paste' ? 'Loading pasted deck...' : `Loading ${loadingDeck}...`}
          </div>
          <div className="text-xs opacity-50">{progress}</div>
        </div>
      )}

      {!loadingDeck && tab === 'presets' && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {[1, 2].map(level => {
            const decksAtLevel = PRESET_DECKS.filter(p => (p.level || 1) === level);
            if (decksAtLevel.length === 0) return null;
            return (
              <React.Fragment key={level}>
                <div style={{
                  display: 'flex', alignItems: 'center', gap: 8, marginTop: level > 1 ? 12 : 0, marginBottom: 4,
                }}>
                  <span style={{
                    fontSize: 10, fontWeight: 800, textTransform: 'uppercase', letterSpacing: 1.5,
                    color: level === 1 ? 'rgba(200,170,60,0.5)' : 'rgba(160,120,255,0.6)',
                    background: level === 1 ? 'rgba(200,170,60,0.08)' : 'rgba(160,120,255,0.08)',
                    padding: '2px 8px', borderRadius: 6,
                  }}>
                    Level {level}
                  </span>
                  <span style={{ fontSize: 10, opacity: 0.3 }}>
                    {level === 1 ? 'Mono-color starter decks' : 'Multicolor advanced decks'}
                  </span>
                </div>
                {decksAtLevel.map(preset => {
                  const entries = parseArenaDecklist(preset.list);
                  const total = entries.reduce((s, e) => s + e.qty, 0);
                  const levelColor = (preset.level || 1) === 2 ? '#a078ff' : '#d4b44a';
                  return (
                    <div key={preset.name} onClick={() => handleLoadPreset(preset)}
                      style={{
                        padding: '12px 16px', borderRadius: 8, cursor: 'pointer',
                        background: 'linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02))',
                        border: '1px solid rgba(255,255,255,0.06)',
                        transition: 'all 0.2s',
                      }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = `${levelColor}44`; e.currentTarget.style.background = `${levelColor}0d`; }}

                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <span style={{ fontWeight: 700, fontSize: 14, color: levelColor }}>{preset.name}</span>
                        <span className="text-xs opacity-40">{total} cards</span>
                      </div>
                      <div className="text-xs opacity-50" style={{ marginTop: 3 }}>{preset.description}</div>
                    </div>
                  );
                })}
              </React.Fragment>
            );
          })}
        </div>
      )}

      {!loadingDeck && tab === 'saved' && (
        <div>
          {savedDecks.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '40px 20px' }}>
              <div style={{ fontSize: 32, marginBottom: 12, opacity: 0.3 }}>&#x1F4BE;</div>
              <div style={{ fontSize: 14, opacity: 0.5, marginBottom: 8 }}>No saved decks yet</div>

                Load a preset or paste a decklist, then save it for quick access in future games.

            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {savedDecks.map(saved => {
                const entries = parseArenaDecklist(saved.listText);
                const totalCards = entries.filter(e => !e.inSideboard).reduce((s, e) => s + e.qty, 0);

                      <div style={{ flex: 1, cursor: 'pointer' }} onClick={() => handleLoadSaved(saved)}>
                        <span style={{ fontWeight: 700, fontSize: 14, color: '#7cb8ff' }}>{saved.name}</span>
                        <div className="text-xs" style={{ opacity: 0.4, marginTop: 2 }}>

                      </div>
                      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>

        <div>

function DeckBuilder({ playerName, onDone, existingDeck, onBack }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [deck, setDeck] = useState(existingDeck || []);
  const [suggestions, setSuggestions] = useState([]);
  const [pickingVersion, setPickingVersion] = useState(null);
  const searchTimeout = useRef(null);
  const inputRef = useRef();

  const doSearch = async () => {
    if (!query.trim()) return;
    setLoading(true);
    const cards = await scryfallSearch(query);
    setResults(cards);
    setLoading(false);
  };

  const handleQueryChange = (val) => {
    setQuery(val);
    if (searchTimeout.current) clearTimeout(searchTimeout.current);
    searchTimeout.current = setTimeout(async () => {
      const s = await scryfallAutocomplete(val);
      setSuggestions(s);
    }, 200);
  };

  // Track last added version per card name, so re-adding uses same version
  const lastAddedVersions = useRef({});

  const addCard = (card) => {
    lastAddedVersions.current[card.name] = card;
    setDeck(prev => {
      const existing = prev.find(e => e.card.id === card.id);
      if (existing) {
        const isBasicLand = card.type_line?.toLowerCase().includes('basic land');
        if (!isBasicLand && existing.qty >= 4) return prev;
        return prev.map(e => e.card.id === card.id ? { ...e, qty: e.qty + 1 } : e);
      }
      return [...prev, { card, qty: 1 }];
    });
  };

  const addOneMore = (cardId) => {
    setDeck(prev => {
      const entry = prev.find(e => e.card.id === cardId);
      if (!entry) return prev;
      const isBasicLand = entry.card.type_line?.toLowerCase().includes('basic land');
      if (!isBasicLand && entry.qty >= 4) return prev;
      return prev.map(e => e.card.id === cardId ? { ...e, qty: e.qty + 1 } : e);
    });
  };

  const removeOne = (cardId) => {
    setDeck(prev => {
      const entry = prev.find(e => e.card.id === cardId);
      if (!entry) return prev;
      if (entry.qty > 1) return prev.map(e => e.card.id === cardId ? { ...e, qty: e.qty - 1 } : e);
      return prev.filter(e => e.card.id !== cardId);
    });
  };

  const removeCard = (cardId) => {
    setDeck(prev => prev.filter(e => e.card.id !== cardId));
  };

  const totalCards = deck.reduce((sum, e) => sum + e.qty, 0);
  const creatures = deck.filter(e => isCreature(e.card)).reduce((s, e) => s + e.qty, 0);
  const lands = deck.filter(e => isLand(e.card)).reduce((s, e) => s + e.qty, 0);
  const spells = totalCards - creatures - lands;

  return (
    <div className="deck-builder">
      <div className="search-panel">
        <div>
          {onBack && <button className="btn text-xs" onClick={onBack} style={{ marginBottom: 8, opacity: 0.6 }}>← Back</button>}
          <h2 style={{ marginBottom: 4 }}>Deck Builder — {playerName}</h2>
          <p className="text-sm opacity-50">Search Scryfall for cards and build your 60-card deck · <span style={{ color: '#ffd700' }}>Historic format</span></p>
        </div>
        <div className="flex gap-2">
          <input ref={inputRef} value={query} onChange={e => handleQueryChange(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && doSearch()}
            placeholder="Search cards... (e.g. 'lightning bolt', 't:creature c:blue', 'shark') — Historic legal only"
            style={{ flex: 1 }} />
          <button className="btn btn-primary" onClick={doSearch} disabled={loading}>
            {loading ? 'Searching...' : 'Search'}
          </button>
        </div>
        {suggestions.length > 0 && query.length >= 2 && (
          <div className="flex gap-1" style={{ flexWrap: 'wrap' }}>
            {suggestions.slice(0, 8).map(s => (
              <button key={s} className="btn text-xs" onClick={() => { setQuery(s); setSuggestions([]); }}>
                {s}
              </button>
            ))}
          </div>
        )}
        <div className="search-results">
          {results.map(card => {
            const img = getCardSmall(card);
            if (!img) return null;
            return (
              <div key={card.id} className="search-card" onClick={() => setPickingVersion(card)}>
                <img src={img} alt={card.name} loading="lazy" />
                <button className="add-btn" title="Quick add (uses last chosen version)" onClick={e => {
                  e.stopPropagation();
                  const remembered = lastAddedVersions.current[card.name];
                  addCard(remembered || card);
                }}>+</button>
              </div>
            );
          })}
          {results.length === 0 && !loading && (
            <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: 40, opacity: 0.4 }}>
              Search for cards to add to your deck.<br/>
              Use Scryfall syntax: t:creature, c:blue, cmc:3, etc.
            </div>
          )}
        </div>

        {pickingVersion && (
          <VersionPicker
            card={pickingVersion}
            onSelect={(printing) => addCard(printing)}
            onClose={() => setPickingVersion(null)}
          />
        )}
      </div>
      <div className="deck-panel">
        <div className="flex items-center justify-between">
          <h3>Deck ({totalCards}/60)</h3>
        </div>
        <div className="text-xs opacity-50" style={{ marginBottom: 4 }}>
          {creatures} creatures · {lands} lands · {spells} spells
        </div>
        <div className="deck-list">
          {deck.sort((a, b) => {
            const typeOrder = (c) => isLand(c) ? 2 : isCreature(c) ? 0 : 1;
            return typeOrder(a.card) - typeOrder(b.card) || a.card.name.localeCompare(b.card.name);
          }).map(entry => (
            <div key={entry.card.id} className="deck-entry">
              <button className="qty-btn" onClick={() => removeOne(entry.card.id)}>−</button>
              <span className="qty">{entry.qty}x</span>
              <button className="qty-btn" onClick={() => addOneMore(entry.card.id)}>+</button>
              <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', marginLeft: 4 }}
                title={`${entry.card.set_name} — ${entry.card.collector_number}`}>
                {entry.card.name}
              </span>
              <span className="remove" onClick={() => removeCard(entry.card.id)} title="Remove all">✕</span>
            </div>
          ))}
        </div>
        <div style={{ borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: 8, marginTop: 8 }}>
          <button className="btn btn-gold" style={{ width: '100%' }}
            onClick={() => onDone(deck)} disabled={totalCards < 1}>
            Done ({totalCards} cards)
          </button>
          <p className="text-xs opacity-50" style={{ marginTop: 4, textAlign: 'center' }}>
            {totalCards < 60 ? `Add ${60 - totalCards} more for a standard deck` : totalCards > 60 ? `${totalCards - 60} over the 60-card minimum` : 'Perfect! 60 cards'}
          </p>
        </div>
      </div>
    </div>
  );
}

// ============ ERROR BOUNDARY ============
class GameErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, errorInfo: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, errorInfo) {
    console.error('GameBoard crash caught by error boundary:', error, errorInfo);
    this.setState({ errorInfo });
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {
        style: {
          position: 'fixed', inset: 0, display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center', background: '#1a1520',
          color: '#e8e0d0', fontFamily: "'Segoe UI', sans-serif", padding: 40, zIndex: 99999,
        }
      },
        React.createElement('div', { style: { fontSize: 48, marginBottom: 16 } }, '\u26A0\uFE0F'),
        React.createElement('h2', { style: { margin: '0 0 12px', color: '#d4b44a' } }, 'Game Error'),
        React.createElement('p', { style: { margin: '0 0 8px', opacity: 0.7, textAlign: 'center', maxWidth: 500 } },
          'Something went wrong during gameplay. This can happen with certain card interactions.'),
        React.createElement('p', { style: { margin: '0 0 24px', opacity: 0.5, fontSize: 12, textAlign: 'center', maxWidth: 500 } },
          String(this.state.error || 'Unknown error')),
        React.createElement('div', { style: { display: 'flex', gap: 12 } },
          React.createElement('button', {
            onClick: () => this.setState({ hasError: false, error: null, errorInfo: null }),
            style: {
              padding: '10px 28px', background: 'rgba(200,170,60,0.2)', border: '1px solid rgba(200,170,60,0.4)',
              color: '#d4b44a', borderRadius: 8, cursor: 'pointer', fontSize: 14, fontWeight: 600,
            }
          }, '\u{1F504} Try to Resume'),
          React.createElement('button', {
            onClick: () => { if (this.props.onExit) this.props.onExit(); },
            style: {
              padding: '10px 28px', background: 'rgba(220,60,60,0.15)', border: '1px solid rgba(220,60,60,0.3)',
              color: '#e88', borderRadius: 8, cursor: 'pointer', fontSize: 14,
            }
          }, '\u{1F3E0} Exit Game')
        )
      );
    }
    return this.props.children;
  }
}

// ============ GAME BOARD ============
function GameBoard({ players, decks, avatars, onExit, gameFormat, commanders: initCommanders,
                     onlineMode, onlinePlayerIndex, onlineState, onlineLastAction, onStateChange,
                     matchInfo, onGameWon, onConcede, concession, serverGameAction }) {
  // ═══════════════════════════════════════════════════════════════
  // GAMEBOARD SECTION INDEX
  // ═══════════════════════════════════════════════════════════════
  // 1. State Declarations & Sync Registry ........... ~line 3268
  // 2. Online Sync: Broadcast & Receive ............. ~line 3482
  // 3. Mulligan System .............................. ~line 3412
  // 4. Card Movement & Zone Transfers ............... ~line 3761
  // 5. Mana System & Costs .......................... ~line 6280
  // 6. Spell Casting & Stack ........................ ~line 6326
  // 7. Combat System ................................ ~line 7003
  // 8. Turn & Phase Management ...................... ~line 6918
  // 9. Context Menu Actions ......................... ~line 5023
  // 10. Trigger System (ETB/LTB) .................... ~line 5479
  // 11. Render (JSX) ................................ ~line 8584
  // ═══════════════════════════════════════════════════════════════

  const isCommander = gameFormat === 'commander';
  const startingLife = isCommander ? GAME_CONSTANTS.COMMANDER_LIFE : GAME_CONSTANTS.STARTING_LIFE;

  const initPlayerState = (deckEntries, name, commanderCard) => {
    const allCards = [];
    deckEntries.forEach(entry => {
      for (let i = 0; i < entry.qty; i++) {
        const card = { ...entry.card, id: uid(), tapped: false, counters: {}, enteredThisTurn: false };
        // Preserve reskin data
        if (entry.card._reskin) card._reskin = entry.card._reskin;
        // In Commander, the commander starts in command zone, not library
        if (isCommander && commanderCard && entry.card.name === commanderCard.name) {
          // Skip first copy — it goes to command zone
          if (!allCards._commanderAdded) {
            allCards._commanderAdded = true;
            continue;
          }
        }
        allCards.push(card);
      }
    });
    delete allCards._commanderAdded;
    const shuffled = shuffle(allCards);
    const cmdZone = [];
    if (isCommander && commanderCard) {
      cmdZone.push({ ...commanderCard, id: uid(), tapped: false, counters: {}, enteredThisTurn: false });
    }
    return {
      name,
      life: startingLife,
      poison: 0,
      library: shuffled.slice(7),
      hand: shuffled.slice(0, 7),
      battlefield: [],
      graveyard: [],
      exile: [],
      commandZone: cmdZone,
      manaPool: { W: 0, U: 0, B: 0, R: 0, G: 0, C: 0 },
      landPlayedThisTurn: false,
      dealtDamageThisTurn: false,
      commanderCastCount: 0,
      commanderDamageReceived: {},
      emblems: [],
      untilNextTurnEffects: [],
    };
  };

  // Online mode: convert server state to client state format
  const initOnlinePlayerState = (serverPlayer, name) => ({
    name: name || serverPlayer.nickname || 'Player',
    life: serverPlayer.life ?? 20,
    poison: serverPlayer.poison ?? 0,
    library: serverPlayer.library || [],
    hand: serverPlayer.hand || [],
    battlefield: serverPlayer.battlefield || [],
    graveyard: serverPlayer.graveyard || [],
    exile: serverPlayer.exile || [],
    commandZone: serverPlayer.commandZone || [],
    manaPool: serverPlayer.manaPool || { W: 0, U: 0, B: 0, R: 0, G: 0, C: 0 },
    landPlayedThisTurn: serverPlayer.landPlayedThisTurn ?? false,
    dealtDamageThisTurn: serverPlayer.dealtDamageThisTurn ?? false,
    commanderCastCount: serverPlayer.commanderCastCount ?? 0,
    commanderDamageReceived: serverPlayer.commanderDamageReceived || {},
    emblems: serverPlayer.emblems || [],
    untilNextTurnEffects: serverPlayer.untilNextTurnEffects || [],
    // Online-specific: track opponent hand count when hand is hidden
    handCount: serverPlayer.handCount,
    libraryCount: serverPlayer.libraryCount,
  });

  const [p1, setP1] = useState(() => {
    if (onlineMode && onlineState?.players?.[0]) {
      return initOnlinePlayerState(onlineState.players[0], players[0]);
    }
    return initPlayerState(decks[0], players[0], initCommanders?.[0]);
  });
  const [p2, setP2] = useState(() => {
    if (onlineMode && onlineState?.players?.[1]) {
      return initOnlinePlayerState(onlineState.players[1], players[1]);
    }
    return initPlayerState(decks[1], players[1], initCommanders?.[1]);
  });
  const [startingPlayer] = useState(() => {
    if (onlineMode && onlineState?.activePlayer !== undefined) return onlineState.activePlayer;
    return Math.random() < 0.5 ? 0 : 1;
  });
  // ═══════════════════════════════════════════════════════════════════
  // ONLINE STATE SYNC REGISTRY
  // ═══════════════════════════════════════════════════════════════════
  // All game state that must sync in online multiplayer uses this pattern:
  //   const [state, _setState] = useState(initial);     // raw setter
  //   const setState = syncSetter(_setState);            // wrapped setter
  //
  // The syncSetter wrapper triggers a broadcast to the opponent whenever
  // state changes in online mode. Receivers use raw _setState to avoid
  // re-broadcasting (echo prevention).
  //
  // ── SYNCED STATE (16 variables): ──────────────────────────────────
  //   activePlayer, instantCasting, librarySearch, endOfTurnRespond,
  //   mulliganPhase, mulliganCounts, mulliganPlayer,
  //   turnCount, currentPhase, combatState, preventCombatDamage,
  //   spellStack, sacCounterChoice, pwAbilityOnStack, pwReminder, searchExile,
  //   p1/p2 (via setState wrapper)
  //
  // ── BROADCAST PAYLOAD: onStateChange({...}) ───────────────────────
  //   All synced variables + players array. See ~50 lines below.
  //
  // ── RECEIVER: useEffect on onlineState ────────────────────────────
  //   Uses raw _setXxx to update without triggering rebroadcast.
  //   Echo detection via onlineLastAction.by (NOT a boolean flag).
  //
  // ── ADDING NEW SYNCED STATE: ──────────────────────────────────────
  //   1. Declare with raw setter: const [x, _setX] = useState(init)
  //   2. Wrap: const setX = syncSetter(_setX)
  //   3. Add to broadcast payload (onStateChange block below)
  //   4. Add receiver: if (onlineState.x !== undefined) _setX(onlineState.x)
  //   5. Add "// SYNCED" comment on the useState line
  // ═══════════════════════════════════════════════════════════════
  // §1. STATE DECLARATIONS & SYNC REGISTRY
  // ═══════════════════════════════════════════════════════════════
  const syncSetter = (rawSetter) => (v) => {
    rawSetter(v);
    if (onlineMode && onlineSyncNeededRef) onlineSyncNeededRef.current = true;
  };

  const [activePlayer, _setActivePlayer] = useState(startingPlayer); // SYNCED
  const setActivePlayer = syncSetter(_setActivePlayer);

  // Online mode: perspective mapping — you always see yourself at bottom
  const bottomPlayerIdx = onlineMode ? onlinePlayerIndex : 0;
  const topPlayerIdx = onlineMode ? (onlinePlayerIndex === 0 ? 1 : 0) : 1;
  const [contextMenu, setContextMenu] = useState(null);
  const [showTokenCreator, setShowTokenCreator] = useState(null);
  const [viewingZone, setViewingZone] = useState(null);
  const [showLibrarySearch, setShowLibrarySearch] = useState(null);
  const [commanderDeathChoice, setCommanderDeathChoice] = useState(null); // { pIdx, card, destination }
  const [peekingHand, setPeekingHand] = useState(null); // { targetPIdx, allowDiscard } — view opponent's hand
  const [instantCasting, _setInstantCasting] = useState(null); // SYNCED — non-active player casting an instant
  const setInstantCasting = syncSetter(_setInstantCasting);
  const [scryView, setScryView] = useState(null); // { pIdx, count, mode: 'scry'|'surveil' }
  const [lookTopView, _setLookTopView] = useState(null); // SYNCED — { pIdx, cards: [], toHand: N, selected: Set }
  const setLookTopView = syncSetter(_setLookTopView);
  const [librarySearch, _setLibrarySearch] = useState(null); // SYNCED — { pIdx, filter, tapped, source }
  const setLibrarySearch = syncSetter(_setLibrarySearch);
  const [putLandFromHand, _setPutLandFromHand] = useState(null); // SYNCED — { pIdx, source } — "you may put a land from your hand onto the battlefield"
  const setPutLandFromHand = syncSetter(_setPutLandFromHand);
  const [endOfTurnRespond, _setEndOfTurnRespond] = useState(false); // SYNCED — waiting for opponent to respond
  const setEndOfTurnRespond = syncSetter(_setEndOfTurnRespond);

  // Mulligan state — London Mulligan: draw 7, then put back cards equal to mulligans taken
  const [mulliganPhase, _setMulliganPhase] = useState(true); // SYNCED
  const [mulliganCounts, _setMulliganCounts] = useState([0, 0]); // SYNCED
  const [mulliganPlayer, _setMulliganPlayer] = useState(startingPlayer); // SYNCED
  const setMulliganPhase = syncSetter(_setMulliganPhase);
  const setMulliganCounts = syncSetter(_setMulliganCounts);
  const setMulliganPlayer = syncSetter(_setMulliganPlayer);

  // ═══════════════════════════════════════════════════════════════
  // §3. MULLIGAN SYSTEM
  // ═══════════════════════════════════════════════════════════════
  const doMulligan = (pIdx) => {
    const newCount = mulliganCounts[pIdx] + 1;
    const drawSize = 7 - newCount;
    if (drawSize <= 0) {
      // Can't mulligan further, keep 0 cards
      setMulliganCounts(prev => { const n = [...prev]; n[pIdx] = newCount; return n; });
      setState(pIdx, prev => ({
        ...prev,
        hand: [],
        library: shuffle([...prev.hand, ...prev.library]),
      }));
      // Move to next player or end mulligan
      if (pIdx === startingPlayer) {
        setMulliganPlayer(startingPlayer === 0 ? 1 : 0);
      } else {
        setMulliganPhase(false);
      }
      return;
    }
    setMulliganCounts(prev => { const n = [...prev]; n[pIdx] = newCount; return n; });
    // Shuffle hand back into library, draw new hand of drawSize
    setState(pIdx, prev => {
      const allCards = shuffle([...prev.hand, ...prev.library]);
      return {
        ...prev,
        hand: allCards.slice(0, drawSize),
        library: allCards.slice(drawSize),
      };

            };
            setState(pIdx, prev => ({ ...prev, battlefield: [...prev.battlefield, token] }));
            addGameLog(pIdx, '\u2726', getDisplayName(card) + ' died: Created ' + x + '/' + x + ' Elemental');
            setCastError({ pIdx, message: '\u2726 ' + getDisplayName(card) + ': Created ' + x + '/' + x + ' Elemental token!' });
            setTimeout(() => setCastError(null), 3000);
            SFX.playCreature();
          }, 800);
        }
      }
    }

    // Handle attachments when a creature leaves the battlefield
    if (from === 'battlefield' && to !== 'battlefield' && isCreature(card)) {
      const attachments = getState(pIdx).battlefield.filter(c => c.attachedTo === card.id);
      if (attachments.length > 0) {
        setState(pIdx, prev => {
          let newBF = prev.battlefield;
          let newGY = [...prev.graveyard];
          for (const att of attachments) {
            if (isAura(att)) {
              // Auras go to graveyard when their creature dies
              newBF = newBF.filter(c => c.id !== att.id);
              newGY.push({ ...att, tapped: false, counters: {}, attachedTo: null });
            } else {
              // Equipment stays on battlefield but detaches
              newBF = newBF.map(c => c.id === att.id ? { ...c, attachedTo: null } : c);
            }
          }
          return { ...prev, battlefield: newBF, graveyard: newGY };
        });
      }
    }

    // Tokens cease to exist when they leave the battlefield (MTG rule)
    if (card.isToken && from === 'battlefield' && to !== 'battlefield') {
      SFX.toGraveyard();
      setState(pIdx, prev => {
        const fromCards = prev[from].filter(c => c.id !== card.id);
        return { ...prev, [from]: fromCards };
      });
      return;
    }

    // Commander: when leaving battlefield to graveyard/exile, offer command zone choice
    if (isCommander && isPlayerCommander(pIdx, card) && from === 'battlefield' && (to === 'graveyard' || to === 'exile')) {
      setCommanderDeathChoice({ pIdx, card, from, destination: to });
      return;
    }

    // Commander: track cast count when cast from command zone
    if (isCommander && from === 'commandZone' && to === 'battlefield') {
      const entryCard = { ...card, tapped: false, enteredThisTurn: true };
      // Set starting loyalty for Planeswalker commanders
      if (isPlaneswalker(entryCard)) {
        const startLoy = getPlaneswalkerStartingLoyalty(entryCard);
        if (startLoy > 0) entryCard.counters = { ...(entryCard.counters || {}), loyalty: startLoy };
      }
      // Auto-tap: check self and opponent effects
      if (checkSelfEntersTapped(card, getState(pIdx).battlefield)) {
        entryCard.tapped = true;
      }
      const opponentIdx = pIdx === 0 ? 1 : 0;
      const isCreatureCard = isCreature(card);
      if (!entryCard.tapped && isCreatureCard) {
        const oppBF = getState(opponentIdx).battlefield;
        for (const oCard of oppBF) {
          const oOracle = [oCard.oracle_text || '', ...(oCard.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
          if (oOracle.includes('creatures your opponents control enter the battlefield tapped') ||
              oOracle.includes('creatures opponents control enter the battlefield tapped') ||
              oOracle.includes('nonland permanents your opponents control enter the battlefield tapped') ||
              oOracle.includes('creatures and nonbasic lands your opponents control enter the battlefield tapped')) {
            entryCard.tapped = true;
            break;
          }
        }
      }
      setState(pIdx, prev => ({
        ...prev,
        commandZone: prev.commandZone.filter(c => c.id !== card.id),
        battlefield: [...prev.battlefield, entryCard],
        commanderCastCount: prev.commanderCastCount + 1,
      }));
      SFX.playCreature();
      if (entryCard.tapped) {
        setCastError({ pIdx, message: `🔄 ${card.name} enters the battlefield tapped` });
        setTimeout(() => setCastError(null), 2000);
      }
      return;
    }

    // Play appropriate sound based on destination
    try {
      if (to === 'battlefield') {
        if (isPlaneswalker(card)) {
          SFX.planeswalkerEnters();
        } else if (isCreature(card) || (card.isToken && card.type_line?.toLowerCase().includes('creature'))) {
          SFX.playCreature();
        } else if (isLand(card)) {
          SFX.playLand();
        } else {
          SFX.playSpell();
        }
      } else if (to === 'graveyard') {
        SFX.toGraveyard();
      } else if (to === 'exile') {
        SFX.toExile();
      } else if (to === 'hand') {
        SFX.draw();
      }
    } catch(e) {}

    // Log zone moves for opponent visibility (skip bounce/discard which log above)
    const zoneLabels = { battlefield: 'battlefield', graveyard: 'graveyard', exile: 'exile', hand: 'hand', library: 'library', commandZone: 'command zone' };
    const fromLabel = zoneLabels[from] || from;
    const toLabel = zoneLabels[to] || to;
    const cardName = card.name || 'a card';
    if (from === 'battlefield' && to === 'graveyard') {
      addGameLog(pIdx, '💀', `${cardName} → graveyard`);
    } else if (from === 'battlefield' && to === 'exile') {
      addGameLog(pIdx, '🚫', `${cardName} → exile`);
    } else if (from === 'battlefield' && to === 'hand') {
      // bounce already logged above for online mode — only log if not already handled
    } else if (from === 'graveyard' && to === 'battlefield') {
      addGameLog(pIdx, '♻️', `${cardName} returned from graveyard to battlefield`);
    } else if (from === 'graveyard' && to === 'hand') {
      addGameLog(pIdx, '♻️', `${cardName} returned from graveyard to hand`);
    } else if (from === 'exile' && to === 'battlefield') {
      addGameLog(pIdx, '♻️', `${cardName} returned from exile to battlefield`);
    } else if (from === 'graveyard' && to === 'exile') {
      addGameLog(pIdx, '🚫', `${cardName} exiled from graveyard`);
    }

    // Stolen card leaving battlefield → goes to original owner's zone
    if (from === 'battlefield' && to !== 'battlefield' && card.originalOwner !== undefined && card.originalOwner !== pIdx) {
      const owner = card.originalOwner;
      const movedCard = { ...card, tapped: false };
      movedCard.counters = {};
      delete movedCard.temporaryControl;
      delete movedCard.originalOwner;
      if (movedCard.grantedHaste) {
        movedCard.keywords = (movedCard.keywords || []).filter(k => k.toLowerCase() !== 'haste');
        delete movedCard.grantedHaste;
      }
      if (movedCard.animatedCreature) {
        delete movedCard.animatedCreature;
        delete movedCard.power;
        delete movedCard.toughness;
        delete movedCard.keywords;
      }
      // Remove from current controller's battlefield
      setState(pIdx, prev => ({ ...prev, battlefield: prev.battlefield.filter(c => c.id !== card.id) }));
      // Add to original owner's destination zone
      setState(owner, prev => ({ ...prev, [to]: [...prev[to], movedCard] }));
      return;
    }

    setState(pIdx, prev => {
      try {
      const fromCards = prev[from] ? prev[from].filter(c => c.id !== card.id) : [];
      const movedCard = { ...card, tapped: false, enteredThisTurn: to === 'battlefield' };
      // Ensure movedCard has essential properties for rendering
      if (!movedCard.id) movedCard.id = uid();
      if (!movedCard.counters) movedCard.counters = {};
      // Clear counters and creature-land state when leaving the battlefield
      if (from === 'battlefield') {
        movedCard.counters = {};
        if (movedCard.animatedCreature) {
          delete movedCard.animatedCreature;
          delete movedCard.power;
          delete movedCard.toughness;
          delete movedCard.keywords;
        }
      }
      // Set starting loyalty when a Planeswalker enters the battlefield (Vorinclex doubles this)
      if (to === 'battlefield' && isPlaneswalker(movedCard)) {
        const startingLoyalty = getPlaneswalkerStartingLoyalty(movedCard);
        if (startingLoyalty > 0) {
          const modifiedLoyalty = applyVorinclexModifier(pIdx, startingLoyalty);
          movedCard.counters = { ...(movedCard.counters || {}), loyalty: modifiedLoyalty };
          if (modifiedLoyalty !== startingLoyalty) {
            addGameLog(pIdx, '⚡', `Vorinclex: ${movedCard.name} enters with ${modifiedLoyalty} loyalty instead of ${startingLoyalty}`);
          }
        }
      }
      // === Auto-tap: "enters the battlefield tapped" ===
      if (to === 'battlefield') {
        const selfEntersTapped = checkSelfEntersTapped(movedCard, prev.battlefield || []);
        // Check opponent's battlefield for effects that force our stuff to enter tapped
        const opponentIdx = pIdx === 0 ? 1 : 0;
        const isCreatureCard = isCreature(movedCard) || (movedCard.isToken && (movedCard.type_line || '').toLowerCase().includes('creature'));
        let externalTapReason = null;
        if (isCreatureCard) {
          const oppBF = getState(opponentIdx).battlefield || [];
          for (const oCard of oppBF) {
            const oOracle = [oCard.oracle_text || '', ...(oCard.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
            if (oOracle.includes('creatures your opponents control enter the battlefield tapped') ||
                oOracle.includes('creatures opponents control enter the battlefield tapped') ||
                oOracle.includes('nonland permanents your opponents control enter the battlefield tapped')) {
              externalTapReason = oCard.name;
              break;
            }
          }
        }
        // Also check for "nonland permanents enter tapped" from opponent (Archon of Emeria pattern)
        if (!externalTapReason && !isLand(movedCard)) {
          const oppBF = getState(opponentIdx).battlefield || [];
          for (const oCard of oppBF) {
            const oOracle = [oCard.oracle_text || '', ...(oCard.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
            if (oOracle.includes('nonland permanents your opponents control enter the battlefield tapped')) {
              externalTapReason = oCard.name;
              break;
            }
          }
        }
        // Thalia, Heretic Cathar: "Creatures and nonbasic lands your opponents control enter the battlefield tapped"
        if (!externalTapReason) {
          const oppBF = getState(opponentIdx).battlefield || [];
          for (const oCard of oppBF) {
            const oOracle = [oCard.oracle_text || '', ...(oCard.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
            if (oOracle.includes('creatures and nonbasic lands your opponents control enter the battlefield tapped')) {
              if (isCreatureCard || (isLand(movedCard) && !(movedCard.type_line || '').toLowerCase().includes('basic'))) {
                externalTapReason = oCard.name;
                break;
              }
            }
          }
        }
        if (selfEntersTapped || externalTapReason) {
          movedCard.tapped = true;
        }
      }
      const toCards = [...(prev[to] || []), movedCard];
      return { ...prev, [from]: fromCards, [to]: toCards };
      } catch (err) {
        console.error('moveCard setState error:', err, { from, to, card: card?.name });
        return prev; // Return unchanged state on error
      }
    });

    // Auto-tap notification (runs after setState to show message)
    if (to === 'battlefield') {
      setTimeout(() => { try {
        const selfEntersTapped = checkSelfEntersTapped(card, getState(pIdx).battlefield || []);
        const opponentIdx = pIdx === 0 ? 1 : 0;
        const isCreatureCard = isCreature(card) || (card.isToken && (card.type_line || '').toLowerCase().includes('creature'));
        let externalTapReason = null;
        if (!selfEntersTapped) {
          const oppBF = getState(opponentIdx).battlefield || [];
          for (const oCard of oppBF) {
            const oOracle = [oCard.oracle_text || '', ...(oCard.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
            if (isCreatureCard && (oOracle.includes('creatures your opponents control enter the battlefield tapped') ||
                oOracle.includes('creatures opponents control enter the battlefield tapped') ||
                oOracle.includes('nonland permanents your opponents control enter the battlefield tapped'))) {
              externalTapReason = oCard.name; break;
            }
            if (!isLand(card) && oOracle.includes('nonland permanents your opponents control enter the battlefield tapped')) {
              externalTapReason = oCard.name; break;
            }
            if (oOracle.includes('creatures and nonbasic lands your opponents control enter the battlefield tapped')) {
              if (isCreatureCard || (isLand(card) && !(card.type_line || '').toLowerCase().includes('basic'))) {
                externalTapReason = oCard.name; break;
              }
            }
          }
        }
        if (selfEntersTapped) {
          setCastError({ pIdx, message: `🔄 ${card.name} enters the battlefield tapped` });
          setTimeout(() => setCastError(null), 2000);
        } else if (externalTapReason) {
          setCastError({ pIdx, message: `🔄 ${card.name} enters tapped (${externalTapReason})` });
          setTimeout(() => setCastError(null), 2500);
        }
      } catch(e) { console.error('Auto-tap notification error:', e); } }, 50);
    }

    // Legendary Rule: if two legendaries with same name, player must sacrifice one
    if (to === 'battlefield') {
      setTimeout(() => {
        const st = getState(pIdx);
        const typeLine = (card.type_line || '').toLowerCase();
        if (!typeLine.includes('legendary')) return;
        const cardName = (card.name || '').toLowerCase();
        const dupes = st.battlefield.filter(c => (c.type_line || '').toLowerCase().includes('legendary') && (c.name || '').toLowerCase() === cardName);
        if (dupes.length > 1) {
          setCastError({ pIdx, message: `⚠️ LEGENDARY RULE: You control ${dupes.length}x ${card.name} — sacrifice one!` });
          setTimeout(() => setCastError(null), 4000);
        }
      }, 150);
    }
  };

  const drawCard = (pIdx) => {
    const p = getState(pIdx);
    if (p.library.length === 0) {
      // Drawing from empty library = lose the game
      const opponent = getState(pIdx === 0 ? 1 : 0);
      if (!gameOver) {
        // Clear any overlays that would stack on top of the game-over screen
        setEndOfTurnRespond(false);
        setInstantCasting(null);
        setSpellTargeting(null);
        setAbilityTargeting(null);
        setModalChoice(null);
        setGameOver({ winner: opponent.name, loser: p.name, reason: `${p.name} tried to draw from an empty library` });
      }
      return;
    }
    SFX.draw();
    setState(pIdx, prev => {
      if (prev.library.length === 0) return prev;
      const card = prev.library[0];
      return { ...prev, library: prev.library.slice(1), hand: [...prev.hand, card] };
    });
  };

  const shuffleLibrary = (pIdx) => {
    SFX.shuffle();
    setState(pIdx, prev => ({ ...prev, library: shuffle(prev.library) }));
  };

  // Gain control of a card: move from one player's battlefield to another's
  const gainControl = (fromPIdx, toPIdx, card, temporary = false) => {
    setState(fromPIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.filter(c => c.id !== card.id),
    }));
    const controlledCard = { ...card, originalOwner: card.originalOwner ?? fromPIdx };
    if (temporary) {
      controlledCard.temporaryControl = true;
      controlledCard.tapped = false; // Untap (Claim the Firstborn, Act of Treason)
      // Grant haste for temporary control
      if (!controlledCard.keywords) controlledCard.keywords = [];
      if (!controlledCard.keywords.some(k => k.toLowerCase() === 'haste')) {
        controlledCard.grantedHaste = true;
        controlledCard.keywords = [...controlledCard.keywords, 'Haste'];
      }
    }
    setState(toPIdx, prev => ({
      ...prev,
      battlefield: [...prev.battlefield, controlledCard],
    }));
    const label = temporary ? '🔀 Temporary control' : '🔀 Gained control';
    setCastError({ pIdx: toPIdx, message: `${label} of ${card.name}` });
    setTimeout(() => setCastError(null), 2000);
  };

  // Return temporarily controlled cards at end of turn
  const returnTemporaryControl = () => {
    [0, 1].forEach(pIdx => {
      const st = getState(pIdx);
      const tempCards = st.battlefield.filter(c => c.temporaryControl);
      if (tempCards.length === 0) return;
      tempCards.forEach(card => {
        const owner = card.originalOwner ?? (pIdx === 0 ? 1 : 0);
        const returnedCard = { ...card };
        delete returnedCard.temporaryControl;
        delete returnedCard.originalOwner;
        if (returnedCard.grantedHaste) {
          returnedCard.keywords = (returnedCard.keywords || []).filter(k => k.toLowerCase() !== 'haste');
          delete returnedCard.grantedHaste;
        }
        returnedCard.tapped = true; // Returns tapped
        setState(pIdx, prev => ({
          ...prev,
          battlefield: prev.battlefield.filter(c => c.id !== card.id),
        }));
        setState(owner, prev => ({
          ...prev,
          battlefield: [...prev.battlefield, returnedCard],
        }));
        setCastError({ pIdx: owner, message: `🔙 ${card.name} returned to ${getState(owner).name}` });
        setTimeout(() => setCastError(null), 2500);
      });
    });
  };

  // ═══════════════════════════════════════════════════════════════
  // §5. MANA SYSTEM & COSTS
  // ═══════════════════════════════════════════════════════════════
  const [manaChoice, setManaChoice] = useState(null); // { pIdx, colors, cardId }

  const addManaToPool = (pIdx, color) => {
    setState(pIdx, prev => ({
      ...prev,
      manaPool: { ...prev.manaPool, [color]: prev.manaPool[color] + 1 },
    }));
  };

  // Detect mana-producing creatures: "{T}: Add {G}" etc.
  const getManaDorkColors = (card) => {
    if (isLand(card)) return null; // Lands handled separately
    const allText = getOracleText(card);
    // Match "{T}: Add {G}" or "{T}: Add {G}{G}" or "{T}: Add {W} or {U}" etc.
    // "one mana of any color" (Birds of Paradise, Noble Hierarch etc.)
    if (/\{t\}:\s*add\s+one mana of any color/.test(allText)) {
      return ['W', 'U', 'B', 'R', 'G'];
    }
    const tapAddMatch = allText.match(/\{t\}:\s*add\s+((?:\{[wubrgc]\}[\s,]*(?:or\s*)?)+)/);
    if (!tapAddMatch) return null;
    const manaStr = tapAddMatch[1];
    const colors = [];
    const symbolMap = { w: 'W', u: 'U', b: 'B', r: 'R', g: 'G', c: 'C' };
    const symbols = manaStr.match(/\{([wubrgc])\}/g) || [];
    for (const sym of symbols) {
      const letter = sym.replace(/[{}]/g, '');
      if (symbolMap[letter]) colors.push(symbolMap[letter]);
    }
    return colors.length > 0 ? colors : null;
  };

  const toggleTap = (pIdx, cardId) => {
    if (onlineMode && pIdx !== onlinePlayerIndex) return;
    const p = getState(pIdx);
    const card = p.battlefield.find(c => c.id === cardId);
    if (!card) return;

    if (!card.tapped && isLand(card)) {
      // Tapping a land: produce mana
      const colors = getLandManaColors(card);
      SFX.tap();
      setState(pIdx, prev => ({
        ...prev,
        battlefield: prev.battlefield.map(c => c.id === cardId ? { ...c, tapped: true } : c),
      }));
      // Detect pain lands: "{T}: Add {X} or {Y}. CARDNAME deals 1 damage to you."
      const landOracle = getOracleText(card);
      const isPainLand = /deals? 1 damage to you/i.test(landOracle) && /\{t\}:\s*add\s/.test(landOracle);
      if (colors.length === 1) {
        addManaToPool(pIdx, colors[0]);
        if (isPainLand && colors[0] !== 'C') {
          setState(pIdx, prev => ({ ...prev, life: prev.life - 1 }));
          addGameLog(pIdx, '🩸', `${card.name}: 1 damage (pain land)`);
        }
      } else if (colors.length > 1) {
        // Multiple colors: player must choose — pass pain land flag
        setManaChoice({ pIdx, colors, cardId, isPainLand });
      }
      // Troll Aura bonus: if this land has a trollAura attached, also add {G}{G}{G}
      const trollAura = p.battlefield.find(c => c.trollAura && c.attachedTo === cardId);
      if (trollAura) {
        addManaToPool(pIdx, 'G');
        addManaToPool(pIdx, 'G');
        addManaToPool(pIdx, 'G');
        addGameLog(pIdx, '\u{1f333}', getDisplayName(card) + ' (Troll Aura): Added {G}{G}{G}');
      }
      return;
    }

    // Tapping a Treasure/Gold/similar sacrifice-for-mana token
    if (!card.tapped) {
      const allText = getOracleText(card);
      const isSacForMana = /\{t\},\s*sacrifice\s+(this|~)[^:]*:\s*add\s+(one mana of any color|(?:\{[wubrgc]\}[\s,]*(?:or\s*)?)+)/.test(allText);
      if (isSacForMana) {
        SFX.tap();
        // Determine colors
        const anyColor = /add one mana of any color/.test(allText);
        let sacColors;
        if (anyColor) {
          sacColors = ['W', 'U', 'B', 'R', 'G'];
        } else {
          const symbolMap = { w: 'W', u: 'U', b: 'B', r: 'R', g: 'G', c: 'C' };
          const manaMatch = allText.match(/add\s+((?:\{[wubrgc]\}[\s,]*(?:or\s*)?)+)/);
          sacColors = manaMatch ? [...new Set((manaMatch[1].match(/\{([wubrgc])\}/g) || []).map(s => symbolMap[s.replace(/[{}]/g, '')]))] : ['C'];
        }
        // Sacrifice the token (remove from battlefield)
        setState(pIdx, prev => ({
          ...prev,
          battlefield: prev.battlefield.filter(c => c.id !== cardId),
        }));
        // Show mana choice
        if (sacColors.length === 1) {
          addManaToPool(pIdx, sacColors[0]);
        } else {
          setManaChoice({ pIdx, colors: sacColors, cardId });
        }
        setCastError({ pIdx, message: `Sacrificed ${card.name} for mana`, background: '#1a2a33' });
        setTimeout(() => setCastError(null), 1500);
        return;
      }
    }

    // Tapping a mana dork: produce mana
    if (!card.tapped) {
      const dorkColors = getManaDorkColors(card);
      if (dorkColors && dorkColors.length > 0) {
        SFX.tap();
        setState(pIdx, prev => ({
          ...prev,
          battlefield: prev.battlefield.map(c => c.id === cardId ? { ...c, tapped: true } : c),
        }));
        // Deduplicate: "{T}: Add {G}{G}" = 2x green, "{T}: Add {W} or {U}" = choose
        const uniqueColors = [...new Set(dorkColors)];
        if (uniqueColors.length === 1) {
          // All same color (e.g. "{T}: Add {G}" or "{T}: Add {G}{G}")
          for (let i = 0; i < dorkColors.length; i++) {
            addManaToPool(pIdx, dorkColors[i]);
          }
        } else {
          // Multiple different colors: player chooses (e.g. "{T}: Add {W} or {U}")
          setManaChoice({ pIdx, colors: uniqueColors, cardId });
        }
        return;
      }
    }

    if (card.tapped) SFX.untap(); else SFX.tap();
    setState(pIdx, prev => ({
      ...prev,
      battlefield: prev.battlefield.map(c => c.id === cardId ? { ...c, tapped: !c.tapped } : c)
    }));
  };

  // ===== SACRIFICE ABILITIES (Mind Stone, Chromatic Sphere, etc.) =====
  const getSacrificeAbilities = (card) => {
    if (isLand(card)) return [];
    const allText = getOracleText(card);
    const abilities = [];
    // Match patterns like "{1}, {T}, Sacrifice ~: Draw a card" or "Sacrifice ~: effect"
    // Also "{1}, Sacrifice ~: effect" (no tap required)
    const sacPatterns = [
      /(?:(\{[^}]+\}(?:,\s*\{[^}]+\})*),\s*)?\{t\},\s*sacrifice\s+(?:this|~|[^:]{0,30}):\s*(.+)/gi,
      /(?:(\{[^}]+\}(?:,\s*\{[^}]+\})*),\s*)?sacrifice\s+(?:this|~|[^:]{0,30}):\s*(.+)/gi,
    ];
    for (const pattern of sacPatterns) {
      let match;
      while ((match = pattern.exec(allText)) !== null) {
        const costPart = match[1] || '';
        const effectText = match[2].trim();
        // Skip if this is a sacrifice-for-mana (already handled by toggleTap)
        if (/^add\s+(one mana|(\{[wubrgc]\}[\s,]*)+)/i.test(effectText)) continue;
        const requiresTap = match[0].includes('{t}');
        // Parse mana cost from costPart
        let manaCost = null;
        let costStr = requiresTap ? '{T}' : '';
        if (costPart) {
          manaCost = parseManaCost(costPart);
          costStr = costPart + (requiresTap ? ', {T}' : '');
        }
        costStr += ', Sacrifice';
        // Parse effect
        let effect;
        if (/draw\s+(\w+)\s+cards?/i.test(effectText)) {
          const countMatch = effectText.match(/draw\s+(\w+)\s+cards?/i);
          const numWord = countMatch[1].toLowerCase();
          const numMap = { a: 1, one: 1, two: 2, three: 3, four: 4, five: 5, six: 6, seven: 7 };
          const count = numMap[numWord] || parseInt(numWord) || 1;
          effect = { type: 'draw', count, label: `Draw ${count} card${count > 1 ? 's' : ''}` };
        } else if (/draw a card/i.test(effectText)) {
          effect = { type: 'draw', count: 1, label: 'Draw a card' };
        } else if (/gain\s+(\d+)\s+life/i.test(effectText)) {
          const amt = parseInt(effectText.match(/gain\s+(\d+)\s+life/i)[1]);
          effect = { type: 'gainLife', amount: amt, label: `Gain ${amt} life` };
        } else if (/deal\s+(\d+)\s+damage/i.test(effectText)) {
          const amt = parseInt(effectText.match(/deal\s+(\d+)\s+damage/i)[1]);
          effect = { type: 'damage', amount: amt, label: `Deal ${amt} damage (manual)` };
        } else if (/counter target.*spell.*unless.*pays\s*\{(\d+)\}/i.test(effectText)) {
          // Cursecatcher, Judge's Familiar, etc.: "Counter target instant or sorcery spell unless its controller pays {X}"
          const payMatch = effectText.match(/unless.*pays\s*\{(\d+)\}/i);
          const payAmount = payMatch ? parseInt(payMatch[1]) : 1;
          effect = { type: 'sacCounter', payAmount, label: `Counter spell unless opponent pays {${payAmount}}` };
        } else {
          const shortText = effectText.length > 40 ? effectText.slice(0, 37) + '...' : effectText;
          effect = { type: 'manual', text: effectText, label: shortText };
        }
        abilities.push({ ...effect, manaCost, costStr, requiresTap });
      }
    }
    // Deduplicate (the two patterns may both match the same ability)
    const seen = new Set();
    return abilities.filter(ab => {
      const key = ab.costStr + ':' + ab.label;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  };

  const activateSacrificeAbility = (pIdx, card, ability) => {
    if (onlineMode && pIdx !== onlinePlayerIndex) return;
    const p = getState(pIdx);
    // Check mana cost
    if (ability.manaCost && !canPayManaCost(p.manaPool, ability.manaCost)) {
      setCastError({ pIdx, message: 'Not enough mana for sacrifice ability' });
      setTimeout(() => setCastError(null), 2000);
      return;
    }
    // Check tap requirement
    if (ability.requiresTap && card.tapped) {
      setCastError({ pIdx, message: `${card.name} is already tapped` });
      setTimeout(() => setCastError(null), 2000);
      return;
    }
    // Pay mana
    let newPool = p.manaPool;
    if (ability.manaCost) {
      newPool = deductManaCost(p.manaPool, ability.manaCost);
    }
    // Sacrifice: remove from battlefield, add to graveyard
    SFX.toGraveyard();
    setState(pIdx, prev => ({
      ...prev,
      manaPool: newPool,
      battlefield: prev.battlefield.filter(c => c.id !== card.id),
      graveyard: [...prev.graveyard, { ...card, tapped: false, counters: {} }],
    }));
    // Execute effect
    if (ability.type === 'sacCounter') {
      // Counter-unless-pays: check if there's a spell on the stack to target
      if (spellStack.length === 0) {
        setCastError({ pIdx, message: 'No spell on the stack to counter!' });
        setTimeout(() => setCastError(null), 2000);
        // Undo sacrifice: move card back (too late — already sacrificed, that's the rule in MTG: you still sacrifice even if no target)
        addGameLog(pIdx, '💀', `Sacrificed ${card.name} (no spell to counter)`);
        return;
      }
      // Target the top spell on the stack (most recent)
      const targetEntry = spellStack[spellStack.length - 1];
      // Show the pay-or-counter choice to the opponent
      setSacCounterChoice({ sacPIdx: pIdx, sacCard: card, targetEntry, payAmount: ability.payAmount });
      addGameLog(pIdx, '🚫', `Sacrificed ${card.name}: Counter ${targetEntry.displayName} unless opponent pays {${ability.payAmount}}`);
      return; // Don't show normal sacrifice message — the choice overlay handles it
    } else if (ability.type === 'draw') {
      for (let i = 0; i < ability.count; i++) {
        setTimeout(() => drawCard(pIdx), i * 100);
      }
    } else if (ability.type === 'gainLife') {
      setState(pIdx, prev => ({ ...prev, life: prev.life + ability.amount }));
    } else if (ability.type === 'damage' || ability.type === 'manual') {
      setEtbReminder({ pIdx, card, effects: [{ icon: '💀', text: `Sacrificed ${card.name}: ${ability.text || ability.label}` }] });
    }
    addGameLog(pIdx, '💀', `Sacrificed ${card.name}: ${ability.label}`);
    // Broadcast sacrifice ability activation to both players
    const sacCardImg = card._reskin?.artUrl || card.image_uris?.art_crop || card.image_uris?.small || (card.card_faces?.[0]?.image_uris?.art_crop) || null;
    setAbilityActivated({
      pIdx,
      cardName: card._reskin?.name || card.name,
      abilityText: `💀 Sacrificed: ${ability.text || ability.label}`,
      cardImage: sacCardImg,
    });
    setTimeout(() => setAbilityActivated(null), 3500);
  };

  // ===== ACTIVATED ABILITIES (Midnight Clock, Heliod, creatures/artifacts/enchantments) =====
  const getPaidAbilities = (card) => {
    if (isLand(card)) return [];
    const allText = getOracleText(card);
    const abilities = [];
    const lines = allText.split('\n');
    for (const line of lines) {
      const trimmed = line.trim();
      // Skip sacrifice abilities (handled by getSacrificeAbilities)
      if (/sacrifice/i.test(trimmed)) continue;
      // Skip tap-for-mana abilities (handled by toggleTap / mana buttons)
      if (/^\{t\}\s*:\s*add\s/i.test(trimmed)) continue;
      // Skip keyword ability words that look like "cost:" but aren't (e.g., "Equip {2}")
      if (/^(?:equip|crew|fortify|reconfigure)\s/i.test(trimmed)) continue;
      // Pattern 1: {T}: effect (tap-only, no mana cost)
      // Pattern 2: {mana}: effect (mana-only, no tap)
      // Pattern 3: {mana}, {T}: effect (mana + tap)
      // Pattern 4: {T}, {mana}: effect (tap then mana — less common but valid)
      // General regex: optional mana symbols and/or {T} separated by commas, then ": effect"
      const abilityMatch = trimmed.match(/^((?:\{[^}]+\}(?:,\s*)?)+)\s*:\s*(.+)/i);
      if (!abilityMatch) continue;
      const fullCostPart = abilityMatch[1].trim();
      const effectText = abilityMatch[2].trim();
      // Skip if the effect is just adding mana
      if (/^add\s/i.test(effectText)) continue;
      // Determine if {T} is in the cost
      const requiresTap = /\{t\}/i.test(fullCostPart);
      // Strip {T} from cost to get just the mana portion
      const manaPart = fullCostPart.replace(/\{t\}/gi, '').replace(/^,\s*/, '').replace(/,\s*$/, '').trim();
      const manaCost = manaPart ? parseManaCost(manaPart) : null;
      // Build display cost string
      let costStr = '';
      if (manaPart && requiresTap) costStr = manaPart + ', {T}';
      else if (requiresTap) costStr = '{T}';
      else costStr = fullCostPart;
      // Detect if ability needs a target creature
      const needsTarget = /target\s+creature/i.test(effectText);
      const needsTargetAny = /(?:any target|target\s+(?:creature|player|opponent))/i.test(effectText);
      // Parse effect type
      let effect;
      // Monstrosity: "{cost}: Monstrosity N"
      const monstrousMatch = effectText.match(/monstrosity\s+(\d+)/i);
      if (monstrousMatch) {
        const monstrousN = parseInt(monstrousMatch[1]);
        effect = { type: 'monstrosity', counters: monstrousN, label: 'Monstrosity ' + monstrousN };
        abilities.push({ ...effect, manaCost, costStr, requiresTap, fullEffectText: effectText });
        continue;
      }
      // Keyword-granting: "target creature gains [keyword] until end of turn" or "another target creature gains [keyword]"
      const keywordGrantMatch = effectText.match(/(?:target\s+)?(?:another\s+)?(?:target\s+)?creature\s+gains?\s+(lifelink|deathtouch|flying|trample|vigilance|menace|first strike|double strike|hexproof|indestructible|reach|haste)\s+until\s+end\s+of\s+turn/i);
      if (keywordGrantMatch) {
        const keyword = keywordGrantMatch[1].toLowerCase();
        effect = { type: 'grantKeyword', keyword, label: `Grant ${keyword} until end of turn`, needsTarget: true };
      // +X/+X buff: "target creature gets +X/+X until end of turn"
      } else if (/(?:target\s+)?(?:another\s+)?(?:target\s+)?creature\s+gets?\s+([+-]\d+)\/([+-]\d+)\s+until\s+end\s+of\s+turn/i.test(effectText)) {
        const buffMatch = effectText.match(/gets?\s+([+-]\d+)\/([+-]\d+)/i);
        const pMod = parseInt(buffMatch[1]);
        const tMod = parseInt(buffMatch[2]);
        effect = { type: 'buff', power: pMod, toughness: tMod, label: `${pMod >= 0 ? '+' : ''}${pMod}/${tMod >= 0 ? '+' : ''}${tMod} until end of turn`, needsTarget };
      // Put a counter on target/another creature
      } else if (/put\s+(?:a|an|one)\s+(\w+)\s+counter\s+on\s+(?:target|another)/i.test(effectText)) {
        const counterType = effectText.match(/put\s+(?:a|an|one)\s+(\w+)\s+counter/i)[1];
        effect = { type: 'addCounterTarget', counterType, label: `Add ${counterType} counter to target`, needsTarget: true };
      // Put a counter on self (~ or "it" or "this creature")
      } else if (/put\s+(?:a|an|one)\s+(\w+)\s+counter/i.test(effectText)) {
        const counterType = effectText.match(/put\s+(?:a|an|one)\s+(\w+)\s+counter/i)[1];
