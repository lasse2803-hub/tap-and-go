                                addGameLog(pwReminder.pIdx, '📚', `${pwReminder.card.name}: Put ${perm.name} into ${getState(ownerIdx).name}'s library 3rd from top`);
                                setCastError({ pIdx: pwReminder.pIdx, message: `📚 ${perm.name} tucked 3rd from top of library` });
                                setTimeout(() => setCastError(null), 2500);
                                setTimeout(() => cleanupAttachments([ownerIdx]), 50);
                                setPwReminder(null);
                              }}>
                              📚 {perm.name} ({perm.ownerIdx === oppIdx ? 'Opp' : 'Own'})
                            </button>
                          ))}
                        </div>
                      );
                    })()}
                    {/* Jace -2: Fact or Fiction — reveal top 3, opponent splits, caster picks */}
                    {isFactOrFiction && (() => {
                      const wordToNum = { one: 1, two: 2, three: 3, four: 4, five: 5 };
                      const numCards = wordToNum[(revealTopMatch[1] || '').toLowerCase()] || parseInt(revealTopMatch[1]) || 3;
                      return (
                        <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                          onClick={() => {
                            const pIdx = pwReminder.pIdx;
                            const st = getState(pIdx);
                            const topCards = st.library.slice(0, numCards);
                            if (topCards.length === 0) {
                              setCastError({ pIdx, message: '⚠️ Library is empty!' });
                              setTimeout(() => setCastError(null), 2000);
                              setPwReminder(null);
                              return;
                            }
                            // Remove cards from library
                            setState(pIdx, prev => ({ ...prev, library: prev.library.slice(numCards) }));
                            // Use modalChoice for the split — opponent assigns cards to piles
                            setModalChoice({
                              type: 'fact_or_fiction',
                              pIdx,
                              cards: topCards,
                              pile1: [],
                              pile2: topCards.map(c => c.id), // Default: all in pile 2
                              source: pwReminder.card.name,
                              phase: 'opponent_split', // opponent splits, then caster picks
                            });
                            addGameLog(pIdx, '🔮', `${pwReminder.card.name}: Revealed top ${topCards.length} cards`);
                            setPwReminder(null);
                          }}>
                          🔮 Reveal Top {numCards} Cards
                        </button>
                      );
                    })()}
                    {isLibraryExileUltimate && (() => {
                      // Jace -8: Search each player's library for a nonland card, exile it, cast free
                      const pIdx = pwReminder.pIdx;
                      const oppIdx = pIdx === 0 ? 1 : 0;
                      const step = pwReminder.ultimateStep || 'own'; // 'own' → 'opp' → 'done'
                      if (step === 'own') {
                        // Step 1: Search your own library
                        const ownNonlands = getState(pIdx).library.filter(c => !isLand(c));
                        return (
                          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'center' }}>
                            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)', marginBottom: 2 }}>Step 1: Choose a nonland card from YOUR library to exile</div>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'center', maxHeight: 200, overflowY: 'auto' }}>
                              {ownNonlands.map(card => (
                                <button key={card.id} className="btn" style={{ padding: '4px 10px', fontSize: 10, maxWidth: 150 }}
                                  onClick={() => {
                                    // Exile chosen card from own library
                                    setState(pIdx, prev => ({
                                      ...prev,
                                      library: prev.library.filter(c => c.id !== card.id),
                                      exile: [...prev.exile, { ...card, castFree: true }],
                                    }));
                                    shuffleLibrary(pIdx);
                                    addGameLog(pIdx, '💫', `${pwReminder.card.name}: Exiled ${getDisplayName(card)} from own library (cast free)`);
                                    // Move to step 2
                                    setPwReminder(prev => ({ ...prev, ultimateStep: 'opp' }));
                                  }}>
                                  {getDisplayName(card)}
                                </button>
                              ))}
                            </div>
                            {ownNonlands.length === 0 && (
                              <button className="btn" style={{ padding: '4px 12px', fontSize: 10 }}
                                onClick={() => {
                                  addGameLog(pIdx, '💫', `${pwReminder.card.name}: No nonland cards in own library`);
                                  setPwReminder(prev => ({ ...prev, ultimateStep: 'opp' }));
                                }}>
                                Skip (no nonlands)
                              </button>
                            )}
                          </div>
                        );
                      } else if (step === 'opp') {
                        // Step 2: Search opponent's library
                        // In online mode, caster can't see opponent's library (server hides it).
                        // So we use a modalChoice to let the OPPONENT pick from their own library.
                        if (onlineMode) {
                          return (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'center' }}>
                              <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)', marginBottom: 2 }}>Step 2: Opponent must choose a nonland card from their library to exile</div>
                              <button className="btn btn-gold" style={{ padding: '6px 16px', fontSize: 12 }}
                                onClick={() => {
                                  // Signal opponent to pick a card — use modalChoice with special type
                                  setModalChoice({
                                    type: 'jace_ultimate_opp_search',
                                    casterPIdx: pIdx,
                                    oppPIdx: oppIdx,
                                    source: pwReminder.card.name,
                                  });
                                  setPwReminder(null);
                                  setCastError({ pIdx, message: '⏳ Waiting for opponent to choose a card from their library...' });
                                  setTimeout(() => setCastError(null), 4000);
                                }}>
                                💫 Ask Opponent to Choose
                              </button>
                            </div>
                          );
                        }
                        // Local mode: caster has full access to opponent's library
                        const oppNonlands = getState(oppIdx).library.filter(c => !isLand(c));
                        return (
                          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'center' }}>
                            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)', marginBottom: 2 }}>Step 2: Choose a nonland card from OPPONENT's library to exile</div>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'center', maxHeight: 200, overflowY: 'auto' }}>
                              {oppNonlands.map(card => (
                                <button key={card.id} className="btn" style={{ padding: '4px 10px', fontSize: 10, maxWidth: 150 }}
                                  onClick={() => {
                                    setState(oppIdx, prev => ({
                                      ...prev,
                                      library: prev.library.filter(c => c.id !== card.id),
                                      exile: [...prev.exile, { ...card, castFree: true, castFreeFor: pIdx }],
                                    }));
                                    shuffleLibrary(oppIdx);
                                    addGameLog(pIdx, '💫', `${pwReminder.card.name}: Exiled ${getDisplayName(card)} from opponent's library (cast free)`);
                                    setPwReminder(null);
                                    setCastError({ pIdx, message: '💫 Jace ultimate complete! Exiled cards can be cast from exile for free.' });
                                    setTimeout(() => setCastError(null), 3500);
                                  }}>
                                  {getDisplayName(card)}
                                </button>
                              ))}
                            </div>
                            {oppNonlands.length === 0 && (
                              <button className="btn" style={{ padding: '4px 12px', fontSize: 10 }}
                                onClick={() => {
                                  addGameLog(pIdx, '💫', `${pwReminder.card.name}: No nonland cards in opponent's library`);
                                  setPwReminder(null);
                                }}>
                                Skip (no nonlands)
                              </button>
                            )}
                          </div>
                        );
                      }
                      return null;
                    })()}
                    {isPreventDamage && (() => {
                      // Kiora's +1: optionally target any permanent an opponent controls
                      // Player can also choose no target (just for the loyalty counter)
                      const oppIdx = pwReminder.pIdx === 0 ? 1 : 0;
                      const oppPermanents = getState(oppIdx).battlefield;
                      const buttons = [];
                      // "No target" option — just take the loyalty counter
                      buttons.push(
                        <button key="no-target" className="btn" style={{ padding: '6px 14px', fontSize: 11 }}
                          onClick={() => {
                            addGameLog(pwReminder.pIdx, '🛡', `${pwReminder.card.name}: +1 (no target chosen)`);
                            setPwReminder(null);
                          }}>
                          ✓ No target (loyalty only)
                        </button>
                      );
                      // One button per opponent permanent (creatures, lands, enchantments, etc.)
                      oppPermanents.forEach(perm => {
                        buttons.push(
                          <button key={perm.id} className="btn btn-gold" style={{ padding: '6px 12px', fontSize: 11, maxWidth: 180 }}
                            onClick={() => {
                              setState(oppIdx, prev => ({
                                ...prev,
                                battlefield: prev.battlefield.map(c => c.id === perm.id ? { ...c, damagePrevented: pwReminder.pIdx } : c)
                              }));
                              addGameLog(pwReminder.pIdx, '🛡', `${pwReminder.card.name}: All damage prevented on ${getDisplayName(perm)} until your next turn`);
                              setCastError({ pIdx: pwReminder.pIdx, message: `🛡️ ${getDisplayName(perm)}: all damage prevented until your next turn`, background: '#1a2a1a' });
                              setTimeout(() => setCastError(null), 3000);
                              setPwReminder(null);
                            }}>
                            🛡️ {getDisplayName(perm)}
                          </button>
                        );
                      });
                      return buttons;
                    })()}
                    <button className="btn" style={{ padding: '6px 16px', fontSize: 11 }}
                      onClick={() => setPwReminder(null)}>
                      Dismiss
                    </button>
                  </div>
                );
              }
              return (
                <button className="btn btn-gold" style={{ padding: '6px 20px', fontSize: 12 }}
                  onClick={() => setPwReminder(null)}>
                  OK — Execute Manually
                </button>
              );
            })()}
          </div>
        </div>
      )}

      {/* LTB Trigger Reminder */}
      {ltbReminder && (
        <div style={{
          position: 'fixed', bottom: 80, left: '50%', transform: 'translateX(-50%)',
          zIndex: 1500, animation: 'fadeIn 0.2s ease',
        }}>
          <div style={{
            background: 'linear-gradient(160deg, #1a1830, #14122a)', borderRadius: 12, padding: '14px 20px',
            border: '1px solid rgba(180,80,80,0.3)', boxShadow: '0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(180,80,80,0.08)',
            maxWidth: 420, textAlign: 'center',
          }}>
            <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 1.5, color: 'rgba(180,80,80,0.7)', marginBottom: 6, fontWeight: 700 }}>
              🚪 Left Battlefield — {ltbReminder.card.name}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, marginBottom: 10 }}>
              {ltbReminder.effects.map((e, i) => (
                <div key={i} style={{
                  padding: '5px 10px', borderRadius: 6, fontSize: 12, fontWeight: 500,
                  background: 'rgba(180,80,80,0.06)', border: '1px solid rgba(180,80,80,0.1)',
                  color: '#e8e4dc', lineHeight: 1.4,
                }}>
                  <span style={{ marginRight: 6 }}>{e.icon}</span>{e.text}
                </div>
              ))}
            </div>
            <button className="btn" style={{ padding: '6px 20px', fontSize: 12, borderColor: 'rgba(180,80,80,0.4)', color: '#e88' }}
              onClick={() => setLtbReminder(null)}>
              OK
            </button>
          </div>
        </div>
      )}

      {/* Exile Link Choice — pick which permanent exiled this card */}
      {exileLinkChoice && (() => {
        const myBattlefield = getState(exileLinkChoice.sourcePIdx).battlefield.filter(c => !c.isToken && !isLand(c));
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999,
          }}>
            <div style={{
              background: '#1e1c30', borderRadius: 12, padding: 24, maxWidth: 400, textAlign: 'center',
              border: '1px solid rgba(120,80,200,0.3)', boxShadow: '0 8px 40px rgba(0,0,0,0.5)',
            }}>
              <h3 style={{ color: '#c0a0ff', marginBottom: 4, fontSize: 15 }}>📎 Link Exile</h3>
              <p style={{ fontSize: 11, opacity: 0.5, marginBottom: 12 }}>
                Exile <strong>{exileLinkChoice.card.name}</strong> — linked to which permanent?
              </p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6, maxHeight: 300, overflowY: 'auto', marginBottom: 12 }}>
                {myBattlefield.map(c => (
                  <button key={c.id} className="btn" style={{
                    padding: '6px 12px', fontSize: 12, textAlign: 'left',
                    borderColor: 'rgba(120,80,200,0.3)', color: '#c0a0ff',
                  }} onClick={() => {
                    exileLinkedTo(exileLinkChoice.targetPIdx, exileLinkChoice.card, exileLinkChoice.sourcePIdx, c);
                    setExileLinkChoice(null);
                  }}>
                    📎 {c.name}
                  </button>
                ))}
              </div>
              <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
                <button className="btn" style={{ padding: '6px 16px', fontSize: 12, borderColor: 'rgba(255,255,255,0.1)' }}
                  onClick={() => {
                    // Exile without linking
                    moveCard(exileLinkChoice.targetPIdx, exileLinkChoice.card, 'battlefield', 'exile');
                    setExileLinkChoice(null);
                  }}>
                  Exile (no link)
                </button>
                <button className="btn" style={{ padding: '6px 16px', fontSize: 12, borderColor: 'rgba(255,255,255,0.1)', opacity: 0.5 }}
                  onClick={() => setExileLinkChoice(null)}>
                  Cancel
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Attachment Selection Overlay (Auras & Equipment) */}
      {attachChoice && (() => {
        const myCreatures = getState(attachChoice.pIdx).battlefield.filter(c =>
          isCreature(c) && c.id !== attachChoice.card.id
        );
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999,
          }}>
            <div style={{
              background: '#1e1c30', borderRadius: 12, padding: 24, maxWidth: 400, textAlign: 'center',
              border: `1px solid ${isAura(attachChoice.card) ? 'rgba(120,80,200,0.3)' : 'rgba(200,170,60,0.3)'}`,
              boxShadow: '0 8px 40px rgba(0,0,0,0.5)',
            }}>
              <h3 style={{ color: isAura(attachChoice.card) ? '#c0a0ff' : '#e8c96a', marginBottom: 4, fontSize: 15 }}>
                📎 {isEquipment(attachChoice.card) ? 'Equip' : 'Enchant'} Creature
              </h3>
              <p style={{ fontSize: 11, opacity: 0.5, marginBottom: 12 }}>
                Attach <strong>{attachChoice.card.name}</strong> to which creature?
              </p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6, maxHeight: 300, overflowY: 'auto', marginBottom: 12 }}>
                {myCreatures.length === 0 && (
                  <div style={{ fontSize: 12, opacity: 0.4, padding: 8 }}>No creatures on the battlefield</div>
                )}
                {myCreatures.map(c => (
                  <button key={c.id} className="btn" style={{
                    padding: '6px 12px', fontSize: 12, textAlign: 'left',
                    borderColor: isAura(attachChoice.card) ? 'rgba(120,80,200,0.3)' : 'rgba(200,170,60,0.3)',
                    color: isAura(attachChoice.card) ? '#c0a0ff' : '#e8c96a',
                  }} onClick={() => attachCardTo(attachChoice.pIdx, attachChoice.card, c.id)}>
                    📎 {c.name} {hasBasePT(c) ? `(${getEffectivePower(c, getAttachments(attachChoice.pIdx, c.id))}/${getEffectiveToughness(c, getAttachments(attachChoice.pIdx, c.id))})` : ''}
                  </button>
                ))}
              </div>
              <button className="btn" style={{ padding: '6px 16px', fontSize: 12, borderColor: 'rgba(255,255,255,0.1)', opacity: 0.5 }}
                onClick={() => setAttachChoice(null)}>
                Cancel
              </button>
            </div>
          </div>
        );
      })()}

      {/* Adventure Choice Modal */}
      {adventureChoice && (() => {
        const card = adventureChoice.card;
        const cFace = getCreatureFace(card);
        const aFace = getAdventureFace(card);
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000,
          }}>
            <div style={{
              background: '#1e1c30', borderRadius: 12, padding: 24, maxWidth: 400, textAlign: 'center',
              border: '1px solid rgba(200,170,60,0.2)', boxShadow: '0 8px 40px rgba(0,0,0,0.5)',
            }}>
              <h3 style={{ color: '#d4b44a', marginBottom: 4 }}>{card.name}</h3>
              <p className="text-sm" style={{ opacity: 0.5, marginBottom: 16 }}>Choose how to cast this Adventure card</p>
              <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
                <button className="btn btn-gold" style={{ padding: '10px 16px' }} onClick={() => {
                  setAdventureChoice(null);
                  castCard(adventureChoice.pIdx, card, false);
                }}>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>{cFace.name}</div>
                  <div style={{ fontSize: 10, opacity: 0.6, marginTop: 2 }}>{cFace.type_line} · {cFace.mana_cost}</div>
                </button>

      <button className="game-log-toggle" onClick={() => setGameLogOpen(!gameLogOpen)}

            <span style={{ marginRight: 6 }}>{latest.icon}</span>

          </div>
        );
      })()}

      {/* In-Game Chat */}
      <div className="chat-overlay">
        <div className="chat-messages">
          {chatMessages.filter(m => Date.now() - m.time < 8000).map((m, i) => (
            <div key={m.time + '-' + i} className="chat-bubble">
              <span className="chat-sender">{m.sender}:</span>
              {m.text}

          ))}
        </div>

          <div className="chat-input-bar">
            <span style={{ fontSize: 10, color: 'rgba(200,170,60,0.6)', fontWeight: 700 }}>💬</span>
            <input

                if (e.key === 'Enter') { e.preventDefault(); sendChat(); }

          </div>
        )}
      </div>

      {showLibrarySearch !== null && (
        <ZoneViewer
          title={`${getState(showLibrarySearch).name}'s Library (${getState(showLibrarySearch).library.length} cards)`}
          cards={getState(showLibrarySearch).library}
          onClose={() => {
            const pIdx = showLibrarySearch;

            shuffleLibrary(pIdx);

          }}
          onCardAction={(card) => {
            const pIdx = showLibrarySearch;
            const actions = getCardActions(pIdx, card, 'library');
            setShowLibrarySearch(null);
            setTimeout(() => {
              setContextMenu({ x: window.innerWidth / 2, y: window.innerHeight / 2, card, actions });

          }}

    </div>
  );
}

/**
 * useGameSocket — Manages the Socket.io connection for online games.
 */
function useGameSocket() {
  const [socket, setSocket] = useState(null);
  const [connected, setConnected] = useState(false);
  const [roomInfo, setRoomInfo] = useState(null);
  const [playerIndex, setPlayerIndex] = useState(null);
  const [playerId, setPlayerId] = useState(null);
  const [error, setError] = useState(null);
  const [gameState, setGameState] = useState(null);
  const [lastAction, setLastAction] = useState(null);
  const [gameStarted, setGameStarted] = useState(false);
  const [opponentReady, setOpponentReady] = useState(false);
  const [opponentDisconnected, setOpponentDisconnected] = useState(false);
  const [chatMessages, setChatMessages] = useState([]);

  // Match state (Best of 3)
  const [matchInfo, setMatchInfo] = useState(null); // { type, score, game, winner }
  const [betweenGames, setBetweenGames] = useState(null); // { loserIndex, nextGame, matchScore }
  const [concession, setConcession] = useState(null); // { loserIndex, loserName, winnerIndex }

  useEffect(() => {
    const serverUrl = window.location.origin;
    const s = io(serverUrl, { transports: ['websocket', 'polling'] });

    s.on('connect', () => { setConnected(true); setError(null); });
    s.on('disconnect', () => setConnected(false));
    s.on('connect_error', (err) => setError('Connection failed: ' + err.message));

    s.on('playerJoined', ({ nickname, playerIndex: pi, roomInfo: ri }) => {
      setRoomInfo(ri);
    });

    s.on('roomReady', ({ roomInfo: ri }) => {
      setRoomInfo(ri);
    });

    s.on('opponentReady', () => {
      setOpponentReady(true);
    });

    s.on('gameStart', ({ state, playerIndex: pi, matchInfo: mi }) => {
      setGameState(state);
      setGameStarted(true);
      setBetweenGames(null);
      if (mi) setMatchInfo(mi);
    });

    s.on('stateUpdate', ({ state, lastAction: la }) => {
      setGameState(state);
      setLastAction(la || null);
    });

    s.on('opponentDisconnected', () => {
      setOpponentDisconnected(true);
    });

    s.on('playerJoined', ({ roomInfo: ri }) => {
      setRoomInfo(ri);
      setOpponentDisconnected(false);
    });

    s.on('chatMessage', (msg) => {
      setChatMessages(prev => [...prev.slice(-99), msg]);
    });

    // Match events
    s.on('matchStateUpdate', ({ matchScore, matchGame, matchWinner, result }) => {
      setMatchInfo(prev => ({ ...prev, score: matchScore, game: matchGame, winner: matchWinner }));
    });

    s.on('betweenGames', ({ loserIndex, nextGame, matchScore }) => {
      setBetweenGames({ loserIndex, nextGame, matchScore });
      setMatchInfo(prev => ({ ...prev, score: matchScore, game: nextGame }));
    });

    s.on('playerConceded', ({ loserIndex, loserName, winnerIndex }) => {
      setConcession({ loserIndex, loserName, winnerIndex });
    });

    setSocket(s);
    return () => { s.disconnect(); };
  }, []);

  const createRoom = useCallback((nickname) => {
    return fetch('/api/room/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname })
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) { setError(data.error); return null; }
      return new Promise((resolve) => {
        socket.emit('joinGame', { roomId: data.roomId, nickname, playerId: data.playerId }, (res) => {
          if (res.error) { setError(res.error); resolve(null); return; }
          setPlayerIndex(res.playerIndex);
          setPlayerId(res.playerId);
          setRoomInfo(res.roomInfo);
          resolve({ roomId: data.roomId, playerId: res.playerId });
        });
      });
    })
    .catch(err => { setError(err.message); return null; });
  }, [socket]);

  const joinRoom = useCallback((roomId, nickname) => {
    return new Promise((resolve) => {
      socket.emit('joinGame', { roomId: roomId.toUpperCase(), nickname }, (res) => {
        if (res.error) { setError(res.error); resolve(null); return; }
        setPlayerIndex(res.playerIndex);
        setPlayerId(res.playerId);
        setRoomInfo(res.roomInfo);
        resolve(res);
      });
    });
  }, [socket]);

  const submitDeck = useCallback((deck, avatar, matchType, sideboard) => {
    // Attach matchType to deck so server receives it
    const deckWithMeta = deck;
    if (matchType) deckWithMeta.matchType = matchType;
    return new Promise((resolve) => {
      socket.emit('submitDeck', {
        deck: deckWithMeta,
        avatar: avatar || null,
        matchType: matchType || 'single',
        sideboard: sideboard || []
      }, (res) => {
        if (res?.error) { setError(res.error); resolve(false); return; }
        resolve(true);
      });
    });
  }, [socket]);

  const sendAction = useCallback((action) => {
    if (!socket) return;
    socket.emit('gameAction', { action }, (res) => {
      if (res?.error) console.warn('Action error:', res.error);
    });
  }, [socket]);

  const sendChat = useCallback((message) => {
    if (!socket) return;
    socket.emit('chatMessage', { message });
  }, [socket]);

  // Best of 3 match functions
  const reportGameWon = useCallback((winnerIndex) => {
    if (!socket) return;
    return new Promise((resolve) => {
      socket.emit('gameWon', { winnerIndex }, (res) => {
        if (res?.error) { setError(res.error); resolve(null); return; }
        resolve(res);
      });
    });
  }, [socket]);

  const updateDeck = useCallback((newDeck, newSideboard) => {
    if (!socket) return;
    return new Promise((resolve) => {
      socket.emit('updateDeck', { newDeck, newSideboard }, (res) => {
        if (res?.error) { setError(res.error); resolve(null); return; }
        resolve(res);
      });
    });
  }, [socket]);

  const chooseFirstPlayer = useCallback((firstPlayerIndex) => {
    if (!socket) return;
    return new Promise((resolve) => {
      socket.emit('chooseFirstPlayer', { firstPlayerIndex }, (res) => {
        if (res?.error) { setError(res.error); resolve(null); return; }
        setBetweenGames(null);
        resolve(res);
      });
    });
  }, [socket]);

  const concedeGame = useCallback(() => {
    if (!socket) return;
    return new Promise((resolve) => {
      socket.emit('concede', {}, (res) => {
        if (res?.error) { setError(res.error); resolve(null); return; }
        resolve(res);
      });
    });
  }, [socket]);

  // Server-side action: sends a game action that the server executes on the true game state.
  // Used for cross-visibility operations (bounce to hand, discard, mulligan, etc.)
  // These bypass the normal stateSync path and operate server-side.
  const serverGameAction = useCallback((action) => {
    if (!socket) return Promise.resolve(null);
    return new Promise((resolve) => {
      socket.emit('gameAction', { action }, (res) => {
        if (res?.error) { setError(res.error); resolve(null); return; }
        resolve(res);
      });
    });
  }, [socket]);

  const leaveRoom = useCallback(() => {
    if (socket) {
      socket.emit('leaveRoom', {});
      // Reset all game state so user returns to a clean lobby
      setRoomInfo(null);
      setPlayerIndex(null);
      setPlayerId(null);
      setGameState(null);
      setLastAction(null);
      setGameStarted(false);
      setOpponentReady(false);
      setOpponentDisconnected(false);
      setChatMessages([]);
      setMatchInfo(null);
      setBetweenGames(null);
      setConcession(null);
      setError(null);
    }
  }, [socket]);

  return {
    socket, connected, roomInfo, playerIndex, playerId,
    error, setError, gameState, lastAction, gameStarted, opponentReady,
    opponentDisconnected, chatMessages,
    createRoom, joinRoom, submitDeck, sendAction, sendChat,
    matchInfo, betweenGames, reportGameWon, updateDeck, chooseFirstPlayer,
    concession, concedeGame, serverGameAction, leaveRoom
  };
}

// ============ MY DECKS MANAGER (pre-game deck management) ============
function MyDecksManager({ onBack }) {
  const [savedDecks, setSavedDecks] = useState(() => getSavedDecks());
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState('');
  const [showPaste, setShowPaste] = useState(false);
  const [pasteText, setPasteText] = useState('');
  const [pasteName, setPasteName] = useState('');
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [notification, setNotification] = useState('');

  const refresh = () => setSavedDecks(getSavedDecks());

  const handleSaveNew = () => {
    if (!pasteName.trim() || !pasteText.trim()) return;
    const entries = parseArenaDecklist(pasteText);
    if (entries.length === 0) { setNotification('No cards detected in decklist'); setTimeout(() => setNotification(''), 2500); return; }
    const total = entries.reduce((s, e) => s + e.qty, 0);
    saveDeckToStorage(pasteName.trim(), pasteText.trim());
    refresh();
    setShowPaste(false);
    setPasteText('');
    setPasteName('');
    setNotification(`Saved "${pasteName.trim()}" (${total} cards)`);
    setTimeout(() => setNotification(''), 2500);
  };

  const handleRename = (id) => {
    if (!editName.trim()) return;
    renameDeckInStorage(id, editName.trim());
    refresh();
    setEditingId(null);
  };

  const handleDelete = (id) => {
    deleteDeckFromStorage(id);
    refresh();
    setConfirmDelete(null);
  };

  const totalPasteCards = (() => {
    if (!pasteText.trim()) return 0;
    return parseArenaDecklist(pasteText).reduce((s, e) => s + e.qty, 0);
  })();

  return (
    <div className="setup-screen" style={{ maxWidth: 520 }}>
      <button className="btn text-xs" onClick={onBack} style={{ marginBottom: 8, opacity: 0.6 }}>&#8592; Back</button>
      <h2 style={{ marginBottom: 4 }}>My Decks</h2>
      <p className="text-sm opacity-50" style={{ marginBottom: 16 }}>
        Build and save decks here so they're ready when you join a game.
      </p>

      {notification && (
        <div style={{ background: 'rgba(94,186,125,0.1)', border: '1px solid rgba(94,186,125,0.3)', borderRadius: 8, padding: '8px 14px', marginBottom: 12, fontSize: 12, color: '#5eba7d' }}>
          {notification}
        </div>
      )}

      {savedDecks.length === 0 && !showPaste && (
        <div style={{ textAlign: 'center', padding: '30px 20px' }}>
          <div style={{ fontSize: 32, marginBottom: 12, opacity: 0.3 }}>&#x1F4BE;</div>
          <div style={{ fontSize: 14, opacity: 0.5, marginBottom: 8 }}>No saved decks yet</div>
          <div style={{ fontSize: 12, opacity: 0.3, marginBottom: 16 }}>
            Create a deck by pasting an Arena-format decklist below.
          </div>
        </div>
      )}

      {!showPaste && savedDecks.length > 0 && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
          {savedDecks.map(saved => {
            const entries = parseArenaDecklist(saved.listText);
            const totalCards = entries.filter(e => !e.inSideboard).reduce((s, e) => s + e.qty, 0);
            const sbCards = entries.filter(e => e.inSideboard).reduce((s, e) => s + e.qty, 0);
            const dateStr = new Date(saved.createdAt).toLocaleDateString();
            return (
              <div key={saved.id} style={{
                padding: '12px 16px', borderRadius: 8,
                background: 'linear-gradient(90deg, rgba(100,180,255,0.06), rgba(100,180,255,0.02))',
                border: '1px solid rgba(100,180,255,0.12)',
              }}>
                {editingId === saved.id ? (
                  <div style={{ display: 'flex', gap: 8 }}>
                    <input value={editName} onChange={e => setEditName(e.target.value)}
                      autoFocus maxLength={40}
                      style={{ flex: 1, padding: '6px 10px', fontSize: 13 }}
                      onKeyDown={e => { if (e.key === 'Enter') handleRename(saved.id); if (e.key === 'Escape') setEditingId(null); }}
                    />
                    <button className="btn btn-gold text-xs" style={{ padding: '6px 12px' }} onClick={() => handleRename(saved.id)}>Save</button>
                    <button className="btn text-xs" style={{ padding: '6px 8px', opacity: 0.5 }} onClick={() => setEditingId(null)}>Cancel</button>
                  </div>
                ) : (
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                      <span style={{ fontWeight: 700, fontSize: 14, color: '#7cb8ff' }}>{saved.name}</span>
                      <div className="text-xs" style={{ opacity: 0.4, marginTop: 2 }}>
                        {totalCards} cards{sbCards > 0 ? ` + ${sbCards} sideboard` : ''} &middot; {dateStr}
                      </div>
                    </div>
                    <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                      <button className="btn text-xs" style={{ padding: '5px 10px', opacity: 0.5 }}
                        onClick={() => { setEditingId(saved.id); setEditName(saved.name); }} title="Rename">
                        &#x270E;
                      </button>
                      {confirmDelete === saved.id ? (
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button className="btn text-xs" style={{ padding: '5px 10px', background: 'rgba(220,60,60,0.2)', border: '1px solid rgba(220,60,60,0.4)', color: '#e67373' }}
                            onClick={() => handleDelete(saved.id)}>Delete</button>
                          <button className="btn text-xs" style={{ padding: '5px 8px', opacity: 0.5 }}
                            onClick={() => setConfirmDelete(null)}>Cancel</button>
                        </div>
                      ) : (
                        <button className="btn text-xs" style={{ padding: '5px 8px', opacity: 0.4 }}
                          onClick={() => setConfirmDelete(saved.id)} title="Delete">
                          &#x2715;
                        </button>
                      )}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {showPaste ? (
        <div style={{ marginTop: 8 }}>
          <input value={pasteName} onChange={e => setPasteName(e.target.value)}
            placeholder="Deck name" maxLength={40}
            style={{ width: '100%', padding: '10px 14px', fontSize: 14, marginBottom: 8, textAlign: 'center' }}
          />
          <textarea
            value={pasteText} onChange={e => setPasteText(e.target.value)}
            placeholder={"Paste Arena-format decklist, e.g.:\n4 Lightning Bolt\n4 Goblin Guide\n20 Mountain\n\nSideboard\n2 Smash to Smithereens"}
            style={{
              width: '100%', height: 220, resize: 'vertical',
              background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)',
              borderRadius: 8, padding: 12, color: '#eee', fontFamily: 'monospace', fontSize: 12,
            }}
          />
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8 }}>
            <span className="text-xs opacity-40">{totalPasteCards > 0 ? `${totalPasteCards} cards detected` : 'No cards detected'}</span>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn text-xs" style={{ padding: '8px 14px', opacity: 0.5 }} onClick={() => { setShowPaste(false); setPasteText(''); setPasteName(''); }}>Cancel</button>
              <button className="btn btn-gold" onClick={handleSaveNew} disabled={!pasteName.trim() || totalPasteCards < 1}>
                Save Deck ({totalPasteCards} cards)
              </button>
            </div>
          </div>
        </div>
      ) : (
        <button className="btn" style={{ width: '100%', padding: 12, marginTop: 4 }}
          onClick={() => setShowPaste(true)}>
          + Create New Deck
        </button>
      )}
    </div>
  );
}

function OnlineSetup({ gameSocket, onGameReady, onBack, avatars, avatarLoading }) {
  const [subPhase, setSubPhase] = useState('nickname');
  const [nickname, setNickname] = useState('');
  const [joinCode, setJoinCode] = useState('');
  const [roomId, setRoomId] = useState(null);
  const [myDeck, setMyDeck] = useState(null);
  const [mySideboard, setMySideboard] = useState([]);
  const [deckSubmitted, setDeckSubmitted] = useState(false);
  const [gameFormat, setGameFormat] = useState('standard');
  const [matchType, setMatchType] = useState('single'); // 'single' | 'bo3'
  const [selectedAvatar, setSelectedAvatar] = useState(null);
  const [saveDeckName, setSaveDeckName] = useState('');
  const [deckSaved, setDeckSaved] = useState(false);
  const [showSaveDeck, setShowSaveDeck] = useState(false);

  const {
    connected, roomInfo, playerIndex, error, setError,
    gameStarted, opponentReady, opponentDisconnected,
    createRoom, joinRoom, submitDeck, gameState
  } = gameSocket;

  useEffect(() => {
    const pathMatch = window.location.pathname.match(/\/game\/([A-Z0-9]{6})/i);
    if (pathMatch) {
      setJoinCode(pathMatch[1].toUpperCase());
      setSubPhase('nickname');
    }
  }, []);

  useEffect(() => {
    if (gameStarted && gameState) {
      onGameReady(gameState, playerIndex, mySideboard);
    }
  }, [gameStarted, gameState, playerIndex, mySideboard]);

  useEffect(() => {
    if (roomInfo && roomInfo.players[0].nickname && roomInfo.players[1].nickname && subPhase === 'waiting') {
      setSubPhase('deck');
    }
  }, [roomInfo, subPhase]);

  if (subPhase === 'nickname') {
    return (
      <div className="setup-screen" style={{ textAlign: 'center' }}>
        <h2 style={{ marginBottom: 16 }}>Enter Your Nickname</h2>
        {!connected && <p style={{ color: '#e67373', fontSize: 12, marginBottom: 8 }}>Connecting to server...</p>}
        {error && <p style={{ color: '#e67373', fontSize: 12, marginBottom: 8 }}>{error}</p>}
        <input
          value={nickname}
          onChange={e => setNickname(e.target.value)}
          placeholder="Your nickname"
          maxLength={20}
          style={{ width: '100%', maxWidth: 300, textAlign: 'center', marginBottom: 16, fontSize: 16, padding: 12 }}
          autoFocus
          onKeyDown={e => {
            if (e.key === 'Enter' && nickname.trim() && connected) {
              setSubPhase(joinCode ? 'joining' : 'create-or-join');
              if (joinCode) {
                joinRoom(joinCode, nickname.trim()).then(res => {
                  if (res) {
                    setRoomId(joinCode);
                    setSubPhase(res.roomInfo?.players[1]?.nickname ? 'deck' : 'waiting');
                  } else {
                    setSubPhase('nickname');
                  }
                });
              }
            }
          }}
        />
        <br />
        <button className="btn btn-gold" disabled={!nickname.trim() || !connected}
          style={{ padding: '12px 32px', fontSize: 14 }}
          onClick={() => {
            if (joinCode) {
              setSubPhase('joining');
              joinRoom(joinCode, nickname.trim()).then(res => {
                if (res) {
                  setRoomId(joinCode);
                  setSubPhase(res.roomInfo?.players[1]?.nickname ? 'deck' : 'waiting');
                } else { setSubPhase('nickname'); }
              });
            } else {
              setSubPhase('create-or-join');
            }
          }}>
          {joinCode ? 'Join Game' : 'Continue'}
        </button>
        <br />
        <button onClick={onBack} style={{ marginTop: 12, background: 'none', border: 'none', color: 'rgba(255,255,255,0.4)', cursor: 'pointer', fontSize: 12 }}>
          Back to Menu
        </button>
      </div>
    );
  }

  if (subPhase === 'create-or-join') {
    return (
      <div className="setup-screen" style={{ textAlign: 'center' }}>
        <h2 style={{ marginBottom: 4 }}>Welcome, {nickname}!</h2>
        <p style={{ opacity: 0.4, fontSize: 12, marginBottom: 24 }}>Create a new game or join an existing one</p>
        {error && <p style={{ color: '#e67373', fontSize: 12, marginBottom: 8 }}>{error}</p>}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, maxWidth: 340, margin: '0 auto' }}>
          <button className="btn btn-gold"
            style={{ padding: 16, fontSize: 15 }}
            onClick={async () => {
              const result = await createRoom(nickname.trim());
              if (result) {
                setRoomId(result.roomId);
                window.history.pushState({}, '', '/game/' + result.roomId);
                setSubPhase('waiting');
              }
            }}>
            Create New Game
          </button>

          <div style={{ display: 'flex', alignItems: 'center', gap: 4, opacity: 0.3 }}>
            <div style={{ flex: 1, height: 1, background: 'rgba(255,255,255,0.2)' }} />
            <span style={{ fontSize: 11 }}>OR</span>
            <div style={{ flex: 1, height: 1, background: 'rgba(255,255,255,0.2)' }} />
          </div>

          <div style={{ display: 'flex', gap: 8 }}>
            <input
              value={joinCode}
              onChange={e => setJoinCode(e.target.value.toUpperCase())}
              placeholder="Enter room code"
              maxLength={6}
              style={{ flex: 1, textAlign: 'center', fontSize: 18, letterSpacing: 4, fontWeight: 700, padding: 12 }}
            />
            <button className="btn btn-gold"
              disabled={joinCode.length < 4}
              style={{ padding: '12px 20px', fontSize: 14 }}
              onClick={async () => {
                const res = await joinRoom(joinCode, nickname.trim());
                if (res) {
                  setRoomId(joinCode);
                  window.history.pushState({}, '', '/game/' + joinCode);
                  setSubPhase(res.roomInfo?.players[1]?.nickname ? 'deck' : 'waiting');
                }
              }}>
              Join
            </button>
          </div>
        </div>

        <div style={{ marginTop: 24, borderTop: '1px solid rgba(255,255,255,0.06)', paddingTop: 16 }}>
          <button onClick={() => setSubPhase('mydecks')}
            style={{
              background: 'rgba(100,180,255,0.06)', border: '1px solid rgba(100,180,255,0.15)',
              borderRadius: 8, padding: '10px 24px', color: '#7cb8ff', cursor: 'pointer',
              fontSize: 13, transition: 'all 0.2s',
            }}>
            My Decks
          </button>
          <div style={{ fontSize: 10, opacity: 0.3, marginTop: 6 }}>Manage saved decks before joining a game</div>
        </div>

        <button onClick={() => setSubPhase('nickname')}
          style={{ marginTop: 16, background: 'none', border: 'none', color: 'rgba(255,255,255,0.4)', cursor: 'pointer', fontSize: 12 }}>
          Back
        </button>
      </div>
    );
  }

  if (subPhase === 'mydecks') {
    return <MyDecksManager onBack={() => setSubPhase('create-or-join')} />;
  }

  if (subPhase === 'joining') {
    return (
      <div className="setup-screen" style={{ textAlign: 'center' }}>
        <h2>Joining game...</h2>
        <div style={{ opacity: 0.5, fontSize: 14, marginTop: 12 }}>Connecting to room {joinCode}</div>
      </div>
    );
  }

  if (subPhase === 'waiting') {
    const shareLink = window.location.origin + '/game/' + roomId;
    return (
      <div className="setup-screen" style={{ textAlign: 'center' }}>
        <h2 style={{ marginBottom: 4 }}>Waiting for Opponent</h2>
        <p style={{ opacity: 0.4, fontSize: 12, marginBottom: 20 }}>Share this link with your friend:</p>

        <div style={{
          background: 'rgba(200,170,60,0.08)', border: '1px solid rgba(200,170,60,0.25)',
          borderRadius: 8, padding: '14px 16px', maxWidth: 420, margin: '0 auto 12px',
          display: 'flex', alignItems: 'center', gap: 10
        }}>
          <code style={{ flex: 1, fontSize: 13, color: '#d4b44a', wordBreak: 'break-all' }}>{shareLink}</code>
          <button className="btn"
            style={{ padding: '6px 12px', fontSize: 11, whiteSpace: 'nowrap', background: 'rgba(200,170,60,0.15)', border: '1px solid rgba(200,170,60,0.3)', borderRadius: 6, color: '#d4b44a', cursor: 'pointer' }}
            onClick={() => { navigator.clipboard.writeText(shareLink); }}>
            Copy
          </button>
        </div>

        <div style={{ marginTop: 8, marginBottom: 16 }}>
          <span style={{
            display: 'inline-block', background: 'rgba(200,170,60,0.1)', border: '1px solid rgba(200,170,60,0.2)',
            borderRadius: 6, padding: '8px 20px', fontSize: 20, letterSpacing: 6, fontWeight: 700, color: '#d4b44a'
          }}>
            {roomId}
          </span>
          <p style={{ opacity: 0.3, fontSize: 10, marginTop: 6 }}>Room Code</p>
        </div>

        <div style={{ marginTop: 24 }}>
          <div className="loading-dots" style={{ display: 'flex', justifyContent: 'center', gap: 6 }}>
            {[0, 1, 2].map(i => (
              <div key={i} style={{
                width: 8, height: 8, borderRadius: '50%', background: 'rgba(200,170,60,0.4)',
                animation: `pulse 1.4s ${i * 0.2}s infinite ease-in-out`
              }} />
            ))}
          </div>
        </div>

        <button onClick={onBack}
          style={{ marginTop: 24, background: 'none', border: 'none', color: 'rgba(255,255,255,0.4)', cursor: 'pointer', fontSize: 12 }}>
          Leave Room
        </button>
      </div>
    );
  }

  if (subPhase === 'deck') {
    if (!myDeck) {
      return (
        <DeckChooser
          playerName={nickname}
          onChoosePreset={(deckData) => {
            setMyDeck(deckData.deck);
            setMySideboard(deckData.sideboard || []);
          }}
          onPasteList={(deckData) => {
            setMyDeck(deckData.deck);
            setMySideboard(deckData.sideboard || []);
          }}
          onBuildCustom={() => setSubPhase('deckbuilder')}
          onBack={() => {}}
        />
      );
    }

    if (!deckSubmitted) {
      return (
        <div className="setup-screen" style={{ textAlign: 'center' }}>
          <h2 style={{ marginBottom: 8 }}>Deck Ready!</h2>
          <p style={{ opacity: 0.5, fontSize: 13, marginBottom: 8 }}>{myDeck.length} cards selected</p>

          {/* Save to My Decks removed — belongs in deck builder, not lobby */}

          {/* Match Type selector */}
          <div style={{ marginBottom: 16, maxWidth: 360, margin: '0 auto 16px' }}>
            <label style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 1, opacity: 0.35, fontWeight: 600, display: 'block', marginBottom: 6 }}>Match Type</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {[
                { id: 'single', label: 'Single Game', desc: 'Play one game' },
                { id: 'bo3', label: 'Best of 3', desc: 'First to 2 wins' }
              ].map(mt => (
                <div key={mt.id} onClick={() => setMatchType(mt.id)}
                  style={{
                    flex: 1, padding: '10px 12px', borderRadius: 8, cursor: 'pointer',
                    background: matchType === mt.id
                      ? 'linear-gradient(135deg, rgba(200,170,60,0.12), rgba(200,170,60,0.04))'
                      : 'rgba(255,255,255,0.03)',
                    border: matchType === mt.id
                      ? '1px solid rgba(200,170,60,0.35)'
                      : '1px solid rgba(255,255,255,0.06)',
                    transition: 'all 0.2s',
                  }}>
                  <div style={{ fontWeight: 700, fontSize: 13, color: matchType === mt.id ? '#d4b44a' : 'rgba(255,255,255,0.7)' }}>{mt.label}</div>
                  <div style={{ fontSize: 10, opacity: 0.5, marginTop: 2 }}>{mt.desc}</div>
                </div>
              ))}
            </div>
            {matchType === 'bo3' && (
              <div style={{ fontSize: 10, opacity: 0.4, marginTop: 6, fontStyle: 'italic' }}>
                Loser of each game chooses who goes first next
              </div>
            )}
          </div>

          <div style={{ marginBottom: 16 }}>
            <label style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 1, opacity: 0.35, fontWeight: 600, display: 'block', marginBottom: 2 }}>Choose Avatar</label>
            <AvatarPicker avatars={avatars} loading={avatarLoading}
              selected={selectedAvatar}
              onSelect={(av) => setSelectedAvatar(av)} />
          </div>

          <button className="btn btn-gold" style={{ padding: '14px 40px', fontSize: 15 }}
            onClick={async () => {
              const ok = await submitDeck(myDeck, selectedAvatar, matchType, mySideboard);
              if (ok) setDeckSubmitted(true);
            }}>
            Submit Deck & Ready Up
          </button>
          <br />
          <button onClick={() => { setMyDeck(null); setDeckSaved(false); setShowSaveDeck(false); setSaveDeckName(''); }}
            style={{ marginTop: 12, background: 'none', border: 'none', color: 'rgba(255,255,255,0.4)', cursor: 'pointer', fontSize: 12 }}>
            Choose different deck
          </button>
        </div>
      );
    }

    return (
      <div className="setup-screen" style={{ textAlign: 'center' }}>
        <h2 style={{ marginBottom: 8 }}>Deck Submitted!</h2>
        {opponentReady ? (
          <p style={{ color: '#5eba7d', fontSize: 14 }}>Both players ready — starting game...</p>
        ) : (
          <>
            <p style={{ opacity: 0.5, fontSize: 13 }}>Waiting for opponent to submit their deck...</p>
            <div style={{ marginTop: 16, display: 'flex', justifyContent: 'center', gap: 6 }}>
              {[0, 1, 2].map(i => (
                <div key={i} style={{
                  width: 8, height: 8, borderRadius: '50%', background: 'rgba(200,170,60,0.4)',
                  animation: `pulse 1.4s ${i * 0.2}s infinite ease-in-out`
                }} />
              ))}
            </div>
          </>
        )}
      </div>
    );
  }

  if (subPhase === 'deckbuilder') {
    return (
      <DeckBuilder
        playerName={nickname}
        existingDeck={null}
        onDone={(deck) => { setMyDeck(deck); setSubPhase('deck'); }}
        onBack={() => setSubPhase('deck')}
      />
    );
  }

  return null;
}

function OnlineGameWrapper({ gameSocket, initialState, playerIndex, onExit, mySideboard }) {
  const { sendAction, gameState: serverState, lastAction: serverLastAction, opponentDisconnected, chatMessages, sendChat,
          matchInfo, betweenGames, reportGameWon, updateDeck, chooseFirstPlayer, concession, concedeGame, serverGameAction } = gameSocket;
  const [chatOpen, setChatOpen] = useState(false);
  const [chatInput, setChatInput] = useState('');
  const [sideboardMode, setSideboardMode] = useState(false);
  const [currentDeck, setCurrentDeck] = useState([]);
  const [currentSideboard, setCurrentSideboard] = useState([]);
  const myName = initialState.players[playerIndex].nickname;
  const oppName = initialState.players[playerIndex === 0 ? 1 : 0].nickname;

  // Initialize deck and sideboard from props
  useEffect(() => {
    if (mySideboard && mySideboard.length > 0) {
      setCurrentSideboard([...mySideboard]);
      // Initialize current deck to empty (will be populated from server when sidebaording starts)
      setCurrentDeck([]);
    }
  }, []);

  // When between-games phase starts and player has sideboard, enable sideboard mode
  useEffect(() => {
    if (betweenGames && mySideboard && mySideboard.length > 0) {
      setSideboardMode(true);
      // Get current main deck from server state (it was the deck from the previous game)
      // For now, we keep an empty deck; actual deck cards would need to be sent from server
      setCurrentDeck([]);
    }
  }, [betweenGames, mySideboard]);

  return (
    <div style={{ position: 'relative', width: '100%', height: '100%' }}>
      {/* Between-Games Overlay (Bo3) */}
      {betweenGames && (
        <div style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.88)',
          display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999,
        }}>
          <div style={{
            background: 'linear-gradient(160deg, #1e1c30, #12101f)', borderRadius: 16, padding: 32,
            maxWidth: sideboardMode ? 800 : 460, textAlign: sideboardMode ? 'left' : 'center', width: '90%',
            border: '1px solid rgba(200,170,60,0.3)', boxShadow: '0 16px 64px rgba(0,0,0,0.7), 0 0 40px rgba(200,170,60,0.08)',
            maxHeight: '90vh', overflowY: 'auto'
          }}>
            {sideboardMode && currentSideboard.length > 0 ? (
              // SIDEBOARD SWAP UI
              <div>
                <h2 style={{ color: '#d4b44a', fontSize: 18, marginBottom: 16, textAlign: 'center' }}>Sideboard Swap</h2>
                <div style={{ display: 'flex', gap: 16, marginBottom: 16 }}>
                  {/* Main Deck Column */}
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, opacity: 0.6, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Main Deck ({currentDeck.reduce((s, e) => s + e.qty, 0)})</div>
                    <div style={{
                      background: 'rgba(255,255,255,0.02)', border: '1px solid rgba(255,255,255,0.06)',
                      borderRadius: 8, padding: 12, minHeight: 300, maxHeight: 400, overflowY: 'auto'
                    }}>
                      {currentDeck.length > 0 ? (
                        currentDeck.map((entry, idx) => (
                          <div key={`deck-${idx}`} onClick={() => {
                            setCurrentSideboard([...currentSideboard, entry]);
                            setCurrentDeck(currentDeck.filter((_, i) => i !== idx));
                          }} style={{
                            padding: '6px 10px', borderRadius: 4, cursor: 'pointer', fontSize: 12,
                            background: 'rgba(255,255,255,0.03)', marginBottom: 4,
                            border: '1px solid rgba(255,255,255,0.08)',
                            transition: 'all 0.15s', display: 'flex', justifyContent: 'space-between'
                          }} onMouseEnter={e => {
                            e.currentTarget.style.background = 'rgba(200,170,60,0.12)';
                            e.currentTarget.style.borderColor = 'rgba(200,170,60,0.2)';
                          }} onMouseLeave={e => {
                            e.currentTarget.style.background = 'rgba(255,255,255,0.03)';
                            e.currentTarget.style.borderColor = 'rgba(255,255,255,0.08)';
                          }}>
                            <span>{entry.qty}x {entry.card.name}</span>
                            <span style={{ opacity: 0.4 }}>→</span>
                          </div>
                        ))
                      ) : (
                        <div style={{ textAlign: 'center', opacity: 0.4, fontSize: 12, padding: 20 }}>Empty</div>
                      )}
                    </div>
                  </div>

                  {/* Sideboard Column */}
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, opacity: 0.6, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Sideboard ({currentSideboard.reduce((s, e) => s + e.qty, 0)})</div>
                    <div style={{
                      background: 'rgba(255,255,255,0.02)', border: '1px solid rgba(255,255,255,0.06)',
                      borderRadius: 8, padding: 12, minHeight: 300, maxHeight: 400, overflowY: 'auto'
                    }}>
                      {currentSideboard.length > 0 ? (
                        currentSideboard.map((entry, idx) => (
                          <div key={`sideboard-${idx}`} onClick={() => {
                            setCurrentDeck([...currentDeck, entry]);
                            setCurrentSideboard(currentSideboard.filter((_, i) => i !== idx));
                          }} style={{
                            padding: '6px 10px', borderRadius: 4, cursor: 'pointer', fontSize: 12,
                            background: 'rgba(255,255,255,0.03)', marginBottom: 4,
                            border: '1px solid rgba(255,255,255,0.08)',
                            transition: 'all 0.15s', display: 'flex', justifyContent: 'space-between'
                          }} onMouseEnter={e => {
                            e.currentTarget.style.background = 'rgba(200,170,60,0.12)';
                            e.currentTarget.style.borderColor = 'rgba(200,170,60,0.2)';
                          }} onMouseLeave={e => {
                            e.currentTarget.style.background = 'rgba(255,255,255,0.03)';
                            e.currentTarget.style.borderColor = 'rgba(255,255,255,0.08)';
                          }}>
                            <span>{entry.qty}x {entry.card.name}</span>
                            <span style={{ opacity: 0.4 }}>←</span>
                          </div>
                        ))
                      ) : (
                        <div style={{ textAlign: 'center', opacity: 0.4, fontSize: 12, padding: 20 }}>Empty</div>
                      )}
                    </div>
                  </div>
                </div>

                <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginBottom: 16 }}>
                  <span style={{ fontSize: 11, opacity: 0.5, alignSelf: 'center' }}>Deck and sideboard must have equal card count</span>
                </div>

                <button className="btn btn-gold" style={{ width: '100%', padding: '12px', fontSize: 14, marginBottom: 12 }}
                  onClick={async () => {
                    await updateDeck(currentDeck, currentSideboard);
                    setSideboardMode(false);
                  }}>
                  Done Sideboarding
                </button>
              </div>
            ) : (
              // CHOOSE FIRST PLAYER UI
              <div>
                <div style={{ fontSize: 40, marginBottom: 8, textAlign: 'center' }}>⚔️</div>
                <h2 style={{ color: '#d4b44a', fontSize: 22, marginBottom: 12, textAlign: 'center' }}>Game {betweenGames.nextGame}</h2>
                <div style={{
                  display: 'flex', justifyContent: 'center', gap: 24, marginBottom: 20,
                  fontSize: 28, fontWeight: 700, color: '#e8e4dc'
                }}>
                  <div style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: 11, opacity: 0.4, marginBottom: 4 }}>{myName}</div>
                    <div style={{ color: '#d4b44a' }}>{betweenGames.matchScore[playerIndex]}</div>
                  </div>
                  <div style={{ fontSize: 16, opacity: 0.3, alignSelf: 'flex-end', paddingBottom: 4 }}>—</div>
                  <div style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: 11, opacity: 0.4, marginBottom: 4 }}>{oppName}</div>
                    <div style={{ color: '#e8e4dc' }}>{betweenGames.matchScore[playerIndex === 0 ? 1 : 0]}</div>
                  </div>
                </div>

                {betweenGames.loserIndex === playerIndex ? (
                  <div>
                    <p style={{ opacity: 0.6, fontSize: 13, marginBottom: 16, textAlign: 'center' }}>You lost the last game. Choose who goes first:</p>
                    <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
                      <button className="btn btn-gold" style={{ padding: '12px 24px', fontSize: 14 }}
                        onClick={() => chooseFirstPlayer(playerIndex)}>
                        I Go First
                      </button>
                      <button className="btn" style={{ padding: '12px 24px', fontSize: 14, background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.15)', borderRadius: 8, color: 'rgba(255,255,255,0.7)', cursor: 'pointer' }}
                        onClick={() => chooseFirstPlayer(playerIndex === 0 ? 1 : 0)}>
                        Opponent Goes First
                      </button>
                    </div>
                  </div>
                ) : (
                  <div>
                    <p style={{ opacity: 0.6, fontSize: 13, marginBottom: 12, textAlign: 'center' }}>You won the last game! Waiting for opponent to choose who goes first...</p>
                    <div style={{ display: 'flex', justifyContent: 'center', gap: 6 }}>
                      {[0, 1, 2].map(i => (
                        <div key={i} style={{
                          width: 8, height: 8, borderRadius: '50%', background: 'rgba(200,170,60,0.5)',
                          animation: `pulse 1.4s ${i * 0.2}s infinite ease-in-out`
                        }} />
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}

      {opponentDisconnected && (
        <div style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 9999,
          background: 'rgba(230,100,100,0.9)', color: '#fff', textAlign: 'center',
          padding: '8px 16px', fontSize: 13, fontWeight: 600
        }}>
          Opponent disconnected — waiting for reconnection...
        </div>
      )}

      <div style={{
        position: 'fixed', bottom: 16, right: 16, zIndex: 9998,
        display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 8
      }}>
        {chatOpen && (
          <div style={{
            width: 300, maxHeight: 320, background: 'rgba(15,15,25,0.95)',
            border: '1px solid rgba(200,170,60,0.2)', borderRadius: 10,
            display: 'flex', flexDirection: 'column', overflow: 'hidden'
          }}>
            <div style={{ padding: '8px 12px', borderBottom: '1px solid rgba(255,255,255,0.06)', fontSize: 11, fontWeight: 700, opacity: 0.5 }}>
              CHAT
            </div>
            <div style={{ flex: 1, overflowY: 'auto', padding: 8, display: 'flex', flexDirection: 'column', gap: 4, maxHeight: 220 }}>
              {chatMessages.map((msg, i) => (
                <div key={i} style={{ fontSize: 12, color: msg.playerIndex === playerIndex ? '#d4b44a' : '#7eb8da' }}>
                  <strong>{msg.from}:</strong> {msg.message}
                </div>
              ))}
              {chatMessages.length === 0 && <div style={{ opacity: 0.3, fontSize: 11 }}>No messages yet</div>}
            </div>
            <div style={{ display: 'flex', borderTop: '1px solid rgba(255,255,255,0.06)' }}>
              <input
                value={chatInput}
                onChange={e => setChatInput(e.target.value)}
                onKeyDown={e => {
                  if (e.key === 'Enter' && chatInput.trim()) {
                    sendChat(chatInput.trim());
                    setChatInput('');
                  }
                }}
                placeholder="Type a message..."
                style={{ flex: 1, padding: '8px 10px', fontSize: 12, background: 'transparent', border: 'none', color: '#e8e4dc', outline: 'none' }}
              />
            </div>
          </div>
        )}
        <button
          onClick={() => setChatOpen(!chatOpen)}
          style={{
            width: 42, height: 42, borderRadius: '50%', border: '1px solid rgba(200,170,60,0.3)',
            background: 'rgba(200,170,60,0.1)', color: '#d4b44a', cursor: 'pointer', fontSize: 18
          }}>
          {chatOpen ? '\u2715' : '\u{1F4AC}'}
        </button>
      </div>

      <GameErrorBoundary onExit={onExit}>
        <GameBoard
          players={[
            initialState.players[0].nickname || 'Player 1',
            initialState.players[1].nickname || 'Player 2'
          ]}
          decks={[[], []]}
          avatars={initialState.avatars || [null, null]}
          onExit={onExit}
          gameFormat="standard"
          commanders={[null, null]}
          onlineMode={true}
          onlinePlayerIndex={playerIndex}
          onlineState={serverState || initialState}
          onlineLastAction={serverLastAction}
          onStateChange={(newState) => {
            sendAction({ type: 'stateSync', state: newState });
          }}
          matchInfo={matchInfo}
          onGameWon={(winnerIndex) => reportGameWon(winnerIndex)}
          onConcede={concedeGame}
          concession={concession}
          serverGameAction={serverGameAction}
        />
      </GameErrorBoundary>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// ═══ APP — Mode switcher (now with online support) ═══════════
// ════════════════════════════════════════════════════════════════

function App() {
  const [avatars, setAvatars] = useState([]);
  const [avatarLoading, setAvatarLoading] = useState(true);
  const [onlineGameState, setOnlineGameState] = useState(null);
  const [onlinePlayerIndex, setOnlinePlayerIndex] = useState(null);
  const [mySideboard, setMySideboard] = useState([]);
  const gameSocket = useGameSocket();

  useEffect(() => {
    fetchAvatarImages().then(results => {
      setAvatars(results);
      setAvatarLoading(false);
    });
  }, []);

  if (onlineGameState) {
    return (
      <OnlineGameWrapper
        gameSocket={gameSocket}
        initialState={onlineGameState}
        playerIndex={onlinePlayerIndex}
        mySideboard={mySideboard}
        onExit={() => {
          gameSocket.leaveRoom();
          setOnlineGameState(null);
          setOnlinePlayerIndex(null);
          setMySideboard([]);
          window.history.pushState({}, '', '/');
        }}
      />
    );
  }

  return (
    <OnlineSetup
      gameSocket={gameSocket}
      avatars={avatars}
      avatarLoading={avatarLoading}
      onGameReady={(state, pIdx, sideboard) => {
        setOnlineGameState(state);
        setOnlinePlayerIndex(pIdx);
        setMySideboard(sideboard || []);
      }}
      onBack={() => {
        window.history.pushState({}, '', '/');
      }}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
