                e.preventDefault();
                // Online mode: disable library context menu for opponent
                if (onlineMode && pIdx !== onlinePlayerIndex) return;
                const actions = [];
                actions.push({ label: `📚 Library (${p.libraryCount ?? p.library.length} cards)`, disabled: true });
                actions.push({ sep: true });
                actions.push({ label: '🔍 Search Library', fn: () => setShowLibrarySearch(pIdx) });
                actions.push({ label: '👁 Look at Top 1', fn: () => setScryView({ pIdx, count: 1, mode: 'scry' }) });
                actions.push({ label: '👁 Look at Top 3', fn: () => setScryView({ pIdx, count: 3, mode: 'scry' }) });
                actions.push({ label: '👁 Look at Top X...', fn: () => {
                  const x = prompt('How many cards to look at?');
                  const n = parseInt(x);
                  if (!isNaN(n) && n > 0) setScryView({ pIdx, count: Math.min(n, p.library.length), mode: 'scry' });
                }});
                actions.push({ sep: true });
                actions.push({ label: '🔥 Impulse Draw 2 (exile top 2, play them)', fn: () => {
                  const lib = p.library;
                  const count = Math.min(2, lib.length);
                  if (count === 0) { setCastError({ pIdx, message: 'Library is empty!' }); setTimeout(() => setCastError(null), 1500); return; }
                  const exiledCards = lib.slice(0, count).map(c => ({ ...c, exilePlayable: true, exilePlayableBy: pIdx, exilePlayableTurn: turnCount + 1 }));
                  setState(pIdx, prev => ({ ...prev, library: prev.library.slice(count), exile: [...prev.exile, ...exiledCards] }));
                  setCastError({ pIdx, message: `🔥 Exiled top ${count} — play from exile until end of next turn!` });
                  setTimeout(() => setCastError(null), 2500);
                }});
                actions.push({ label: '🔥 Impulse Draw X...', fn: () => {
                  const x = prompt('How many cards to exile and play?');
                  const n = parseInt(x);
                  if (isNaN(n) || n < 1) return;
                  const lib = p.library;
                  const count = Math.min(n, lib.length);
                  if (count === 0) { setCastError({ pIdx, message: 'Library is empty!' }); setTimeout(() => setCastError(null), 1500); return; }
                  const exiledCards = lib.slice(0, count).map(c => ({ ...c, exilePlayable: true, exilePlayableBy: pIdx, exilePlayableTurn: turnCount + 1 }));
                  setState(pIdx, prev => ({ ...prev, library: prev.library.slice(count), exile: [...prev.exile, ...exiledCards] }));
                  setCastError({ pIdx, message: `🔥 Exiled top ${count} — play from exile until end of next turn!` });
                  setTimeout(() => setCastError(null), 2500);
                }});
                actions.push({ sep: true });
                actions.push({ label: '🤚 Draw 1', fn: () => drawCard(pIdx) });
                actions.push({ label: '🤚 Draw X...', fn: () => {
                  const x = prompt('How many cards to draw?');
                  const n = parseInt(x);
                  if (!isNaN(n) && n > 0) { for (let di = 0; di < n; di++) drawCard(pIdx); }
                }});
                actions.push({ label: '💀 Mill 1', fn: () => millCards(pIdx, 1) });
                actions.push({ label: '💀 Mill X...', fn: () => {
                  const x = prompt('How many cards to mill?');
                  const n = parseInt(x);
                  if (!isNaN(n) && n > 0) millCards(pIdx, n);
                }});
                actions.push({ sep: true });
                actions.push({ label: '🔀 Shuffle Library', fn: () => {
                  setState(pIdx, prev => {
                    const shuffled = [...prev.library];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                      const j = Math.floor(Math.random() * (i + 1));
                      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    return { ...prev, library: shuffled };
                  });
                  setCastError({ pIdx, message: '🔀 Library shuffled!' });
                  setTimeout(() => setCastError(null), 1500);
                }});
                setContextMenu({ x: e.clientX, y: e.clientY, items: actions });
              }}>
              Lib ({p.libraryCount ?? p.library.length})
            </button>
          </div>
        </div>

        {/* Cost Modifier Reminders */}
        {(() => {
          const opIdx = pIdx === 0 ? 1 : 0;
          const mods = getCostModifiers(p.battlefield, getState(opIdx).battlefield);
          const relevant = mods.filter(m => m.affectsWho === 'you' || m.affectsWho === 'both');
          if (relevant.length === 0) return null;
          return (
            <div style={{
              display: 'flex', flexWrap: 'wrap', gap: 4, padding: '3px 8px',
              background: 'rgba(200,60,60,0.08)', borderBottom: '1px solid rgba(200,60,60,0.15)',
            }}>
              {relevant.map((m, i) => (
                <span key={i} style={{
                  fontSize: 10, color: m.icon === '💎' ? '#60c080' : '#e8a060',
                  fontWeight: 600, padding: '1px 6px', borderRadius: 3,
                  background: m.icon === '💎' ? 'rgba(60,180,100,0.1)' : 'rgba(200,120,40,0.1)',
                  border: `1px solid ${m.icon === '💎' ? 'rgba(60,180,100,0.2)' : 'rgba(200,120,40,0.2)'}`,
                }}>{m.icon} {m.source}: {m.text}</span>
              ))}
            </div>
          );
        })()}

        <div className="battlefield" style={{ flex: 1, minHeight: 0 }}>
          {battlefieldRows}
        </div>

        <div className="hand-zone">
          {(onlineMode ? pIdx !== onlinePlayerIndex : pIdx !== activePlayer) ? (
            <>
              {p.hand.map((card) => (
                <div key={card.id || uid()}><div className="card-back" /></div>
              ))}
              {(() => { const count = p.handCount ?? p.hand.length; return count === 0
                ? <span className="text-xs" style={{ padding: 20, opacity: 0.25 }}>Hand empty</span>
                : <span className="hand-hidden-label">{count} cards</span>;
              })()}
            </>
          ) : (
            <>
              {p.hand.map((card, idx) => (
                <div key={card.id}
                  draggable
                  onDragStart={(e) => { e.dataTransfer.setData('handDragIdx', String(idx)); e.dataTransfer.setData('handDragPlayer', String(pIdx)); }}
                  onDragOver={(e) => { e.preventDefault(); e.currentTarget.style.borderLeft = '2px solid #d4b44a'; }}
                  onDragLeave={(e) => { e.currentTarget.style.borderLeft = 'none'; }}
                  onDrop={(e) => {
                    e.preventDefault();
                    e.currentTarget.style.borderLeft = 'none';
                    const fromPlayer = parseInt(e.dataTransfer.getData('handDragPlayer'));
                    if (fromPlayer !== pIdx) return;
                    const fromIdx = parseInt(e.dataTransfer.getData('handDragIdx'));
                    if (fromIdx === idx) return;
                    setState(pIdx, prev => {
                      const hand = [...prev.hand];
                      const [moved] = hand.splice(fromIdx, 1);
                      hand.splice(idx, 0, moved);
                      return { ...prev, hand };
                    });
                  }}
                  style={{ cursor: 'grab' }}>
                  <CardDisplay card={card} size={62}
                    onClick={() => { if (onlineMode && pIdx !== onlinePlayerIndex) return; playCardFromHand(pIdx, card); }}
                    onContext={(e) => handleContext(e, card, pIdx, 'hand')}
                    dynamicBadge={getHandCardDynamicValue(card, p)}
                    showPreview />
                </div>
              ))}
              {p.hand.length === 0 && <span className="text-xs" style={{ padding: 20, opacity: 0.25 }}>Hand empty</span>}
            </>
          )}
          {castError && castError.pIdx === pIdx && (
            <div style={{
              position: 'absolute', top: -24, left: '50%', transform: 'translateX(-50%)',
              background: castError.message.startsWith('Cast ') ? 'rgba(60,160,60,0.9)' : 'rgba(200,40,40,0.9)',
              color: '#fff', padding: '3px 10px',
              borderRadius: 6, fontSize: 11, fontWeight: 600, whiteSpace: 'nowrap',
              animation: 'fadeIn 0.2s ease',
            }}>{castError.message}</div>
          )}
        </div>
      </>
    );

    return (
      <div className={`player-area ${inverted ? 'top' : ''}`} style={{ flex: 1, minHeight: 0 }}>
        {content}
      </div>
    );
  };

  // ═══════════════════════════════════════════════════════════════
  // §11. RENDER (JSX)
  // ═══════════════════════════════════════════════════════════════
  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* Mulligan Phase Overlay */}
      {mulliganPhase && (
        <div style={{
          position: 'fixed', inset: 0, background: 'rgba(5,5,12,0.92)', zIndex: 3000,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          backdropFilter: 'blur(8px)',
        }}>
          {/* Online mode: show waiting screen when it's opponent's mulligan turn */}
          {onlineMode && mulliganPlayer !== onlinePlayerIndex ? (
            <div style={{ textAlign: 'center' }}>
              <h2 style={{ color: '#d4b44a', fontSize: 20, marginBottom: 8, fontWeight: 800 }}>Mulligan Phase</h2>
              <p style={{ opacity: 0.5, fontSize: 13 }}>Waiting for opponent to decide...</p>
              <div className="loading-dots" style={{ marginTop: 12 }}><span>.</span><span>.</span><span>.</span></div>
            </div>
          ) :
          (() => {
            const pIdx = mulliganPlayer;
            const p = getState(pIdx);
            const count = mulliganCounts[pIdx];
            const handSize = p.hand.length;
            return (
              <div style={{ maxWidth: 700, width: '95%', textAlign: 'center' }}>
                {pIdx === startingPlayer && count === 0 && mulliganCounts[startingPlayer === 0 ? 1 : 0] === 0 && (
                  <div style={{
                    marginBottom: 12, padding: '6px 16px', borderRadius: 8,
                    background: 'rgba(200,170,60,0.08)', border: '1px solid rgba(200,170,60,0.15)',
                    fontSize: 12, color: 'rgba(200,170,60,0.8)',
                  }}>
                    🪙 Coin flip: <strong>{getState(startingPlayer).name}</strong> goes first!
                  </div>
                )}
                <h2 style={{ color: '#d4b44a', fontSize: 20, marginBottom: 4, fontWeight: 800 }}>
                  {p.name} — Opening Hand
                </h2>
                <p style={{ opacity: 0.5, fontSize: 12, marginBottom: 16 }}>
                  {count === 0
                    ? 'Starting hand (7 cards). Keep or mulligan?'
                    : `Mulligan ${count} — Drawing ${handSize} card${handSize !== 1 ? 's' : ''}. Keep or mulligan again?`}
                </p>

                {/* Show current hand */}
                <div style={{
                  display: 'flex', gap: 6, justifyContent: 'center', flexWrap: 'wrap',
                  marginBottom: 20, padding: 12,
                  background: 'rgba(255,255,255,0.02)', borderRadius: 10,
                  border: '1px solid rgba(255,255,255,0.04)',
                }}>
                  {p.hand.map(card => (
                    <CardDisplay key={card.id} card={card} size={80} showPreview />
                  ))}
                  {p.hand.length === 0 && (
                    <span style={{ padding: 30, opacity: 0.3, fontSize: 13 }}>No cards</span>
                  )}
                </div>

                <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
                  {(!onlineMode || onlinePlayerIndex === pIdx) ? (
                    <>
                      <button className="btn btn-gold" style={{ padding: '12px 32px', fontSize: 15, fontWeight: 700 }}
                        onClick={() => keepHand(pIdx)}>
                        Keep Hand ({handSize} cards)
                      </button>
                      {handSize > 0 && (
                        <button className="btn" style={{ padding: '12px 24px', fontSize: 14, borderColor: 'rgba(220,80,60,0.3)', color: '#dc8060' }}
                          onClick={() => doMulligan(pIdx)}>
                          Mulligan (draw {Math.max(0, 7 - (count + 1))})
                        </button>
                      )}
                    </>
                  ) : (
                    <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)', fontStyle: 'italic', padding: '12px 0' }}>
                      Waiting for {p.name} to decide...
                    </div>
                  )}
                </div>

                {mulliganPlayer === 1 && mulliganCounts[0] > 0 && (
                  <p style={{ marginTop: 12, fontSize: 11, opacity: 0.35 }}>
                    {getState(0).name} kept {7 - mulliganCounts[0]} cards after {mulliganCounts[0]} mulligan{mulliganCounts[0] > 1 ? 's' : ''}
                  </p>
                )}
              </div>
            );
          })()}
        </div>
      )}

      <div className="top-bar">
        <span className="top-bar-title">MTG Board{onlineMode ? ' (Online)' : ''}</span>
        <div className="flex items-center gap-2">
          <span className="turn-badge">Turn {turnCount}{onlineMode ? ` — ${activePlayer === onlinePlayerIndex ? 'Your turn' : "Opponent's turn"}` : ''}</span>
          <span style={{ fontSize: 9, opacity: 0.25, cursor: 'default' }} title="Press Enter to open chat">💬</span>
          {!combatState && (currentPhase === 'main1' || currentPhase === 'main2') && !(onlineMode && activePlayer !== onlinePlayerIndex) && (
            <button className="btn text-xs" style={{ borderColor: 'rgba(220,60,40,0.3)', color: '#dc5040', ...((onlineMode && activePlayer !== onlinePlayerIndex) ? { opacity: 0.3, cursor: 'not-allowed' } : {}) }} disabled={onlineMode && activePlayer !== onlinePlayerIndex} onClick={() => { if (onlineMode && activePlayer !== onlinePlayerIndex) return; enterCombat(); }}>⚔ Combat</button>
          )}
          <button className="btn text-xs btn-gold" disabled={!!combatState || endOfTurnRespond || (onlineMode && activePlayer !== onlinePlayerIndex)} style={(combatState || endOfTurnRespond || (onlineMode && activePlayer !== onlinePlayerIndex)) ? { opacity: 0.3, cursor: 'not-allowed' } : {}} onClick={() => {
            if (combatState || endOfTurnRespond) return;
            if (onlineMode && activePlayer !== onlinePlayerIndex) return;
            // Show end-of-turn priority window so opponent can respond with instants
            // Safety: clear any lingering overlay state that would block the end-of-turn overlay
            setSpellTargeting(null);
            setModalChoice(null);
            setInstantCasting(null);
            setEndOfTurnRespond(true);
            setCurrentPhase('end');
          }}>Pass Turn</button>
          <button className="btn btn-danger text-xs" onClick={onExit}>Exit</button>
        </div>
      </div>

      <div style={{ display: 'flex', flex: 1, minHeight: 0, marginBottom: instantCasting ? 190 : 0, transition: 'margin 0.15s ease' }}>
        <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0, overflow: 'auto' }}>
          <PlayerArea pIdx={topPlayerIdx} inverted />

          {/* Combat Log Message */}
          {combatLog && !combatState && (
            <div style={{
              textAlign: 'center', padding: '4px 16px', fontSize: 12, fontWeight: 700,
              color: 'rgba(220,80,60,0.9)', background: 'rgba(220,60,40,0.06)',
              borderRadius: 6, margin: '0 8px',
              animation: 'fadeIn 0.3s ease',
            }}>{combatLog}</div>
          )}

          {/* Spell Targeting Bar */}
          {spellTargeting && (
            <div className="spell-target-bar">
              <span className="target-label">🎯 {getDisplayName(spellTargeting.card)}</span>
              <span className="target-hint">
                {spellTargeting.effects.map(e => e.description).join(', ')} — Click a target
                {spellTargeting.effects.some(e => e.type === 'damage' && (e.targetDesc === 'any target' || e.targetDesc?.includes('player')))
                  ? ' or click a player' : ''}
              </span>
              <button className="btn" style={{ borderColor: 'rgba(100,170,255,0.3)', color: '#6af', fontSize: 10 }} onClick={cancelSpellTargeting}>Cancel</button>
            </div>
          )}

          {/* Ability Targeting Bar — only show if stack is not minimized (minimized bar has its own targeting hint) */}
          {abilityTargeting && !stackMinimized && (
            <div className="spell-target-bar" style={{ borderColor: 'rgba(220,160,60,0.4)' }}>
              <span className="target-label" style={{ color: '#e0a040' }}>🎯 {abilityTargeting.card._reskin?.name || abilityTargeting.card.name}</span>
              <span className="target-hint">
                {abilityTargeting.ability.label} — Click a target creature
              </span>
              <button className="btn" style={{ borderColor: 'rgba(220,160,60,0.3)', color: '#e0a040', fontSize: 10 }} onClick={() => {
                setAbilityTargeting(null);
                setStackMinimized(false);
                setCastError(null);
              }}>Cancel</button>
            </div>
          )}

          {/* Combat Control Bar */}
          {combatState ? (
            <div className="combat-bar">
              <span className="combat-label">
                {combatState.phase === 'attackers' ? '⚔ Declare Attackers' :
                 combatState.phase === 'pw-targets' ? '🎯 Assign Attack Targets' :
                 combatState.phase === 'post-attackers' ? '⚡ After Attackers — Priority' :
                 combatState.phase === 'blockers' ? '🛡 Declare Blockers' :
                 combatState.phase === 'combat-respond' ? '⚡ Before Damage' :
                 combatState.phase === 'damage' ? '💥 Resolving Damage...' : 'Combat'}
              </span>
              {/* Force Resolve removed - the root cause (combatState null not syncing)
                is now fixed. Combat damage resolves automatically. */}
              <span className="combat-hint">
                {combatState.phase === 'attackers'
                  ? `${getState(activePlayer).name}: Click creatures to attack (${combatState.attackers.length} selected)`
                  : combatState.phase === 'pw-targets'
                  ? `Choose target for each attacker: opponent or their Planeswalker`
                  : combatState.phase === 'post-attackers'
                  ? `Both players may cast instants or activate abilities before blockers`
                  : combatState.phase === 'blockers'
                  ? combatState.selectedBlocker
                    ? `Now click an attacker to block it`
                    : `${getState(activePlayer === 0 ? 1 : 0).name}: Click your creature to block with, then the attacker`
                  : combatState.phase === 'combat-respond'
                  ? `${getState(activePlayer).name}: Cast spells before damage, or proceed`
                  : ''}
              </span>
              {combatState.phase === 'attackers' && (!onlineMode || activePlayer === onlinePlayerIndex) && (
                <>
                  <button className="btn btn-gold" onClick={() => {
                    SFX.attack();
                    confirmAttackers();
                  }}>Confirm Attackers ({combatState.attackers.length})</button>
                  <button className="btn" onClick={cancelCombat}>Cancel</button>
                </>
              )}
              {combatState.phase === 'pw-targets' && (!onlineMode || activePlayer === onlinePlayerIndex) && (() => {
                const defendingPlayer = activePlayer === 0 ? 1 : 0;
                const defenderPWs = getState(defendingPlayer).battlefield.filter(c => isPlaneswalker(c));
                const attackerState = getState(activePlayer);
                return (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 4, width: '100%', marginTop: 4 }}>
                    {combatState.attackers.map(attackerId => {
                      const attacker = attackerState.battlefield.find(c => c.id === attackerId);
                      if (!attacker) return null;
                      const currentTarget = (combatState.attackTargets || {})[attackerId] || 'player';
                      return (
                        <div key={attackerId} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, padding: '2px 6px', background: 'rgba(255,255,255,0.03)', borderRadius: 4 }}>
                          <span style={{ fontWeight: 600, color: '#e8c96a', minWidth: 100 }}>{attacker.name}</span>
                          <span style={{ opacity: 0.5 }}>→</span>
                          <button
                            className="btn"
                            style={{
                              fontSize: 10, padding: '1px 8px',
                              borderColor: currentTarget === 'player' ? 'rgba(220,60,40,0.6)' : 'rgba(255,255,255,0.1)',
                              color: currentTarget === 'player' ? '#ef5555' : '#888',
                              background: currentTarget === 'player' ? 'rgba(220,60,40,0.1)' : 'transparent',
                            }}
                            onClick={() => setAttackTarget(attackerId, 'player')}
                          >{getState(defendingPlayer).name}</button>
                          {defenderPWs.map(pw => (
                            <button
                              key={pw.id}
                              className="btn"
                              style={{
                                fontSize: 10, padding: '1px 8px',
                                borderColor: currentTarget === pw.id ? 'rgba(200,170,60,0.6)' : 'rgba(255,255,255,0.1)',
                                color: currentTarget === pw.id ? '#e8c96a' : '#888',
                                background: currentTarget === pw.id ? 'rgba(200,170,60,0.1)' : 'transparent',
                              }}
                              onClick={() => setAttackTarget(attackerId, pw.id)}
                            >{pw.name} ({(pw.counters && pw.counters['loyalty']) || '?'})</button>
                          ))}
                        </div>
                      );
                    })}
                    <div style={{ display: 'flex', gap: 6, justifyContent: 'center', marginTop: 2 }}>
                      <button className="btn btn-gold" onClick={confirmPwTargets}>Confirm Targets</button>
                    </div>
                  </div>
                );
              })()}
              {combatState.phase === 'post-attackers' && (() => {
                const defendingPlayer = activePlayer === 0 ? 1 : 0;
                const isDefender = onlineMode && onlinePlayerIndex === defendingPlayer;
                const isAttacker = onlineMode && onlinePlayerIndex === activePlayer;
                return (
                  <>
                    {/* Both players can cast instants/cycle after attackers, before blockers */}
                    {(!onlineMode || isAttacker) && (
                      <button className="btn" style={{ borderColor: 'rgba(200,170,60,0.3)', color: '#e8c96a', fontSize: 11 }}
                        onClick={() => respondInCombat(activePlayer)}>⚡ {getState(activePlayer).name}: Cast Spell</button>
                    )}
                    {(!onlineMode || isDefender) && (
                      <button className="btn" style={{ borderColor: 'rgba(100,200,255,0.4)', color: '#6cf', fontSize: 11 }}
                        onClick={() => respondInCombat(defendingPlayer)}>⚡ {getState(defendingPlayer).name}: Cast/Cycle</button>
                    )}
                    {/* Defender controls the flow: Proceed to Blockers */}
                    {(!onlineMode || isDefender) && (
                      <button className="btn btn-primary" onClick={proceedToBlockers}>Proceed to Blockers →</button>
                    )}
                    {/* Attacker sees waiting message */}
                    {onlineMode && isAttacker && (
                      <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)', fontStyle: 'italic', alignSelf: 'center' }}>
                        Waiting for {getState(defendingPlayer).name} to declare blockers...
                      </span>
                    )}
                  </>
                );
              })()}
              {combatState.phase === 'combat-respond' && (() => {
                const defendingPlayer = activePlayer === 0 ? 1 : 0;
                const isDefender = onlineMode && onlinePlayerIndex === defendingPlayer;
                const isAttacker = onlineMode && onlinePlayerIndex === activePlayer;
                return (
                  <>
                    {/* Attacker has priority after blockers — can cast combat tricks */}
                    {(!onlineMode || isAttacker) && (
                      <button className="btn" style={{ borderColor: 'rgba(200,170,60,0.3)', color: '#e8c96a', fontSize: 11 }}
                        onClick={() => respondInCombat(activePlayer)}>⚡ {getState(activePlayer).name}: Cast Spell</button>
                    )}
                    {/* Defender can also respond to attacker's spells */}
                    {(!onlineMode || isDefender) && (
                      <button className="btn" style={{ borderColor: 'rgba(100,200,255,0.4)', color: '#6cf', fontSize: 11 }}
                        onClick={() => respondInCombat(defendingPlayer)}>⚡ {getState(defendingPlayer).name}: Respond</button>
                    )}
                    {/* Attacker controls the flow: Proceed to Damage */}
                    {(!onlineMode || isAttacker) && (
                      <button className="btn btn-primary" onClick={proceedToDamage}>Proceed to Damage →</button>
                    )}
                    {/* Defender sees waiting message */}
                    {onlineMode && isDefender && (
                      <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)', fontStyle: 'italic', alignSelf: 'center' }}>
                        Waiting for {getState(activePlayer).name} to proceed to damage...
                      </span>
                    )}
                  </>
                );
              })()}
              {combatState.phase === 'blockers' && (() => {
                const totalAttackers = combatState.attackers.length;
                const blockedCount = Object.entries(combatState.blocks).filter(([, ids]) => ids.length > 0).length;
                const unblockedCount = totalAttackers - blockedCount;
                const defendingPlayer = activePlayer === 0 ? 1 : 0;
                const canBlock = !onlineMode || onlinePlayerIndex === defendingPlayer;
                return (
                  <>
                    <span style={{ fontSize: 10, opacity: 0.5 }}>
                      {blockedCount > 0 && <span style={{ color: 'rgba(60,120,220,0.9)' }}>🛡{blockedCount} blocked</span>}
                      {blockedCount > 0 && unblockedCount > 0 && ' · '}
                      {unblockedCount > 0 && <span style={{ color: 'rgba(220,60,40,0.9)' }}>⚔{unblockedCount} unblocked</span>}
                    </span>
                    {canBlock && (
                      <>
                        <button className="btn btn-primary" onClick={() => {
                          SFX.block();
                          confirmBlockers();
                        }}>Confirm Blockers</button>
                        <button className="btn" style={{ fontSize: 10 }} onClick={() => {
                          // Clear all blocks first, then confirm (no blocks)
                          setCombatState(prev => ({ ...prev, blocks: {} }));
                          setTimeout(() => { SFX.block(); confirmBlockers(); }, 50);
                        }}>No Blocks</button>
                      </>
                    )}
                    {castError && castError.pIdx === (activePlayer === 0 ? 1 : 0) && (
                      <span style={{ fontSize: 11, color: '#ff6060', fontWeight: 600, animation: 'fadeIn 0.2s ease' }}>
                        {castError.message}
                      </span>
                    
                    )}
                  </>
                );
              })()}
            </div>
          ) : (
            <div className="board-divider" />
          )}

          <PlayerArea pIdx={bottomPlayerIdx} />
        </div>

        {/* Phase indicator — Arena-style vertical strip */}
        <div className="phase-strip">
          {phases.map(phase => (
            <div key={phase.id}
              className={`phase-dot ${currentPhase === phase.id ? 'active-phase' : ''}`}
              data-label={phase.label}
              onClick={() => {
                if (phase.id === 'combat' && !combatState && (currentPhase === 'main1' || currentPhase === 'combat')) {
                  enterCombat();
                } else if (!combatState) {
                  setCurrentPhase(phase.id);
                }
              }}
            />
          ))}
        </div>
      </div>

      {contextMenu && (
        <ContextMenu
          x={contextMenu.x} y={contextMenu.y}
          card={contextMenu.card}
          actions={contextMenu.actions}
          onClose={() => setContextMenu(null)}
        />
      )}

      {showTokenCreator !== null && (
        <TokenCreator
          onClose={() => setShowTokenCreator(null)}
          onCreate={(token, playSound) => createToken(showTokenCreator, token, playSound)}
        />
      )}

      {viewingZone && (
        <ZoneViewer
          title={viewingZone.title}
          cards={viewingZone.cards}
          onClose={() => setViewingZone(null)}
          onCardAction={(card) => {
            setContextMenu(null);
            const actions = getCardActions(viewingZone.pIdx, card, viewingZone.zone);
            const fakeEvent = { clientX: window.innerWidth / 2, clientY: window.innerHeight / 2, preventDefault: () => {} };
            setViewingZone(null);
            setTimeout(() => {
              setContextMenu({ x: fakeEvent.clientX, y: fakeEvent.clientY, card, actions });
            }, 50);
          }}
        />
      )}

      {manaChoice && (
        <div style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)',
          display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 10001,
        }}>
          <div style={{
            background: '#1e1c30', borderRadius: 12, padding: 20, textAlign: 'center',
            border: '1px solid rgba(255,255,255,0.1)',
          }}>
            <p style={{ marginBottom: 12, fontSize: 13 }}>
              Choose mana color to produce:{manaChoice.isPainLand ? ' (colored = 1 damage)' : ''}
            </p>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
              {manaChoice.colors.map(c => (
                <button key={c} className="btn" onClick={() => {
                  addManaToPool(manaChoice.pIdx, c);
                  // Pain land: deal 1 damage for colored mana (not colorless)
                  if (manaChoice.isPainLand && c !== 'C') {
                    setState(manaChoice.pIdx, prev => ({ ...prev, life: prev.life - 1 }));
                    addGameLog(manaChoice.pIdx, '🩸', `Pain land: 1 damage for {${c}}`);
                  }
                  setManaChoice(null);
                }} style={{
                  fontSize: 18, padding: '8px 16px',
                  color: MANA_COLORS_CSS[c],
                  borderColor: MANA_COLORS_CSS[c] + '66',
                }}>{MANA_SYMBOLS[c]} {c}</button>
              ))}
            </div>
          </div>
        </div>
      )}

      {commanderDeathChoice && (
        <div style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)',
          display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000,
        }}>
          <div style={{
            background: '#1e1c30', borderRadius: 12, padding: 24, maxWidth: 360, textAlign: 'center',
            border: '1px solid rgba(200,170,60,0.2)', boxShadow: '0 8px 40px rgba(0,0,0,0.5)',
          }}>
            <h3 style={{ color: '#d4b44a', marginBottom: 8 }}>Commander Leaving Battlefield</h3>
            <p className="text-sm" style={{ opacity: 0.6, marginBottom: 16 }}>
              {commanderDeathChoice.card.name} would go to {commanderDeathChoice.destination}. Send to Command Zone instead?
            </p>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
              <button className="btn btn-gold" onClick={() => {
                const { pIdx, card, from } = commanderDeathChoice;
                SFX.toGraveyard();
                setState(pIdx, prev => ({
                  ...prev,
                  [from]: prev[from].filter(c => c.id !== card.id),
                  commandZone: [...prev.commandZone, { ...card, tapped: false }],
                }));
                setCommanderDeathChoice(null);
              }}>Command Zone</button>
              <button className="btn" onClick={() => {
                const { pIdx, card, from, destination } = commanderDeathChoice;
                destination === 'exile' ? SFX.toExile() : SFX.toGraveyard();
                setState(pIdx, prev => ({
                  ...prev,
                  [from]: prev[from].filter(c => c.id !== card.id),
                  [destination]: [...prev[destination], { ...card, tapped: false }],
                }));
                setCommanderDeathChoice(null);
              }}>{commanderDeathChoice.destination === 'exile' ? 'Exile' : 'Graveyard'}</button>
            </div>
          </div>
        </div>
      )}

      {/* ETB Reminder Popup */}
      {/* Scry / Surveil Overlay — separate modes (only visible to scrying player in online mode) */}
      {scryView && (!onlineMode || onlinePlayerIndex === scryView.pIdx) && (() => {
        const sp = getState(scryView.pIdx);
        const topCards = sp.library.slice(0, scryView.count);
        const isScry = scryView.mode === 'scry';
        const isSurveil = scryView.mode === 'surveil';
        const accentColor = isScry ? 'rgba(100,180,220,' : 'rgba(140,100,200,';
        const textColor = isScry ? '#70b8d8' : '#b090e0';
        const canInteract = !onlineMode || onlinePlayerIndex === scryView.pIdx;
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            zIndex: 10000, animation: 'fadeIn 0.2s ease',
          }}>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 2, color: accentColor + '0.8)', marginBottom: 6, fontWeight: 700 }}>
              {isScry ? '🔮 Scry' : '👁 Surveil'} — Top {topCards.length} of {sp.library.length}
            </div>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.35)', marginBottom: 14, fontStyle: 'italic' }}>
              {isScry
                ? 'For each card: keep on top of library or put on the bottom.'
                : 'For each card: keep on top of library or put into graveyard.'}
            </div>
            <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', justifyContent: 'center', maxWidth: '80vw', marginBottom: 20 }}>
              {topCards.map((card, idx) => (
                <div key={card.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
                  <CardImg card={card} alt={card.name}
                    style={{ height: 240, borderRadius: 10, boxShadow: '0 4px 16px rgba(0,0,0,0.5)' }} />
                  {canInteract && (
                  <div style={{ display: 'flex', gap: 4 }}>
                    <button className="btn" style={{ padding: '4px 10px', fontSize: 10, borderColor: accentColor + '0.3)', color: textColor }}
                      onClick={() => {
                        const cb = scryView.onComplete;
                        setScryView(null);
                        if (cb) setTimeout(cb, 50);
                      }} title="Keep on top">📚 Top</button>
                    {isScry && (
                      <button className="btn" style={{ padding: '4px 10px', fontSize: 10, borderColor: 'rgba(180,180,60,0.3)', color: '#c0c060' }}
                        onClick={() => {
                          const cb = scryView.onComplete;
                          setState(scryView.pIdx, prev => {
                            const lib = prev.library.filter(c => c.id !== card.id);
                            return { ...prev, library: [...lib, card] };
                          });
                          setScryView(null);
                          if (cb) setTimeout(cb, 50);
                        }} title="Put on bottom">📚 Bottom</button>
                    )}
                    {isSurveil && (
                      <button className="btn" style={{ padding: '4px 10px', fontSize: 10, borderColor: 'rgba(180,80,80,0.3)', color: '#e08080' }}
                        onClick={() => {
                          const cb = scryView.onComplete;
                          moveCard(scryView.pIdx, card, 'library', 'graveyard');
                          setScryView(null);
                          if (cb) setTimeout(cb, 50);
                        }} title="To graveyard">💀 Graveyard</button>
                    )}
                  </div>
                  )}
                </div>
              ))}
              {topCards.length === 0 && (
                <div style={{ color: 'rgba(255,255,255,0.3)', fontSize: 14, padding: 40 }}>Library is empty</div>
              )}
            </div>
            {canInteract ? (
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn" style={{ padding: '6px 16px', fontSize: 11, borderColor: accentColor + '0.3)', color: textColor }}
                onClick={() => setScryView({ ...scryView, count: Math.min(scryView.count + 1, sp.library.length) })}>
                + Show More
              </button>
              <button className="btn" style={{ padding: '8px 24px', fontSize: 13 }}
                onClick={() => {
                  const cb = scryView.onComplete;
                  setScryView(null);
                  if (cb) setTimeout(cb, 50);
                }}>
                Close (Keep All)
              </button>
            </div>
            ) : (
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', padding: '10px 0', fontStyle: 'italic' }}>
              Opponent is {isScry ? 'scrying' : 'surveilling'}...
            </div>
            )}
          </div>
        );
      })()}

      {/* End of Turn — opponent can respond before turn passes */}
      {/* IMPORTANT: Hide when spellStack/targeting/modals are active — those overlays must take priority */}
      {endOfTurnRespond && !instantCasting && spellStack.length === 0 && !spellTargeting && !abilityTargeting && !modalChoice && !gameOver && (() => {
        const opponentIdx = activePlayer === 0 ? 1 : 0;
        const opponentName = getState(opponentIdx).name;
        const activeName = getState(activePlayer).name;
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.82)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            zIndex: 10000, animation: 'fadeIn 0.2s ease',
          }}>
            <div style={{ fontSize: 13, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(200,170,60,0.85)', marginBottom: 8, fontWeight: 700 }}>
              ⏳ End of Turn — {activeName} is passing
            </div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginBottom: 24, fontStyle: 'italic' }}>
              {opponentName}: Cast instants, flash creatures, or cycle before the turn ends.
            </div>
            <div style={{ display: 'flex', gap: 12 }}>
              {(!onlineMode || onlinePlayerIndex === opponentIdx) && (
                <button className="btn" style={{ padding: '10px 28px', fontSize: 13, borderColor: 'rgba(60,180,220,0.4)', color: '#60c8e8', background: 'rgba(60,180,220,0.08)' }}
                  onClick={() => setInstantCasting({ pIdx: opponentIdx, returnToEndStep: true })}>
                  ⚡ Cast Instant / Flash / Cycle
                </button>
              )}
              {(!onlineMode || onlinePlayerIndex === activePlayer) && (
                <button className="btn" style={{ padding: '10px 28px', fontSize: 13, borderColor: 'rgba(60,180,220,0.4)', color: '#60c8e8', background: 'rgba(60,180,220,0.08)' }}
                  onClick={() => setInstantCasting({ pIdx: activePlayer, returnToEndStep: true })}>
                  ⚡ {activeName} Respond
                </button>
              )}
              {(!onlineMode || onlinePlayerIndex === opponentIdx) && (
                <button className="btn btn-gold" style={{ padding: '10px 28px', fontSize: 13 }}
                  onClick={executePassTurn}>
                  ✓ Proceed — Pass Turn
                </button>
              )}
              {onlineMode && onlinePlayerIndex === activePlayer && (
                <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', fontStyle: 'italic', alignSelf: 'center' }}>
                  Waiting for {opponentName} to respond or pass...
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* Look at Top X — choose cards for hand (Memory Deluge, Dig Through Time, etc.) — only visible to choosing player */}
      {lookTopView && (!onlineMode || onlinePlayerIndex === lookTopView.pIdx) && (() => {
        const { pIdx: ltPIdx, cards: ltCards, toHand, selected, toBattlefield, etaliMode, etaliLabel, selectFilter } = lookTopView;
        const selectedSet = selected instanceof Set ? selected : new Set(selected);
        // Collected Company filter: only creature cards with mana value ≤ N are selectable
        const isSelectable = (card) => {
          if (!selectFilter) return true;
          if (selectFilter.type === 'creature' && !isCreature(card)) return false;
          if (selectFilter.maxMV !== undefined && (card.cmc || 0) > selectFilter.maxMV) return false;
          return true;
        };
        const filterLabel = selectFilter ? ` (creatures with MV ≤ ${selectFilter.maxMV} only)` : '';
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.88)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            zIndex: 10000, animation: 'fadeIn 0.2s ease',
          }}>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 2, color: etaliMode ? 'rgba(220,160,60,0.8)' : 'rgba(60,200,160,0.8)', marginBottom: 6, fontWeight: 700 }}>
              {etaliMode ? `⚔️ ${etaliLabel || 'Cast for free or leave in exile'}` : `🔍 Look at Top ${ltCards.length} — Choose up to ${toHand} for your ${toBattlefield ? 'battlefield' : 'hand'}${filterLabel}`}
            </div>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.35)', marginBottom: 14, fontStyle: 'italic' }}>
              {etaliMode ? 'Click cards to cast them for free onto the battlefield. Unselected cards stay in exile.' : `Click cards to select them.${selectFilter ? ' Greyed-out cards cannot be selected.' : ''} Rest go to bottom of library in random order.`}
            </div>
            <div style={{ fontSize: 10, color: 'rgba(60,200,160,0.6)', marginBottom: 14 }}>
              Selected: {selectedSet.size} / {toHand}
            </div>
            <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', justifyContent: 'center', maxWidth: '80vw', marginBottom: 20 }}>
              {ltCards.map((card) => {
                const isSelected = selectedSet.has(card.id);
                const canSelect = isSelectable(card);
                return (
                  <div key={card.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, cursor: canSelect ? 'pointer' : 'not-allowed' }}
                    onClick={() => {
                      if (!canSelect && !isSelected) return; // can't select ineligible cards
                      setLookTopView(prev => {
                        const newSelected = new Set(prev.selected);
                        if (newSelected.has(card.id)) {
                          newSelected.delete(card.id);
                        } else if (newSelected.size < toHand && canSelect) {
                          newSelected.add(card.id);
                        }
                        return { ...prev, selected: newSelected };
                      });
                    }}>
                    <CardImg card={card} alt={card.name}
                      style={{
                        height: 240, borderRadius: 10,
                        boxShadow: isSelected ? '0 0 20px rgba(60,200,160,0.8)' : '0 4px 16px rgba(0,0,0,0.5)',
                        border: isSelected ? '3px solid rgba(60,200,160,0.9)' : canSelect ? '3px solid transparent' : '3px solid rgba(255,60,60,0.3)',
                        transition: 'all 0.15s ease',
                        opacity: isSelected ? 1 : canSelect ? 0.7 : 0.3,
                      }} />
                    {isSelected && (
                      <div style={{ fontSize: 10, color: etaliMode ? '#e0a040' : '#3cc8a0', fontWeight: 700 }}>{etaliMode ? '✓ Cast Free' : toBattlefield ? '✓ To Battlefield' : '✓ To Hand'}</div>
                    )}
                    {!canSelect && !isSelected && (
                      <div style={{ fontSize: 9, color: 'rgba(255,100,100,0.6)', fontWeight: 600 }}>Ineligible</div>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn" style={{
                padding: '8px 24px', fontSize: 13,
                borderColor: (toBattlefield ? selectedSet.size <= toHand : selectedSet.size === toHand) ? 'rgba(60,200,160,0.5)' : 'rgba(255,255,255,0.1)',
                color: (toBattlefield ? selectedSet.size <= toHand : selectedSet.size === toHand) ? '#3cc8a0' : 'rgba(255,255,255,0.3)',
                cursor: (toBattlefield ? selectedSet.size <= toHand : selectedSet.size === toHand) ? 'pointer' : 'not-allowed',
              }}
                disabled={toBattlefield ? false : selectedSet.size !== toHand}
                onClick={() => {
                  if (!toBattlefield && !etaliMode && selectedSet.size !== toHand) return;
                  if (toBattlefield && !etaliMode && selectedSet.size > toHand) return;
                  const chosenCards = ltCards.filter(c => selectedSet.has(c.id));
                  const bottomCards = ltCards.filter(c => !selectedSet.has(c.id));

                  // Etali mode: selected go from exile to battlefield, unselected stay in exile
                  if (etaliMode) {
                    if (chosenCards.length > 0) {
                      const entryCards = chosenCards.map(c => ({ ...c, tapped: false, enteredThisTurn: true, etaliExiled: undefined, etaliOwner: undefined }));
                      // Remove chosen cards from their owner's exile, add to caster's battlefield
                      chosenCards.forEach(c => {
                        const ownerIdx = c.etaliOwner !== undefined ? c.etaliOwner : ltPIdx;
                        setState(ownerIdx, prev => ({
                          ...prev,
                          exile: prev.exile.filter(ex => ex.id !== c.id),
                        }));
                      });
                      setState(ltPIdx, prev => ({
                        ...prev,
                        battlefield: [...prev.battlefield, ...entryCards],
                      }));
                      // Trigger ETB for each
                      chosenCards.forEach((c, i) => {
                        setTimeout(() => {
                          const etbFx = parseETBEffects(c);
                          if (isCreature(c)) etbFx.push(...scanOtherCreatureETBTriggers(ltPIdx, c));
                          if (etbFx.length > 0) setEtbReminder({ pIdx: ltPIdx, card: c, effects: etbFx });
                        }, 200 + i * 500);
                      });
                    }
                    setLookTopView(null);
                    setCastError({ pIdx: ltPIdx, message: `Cast ${chosenCards.length} spell(s) for free, ${bottomCards.length} left in exile` });
                    setTimeout(() => setCastError(null), 2500);
                    return;
                  }

                  // Shuffle bottom cards
                  for (let i = bottomCards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [bottomCards[i], bottomCards[j]] = [bottomCards[j], bottomCards[i]];
                  }
                  if (toBattlefield) {
                    // Collected Company etc: put onto battlefield
                    const entryCards = chosenCards.map(c => ({ ...c, tapped: false, enteredThisTurn: true }));
                    setState(ltPIdx, prev => {
                      const remainingLib = prev.library.slice(ltCards.length);
                      return {
                        ...prev,
                        battlefield: [...prev.battlefield, ...entryCards],
                        library: [...remainingLib, ...bottomCards],
                      };
                    });
                    // Trigger ETB for each card entering (including other-creature-ETB triggers)
                    chosenCards.forEach((c, i) => {
                      setTimeout(() => {
                        const etbFx = parseETBEffects(c);
                        if (isCreature(c)) etbFx.push(...scanOtherCreatureETBTriggers(ltPIdx, c));
                        if (etbFx.length > 0) setEtbReminder({ pIdx: ltPIdx, card: c, effects: etbFx });
                      }, 200 + i * 500);
                    });
                  } else {
                    setState(ltPIdx, prev => {
                      const remainingLib = prev.library.slice(ltCards.length);
                      return {
                        ...prev,
                        hand: [...prev.hand, ...chosenCards],
                        library: [...remainingLib, ...bottomCards],
                      };
                    });
                  }
                  setLookTopView(null);
                  setCastError({ pIdx: ltPIdx, message: `Put ${toHand} card(s) ${toBattlefield ? 'onto battlefield' : 'into hand'}, ${bottomCards.length} to bottom` });
                  setTimeout(() => setCastError(null), 2000);
                }}>
                ✓ Confirm Selection
              </button>
              <button className="btn" style={{ padding: '8px 16px', fontSize: 11 }}
                onClick={() => {
                  if (etaliMode) {
                    // Etali: just close, cards stay in exile
                    setLookTopView(null);
                    return;
                  }
                  // Put all to bottom without taking any
                  const bottomCards = [...ltCards];
                  for (let i = bottomCards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [bottomCards[i], bottomCards[j]] = [bottomCards[j], bottomCards[i]];
                  }
                  setState(ltPIdx, prev => {
                    const remainingLib = prev.library.slice(ltCards.length);
                    return { ...prev, library: [...remainingLib, ...bottomCards] };
                  });
                  setLookTopView(null);
                }}>
                {etaliMode ? 'Leave All in Exile' : 'Cancel (Bottom All)'}
              </button>
            </div>
          </div>
        );
      })()}

      {/* Instant Casting Overlay — non-active player casts instant/flash */}
      {instantCasting && !spellTargeting && !modalChoice && (() => {
        const ip = getState(instantCasting.pIdx);
        const sfFlash = hasSorceryFlash(instantCasting.pIdx);
        const instantCards = ip.hand.filter(c => canCastAtInstantSpeed(c) || (sfFlash && (c.type_line || '').toLowerCase().includes('sorcery')));
        const cyclingCards = ip.hand.filter(c => !canCastAtInstantSpeed(c) && !(sfFlash && (c.type_line || '').toLowerCase().includes('sorcery')) && getCyclingCost(c));
        const isRespondingToStack = instantCasting.returnToStack && spellStack.length > 0;
        return (
          <div style={{
            position: 'fixed', bottom: 10, left: '50%', transform: 'translateX(-50%)',
            width: 'min(90vw, 800px)',
            background: 'rgba(10,12,20,0.97)', border: '2px solid rgba(60,180,220,0.4)', borderRadius: 14,
            padding: '12px 20px', zIndex: 10000, animation: 'fadeIn 0.15s ease',
            boxShadow: '0 -8px 40px rgba(0,0,0,0.7), 0 0 30px rgba(60,180,220,0.1)',
          }}>
            {isRespondingToStack && (
              <div style={{ fontSize: 10, color: '#e08040', marginBottom: 6, fontWeight: 700 }}>
                ⚡ RESPONDING TO: {stackTop.displayName} (by {getState(stackTop.pIdx).name})
              </div>
            )}
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(60,180,220,0.8)', fontWeight: 700 }}>
                ⚡ {ip.name} — Cast Instant
              </span>
              <span style={{ fontSize: 10, color: '#e8c840', fontStyle: 'italic', fontWeight: 600 }}>
                ☝ Tap lands on the board first, then pick a card
              </span>
              {(() => {
                const manaStr = Object.entries(ip.manaPool || {}).filter(([,v]) => v > 0).map(([k,v]) => `${k}:${v}`).join(' ');
                return manaStr ? (
                  <span style={{ fontSize: 10, color: '#60e860', fontWeight: 700, marginLeft: 8 }}>
                    💧 Mana: {manaStr}
                  </span>
                ) : (
                  <span style={{ fontSize: 10, color: '#e06040', fontWeight: 700, marginLeft: 8 }}>
                    ⚠ No mana — tap lands above first!
                  </span>
                );
              })()}
            </div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'flex-end', marginBottom: 10, maxHeight: '25vh', overflowY: 'auto' }}>
              {instantCards.map(card => {
                const isAdv = isAdventureCard(card) && card.card_faces?.[1]?.type_line?.toLowerCase().includes('instant');
                const advFaceName = isAdv ? card.card_faces?.[1]?.name : null;
                return (
                <div key={card.id} style={{ cursor: 'pointer', transition: 'transform 0.15s ease', position: 'relative' }}
                  onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.03)'; }}
                  onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; }}
                  onClick={() => {
                    castInstantFromHand(instantCasting.pIdx, card);
                  }}>
                  <CardImg card={card} alt={card.name}
                    style={{ height: 140, borderRadius: 8, boxShadow: '0 3px 12px rgba(0,0,0,0.5), 0 0 8px rgba(60,180,220,0.2)' }} />
                  {advFaceName && (
                    <div style={{ position: 'absolute', bottom: 6, left: '50%', transform: 'translateX(-50%)',
                      background: 'rgba(0,0,0,0.85)', border: '1px solid rgba(60,180,220,0.4)', borderRadius: 6,
                      padding: '2px 8px', fontSize: 9, color: '#6cf', fontWeight: 700, whiteSpace: 'nowrap' }}>
                      ⚔️ {advFaceName} (Adventure)
                    </div>
                  )}
                </div>
              );})}
              {cyclingCards.map(card => (
                <div key={card.id} style={{ cursor: 'pointer', transition: 'transform 0.15s ease', position: 'relative' }}
                  onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.03)'; }}
                  onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; }}
                  onClick={() => {
                    cycleCard(instantCasting.pIdx, card);

                  // Fetch token art from Scryfall
                  (async () => {

                      const res = await fetch('https://api.scryfall.com/cards/search?q=' + encodeURIComponent('t:token ' + creatureType.toLowerCase()) + '&unique=art&order=released&dir=desc');
                      if (res.ok) {

      {peekingHand && (() => {

      {spellStack.length > 0 && !instantCasting && !stackMinimized && (

                    display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
                    opacity: i === 0 ? 1 : 0.5, padding: '4px 8px',

                    <CardImg card={entry.card} alt={entry.displayName}

                    <span style={{ fontSize: 8, color: i === 0 ? '#60c8e8' : 'rgba(255,255,255,0.5)', fontWeight: 700 }}>

            <div className="spell-stack-label">
              {stackTop.overloadMode ? '🌊 OVERLOADED — ' : ''}On the Stack{spellStack.length > 1 ? ` (resolving top)` : ''}
            </div>
            <div className="spell-stack-buttons">
              {(!onlineMode || onlinePlayerIndex === (stackTop.pIdx === 0 ? 1 : 0)) && (
                <button className="btn-resolve" onClick={() => {
                  // Always resolve directly — works for both local and online mode.
                  // Public zones (stack, graveyard, battlefield, exile, life) are all accessible.

              {(!onlineMode || onlinePlayerIndex === (stackTop.pIdx === 0 ? 1 : 0)) && (

              {(!onlineMode || onlinePlayerIndex === (stackTop.pIdx === 0 ? 1 : 0)) && (

                  setStackMinimized(true);

      {/* Minimized spell stack bar — shown when user clicks "Respond (Ability)" to interact with battlefield */}

          padding: '8px 20px', zIndex: 10000, display: 'flex', alignItems: 'center', gap: 12,
          boxShadow: '0 4px 24px rgba(0,0,0,0.6), 0 0 20px rgba(220,160,60,0.1)',
        }}>
          <span style={{ fontSize: 11, color: '#e0a040', fontWeight: 700 }}>

          </span>

              onClick={() => { setAbilityTargeting(null); setStackMinimized(false); setCastError(null); }}>Cancel Ability</button>
          )}
        </div>
      )}

      {/* Sacrifice Counter: "Counter unless pays {X}" choice overlay */}
      {sacCounterChoice && (() => {
        const { sacPIdx, sacCard, targetEntry, payAmount } = sacCounterChoice;
        const targetPIdx = targetEntry.pIdx;
        const targetPlayer = getState(targetPIdx);
        const sacPlayer = getState(sacPIdx);
        // In online mode: only the spell's owner (targetPIdx) decides whether to pay
        const canDecide = !onlineMode || onlinePlayerIndex === targetPIdx;
        const totalMana = Object.values(targetPlayer.manaPool || {}).reduce((a, b) => a + b, 0);
        const canPay = totalMana >= payAmount;
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.88)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            zIndex: 10001, animation: 'fadeIn 0.2s ease',
          }}>
            <div style={{
              background: 'linear-gradient(160deg, #1a1830, #14122a)', borderRadius: 14, padding: '20px 28px',
              border: '1px solid rgba(220,80,60,0.4)', boxShadow: '0 8px 40px rgba(0,0,0,0.7), 0 0 30px rgba(220,80,60,0.1)',

            }}>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(220,80,60,0.8)', marginBottom: 6, fontWeight: 700 }}>
                🚫 Counter Unless Pays
              </div>
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginBottom: 12, lineHeight: 1.5 }}>
                <strong style={{ color: '#e0a040' }}>{sacPlayer.name}</strong> sacrificed <strong style={{ color: '#d4b44a' }}>{sacCard.name}</strong> to counter{' '}
                <strong style={{ color: '#6cf' }}>{targetEntry.displayName}</strong>.
              </div>
              <div style={{ fontSize: 13, color: '#e8e4dc', marginBottom: 16, fontWeight: 600 }}>
                {targetPlayer.name}: Pay {'{' + payAmount + '}'} to keep your spell, or let it be countered?
              </div>
              <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.35)', marginBottom: 14, fontStyle: 'italic' }}>
                Mana pool: {Object.entries(targetPlayer.manaPool || {}).filter(([,v]) => v > 0).map(([k,v]) => `${k}:${v}`).join(' ') || 'empty'} — Tap lands above to add mana first if needed.
              </div>
              {canDecide ? (
                <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
                  <button className="btn btn-gold" style={{ padding: '10px 24px', fontSize: 13, opacity: canPay ? 1 : 0.35, cursor: canPay ? 'pointer' : 'not-allowed' }}
                    disabled={!canPay}
                    onClick={() => {
                      if (!canPay) return;
                      // Pay the mana: deduct generic mana from pool
                      let remaining = payAmount;
                      setState(targetPIdx, prev => {
                        const newPool = { ...prev.manaPool };
                        // Deduct from colorless first, then alphabetical
                        const order = ['C', 'B', 'G', 'R', 'U', 'W'];
                        for (const color of order) {
                          if (remaining <= 0) break;
                          const available = newPool[color] || 0;
                          const take = Math.min(available, remaining);
                          newPool[color] = available - take;
                          remaining -= take;
                        }
                        return { ...prev, manaPool: newPool };
                      });
                      // Spell stays on the stack — counter fizzles
                      SFX.playSpell();
                      setCastError({ pIdx: targetPIdx, message: `💰 Paid {${payAmount}} — ${targetEntry.displayName} was NOT countered!` });
                      setTimeout(() => setCastError(null), 2500);
                      addGameLog(targetPIdx, '💰', `Paid {${payAmount}} to prevent ${sacCard.name} from countering ${targetEntry.displayName}`);

                      // Remove the targeted spell from stack

                      setCastError({ pIdx: targetPIdx, message: `🚫 ${targetEntry.displayName} was countered by ${sacCard.name}!` });
                      setTimeout(() => setCastError(null), 2500);
                      addGameLog(sacPIdx, '🚫', `${sacCard.name} countered ${targetEntry.displayName} (opponent declined to pay)`);
                      setSacCounterChoice(null);
                    }}>
                    🚫 Don't Pay — Countered
                  </button>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)', fontStyle: 'italic', padding: '10px 0' }}>
                  Waiting for {targetPlayer.name} to decide...
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* Library Search Overlay (Solemn Simulacrum, Farhaven Elf, etc.) */}
      {librarySearch && (!onlineMode || onlinePlayerIndex === librarySearch.pIdx) && (() => {
        const { pIdx: searchPIdx, filter, tapped: enterTapped, source } = librarySearch;
        const lib = getState(searchPIdx).library || [];
        const BASIC_LAND_NAMES = ['plains', 'island', 'swamp', 'mountain', 'forest',
          'snow-covered plains', 'snow-covered island', 'snow-covered swamp', 'snow-covered mountain', 'snow-covered forest'];
        const matchingCards = filter === 'basicLand'
          ? lib.filter(c => {
              const tl = (c.type_line || '').toLowerCase();
              const name = (c.name || '').toLowerCase();
              return tl.includes('basic') && tl.includes('land') || BASIC_LAND_NAMES.includes(name);
            })
          : lib.filter(c => (c.type_line || '').toLowerCase().includes('land'));
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.9)',

            }}>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(80,200,80,0.8)', marginBottom: 6, fontWeight: 700 }}>

              </div>
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginBottom: 14 }}>
                Choose a {filter === 'basicLand' ? 'basic land' : 'land'} card to put onto the battlefield{enterTapped ? ' tapped' : ''}. ({matchingCards.length} found in library)
              </div>
              {matchingCards.length > 0 ? (
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, justifyContent: 'center', marginBottom: 14 }}>
                  {[...new Map(matchingCards.map(c => [c.name, c])).values()].map((card, i) => {
                    const count = matchingCards.filter(c => c.name === card.name).length;
                    return (
                      <button key={i} onClick={() => {
                        // Find first matching card in library
                        const target = lib.find(c => c.name === card.name);
                        if (!target) return;
                        setState(searchPIdx, prev => {
                          const newLib = [...prev.library];
                          const idx = newLib.findIndex(c => c.id === target.id);
                          if (idx === -1) return prev;
                          const [landCard] = newLib.splice(idx, 1);
                          // Shuffle remaining library
                          for (let si = newLib.length - 1; si > 0; si--) { const sj = Math.floor(Math.random() * (si + 1)); [newLib[si], newLib[sj]] = [newLib[sj], newLib[si]]; }
                          return {
                            ...prev,
                            library: newLib,
                            battlefield: [...prev.battlefield, { ...landCard, tapped: !!enterTapped, counters: {} }],
                          };

                        setTimeout(() => setCastError(null), 1500);
                        setLibrarySearch(null);
                      }} style={{
                        background: 'linear-gradient(180deg, #2a4a2a, #1a3a1a)', border: '1px solid rgba(80,200,80,0.3)',

                        {card.name} {count > 1 ? `(x${count})` : ''}
                      </button>
                    );

                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)', marginBottom: 14, fontStyle: 'italic' }}>
                  No matching lands found in library.
                </div>

                setState(searchPIdx, prev => {
                  const newLib = [...prev.library];
                  for (let si = newLib.length - 1; si > 0; si--) { const sj = Math.floor(Math.random() * (si + 1)); [newLib[si], newLib[sj]] = [newLib[sj], newLib[si]]; }
                  return { ...prev, library: newLib };
                });
                addGameLog(searchPIdx, '🔍', `${getState(searchPIdx).name} searched library but chose not to find a land (${source})`);
                setLibrarySearch(null);
              }} style={{
                background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.2)',
                borderRadius: 8, padding: '8px 20px', color: 'rgba(255,255,255,0.5)', cursor: 'pointer', fontSize: 11,
              }}>
                Decline (shuffle only)
              </button>
            </div>
          </div>

      })()}

      {/* Put Land From Hand Overlay (Growth Spiral, Explore — "you may put a land onto the battlefield") */}
      {putLandFromHand && (!onlineMode || onlinePlayerIndex === putLandFromHand.pIdx) && (() => {
        const { pIdx: landPIdx, source } = putLandFromHand;
        const playerHand = getState(landPIdx).hand;
        const landsInHand = playerHand.filter(c => isLand(c));
        // Deduplicate by name for display
        const uniqueLands = [...new Map(landsInHand.map(c => [c.name, c])).values()];
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.9)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            zIndex: 10002, animation: 'fadeIn 0.2s ease',
          }}>
            <div style={{
              background: 'linear-gradient(160deg, #1a2a1a, #122014)', borderRadius: 14, padding: '20px 28px',
              border: '1px solid rgba(80,200,80,0.4)', boxShadow: '0 8px 40px rgba(0,0,0,0.7), 0 0 30px rgba(80,200,80,0.1)',
              maxWidth: 600, textAlign: 'center', maxHeight: '80vh', overflow: 'auto',
            }}>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(80,200,80,0.8)', marginBottom: 6, fontWeight: 700 }}>
                {source}
              </div>
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginBottom: 14 }}>
                You may put a land card from your hand onto the battlefield. ({landsInHand.length} land{landsInHand.length !== 1 ? 's' : ''} in hand)
              </div>
              {landsInHand.length > 0 ? (
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, justifyContent: 'center', marginBottom: 14 }}>
                  {uniqueLands.map((card, i) => {
                    const count = landsInHand.filter(c => c.name === card.name).length;
                    const imgUrl = card.image_uris?.small || card.card_faces?.[0]?.image_uris?.small;
                    return (
                      <button key={i} onClick={() => {
                        const target = playerHand.find(c => c.name === card.name && isLand(c));
                        if (!target) return;
                        // Move land from hand to battlefield (this is an effect, not a "land play")
                        moveCard(landPIdx, target, 'hand', 'battlefield');
                        SFX.playLand();
                        addGameLog(landPIdx, '🌿', `${source}: Put ${card.name} onto the battlefield from hand`);
                        setCastError({ pIdx: landPIdx, message: `🌿 ${card.name} enters the battlefield via ${source}`, background: '#1a3320' });
                        setTimeout(() => setCastError(null), 2000);
                        setPutLandFromHand(null);
                        // Trigger landfall
                        setTimeout(() => {
                          const st = getState(landPIdx);
                          const landfallTriggers = [];
                          for (const bf of st.battlefield) {
                            const oracle = [bf.oracle_text || '', ...(bf.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
                            const kw = (bf.keywords || []).map(k => k.toLowerCase());
                            if (kw.includes('landfall') || oracle.includes('whenever a land enters the battlefield')) {
                              const triggerMatch = oracle.match(/whenever a land enters the battlefield[^,.]*, ([^.]+)/);
                              const effectText = triggerMatch ? triggerMatch[1].trim() : 'landfall trigger';
                              landfallTriggers.push({ name: bf.name, effect: effectText });
                            }
                          }
                          if (landfallTriggers.length > 0) {
                            setEtbReminder({ pIdx: landPIdx, card: landfallTriggers[0], effects: landfallTriggers.map(t => ({ icon: '🌿', text: `${t.name}: ${t.effect}` })) });
                          }
                        }, 200);
                      }} style={{
                        background: 'linear-gradient(180deg, #2a4a2a, #1a3a1a)', border: '1px solid rgba(80,200,80,0.3)',
                        borderRadius: 8, padding: '8px 14px', color: '#e8e4dc', cursor: 'pointer', fontSize: 12,
                        transition: 'all 0.15s', minWidth: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
                      }}
                      onMouseOver={e => e.currentTarget.style.borderColor = 'rgba(80,200,80,0.8)'}
                      onMouseOut={e => e.currentTarget.style.borderColor = 'rgba(80,200,80,0.3)'}
                      >
                        {imgUrl && <img src={imgUrl} alt={card.name} style={{ width: 80, height: 'auto', borderRadius: 4 }} />}
                        <span>{card.name} {count > 1 ? `(x${count})` : ''}</span>
                      </button>
                    );
                  })}
                </div>
              ) : (
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)', marginBottom: 14, fontStyle: 'italic' }}>
                  No land cards in hand.
                </div>
              )}
              <button onClick={() => {
                addGameLog(landPIdx, '🌿', `${source}: Chose not to put a land onto the battlefield`);
                setPutLandFromHand(null);
              }} style={{
                background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.2)',
                borderRadius: 8, padding: '8px 20px', color: 'rgba(255,255,255,0.5)', cursor: 'pointer', fontSize: 11,
              }}>
                Decline
              </button>
            </div>
          </div>
        );
      })()}

      {/* ===== Discard to Hand Size Overlay ===== */}
      {discardChoice && (!onlineMode || onlinePlayerIndex === discardChoice.pIdx) && (() => {
        const { pIdx: discPIdx, selected } = discardChoice;
        const hand = getState(discPIdx).hand;
        const mustDiscard = hand.length - MAX_HAND_SIZE;
        const canConfirm = selected.length === mustDiscard;
        return (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            zIndex: 10004, animation: 'fadeIn 0.2s ease',
          }}>
            <div style={{
              background: 'linear-gradient(160deg, #2a1a1a, #1a1218)', borderRadius: 14, padding: '20px 28px',
              border: '1px solid rgba(220,80,60,0.4)', boxShadow: '0 8px 40px rgba(0,0,0,0.7), 0 0 30px rgba(220,80,60,0.1)',
              maxWidth: 700, width: '95%', textAlign: 'center', maxHeight: '85vh', overflow: 'auto',
            }}>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 2, color: 'rgba(220,80,60,0.8)', marginBottom: 6, fontWeight: 700 }}>
                Cleanup Step — Discard to Hand Size
              </div>
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginBottom: 14 }}>
                You have {hand.length} cards in hand (maximum {MAX_HAND_SIZE}). Select {mustDiscard} card{mustDiscard > 1 ? 's' : ''} to discard.
                <span style={{ color: 'rgba(220,80,60,0.8)', fontWeight: 700 }}> ({selected.length}/{mustDiscard} selected)</span>
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, justifyContent: 'center', marginBottom: 16 }}>
                {hand.map((card, i) => {
                  const isSelected = selected.includes(card.id);
                  return (
                    <div key={card.id} onClick={() => {
                      setDiscardChoice(prev => {
                        const sel = prev.selected;
                        if (isSelected) {
                          return { ...prev, selected: sel.filter(id => id !== card.id) };
                        }
                        if (sel.length >= mustDiscard) return prev; // Already selected enough
                        return { ...prev, selected: [...sel, card.id] };
                      });
                    }} style={{
                      position: 'relative', cursor: 'pointer', transition: 'all 0.15s',
                      transform: isSelected ? 'scale(0.92)' : 'scale(1)',
                      opacity: isSelected ? 0.5 : 1,
                      border: isSelected ? '2px solid rgba(220,80,60,0.8)' : '2px solid transparent',
                      borderRadius: 8,
                    }}>
                      <CardImg card={card} alt={card.name}
                        style={{ height: 120, borderRadius: 6, display: 'block' }} />
                      {isSelected && (
                        <div style={{
                          position: 'absolute', inset: 0, background: 'rgba(220,60,40,0.3)',
                          borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center',
                          fontSize: 28, color: '#ff6050', fontWeight: 900,
                        }}>✕</div>
                      )}
                      <div style={{
                        fontSize: 9, color: '#e8e4dc', textAlign: 'center', marginTop: 2,
                        maxWidth: 80, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                      }}>{getDisplayName(card)}</div>
                    </div>
                  );
                })}
              </div>
              <button disabled={!canConfirm} onClick={() => {
                // Discard selected cards from hand to graveyard
                const sel = new Set(selected);
                const discarded = hand.filter(c => sel.has(c.id));
                setState(discPIdx, prev => ({
                  ...prev,
                  hand: prev.hand.filter(c => !sel.has(c.id)),
                  graveyard: [...prev.graveyard, ...discarded.map(c => ({ ...c, tapped: false }))],
                }));
                addGameLog(discPIdx, '🗑️', `${getState(discPIdx).name} discards ${discarded.map(c => c.name).join(', ')} to hand size`);
                setDiscardChoice(null);
                // Now actually pass the turn
                executePassTurn();
              }} style={{
                background: canConfirm ? 'linear-gradient(180deg, #5a2a2a, #3a1a1a)' : 'rgba(255,255,255,0.05)',
                border: canConfirm ? '1px solid rgba(220,80,60,0.5)' : '1px solid rgba(255,255,255,0.1)',
                borderRadius: 8, padding: '10px 28px', color: canConfirm ? '#ff8060' : 'rgba(255,255,255,0.3)',
                cursor: canConfirm ? 'pointer' : 'not-allowed', fontSize: 12, fontWeight: 700,
                transition: 'all 0.15s',
              }}>
                {canConfirm ? `Discard ${selected.length} Card${selected.length > 1 ? 's' : ''} & Pass Turn` : `Select ${mustDiscard - selected.length} more card${mustDiscard - selected.length > 1 ? 's' : ''}`}
              </button>
            </div>
          </div>
        );
      })()}

      {/* ===== Card Info & Rulings Overlay ===== */}
      {cardInfoOverlay && (() => {
        const { card } = cardInfoOverlay;
