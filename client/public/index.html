      const sourceNames = attackerDebuffs.map(e => e.sourceName).join(', ');
      setCastError({ pIdx: defendingPlayer, message: `🛡️ ${sourceNames}: Attackers get ${totalPower >= 0 ? '+' : ''}${totalPower}/${totalToughness >= 0 ? '+' : ''}${totalToughness}!` });
      setTimeout(() => setCastError(null), 3000);
    }

    // Battle Cry: each other attacking creature gets +1/+0 until EOT
    {
      let battleCryCount = 0;
      const battleCryNames = [];
      for (const atkId of combatState.attackers) {
        const atk = p.battlefield.find(c => c.id === atkId);
        if (!atk) continue;
        const atkKw = (atk.keywords || []).map(k => k.toLowerCase());
        const atkOracle = getOracleText(atk);
        if (atkKw.includes('battle cry') || /battle cry/i.test(atkOracle) ||
            /whenever.*attacks.*each other attacking creature gets? \+1\/\+0/i.test(atkOracle)) {
          battleCryCount++;
          battleCryNames.push(getDisplayName(atk));
        }
      }
      if (battleCryCount > 0 && combatState.attackers.length > 1) {
        setState(activePlayer, prev => ({
          ...prev,
          battlefield: prev.battlefield.map(c => {
            if (!combatState.attackers.includes(c.id) || !isCreature(c)) return c;
            const atkKw2 = (c.keywords || []).map(k => k.toLowerCase());
            const atkOracle2 = getOracleText(c);
            const isBattleCrySource = atkKw2.includes('battle cry') || /battle cry/i.test(atkOracle2) ||
              /whenever.*attacks.*each other attacking creature gets? \+1\/\+0/i.test(atkOracle2);
            const buffFromOthers = isBattleCrySource ? battleCryCount - 1 : battleCryCount;
            if (buffFromOthers <= 0) return c;
            const existing = c.tempBuffs || { power: 0, toughness: 0, keywords: [] };
            return { ...c, tempBuffs: { ...existing, power: (existing.power || 0) + buffFromOthers, toughness: existing.toughness || 0 } };
          }),
        }));
        addGameLog(activePlayer, '\u2694\ufe0f', 'Battle Cry! ' + battleCryNames.join(', ') + ': Other attackers get +' + battleCryCount + '/+0');
        setCastError({ pIdx: activePlayer, message: '\u2694\ufe0f Battle Cry! Other attackers get +' + battleCryCount + '/+0' });
        setTimeout(() => setCastError(null), 3000);
      }
    }

    // Check if defending player has any planeswalkers — if so, ask for attack targets
    const defenderPWs = getState(defendingPlayer).battlefield.filter(c => isPlaneswalker(c));
    if (defenderPWs.length > 0 && combatState.attackers.length > 0) {
      const defaultTargets = {};
      combatState.attackers.forEach(id => { defaultTargets[id] = 'player'; });
      setCombatState(prev => ({ ...prev, phase: 'pw-targets', attackTargets: defaultTargets, blocks: {}, selectedBlocker: null }));
    } else {
      const defaultTargets = {};
      combatState.attackers.forEach(id => { defaultTargets[id] = 'player'; });
      // Priority window after attackers declared — both players can cast instants/cycle before blockers
      setCombatState(prev => ({ ...prev, phase: 'post-attackers', attackTargets: defaultTargets, blocks: {}, selectedBlocker: null }));
    }

    // Check for attack triggers on ALL creatures (including creature lands)
    const attackTriggers = [];
    for (const attackerId of combatState.attackers) {
      const attacker = p.battlefield.find(c => c.id === attackerId);
      if (!attacker) continue;
      // Creature land attack triggers (existing system)
      if (attacker.animatedCreature && attacker.animatedData?.attackTrigger) {
        attackTriggers.push({ card: attacker, trigger: attacker.animatedData.attackTrigger });
      }
      // Regular creature attack triggers: "whenever [name] attacks" or "whenever [name] attacks or blocks"
      if (isCreature(attacker) && !attacker.animatedCreature) {
        const oracle = [attacker.oracle_text || '', ...(attacker.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
        const nameLower = (attacker.name || '').toLowerCase();
        const nameEscaped = nameLower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        // Match patterns: "whenever [name] attacks", "whenever [name] attacks or blocks", "whenever [name] enters the battlefield or attacks"
        // For legendary creatures like "Kari Zev, Skyship Raider", oracle text uses the short name "Kari Zev"
        const shortName = nameLower.includes(',') ? nameLower.split(',')[0].trim() : null;
        const shortNameEscaped = shortName ? shortName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') : null;
        const selfAttackPattern = new RegExp('whenever ' + nameEscaped + '(?:\\s+enters the battlefield or)?\\s+attacks(?:\\s+or\\s+blocks)?');
        const shortNameAttackPattern = shortNameEscaped ? new RegExp('whenever ' + shortNameEscaped + '(?:\\s+enters the battlefield or)?\\s+attacks(?:\\s+or\\s+blocks)?') : null;
        // Also match generic "~ attacks" or "this creature attacks" patterns as fallback
        const genericAttackPattern = /whenever (?:~|this creature)(?:\s+enters the battlefield or)?\s+attacks(?:\s+or\s+blocks)?/;
        if (selfAttackPattern.test(oracle) || (shortNameAttackPattern && shortNameAttackPattern.test(oracle)) || genericAttackPattern.test(oracle) || (/whenever you attack/.test(oracle) && !/from your graveyard/.test(oracle))) {
          try {
            const parsedTrigger = parseCombatTrigger(attacker, oracle, 'attack');
            if (parsedTrigger) attackTriggers.push(parsedTrigger);
          } catch (e) {
            console.error('[Attack Trigger] Error parsing trigger for', attacker.name, e);
          }
        }
        // Mentor keyword: put +1/+1 on target attacking creature with lesser power
        const attackerKeywords = (attacker.keywords || []).map(k => k.toLowerCase());
        if (attackerKeywords.includes('mentor') || /\bmentor\b/i.test(oracle)) {
          const attackerPower = getEffectivePower(attacker, getAttachments(activePlayer, attacker.id));
          const mentorTargets = combatState.attackers
            .filter(id => id !== attacker.id)
            .map(id => p.battlefield.find(c => c.id === id))
            .filter(c => c && isCreature(c) && getEffectivePower(c, getAttachments(activePlayer, c.id)) < attackerPower);
          if (mentorTargets.length > 0) {
            attackTriggers.push({
              card: attacker,
              trigger: {
                icon: '\u{1f393}', text: 'MENTOR \u2014 ' + getDisplayName(attacker) + ' (power ' + attackerPower + '): Put +1/+1 on attacking creature with lesser power',
                mentorTargets: mentorTargets.map(c => ({ id: c.id, name: getDisplayName(c), power: getEffectivePower(c, getAttachments(activePlayer, c.id)) })),
                isMentor: true,
              }
            });
          }
        }
      }
    }

    // Tribal attack triggers: "whenever a [type] you control attacks" (Utvara Hellkite, etc.)
    // Scan ALL battlefield permanents (not just attackers) for tribal attack triggers
    const attackerCards = combatState.attackers.map(id => p.battlefield.find(c => c.id === id)).filter(Boolean);
    for (const perm of p.battlefield) {
      const oracle = [perm.oracle_text || '', ...(perm.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
      // Match "whenever a [type] you control attacks"
      const tribalMatch = oracle.match(/whenever an? (.+?) you control attacks,?\s*([^.]+)/);
      if (tribalMatch) {
        const triggerType = tribalMatch[1].trim();
        const effectText = tribalMatch[2].trim();
        // Check if any declared attacker matches the creature type
        for (const attacker of attackerCards) {
          const typeLine = (attacker.type_line || '').toLowerCase();
          const subtypes = typeLine.split('—').pop()?.trim() || '';
          if (subtypes.includes(triggerType) || typeLine.includes(triggerType)) {
            // Avoid duplicate if perm IS the attacker and already had a self-trigger
            const alreadyTriggered = attackTriggers.some(t => t.card.id === perm.id && t.trigger.text?.includes(perm.name));
            if (!alreadyTriggered) {
              attackTriggers.push({ card: perm, trigger: { icon: '🐉', text: `TRIBAL — ${perm.name}: ${attacker.name} (${triggerType}) attacks → ${effectText}` } });
            }
          }
        }
      }
    }

    if (attackTriggers.length > 0) {
      // Separate modal triggers (choose one) from simple auto-execute triggers
      const modalTriggers = attackTriggers.filter(t => t.trigger.isModal);
      const simpleTriggers = attackTriggers.filter(t => !t.trigger.isModal);

      // Show ETB-style reminder for non-modal triggers
      if (simpleTriggers.length > 0) {
        const triggerTexts = simpleTriggers.map(t => t.trigger);
        setEtbReminder({ pIdx: activePlayer, card: simpleTriggers[0].card,
          effects: triggerTexts.map(t => ({ icon: t.icon, text: t.text })) });
      }

      // Show modal choice overlay for "choose one" triggers (Elder Gargaroth etc.)
      if (modalTriggers.length > 0) {
        const mt = modalTriggers[0]; // Process one modal trigger at a time
        setModalChoice({
          pIdx: activePlayer, card: mt.card, triggerType: 'attack',
          choices: mt.trigger.modalChoices,
        });
      }

      // Auto-apply mentor triggers
      for (const t of simpleTriggers) {
        if (t.trigger.isMentor && t.trigger.mentorTargets && t.trigger.mentorTargets.length > 0) {
          const targets = t.trigger.mentorTargets;
          const target = targets.length === 1 ? targets[0] : targets.sort((a, b) => a.power - b.power)[0];
          addCounter(activePlayer, target.id, '+1/+1');
          addGameLog(activePlayer, '\u{1f393}', 'Mentor: ' + getDisplayName(t.card) + ' \u2192 +1/+1 on ' + target.name);
        }
      }

      // Auto-create tokens from non-modal simple triggers
      for (const t of simpleTriggers) {
        if (t.trigger.token) {
          const tk = t.trigger.token;
          const reskin = t.card._reskin;
          const tokenName = reskin?.customTokenName || tk.name;
          const tokenCard = {
            id: uid(), name: tokenName, isToken: true,
            type_line: tk.type_line, power: tk.power, toughness: tk.toughness,
            keywords: tk.keywords || [], tapped: true, counters: {}, enteredThisTurn: true,
            attackingToken: true, // Mark as created-by-attack-trigger (for exile at end of combat)
          };
          if (reskin?.customTokenImage) {
            tokenCard.tokenImageSmall = reskin.customTokenImage;
            tokenCard.tokenImageNormal = reskin.customTokenImage;
          }
          // Check oracle text if token should be exiled at end of combat
          const triggerOracle = (t.trigger.text || '').toLowerCase();
          if (triggerOracle.includes('exile') && triggerOracle.includes('end of combat')) {
            tokenCard.exileAtEndOfCombat = true;
          }
          const sourceOracle = [t.card.oracle_text || '', ...(t.card.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
          if (sourceOracle.includes('exile') && sourceOracle.includes('end of combat')) {
            tokenCard.exileAtEndOfCombat = true;
          }
          setState(activePlayer, prev => ({
            ...prev,
            battlefield: [...prev.battlefield, tokenCard],
          }));
          setCombatState(prev => prev ? { ...prev, attackers: [...prev.attackers, tokenCard.id] } : prev);
          if (!reskin?.customTokenImage) {
            ((tName, pI) => {
              (async () => {
                try {
                  const res = await fetch('https://api.scryfall.com/cards/search?q=' + encodeURIComponent('t:token ' + tName.toLowerCase()) + '&unique=art&order=released&dir=desc');
                  if (res.ok) {
                    const data = await res.json();
                    const match = data.data?.find(c => c.image_uris && (c.name || '').toLowerCase().includes(tName.toLowerCase()));
                    if (match?.image_uris) {
                      setState(pI, prev => ({
                        ...prev,
                        battlefield: prev.battlefield.map(c =>
                          c.isToken && c.name === tName && !c.tokenImageSmall ? { ...c, image_uris: match.image_uris, tokenImageSmall: match.image_uris.small, tokenImageNormal: match.image_uris.normal } : c
                        )
                      }));
                    }
                  }
                } catch(e) {}
              })();
            })(tokenName, activePlayer);
          }
        }
      }
      // Etali-style: "exile the top card of each player's library" — auto-exile and show cast-for-free UI
      for (const t of attackTriggers) {
        const trigText = (t.trigger.text || '').toLowerCase();
        if (trigText.includes('exile the top card of each player') || trigText.includes('exile the top card of each opponent')) {
          setTimeout(() => {
            const exiledCards = [];
            [0, 1].forEach(pi => {
              const st = getState(pi);
              if (st.library.length > 0) {
                const topCard = { ...st.library[0], etaliExiled: true, etaliOwner: pi };
                setState(pi, prev => ({
                  ...prev,
                  library: prev.library.slice(1),
                  exile: [...prev.exile, topCard],
                }));
                exiledCards.push(topCard);
              }
            });
            if (exiledCards.length > 0) {
              // Show a lookTopView-like interface for casting for free
              setLookTopView({
                pIdx: activePlayer,
                cards: exiledCards,
                toHand: exiledCards.length,
                selected: new Set(),
                toBattlefield: true,
                etaliMode: true,
                etaliLabel: `${t.card.name}: Cast for free or leave in exile`,
              });
            }
          }, 600);
          break; // Only one Etali trigger at a time
        }
      }
    }
  };

  // Set attack target for a specific attacker (player or a planeswalker)
  const setAttackTarget = (attackerId, target) => {
    setCombatState(prev => ({
      ...prev,
      attackTargets: { ...prev.attackTargets, [attackerId]: target }
    }));
  };

  const confirmPwTargets = () => {
    if (!combatState || combatState.phase !== 'pw-targets') return;
    // Priority window after PW targets — both players can cast instants/cycle before blockers
    setCombatState(prev => ({ ...prev, phase: 'post-attackers', blocks: {}, selectedBlocker: null }));
  };

  // After post-attackers priority window, proceed to blockers (or skip if no untapped creatures)
  const proceedToBlockers = () => {
    if (!combatState || combatState.phase !== 'post-attackers') return;
    const defendingPlayer = activePlayer === 0 ? 1 : 0;
    // Re-check untapped creatures — new tokens (e.g. Shark Typhoon) may have entered since attackers were declared
    const defenderCreatures = getState(defendingPlayer).battlefield.filter(c => isCreature(c) && !c.tapped);
    if (defenderCreatures.length === 0) {
      // No blockers possible — skip to combat-respond (attacker priority before damage)
      setCombatState(prev => ({ ...prev, phase: 'combat-respond', blocks: {}, selectedBlocker: null }));
    } else {
      setCombatState(prev => ({ ...prev, phase: 'blockers', blocks: {}, selectedBlocker: null }));
    }
  };

  // Attacker clicks "Proceed to Damage" after optional combat tricks post-blockers
  const proceedToDamage = () => {
    if (!combatState || combatState.phase !== 'combat-respond') return;
    combatDamageResolvedRef.current = false; // Reset re-entry guard
    setCombatState(prev => ({ ...prev, phase: 'damage' }));
    setTimeout(() => {
      resolveCombatDamage();
      // Safety retry: if combat is still in damage phase after 2s, try again
      setTimeout(() => {
        if (combatStateRef.current && combatStateRef.current.phase === 'damage') {
          resolveCombatDamage();
        }
      }, 2000);
    }, 500);
  };

  const respondInCombat = (pIdx) => {
    setInstantCasting({ pIdx, returnToCombat: true });
  };

  const MAX_HAND_SIZE = 7;

  const executePassTurn = () => {
    // Safety: don't pass turn while spells are still on the stack
    if (spellStack.length > 0) {
      setCastError({ pIdx: activePlayer, message: '⚠️ Resolve all spells on the stack before passing the turn!' });
      setTimeout(() => setCastError(null), 2500);
      return;
    }
    // Cleanup step: check if active player must discard to hand size
    const ap = activePlayer;
    const handSize = getState(ap).hand.length;
    if (handSize > MAX_HAND_SIZE && !discardChoice) {
      // In online mode, only the active player sees the discard overlay
      if (!onlineMode || onlinePlayerIndex === ap) {
        setDiscardChoice({ pIdx: ap, selected: [] });
        return; // Don't pass turn yet — wait for discard
      }
    }

    setEndOfTurnRespond(false);
    setInstantCasting(null);
    setSpellTargeting(null);
    setAbilityTargeting(null);
    setModalChoice(null);
    setStackMinimized(false);
    setPutLandFromHand(null);
    SFX.passTurn();
    revertCreatureLands(0);
    revertCreatureLands(1);
    // Return temporarily controlled cards (Claim the Firstborn, Act of Treason, etc.)
    returnTemporaryControl();
    // Clear temporary buffs for both players (until end of turn effects expire)
    // Note: damagePrevented is NOT cleared here — it persists until the setting player's next turn
    [0, 1].forEach(pi => {
      setState(pi, p => ({
        ...p,
        battlefield: p.battlefield.map(c => c.tempBuffs ? { ...c, tempBuffs: null } : c),
      }));
    });
    setActivePlayer(prev => {
      const next = prev === 0 ? 1 : 0;
      if (next === 0) setTurnCount(t => t + 1);
      // Clear "until your next turn" effects for the player whose turn is starting
      // (their next turn has arrived, so effects like Jace's +1 and Kiora's +1 expire)
      setState(next, p => ({
        ...p,
        untilNextTurnEffects: [],
      }));
      // Clear damagePrevented flags set by this player (their next turn has arrived)
      // damagePrevented stores the pIdx of who set it — clear on BOTH players' battlefields
      [0, 1].forEach(pi => {
        setState(pi, p => ({
          ...p,
          battlefield: p.battlefield.map(c =>
            c.damagePrevented === next ? { ...c, damagePrevented: undefined } : c
          ),
        }));
      });
      setState(next, p => {
        const base = {
          ...p,
          battlefield: p.battlefield.map(c => ({ ...c, tapped: false, enteredThisTurn: false })),
          landPlayedThisTurn: false,
          dealtDamageThisTurn: false,
          manaPool: { W: 0, U: 0, B: 0, R: 0, G: 0, C: 0 },
        };
        // In online mode, NEVER draw a card here — the onlineTurnDrawEffect handles
        // all turn-start draws. This function can be called by either the active player
        // (via discard flow) or the opponent (via "Proceed" button), and the
        // onlineTurnDrawEffect already fires when activePlayer changes. Drawing here
        // too would cause a double-draw.
        if (onlineMode) {
          return base;
        }
        // Hotseat: draw normally (no onlineTurnDrawEffect in hotseat)
        return {
          ...base,
          library: p.library.slice(1),
          hand: [...p.hand, ...(p.library.length > 0 ? [p.library[0]] : [])],
        };
      });
      setState(prev, p => ({
        ...p,
        manaPool: { W: 0, U: 0, B: 0, R: 0, G: 0, C: 0 },
      }));
      return next;
    });
    setCurrentPhase('main1');
    setPreventCombatDamage(false);
    SFX.untapAll();
    // In online mode the receiving player plays the draw SFX when they auto-draw
    if (!onlineMode) { SFX.draw(); }
    // Process upkeep triggers for the NEW active player only
    // Compute next here so setTimeout has access to it
    const nextPlayer = activePlayer === 0 ? 1 : 0;
    setTimeout(() => {
      if (onlineMode) {
        // In online mode, DON'T process upkeep triggers here — the passing player's
        // client runs this, but it's the NEW active player who should get upkeep triggers.
        // The onlineTurnDrawEffect on the receiving client handles this instead.
      } else {
        // Hotseat: process upkeep triggers for the new active player only
        processUpkeepTriggers(nextPlayer);
      }
    }, 200);
    // ONLINE SYNC FIX: Force an immediate sync broadcast after turn pass.
    // The useEffect-based sync relies on a React render cycle, which browsers
    // may delay if the tab has been idle. This ensures the turn change is
    // sent immediately via a dedicated setTimeout at 100ms (after React batches).
    if (onlineMode && onStateChange) {
      setTimeout(() => {
        onlineSyncNeededRef.current = true;
        // Force a re-render to trigger the sync useEffect
        setCurrentPhase(prev => prev);
      }, 100);
      // Second safety net at 500ms in case the first was swallowed
      setTimeout(() => {
        if (onlineSyncNeededRef.current) {
          onlineSyncNeededRef.current = false;
          const payload = {
            players: [p1, p2],
            activePlayer: activePlayer === 0 ? 1 : 0,
            currentPhase: 'main1',
            turnNumber: turnCount + (activePlayer === 1 ? 1 : 0),
            combatState: null,
            mulliganPhase,
            mulliganPlayer,
            mulliganCounts,
          };
          onStateChange(payload);
        }
      }, 500);
    }
  };

  // New flow: click YOUR blocker first, then click the attacker to block
  const selectBlocker = (blockerId) => {
    if (!combatState || combatState.phase !== 'blockers') return;
    const defendingPlayer = activePlayer === 0 ? 1 : 0;
    // Online mode: only defender can select blockers
    if (onlineMode && onlinePlayerIndex !== defendingPlayer) return;
    const blocker = getState(defendingPlayer).battlefield.find(c => c.id === blockerId);
    if (!blocker || !isCreature(blocker) || blocker.tapped) return;

    // "Can't block" restriction (Relic Robber tokens, Goblin Construct, etc.)
    const blockerOracle2 = [blocker.oracle_text || '', ...(blocker.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
    if (blocker.cantBlock || /this creature can't block/i.test(blockerOracle2) || /(?:^|\.\s)can't block(?:\.|$)/i.test(blockerOracle2)) {
      setCastError({ pIdx: defendingPlayer, message: `⚠️ ${blocker.name} can't block!` });
      setTimeout(() => setCastError(null), 2000);
      return;
    }

    // Conditional block restriction: "can't attack or block unless you control another creature with power N or greater"
    const cantBlockUnless = blockerOracle2.match(/can't attack or block unless you control another creature with power (\d+) or greater/);
    if (cantBlockUnless) {
      const requiredPower = parseInt(cantBlockUnless[1]);
      const hasQualifier = getState(defendingPlayer).battlefield.some(c =>
        c.id !== blocker.id && isCreature(c) && (parseInt(c.power) || 0) >= requiredPower
      );
      if (!hasQualifier) {
        setCastError({ pIdx: defendingPlayer, message: `⚠️ ${blocker.name} can't block unless you control another creature with power ${requiredPower}+!` });
        setTimeout(() => setCastError(null), 2500);
        return;
      }
    }

    // If clicking the already-selected blocker, deselect it
    if (combatState.selectedBlocker === blockerId) {
      setCombatState(prev => ({ ...prev, selectedBlocker: null }));
      return;
    }

    // If this blocker is already assigned, remove the assignment
    const alreadyBlocking = Object.entries(combatState.blocks).find(([, ids]) => ids.includes(blockerId));
    if (alreadyBlocking) {
      setCombatState(prev => {
        const attackerId = alreadyBlocking[0];
        return {
          ...prev,
          blocks: { ...prev.blocks, [attackerId]: prev.blocks[attackerId].filter(id => id !== blockerId) },
          selectedBlocker: null,
        };
      });
      return;
    }

    setCombatState(prev => ({ ...prev, selectedBlocker: blockerId }));
  };

  const assignBlockerToAttacker = (attackerId) => {
    if (!combatState || !combatState.selectedBlocker) return;
    const defendingPlayer = activePlayer === 0 ? 1 : 0;
    // Online mode: only defender can assign blockers
    if (onlineMode && onlinePlayerIndex !== defendingPlayer) return;
    const blocker = getState(defendingPlayer).battlefield.find(c => c.id === combatState.selectedBlocker);
    const attacker = getState(activePlayer).battlefield.find(c => c.id === attackerId);
    if (!blocker || !attacker) return;

    // === Combat Blocking Keyword Validation ===
    const attackerKw = getCreatureKeywords(attacker, getAttachments(activePlayer, attacker.id));
    const blockerKw = getCreatureKeywords(blocker, getAttachments(defendingPlayer, blocker.id));
    const attackerOracle = [attacker.oracle_text || '', ...(attacker.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
    const blockerOracle = [blocker.oracle_text || '', ...(blocker.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
    const blockerTypeLine = (blocker.type_line || '').toLowerCase();
    const blockerColors = blocker.colors || blocker.card_faces?.[0]?.colors || [];

    const rejectBlock = (reason) => {
      setCastError({ pIdx: defendingPlayer, message: `${blocker.name} can't block ${attacker.name} (${reason})` });
      setTimeout(() => setCastError(null), 2000);
      setCombatState(prev => ({ ...prev, selectedBlocker: null }));
    };

    // Unblockable: "can't be blocked"
    if (attackerOracle.includes("can't be blocked") && !attackerOracle.includes("can't be blocked except")) {
      rejectBlock('unblockable'); return;
    }

    // Flying: only blocked by flying or reach
    if (attackerKw.includes('flying') && !blockerKw.includes('flying') && !blockerKw.includes('reach')) {
      rejectBlock('flying'); return;
    }

    // Fear: only blocked by artifact creatures or black creatures
    if (attackerKw.includes('fear')) {
      const isArtifactCreature = blockerTypeLine.includes('artifact');
      const isBlack = blockerColors.includes('B');
      if (!isArtifactCreature && !isBlack) {
        rejectBlock('fear — must be artifact or black'); return;
      }
    }

    // Intimidate: only blocked by artifact creatures or creatures that share a color
    if (attackerKw.includes('intimidate')) {
      const isArtifactCreature = blockerTypeLine.includes('artifact');
      const attackerColors = attacker.colors || attacker.card_faces?.[0]?.colors || [];
      const sharesColor = attackerColors.some(c => blockerColors.includes(c));
      if (!isArtifactCreature && !sharesColor) {
        rejectBlock('intimidate — must be artifact or share a color'); return;
      }
    }

    // Menace: must be blocked by two or more creatures
    // (We allow assignment but validate in confirmBlockers)

    // Shadow: can only be blocked by shadow; non-shadow can't block shadow
    if (attackerKw.includes('shadow') && !blockerKw.includes('shadow')) {
      rejectBlock('shadow — only shadow can block shadow'); return;
    }
    if (!attackerKw.includes('shadow') && blockerKw.includes('shadow')) {
      rejectBlock('shadow — shadow can only block shadow'); return;
    }

    // Horsemanship: only blocked by horsemanship
    if (attackerKw.includes('horsemanship') && !blockerKw.includes('horsemanship')) {
      rejectBlock('horsemanship'); return;
    }

    // Protection from color: can't be blocked by creatures of that color
    const colorNames = { W: 'white', U: 'blue', B: 'black', R: 'red', G: 'green' };
    for (const c of blockerColors) {
      if (attackerOracle.includes(`protection from ${colorNames[c]}`)) {
        rejectBlock(`protection from ${colorNames[c]}`); return;
      }
    }
    // Protection from "everything" / "creatures" — can't be blocked at all
    if (attackerOracle.includes('protection from everything') || attackerOracle.includes('protection from creatures')) {
      rejectBlock('protection from creatures'); return;
    }

    // "Can't be blocked except by" patterns
    const exceptByMatch = attackerOracle.match(/can't be blocked except by ([^.]+)/);
    if (exceptByMatch) {
      const requirement = exceptByMatch[1].trim();
      // Common patterns: "creatures with flying", "two or more creatures", "Walls", etc.
      let canBlock = false;
      if (requirement.includes('flying') && blockerKw.includes('flying')) canBlock = true;
      if (requirement.includes('reach') && blockerKw.includes('reach')) canBlock = true;
      if (requirement.includes('artifact') && blockerTypeLine.includes('artifact')) canBlock = true;
      if (requirement.includes('wall') && blockerTypeLine.includes('wall')) canBlock = true;
      if (requirement.includes('two or more') || requirement.includes('three or more')) canBlock = true; // validated at confirm
      // If none of the patterns matched, allow manual override
      if (!canBlock && !requirement.includes('or more')) {
        rejectBlock(requirement); return;
      }
    }

    // "Can't be blocked by creatures with power N or less" (Steel Leaf Champion)
    const cantBlockedByPowerMatch = attackerOracle.match(/can't be blocked by creatures with power (\d+) or less/);
    if (cantBlockedByPowerMatch) {
      const maxPower = parseInt(cantBlockedByPowerMatch[1]);
      const blockerPow = getEffectivePower(blocker, getAttachments(defendingPlayer, blocker.id));
      if (blockerPow <= maxPower) {
        rejectBlock('power ' + blockerPow + ' \u2264 ' + maxPower); return;
      }
    }

    setCombatState(prev => {
      const existing = prev.blocks[attackerId] || [];
      return {
        ...prev,
        blocks: { ...prev.blocks, [attackerId]: [...existing, prev.selectedBlocker] },
        selectedBlocker: null,
      };
    });
  };

  const confirmBlockers = () => {
    if (!combatState) return;

    // Menace validation: if an attacker with menace is blocked, it must be blocked by 2+
    for (const [attackerId, blockerIds] of Object.entries(combatState.blocks)) {
      if (blockerIds.length === 0) continue;
      const attacker = getState(activePlayer).battlefield.find(c => c.id === attackerId);
      if (!attacker) continue;
      const attackerKw = getCreatureKeywords(attacker, getAttachments(activePlayer, attacker.id));
      const attackerOracle = [attacker.oracle_text || '', ...(attacker.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();

      // Menace keyword or "can't be blocked except by two or more"
      const hasMenace = attackerKw.includes('menace') || attackerOracle.includes("can't be blocked except by two or more");
      if (hasMenace && blockerIds.length < 2) {
        const defendingPlayer = activePlayer === 0 ? 1 : 0;
        setCastError({ pIdx: defendingPlayer, message: `${attacker.name} has menace — must be blocked by 2+ creatures or not at all` });
        setTimeout(() => setCastError(null), 2500);
        return; // Don't proceed
      }

      // "Can't be blocked except by three or more"
      if (attackerOracle.includes("can't be blocked except by three or more") && blockerIds.length < 3) {
        const defendingPlayer = activePlayer === 0 ? 1 : 0;
        setCastError({ pIdx: defendingPlayer, message: `${attacker.name} must be blocked by 3+ creatures or not at all` });
        setTimeout(() => setCastError(null), 2500);
        return;
      }
    }

    // ===== BLOCK TRIGGERS: scan blocking creatures for "whenever X blocks" or "whenever X attacks or blocks" =====
    const defendingPlayer = activePlayer === 0 ? 1 : 0;
    const defenderState = getState(defendingPlayer);
    const allBlockerIds = new Set(Object.values(combatState.blocks).flat());
    const blockTriggers = [];
    for (const blockerId of allBlockerIds) {
      const blocker = defenderState.battlefield.find(c => c.id === blockerId);
      if (!blocker || !isCreature(blocker)) continue;
      const oracle = [blocker.oracle_text || '', ...(blocker.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
      const nameLower = (blocker.name || '').toLowerCase();
      const nameEscaped = nameLower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      // Match "whenever [name] blocks" or "whenever [name] attacks or blocks"
      // For legendary creatures, oracle text uses the short name (before comma)
      const shortName = nameLower.includes(',') ? nameLower.split(',')[0].trim() : null;
      const shortNameEscaped = shortName ? shortName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') : null;
      const selfBlockPattern = new RegExp('whenever ' + nameEscaped + '(?:\\s+attacks\\s+or)?\\s+blocks');
      const shortNameBlockPattern = shortNameEscaped ? new RegExp('whenever ' + shortNameEscaped + '(?:\\s+attacks\\s+or)?\\s+blocks') : null;
      const genericBlockPattern = /whenever (?:~|this creature)(?:\s+attacks\s+or)?\s+blocks/;
      if (selfBlockPattern.test(oracle) || (shortNameBlockPattern && shortNameBlockPattern.test(oracle)) || genericBlockPattern.test(oracle)) {
        try {
          const parsedTrigger = parseCombatTrigger(blocker, oracle, 'block');
          if (parsedTrigger) blockTriggers.push(parsedTrigger);
        } catch (e) {
          console.error('[Block Trigger] Error parsing trigger for', blocker.name, e);
        }
      }
    }

    if (blockTriggers.length > 0) {
      const modalBlockTriggers = blockTriggers.filter(t => t.trigger.isModal);
      const simpleBlockTriggers = blockTriggers.filter(t => !t.trigger.isModal);

      if (simpleBlockTriggers.length > 0) {
        const triggerTexts = simpleBlockTriggers.map(t => t.trigger);
        setEtbReminder({ pIdx: defendingPlayer, card: simpleBlockTriggers[0].card,
          effects: triggerTexts.map(t => ({ icon: t.icon, text: t.text })) });
      }

      if (modalBlockTriggers.length > 0) {
        const mt = modalBlockTriggers[0];
        setModalChoice({
          pIdx: defendingPlayer, card: mt.card, triggerType: 'block',
          choices: mt.trigger.modalChoices,
        });
      }
    }

    SFX.tap();
    // After blockers are declared, go to combat-respond so attacker gets priority
    // (can cast combat tricks like Giant Growth knowing which creatures are blocked/unblocked)
    setCombatState(prev => ({ ...prev, phase: 'combat-respond' }));
  };

  const combatDamageResolvedRef = useRef(false);

  const resolveCombatDamage = () => {
    // Use refs for latest state to avoid stale closure from setTimeout
    const cs = combatStateRef.current;
    if (!cs) return;
    // Re-entry guard: prevent double damage from multiple callers (auto-setTimeout, safety retry, Force Resolve, online handler)
    if (combatDamageResolvedRef.current) return;
    combatDamageResolvedRef.current = true;
    const attackingPlayer = activePlayer;
    const defendingPlayer = activePlayer === 0 ? 1 : 0;

    // Check for combat damage prevention (Fog, Tangle, etc.)
    if (preventCombatDamage) {
      setCombatLog('🛡 All combat damage prevented!');
      // Still exile tokens flagged for end-of-combat exile (e.g. Ragavan)
      [attackingPlayer, defendingPlayer].forEach(pi => {
        setState(pi, prev => {
          const toExile = prev.battlefield.filter(c => c.exileAtEndOfCombat);
          if (toExile.length === 0) return prev;
          return { ...prev, battlefield: prev.battlefield.filter(c => !c.exileAtEndOfCombat), exile: [...prev.exile, ...toExile] };
        });
      });
      setCombatState(null);
      setCurrentPhase('main2');
      setPreventCombatDamage(false);
      return;
    }

    // Helper: get creature info with keywords (including attachment bonuses)
    const getCreatureInfo = (card, ownerPIdx) => {
      const atts = getAttachments(ownerPIdx, card.id);
      const kw = getCreatureKeywords(card, atts);
      return {
        card, id: card.id,
        power: getEffectivePower(card, atts), toughness: getEffectiveToughness(card, atts),
        firstStrike: kw.includes('first strike') || kw.includes('double strike'),
        doubleStrike: kw.includes('double strike'),
        deathtouch: kw.includes('deathtouch'),
        trample: kw.includes('trample'),
        lifelink: kw.includes('lifelink'),
        indestructible: kw.includes('indestructible'),
        infect: kw.includes('infect') || kw.includes('toxic'),
        toxic: kw.includes('toxic'),
        toxicAmount: (() => { const oracle = (card.oracle_text || '').toLowerCase(); const m = oracle.match(/toxic (\d+)/); return m ? parseInt(m[1]) : 1; })(),
        damagePrevented: card.damagePrevented !== undefined && card.damagePrevented !== false,
      };
    };

    // Track accumulated damage on each creature (for two-phase resolution)
    const damageTaken = {}; // cardId → damage amount
    const killedIds = new Set();
    let damageToDefender = 0;
    let poisonToDefender = 0;
    const damageToPlaneswalkers = {}; // pwCardId → damage amount
    let lifelinkGainAttacker = 0;
    let lifelinkGainDefender = 0;

    // Helper to route unblocked damage to player or planeswalker
    const addUnblockedDamage = (attackerInfo, amount) => {
      const target = (cs.attackTargets || {})[attackerInfo.id] || 'player';
      if (target === 'player') {
        if (attackerInfo.infect) {
          // Infect: damage to player becomes poison counters
          poisonToDefender += amount;
        } else {
          damageToDefender += amount;
          // Toxic: also add poison (but damage is normal)
          if (attackerInfo.toxic) {
            poisonToDefender += attackerInfo.toxicAmount;
          }
        }
        if (isCommander && isPlayerCommander(attackingPlayer, attackerInfo.card)) {
          setState(defendingPlayer, prev => ({
            ...prev,
            commanderDamageReceived: {
              ...prev.commanderDamageReceived,
              [attackingPlayer]: (prev.commanderDamageReceived[attackingPlayer] || 0) + amount,
            },
          }));
        }
      } else {
        // Target is a planeswalker card id
        damageToPlaneswalkers[target] = (damageToPlaneswalkers[target] || 0) + amount;
      }
    };

    // Resolve one phase of damage for a single attacker vs its blockers
    const resolveAttackerPhase = (attackerInfo, blockerInfos, phase) => {
      // phase: 'first' or 'normal'
      // In 'first' phase: only first strike / double strike creatures deal damage
      // In 'normal' phase: only non-first-strike creatures deal damage (+ double strike again)
      const attackerDealsNow = phase === 'first'
        ? attackerInfo.firstStrike
        : (!attackerInfo.firstStrike || attackerInfo.doubleStrike);

      // Per-creature damage prevention (Kiora's +1, etc.) — creature deals no combat damage
      if (attackerInfo.damagePrevented) {
        // Still let blockers deal damage to this attacker
        for (const bi of blockerInfos) {
          if (killedIds.has(bi.id)) continue;
          const blockerDealsNow = phase === 'first' ? bi.firstStrike : (!bi.firstStrike || bi.doubleStrike);
          if (!blockerDealsNow) continue;
          const protFromBlocker = hasProtectionFrom(attackerInfo.card, bi.card);
          if (protFromBlocker) continue;
          damageTaken[attackerInfo.id] = (damageTaken[attackerInfo.id] || 0) + bi.power;
          if (bi.lifelink && bi.power > 0) lifelinkGainDefender += bi.power;
          if (!attackerInfo.indestructible) {
            if (bi.deathtouch && bi.power > 0) killedIds.add(attackerInfo.id);
            if (damageTaken[attackerInfo.id] >= attackerInfo.toughness) killedIds.add(attackerInfo.id);
          }
        }
        return;
      }

      if (blockerInfos.length === 0) {
        // Unblocked — damage goes to attack target (player or planeswalker)
        if (attackerDealsNow && !killedIds.has(attackerInfo.id)) {
          addUnblockedDamage(attackerInfo, attackerInfo.power);
          if (attackerInfo.lifelink) lifelinkGainAttacker += attackerInfo.power;
        }
        return;
      }

      // Blocked: attacker deals damage to blockers, blockers deal damage to attacker
      if (attackerDealsNow && !killedIds.has(attackerInfo.id)) {
        let remaining = attackerInfo.power;
        for (const bi of blockerInfos) {
          if (killedIds.has(bi.id)) continue;
          // Protection: blocker with protection from attacker's color takes no damage
          const protFromAttacker = hasProtectionFrom(bi.card, attackerInfo.card);
          if (protFromAttacker) continue; // damage prevented
          const lethal = attackerInfo.deathtouch ? 1 : (bi.toughness - (damageTaken[bi.id] || 0));
          const assigned = Math.min(remaining, Math.max(0, lethal));
          damageTaken[bi.id] = (damageTaken[bi.id] || 0) + assigned;
          remaining -= assigned;
          if (!bi.indestructible && (damageTaken[bi.id] >= bi.toughness || (attackerInfo.deathtouch && assigned > 0))) {
            killedIds.add(bi.id);
          }
        }
        // Trample overflow goes to the attack target (player or PW)
        if (attackerInfo.trample && remaining > 0) {
          addUnblockedDamage(attackerInfo, remaining);
        }
        if (attackerInfo.lifelink) lifelinkGainAttacker += attackerInfo.power;
      }

      // Blockers deal damage to attacker
      for (const bi of blockerInfos) {
        if (killedIds.has(bi.id)) continue;
        const blockerDealsNow = phase === 'first'
          ? bi.firstStrike
          : (!bi.firstStrike || bi.doubleStrike);
        if (!blockerDealsNow) continue;

        // Protection: attacker with protection from blocker's color takes no damage
        const protFromBlocker = hasProtectionFrom(attackerInfo.card, bi.card);
        if (protFromBlocker) continue; // damage prevented

        damageTaken[attackerInfo.id] = (damageTaken[attackerInfo.id] || 0) + bi.power;
        if (bi.lifelink && bi.power > 0) lifelinkGainDefender += bi.power;
        if (!attackerInfo.indestructible) {
          if (bi.deathtouch && bi.power > 0) {
            killedIds.add(attackerInfo.id);
          }
          if (damageTaken[attackerInfo.id] >= attackerInfo.toughness) {
            killedIds.add(attackerInfo.id);
          }
        }
      }
    };

    // Build creature info for all combatants
    const attackerState = getStateRef(attackingPlayer);
    const defenderState = getStateRef(defendingPlayer);
    const combatPairs = cs.attackers.map(attackerId => {
      const attacker = attackerState.battlefield.find(c => c.id === attackerId);
      if (!attacker) return null;
      const blockerIds = cs.blocks[attackerId] || [];
      const blockers = blockerIds.map(bid => defenderState.battlefield.find(c => c.id === bid)).filter(Boolean);
      return { attacker: getCreatureInfo(attacker, attackingPlayer), blockers: blockers.map(b => getCreatureInfo(b, defendingPlayer)) };
    }).filter(Boolean);

    // Check if any creature has first strike or double strike
    const hasAnyFirstStrike = combatPairs.some(p =>
      p.attacker.firstStrike || p.blockers.some(b => b.firstStrike)
    );

    // PHASE 1: First strike damage (only if any creature has first/double strike)
    if (hasAnyFirstStrike) {
      for (const pair of combatPairs) {
        resolveAttackerPhase(pair.attacker, pair.blockers, 'first');
      }
    }

    // PHASE 2: Normal damage
    for (const pair of combatPairs) {
      resolveAttackerPhase(pair.attacker, pair.blockers, 'normal');
    }

    // Apply lifelink
    if (lifelinkGainAttacker > 0) {
      setState(attackingPlayer, prev => ({ ...prev, life: prev.life + lifelinkGainAttacker }));
    }
    if (lifelinkGainDefender > 0) {
      setState(defendingPlayer, prev => ({ ...prev, life: prev.life + lifelinkGainDefender }));
    }

    // Apply damage to defending player
    // NOTE: SFX is handled below in the unified combat sound block to avoid overlap
    if (damageToDefender > 0) {
      setState(defendingPlayer, prev => ({ ...prev, life: prev.life - damageToDefender }));
      markDealtDamage(defendingPlayer);
    }

    // Apply poison counters (from infect/toxic) — Vorinclex modifies counter amounts on players too
    if (poisonToDefender > 0) {
      const modifiedPoison = applyVorinclexModifier(attackingPlayer, poisonToDefender);
      if (modifiedPoison > 0) {
        setState(defendingPlayer, prev => ({ ...prev, poison: prev.poison + modifiedPoison }));
      }
    }

    // Infect: damage to creatures = -1/-1 counters instead of regular damage
    // Apply -1/-1 counters for surviving creatures damaged by infect creatures
    for (const pair of combatPairs) {
      // Check if attacker has infect and dealt damage to blockers
      if (pair.attacker.infect) {
        for (const bi of pair.blockers) {
          const dmg = damageTaken[bi.id] || 0;
          if (dmg > 0 && !killedIds.has(bi.id)) {
            addMultipleCounters(defendingPlayer, bi.id, '-1/-1', dmg);
          }
        }
      }
      // Check if any blocker has infect and dealt damage to attacker
      for (const bi of pair.blockers) {
        if (bi.infect) {
          const dmg = damageTaken[pair.attacker.id] || 0;
          if (dmg > 0 && !killedIds.has(pair.attacker.id)) {
            addMultipleCounters(attackingPlayer, pair.attacker.id, '-1/-1', dmg);
          }
        }
      }
    }

    // Apply damage to planeswalkers (reduce loyalty counters)
    const killedPWs = [];
    const pwDamageEntries = Object.entries(damageToPlaneswalkers);
    if (pwDamageEntries.length > 0) {
      setState(defendingPlayer, prev => {
        const newBF = [];
        const newGY = [...prev.graveyard];
        for (const c of prev.battlefield) {
          const pwDmg = damageToPlaneswalkers[c.id];
          if (pwDmg && pwDmg > 0) {
            const currentLoyalty = (c.counters && c.counters['loyalty']) || 0;
            const newLoyalty = Math.max(0, currentLoyalty - pwDmg);
            if (newLoyalty <= 0) {
              // PW dies — move to graveyard
              killedPWs.push(c.name);
              newGY.push({ ...c, tapped: false, counters: {} });
            } else {
              newBF.push({ ...c, counters: { ...c.counters, loyalty: newLoyalty } });
            }
          } else {
            newBF.push(c);
          }
        }
        return { ...prev, battlefield: newBF, graveyard: newGY };
      });
    }

    // Kill creatures (move to graveyard), handling Undying/Persist
    const killAttacker = [...killedIds].filter(id => attackerState.battlefield.some(c => c.id === id));
    const killDefender = [...killedIds].filter(id => defenderState.battlefield.some(c => c.id === id));

    // Collect creatures that will return via Undying/Persist
    const undyingReturns = [];

    const processDying = (dyingCards, pIdx) => {
      const toGraveyard = [];
      for (const c of dyingCards) {
        const kw = (c.keywords || []).map(k => k.toLowerCase());
        const has11 = (c.counters?.['+1/+1'] || 0) > 0;
        const hasM1 = (c.counters?.['-1/-1'] || 0) > 0;
        const cleanCard = { ...c, tapped: false, counters: {}, tempBuffs: null, damagePrevented: undefined, attachedTo: null };

        if (kw.includes('undying') && !has11 && !c.isToken) {
          undyingReturns.push({ pIdx, card: c, type: 'undying' });
        } else if (kw.includes('persist') && !hasM1 && !c.isToken) {
          undyingReturns.push({ pIdx, card: c, type: 'persist' });
        }
        toGraveyard.push(cleanCard);
      }
      return toGraveyard;
    };

    if (killAttacker.length > 0) {
      setState(attackingPlayer, prev => {
        const dying = prev.battlefield.filter(c => killAttacker.includes(c.id));
        const surviving = prev.battlefield.filter(c => !killAttacker.includes(c.id));
        const toGY = processDying(dying, attackingPlayer);
        return { ...prev, battlefield: surviving, graveyard: [...prev.graveyard, ...toGY] };
      });
    }
    if (killDefender.length > 0) {
      setState(defendingPlayer, prev => {
        const dying = prev.battlefield.filter(c => killDefender.includes(c.id));
        const surviving = prev.battlefield.filter(c => !killDefender.includes(c.id));
        const toGY = processDying(dying, defendingPlayer);
        return { ...prev, battlefield: surviving, graveyard: [...prev.graveyard, ...toGY] };
      });
    }

    // Process Undying/Persist returns after a short delay
    if (undyingReturns.length > 0) {
      setTimeout(() => {
        for (const ret of undyingReturns) {
          setState(ret.pIdx, prev => {
            const inGY = prev.graveyard.find(c => c.id === ret.card.id);
            if (!inGY) return prev;
            const counterType = ret.type === 'undying' ? '+1/+1' : '-1/-1';
            const shouldTap = checkSelfEntersTapped(inGY, prev.battlefield);
            const returned = {
              ...inGY,
              tapped: shouldTap,
              enteredThisTurn: true,
              counters: { [counterType]: 1 },
              tempBuffs: null, attachedTo: null,
            };
            return {
              ...prev,
              graveyard: prev.graveyard.filter(c => c.id !== ret.card.id),
              battlefield: [...prev.battlefield, returned],
            };
          });
          const label = ret.type === 'undying' ? 'Undying (+1/+1 counter)' : 'Persist (-1/-1 counter)';
          setCastError({ pIdx: ret.pIdx, message: `♻️ ${ret.card.name} returns with ${label}!` });
          setTimeout(() => setCastError(null), 2500);
          SFX.playCreature();
        }
      }, 800);
    }

    // Unified combat SFX — only ONE sound per combat resolution to avoid overlap.
    // Priority: creature death > combat damage (Creatures_Hit.wav for ALL combat)
    // NOTE: SFX.playerDamage() uses Life_Loss_Spells.wav which sounds like spell damage,
    // so we use SFX.combatDamage() (Creatures_Hit.wav) for all combat damage instead.
    if (killAttacker.length > 0 || killDefender.length > 0) {
      SFX.creatureDeath();
    } else if (damageToDefender > 0 || combatPairs.length > 0) {
      SFX.combatDamage();
    }

    // Build detailed combat log
    const logParts = [];
    if (damageToDefender > 0) logParts.push(`${damageToDefender} dmg to ${getState(defendingPlayer).name}`);
    if (poisonToDefender > 0) logParts.push(`${poisonToDefender} poison to ${getState(defendingPlayer).name}`);
    for (const [pwId, dmg] of pwDamageEntries) {
      const pwCard = defenderState.battlefield.find(c => c.id === pwId);
      const pwName = pwCard ? pwCard.name : 'Planeswalker';
      logParts.push(`${dmg} dmg to ${pwName}`);
    }
    if (killedPWs.length > 0) logParts.push(`${killedPWs.join(', ')} destroyed`);
    if (lifelinkGainAttacker > 0) logParts.push(`${getState(attackingPlayer).name} gains ${lifelinkGainAttacker} (lifelink)`);
    if (lifelinkGainDefender > 0) logParts.push(`${getState(defendingPlayer).name} gains ${lifelinkGainDefender} (lifelink)`);
    if (killAttacker.length > 0) logParts.push(`${killAttacker.length} attacker(s) died`);
    if (killDefender.length > 0) logParts.push(`${killDefender.length} blocker(s) died`);
    if (logParts.length > 0) {
      setCombatLog(logParts.join(' • '));
      addGameLog(attackingPlayer, '⚔️', `Combat: ${logParts.join(' • ')}`);
    }

    // Combat damage triggers: "Whenever ~ deals combat damage to a player/opponent"
    const combatDamageTriggers = [];
    for (const pair of combatPairs) {
      if (killedIds.has(pair.attacker.id)) continue;
      if (pair.attacker.damagePrevented) continue; // Kiora +1 etc. — no damage dealt, no trigger
      const blockerIds = cs.blocks[pair.attacker.id] || [];
      const dealtToPlayer = blockerIds.length === 0 || pair.attacker.card.keywords?.some(k => k.toLowerCase() === 'trample');
      if (!dealtToPlayer) continue;
      const oracle = [pair.attacker.card.oracle_text || '', ...(pair.attacker.card.card_faces || []).map(f => f.oracle_text || '')].join(' ').toLowerCase();
      if (oracle.includes('deals combat damage to a player') || oracle.includes('deals combat damage to an opponent')) {
        const trigMatch = oracle.match(/(whenever.*?deals combat damage to (?:a player|an opponent).*?(?:\.|$))/);
        if (trigMatch) combatDamageTriggers.push({ name: pair.attacker.card.name, text: trigMatch[1].slice(0, 300) });
      }
    }
    // Auto-execute known combat damage triggers
    const manualTriggers = [];
    for (const trig of combatDamageTriggers) {
      const trigOracle = trig.text.toLowerCase();

      // Relic Robber: "that player creates a 0/1 colorless Goblin Construct artifact creature token"
      if (/that player creates a 0\/1.*goblin construct/i.test(trigOracle)) {
        const gcToken = {
          name: 'Goblin Construct',
          power: '0', toughness: '1',
          type_line: 'Artifact Creature Token — Goblin Construct',
          colors: [],
          isToken: true,
          cantBlock: true,
          oracle_text: "This creature can't block.\nAt the beginning of your upkeep, this creature deals 1 damage to you.",
          keywords: [],
        };
        createToken(defendingPlayer, gcToken, true, true);
        // Fetch official Scryfall token art — use direct card endpoint (TZNR #11)
        (async () => {
          try {
            const res = await fetch('https://api.scryfall.com/cards/tznr/11');
            if (res.ok) {
              const card = await res.json();
              if (card?.image_uris) {
                setState(defendingPlayer, prev => ({
                  ...prev,
                  battlefield: prev.battlefield.map(c =>
                    c.name === 'Goblin Construct' && !c.image_uris
                      ? { ...c, image_uris: card.image_uris, tokenImageSmall: card.image_uris.small, tokenImageNormal: card.image_uris.normal }
                      : c
                  )
                }));
              }
            }
          } catch(e) { /* fallback to text rendering */ }
        })();
        addGameLog(attackingPlayer, '⚔️', `${trig.name}: Created 0/1 Goblin Construct for ${getState(defendingPlayer).name}`);
        continue;
      }

      // Unknown trigger — show as manual reminder
      manualTriggers.push(trig);
    }
    if (manualTriggers.length > 0) {
      setTimeout(() => {
        setEtbReminder({ pIdx: attackingPlayer, card: manualTriggers[0], effects: manualTriggers.map(t => ({ icon: '⚔️', text: `${t.name}: ${t.text}` })) });
      }, 300);
    }

    // Exile tokens flagged "exileAtEndOfCombat" (e.g. Ragavan from Kari Zev)
    [attackingPlayer, defendingPlayer].forEach(pi => {
      setState(pi, prev => {
        const toExile = prev.battlefield.filter(c => c.exileAtEndOfCombat);
        if (toExile.length === 0) return prev;
        return {
          ...prev,
          battlefield: prev.battlefield.filter(c => !c.exileAtEndOfCombat),
          exile: [...prev.exile, ...toExile],
        };
      });
    });

    // End combat
    setCombatState(null);
    setCurrentPhase('main2');
  };

  const cancelCombat = () => {
    setCombatState(null);
    setCurrentPhase('main1');
  };

  // Render SVG lines connecting blockers to their assigned attackers
  const BlockerLines = () => {
    if (!combatState || combatState.phase !== 'blockers') return null;
    const blockEntries = Object.entries(combatState.blocks);
    if (blockEntries.length === 0) return null;

    const lines = [];
    for (const [attackerId, blockerIds] of blockEntries) {
      for (const blockerId of blockerIds) {
        // Find DOM elements by data attribute
        const attackerEl = document.querySelector(`[data-card-id="${attackerId}"]`);
        const blockerEl = document.querySelector(`[data-card-id="${blockerId}"]`);
        if (!attackerEl || !blockerEl) continue;
        const aRect = attackerEl.getBoundingClientRect();
        const bRect = blockerEl.getBoundingClientRect();
        lines.push({
          key: `${attackerId}-${blockerId}`,
          x1: aRect.left + aRect.width / 2,
          y1: aRect.top + aRect.height / 2,
          x2: bRect.left + bRect.width / 2,
          y2: bRect.top + bRect.height / 2,
        });
      }
    }
    if (lines.length === 0) return null;

    return ReactDOM.createPortal(
      <svg className="block-line" style={{ position: 'fixed', inset: 0, width: '100vw', height: '100vh', zIndex: 50 }}>
        {lines.map(l => (
          <g key={l.key}>
            <line x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2}
              stroke="rgba(60,180,220,0.15)" strokeWidth="6" strokeLinecap="round" />
            <line x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2}
              stroke="rgba(60,180,220,0.6)" strokeWidth="2"
              strokeDasharray="6,4" strokeLinecap="round">
              <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="1s" repeatCount="indefinite" />
            </line>
          </g>
        ))}
      </svg>,
      document.body
    );
  };

  const phases = [
    { id: 'untap', label: 'Untap' },
    { id: 'upkeep', label: 'Upkeep' },
    { id: 'draw', label: 'Draw' },
    { id: 'main1', label: 'Main 1' },
    { id: 'combat', label: 'Combat' },
    { id: 'main2', label: 'Main 2' },
    { id: 'end', label: 'End' },
  ];

  const PlayerArea = ({ pIdx, inverted }) => {
    const p = getState(pIdx);
    const isActive = activePlayer === pIdx;
    const bf = (p.battlefield || []).filter(c => c && c.id); // Guard: filter out any invalid entries
    const devotion = calculateDevotion(bf);

    const creatures = bf.filter(c => isCreature(c) || (c.isToken && c.type_line?.toLowerCase().includes('creature')));
    const planeswalkers = bf.filter(c => isPlaneswalker(c));
    const lands = bf.filter(c => isLand(c) && !isCreature(c));
    const attached = bf.filter(c => c.attachedTo);
    const other = bf.filter(c => !creatures.includes(c) && !lands.includes(c) && !planeswalkers.includes(c) && !c.attachedTo);

    const getCombatClass = (card) => {
      // Action log highlight glow
      const glowClass = highlightCards.includes(card.id) ? ' card-highlight-glow' : '';
      // Spell targeting mode: highlight valid targets
      if (spellTargeting) {
        if (isCreature(card)) return 'spell-target' + glowClass;
        const targetTypes = spellTargeting.effects.map(e => e.targetType || '').join(' ');
        if (targetTypes.includes('permanent') || targetTypes.includes('artifact') || targetTypes.includes('enchantment')) return 'spell-target' + glowClass;
        return glowClass;
      }
      if (!combatState) return glowClass;
      const defendingPlayer = activePlayer === 0 ? 1 : 0;
      if (pIdx === activePlayer && combatState.attackers.includes(card.id)) return 'attacking' + glowClass;
      if (combatState.phase === 'attackers' && pIdx === activePlayer && isCreature(card) && !card.tapped) {
        const hasHaste = card.keywords?.some(k => k.toLowerCase() === 'haste');
        if (!card.enteredThisTurn || hasHaste) return 'can-attack' + glowClass;
      }
      if (combatState.phase === 'blockers' && pIdx === defendingPlayer) {
        if (combatState.selectedBlocker === card.id) return 'blocking selected-blocker' + glowClass;
        const isBlocking = Object.values(combatState.blocks).some(ids => ids.includes(card.id));
        if (isBlocking) return 'blocking' + glowClass;
        if (isCreature(card) && !card.tapped) return 'can-block' + glowClass;
      }
      if (combatState.phase === 'blockers' && pIdx === activePlayer && combatState.attackers.includes(card.id)) {
        if (combatState.selectedBlocker) return 'block-target' + glowClass;
        const hasBlockers = (combatState.blocks[card.id] || []).length > 0;
        if (!hasBlockers) return 'attacking unblocked' + glowClass;
        return 'attacking blocked' + glowClass;
      }
      return glowClass;
    };

    const renderBfRow = (cards, className, cardSize = 72) => (
      <div className={`bf-row ${className}`}>
        {cards.map(card => {
          const cardAttachments = attached.filter(a => a.attachedTo === card.id);
          return (
            <div key={card.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', position: 'relative' }}>
              <CardDisplay card={card} size={cardSize}
                onClick={() => handleCardClick(card, pIdx, 'battlefield')}
                onContext={(e) => handleContext(e, card, pIdx, 'battlefield')}
                extraClass={getCombatClass(card)}
                devotionData={devotion}
                attachments={cardAttachments}
                onCounterChange={isCreature(card) ? (type) => {
                  if (type === '+1/+1') addCounter(pIdx, card.id, '+1/+1');
                  else if (type === '-1/-1') {
                    const has11 = (card.counters?.['+1/+1'] || 0) > 0;
                    if (has11) removeCounter(pIdx, card.id, '+1/+1');
                    else addCounter(pIdx, card.id, '-1/-1');
                  }
                } : null}
                showPreview />
              {cardAttachments.length > 0 && (
                <div style={{ display: 'flex', gap: 2, marginTop: -8, zIndex: 5 }}>
                  {cardAttachments.map(att => (
                    <div key={att.id} style={{ position: 'relative' }}>
                      <CardDisplay card={att} size={Math.round(cardSize * 0.5)}
                        onClick={() => handleCardClick(att, pIdx, 'battlefield')}
                        onContext={(e) => handleContext(e, att, pIdx, 'battlefield')}
                        showPreview />
                      <div style={{
                        position: 'absolute', top: -4, right: -4, fontSize: 8, padding: '0 3px',
                        background: isAura(att) ? 'rgba(100,60,200,0.8)' : 'rgba(160,140,60,0.8)',
                        borderRadius: 3, color: '#fff', fontWeight: 700, lineHeight: '14px',
                      }}>📎</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );

    /* renderSidebar removed — "other" permanents now use renderBfRow like creatures/lands */

    const renderPWSidebar = () => planeswalkers.length === 0 ? null : (
      <div className="bf-planeswalkers">
        {planeswalkers.map(card => {
          const cardAttachments = attached.filter(a => a.attachedTo === card.id);
          return (
            <div key={card.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
              <CardDisplay card={card} size={82}
                onClick={() => handleCardClick(card, pIdx, 'battlefield')}
                onContext={(e) => handleContext(e, card, pIdx, 'battlefield')}
                devotionData={devotion}
                showPreview />
              {cardAttachments.length > 0 && (
                <div style={{ display: 'flex', gap: 2, marginTop: -6 }}>
                  {cardAttachments.map(att => (
                    <CardDisplay key={att.id} card={att} size={36}
                      onClick={() => handleCardClick(att, pIdx, 'battlefield')}
                      onContext={(e) => handleContext(e, att, pIdx, 'battlefield')}
                      showPreview />
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );

    /* Arena layout: lands near player, creatures near center, other permanents between them, PW sidebar on right */
    const battlefieldRows = inverted ? (
      <>
        {other.length > 0 && (
          <div className="bf-sidebar-left" style={{ display: 'flex', flexDirection: 'column', gap: 2, minWidth: 60, alignItems: 'center' }}>
            {renderBfRow(other, 'bf-other')}
          </div>
        )}
        <div className="bf-main">
          {renderBfRow(lands, 'bf-lands')}
          {renderBfRow(creatures, 'bf-creatures')}
        </div>
        {planeswalkers.length > 0 && (
          <div className="bf-sidebar" style={{ display: 'flex', flexDirection: 'column', gap: 2, minWidth: 60, alignItems: 'center' }}>
            {renderPWSidebar()}
          </div>
        )}
      </>
    ) : (
      <>
        {other.length > 0 && (
          <div className="bf-sidebar-left" style={{ display: 'flex', flexDirection: 'column', gap: 2, minWidth: 60, alignItems: 'center' }}>
            {renderBfRow(other, 'bf-other')}
          </div>
        )}
        <div className="bf-main">
          {renderBfRow(creatures, 'bf-creatures')}
          {renderBfRow(lands, 'bf-lands')}
        </div>
        {planeswalkers.length > 0 && (
          <div className="bf-sidebar" style={{ display: 'flex', flexDirection: 'column', gap: 2, minWidth: 60, alignItems: 'center' }}>
            {renderPWSidebar()}
          </div>
        )}
      </>
    );

    const content = (
      <>
        <div className={`player-bar ${isActive ? 'active' : ''}${spellTargeting && spellTargeting.effects.some(e => e.type === 'damage' && (e.targetDesc === 'any target' || e.targetDesc?.includes('player') || e.targetDesc?.includes('opponent'))) ? ' player-target' : ''}`}
          onClick={() => { if (spellTargeting && spellTargeting.effects.some(e => e.type === 'damage')) handlePlayerTarget(pIdx); }}>
          <div className="flex items-center gap-2">
            {(() => {
              const av = avatars?.[pIdx];
              const avatarUrl = av?.artCrop;
              const objPos = av?.objectPosition || 'center center';
              return (
                <div style={{
                  width: 32, height: 32, borderRadius: '50%', overflow: 'hidden', flexShrink: 0,
                  border: isActive ? '2px solid rgba(200,170,60,0.5)' : '2px solid rgba(255,255,255,0.08)',
                  boxShadow: isActive ? '0 0 10px rgba(200,170,60,0.2)' : 'none',
                  transition: 'all 0.3s ease',
                }}>
                  {avatarUrl ? (
                    <img src={avatarUrl} alt={p.name}
                      style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: objPos, display: 'block', transform: av?.scale ? `scale(${av.scale})` : undefined, transformOrigin: objPos }} />
                  ) : (
                    <div style={{
                      width: '100%', height: '100%',
                      background: isActive
                        ? 'linear-gradient(135deg, rgba(200,170,60,0.3), rgba(200,170,60,0.1))'
                        : 'linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03))',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 11, fontWeight: 800, color: isActive ? '#d4b44a' : 'rgba(255,255,255,0.4)',
                    }}>
                      {pIdx === 0 ? 'P1' : 'P2'}
                    </div>
                  )}
                </div>
              );
            })()}
            <span className="player-name">{p.name}</span>
          </div>
          <div className="flex items-center gap-2">
            <div className="life-counter">
              <button onClick={() => {
                SFX.lifeLoss();
                updatePlayer(pIdx, { life: p.life - 1 });
                markDealtDamage(pIdx);
                if (pIdx !== activePlayer) { setCastError({ pIdx: activePlayer, message: `−1 life to ${p.name}` }); setTimeout(() => setCastError(null), 1200); }
              }}>−</button>
              <span className="life-value">{p.life}</span>
              <button onClick={() => {
                SFX.lifeGain();
                updatePlayer(pIdx, { life: p.life + 1 });
                if (pIdx !== activePlayer) { setCastError({ pIdx: activePlayer, message: `+1 life to ${p.name}` }); setTimeout(() => setCastError(null), 1200); }
              }}>+</button>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 3, fontSize: 11, color: p.poison > 0 ? '#a0e060' : 'rgba(255,255,255,0.3)' }}>
              <span style={{ fontSize: 13 }}>☠</span>
              <span style={{ fontWeight: 700, minWidth: 14, textAlign: 'center' }}>{p.poison}</span>
              <span style={{ cursor: 'pointer', opacity: 0.5, fontSize: 10 }} onClick={() => { SFX.damage(); updatePlayer(pIdx, { poison: p.poison + 1 }); }}>▲</span>
              <span style={{ cursor: 'pointer', opacity: 0.5, fontSize: 10 }} onClick={() => { updatePlayer(pIdx, { poison: Math.max(0, p.poison - 1) }); }}>▼</span>
            </div>
          {isCommander && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 3, fontSize: 11, color: 'rgba(200,170,60,0.7)' }}>
                <span style={{ fontSize: 11 }}>⚔</span>
                <span style={{ fontWeight: 700, minWidth: 14, textAlign: 'center' }}>{p.commanderDamageReceived?.[pIdx === 0 ? 1 : 0] || 0}</span>
                <span className="text-xs" style={{ opacity: 0.4 }}>cmd dmg</span>
              </div>
            )}
            {/* Mana Pool Display */}
            {(() => {
              const pool = p.manaPool || {};
              const hasAny = Object.values(pool).some(v => v > 0);
              if (!hasAny) return null;
              return (
                <div style={{ display: 'flex', alignItems: 'center', gap: 2, fontSize: 11, padding: '1px 6px', borderRadius: 4, background: 'rgba(255,255,255,0.04)' }}>
                  {['W','U','B','R','G','C'].map(c => pool[c] > 0 ? (
                    <span key={c} style={{ color: MANA_COLORS_CSS[c], fontWeight: 700, cursor: 'pointer' }}
                      title={`Click to remove 1 ${c}`}
                      onClick={() => {
                        if (onlineMode && pIdx !== onlinePlayerIndex) return;
                        setState(pIdx, prev => ({
                          ...prev, manaPool: { ...prev.manaPool, [c]: Math.max(0, prev.manaPool[c] - 1) }
                        }));
                      }}>
                      {pool[c]}{MANA_SYMBOLS[c]}
                    </span>
                  ) : null)}
                  <span style={{ cursor: 'pointer', opacity: 0.3, marginLeft: 2, fontSize: 9 }}
                    title="Clear mana pool"
                    onClick={() => {
                      if (onlineMode && pIdx !== onlinePlayerIndex) return;
                      setState(pIdx, prev => ({
                        ...prev, manaPool: { W: 0, U: 0, B: 0, R: 0, G: 0, C: 0 }
                      }));
                    }}>✕</span>
                </div>
              );
            })()}
            {/* Devotion Display */}
            {(() => {
              const hasAnyDevotion = Object.values(devotion).some(v => v > 0);
              if (!hasAnyDevotion) return null;
              return (
                <div style={{ display: 'flex', alignItems: 'center', gap: 3, fontSize: 10, padding: '1px 6px', borderRadius: 4, background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.04)' }}
                  title="Devotion (colored mana symbols among your permanents)">
                  <span style={{ fontSize: 9, opacity: 0.4, fontWeight: 600, letterSpacing: 0.5 }}>DEV</span>
                  {['W','U','B','R','G'].map(c => devotion[c] > 0 ? (
                    <span key={c} style={{ color: c === 'B' ? '#a090b0' : MANA_COLORS_CSS[c], fontWeight: 700, fontSize: 11 }}
                      title={`Devotion to ${c}: ${devotion[c]}`}>
                      {devotion[c]}{MANA_SYMBOLS[c]}
                    </span>
                  ) : null)}
                </div>
              );
            })()}
            {/* Graveyard counter — always visible for Drown in the Loch, mill tracking */}
            {(() => {
              const gyCount = p.graveyard.length;
              const opponentPIdx = pIdx === 0 ? 1 : 0;
              const oppGy = getState(opponentPIdx).graveyard.length;
              // Highlight: this player's GY count matters for opponent's Drown in the Loch etc.
              const threshold = gyCount >= 8;
              return (
                <>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3, fontSize: 10, padding: '1px 6px', borderRadius: 4, cursor: 'pointer',
                  background: threshold ? 'rgba(180,60,220,0.12)' : 'rgba(255,255,255,0.03)',
                  border: threshold ? '1px solid rgba(180,60,220,0.25)' : '1px solid rgba(255,255,255,0.04)', transition: 'all 0.3s' }}
                  title={`${p.name}: ${gyCount} cards in graveyard\nOpponent: ${oppGy} cards in graveyard\n${threshold ? '⚠️ Drown in the Loch / Rogues threshold (8+) reached!' : gyCount >= 5 ? `${8 - gyCount} more cards until Drown threshold (8)` : ''}`}
                  onClick={() => setViewingZone({ pIdx, zone: 'graveyard', title: `${p.name}'s Graveyard`, cards: p.graveyard })}>
                  <span style={{ fontSize: 9, opacity: 0.5, fontWeight: 600, letterSpacing: 0.5 }}>💀</span>
                  <span style={{ fontWeight: 700, fontSize: 11, color: threshold ? '#c080e0' : gyCount > 0 ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.25)' }}>{gyCount}</span>
                  {threshold && <span style={{ fontSize: 8, color: '#c080e0', fontWeight: 600 }}>⚠️</span>}
                </div>
                {/* Opponent's graveyard count — key for Drown in the Loch: you need to see THEIR GY count */}
                {(() => {
                  const oppThreshold = oppGy >= 8;
                  return (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 2, fontSize: 10, padding: '1px 5px', borderRadius: 4, cursor: 'pointer',
                      background: oppThreshold ? 'rgba(220,80,60,0.12)' : 'rgba(255,255,255,0.02)',
                      border: oppThreshold ? '1px solid rgba(220,80,60,0.25)' : '1px solid rgba(255,255,255,0.03)', transition: 'all 0.3s' }}
                      title={`Opponent graveyard: ${oppGy} cards\n${oppThreshold ? '⚠️ Drown in the Loch active — their spells with MV ≤ ' + oppGy + ' can be countered/destroyed!' : oppGy >= 5 ? `${8 - oppGy} more until Drown threshold` : 'Mill opponent to power up Drown in the Loch'}`}
                      onClick={() => setViewingZone({ pIdx: opponentPIdx, zone: 'graveyard', title: `${getState(opponentPIdx).name}'s Graveyard`, cards: getState(opponentPIdx).graveyard })}>
                      <span style={{ fontSize: 8, opacity: 0.4, fontWeight: 600 }}>OPP</span>
                      <span style={{ fontSize: 8, opacity: 0.4 }}>💀</span>
                      <span style={{ fontWeight: 700, fontSize: 11, color: oppThreshold ? '#e06048' : oppGy > 0 ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.15)' }}>{oppGy}</span>
                      {oppThreshold && <span style={{ fontSize: 8, color: '#e06048', fontWeight: 600 }}>⚠️</span>}
                    </div>
                  );
                })()}
                </>
              );
            })()}
          </div>
          <div className="flex gap-1">
            {isActive && isCommander && p.commandZone.length > 0 && (
              <button className="btn text-xs" style={{ borderColor: 'rgba(200,170,60,0.3)', color: '#d4b44a' }}
                onClick={() => {
                  const cmd = p.commandZone[0];
                  if (cmd) moveCard(pIdx, cmd, 'commandZone', 'battlefield');
                }}>
                Cast Commander {p.commanderCastCount > 0 ? `(+${p.commanderCastCount * 2})` : ''}
              </button>
            )}
            {isActive && !(onlineMode && pIdx !== onlinePlayerIndex) && <button className="btn text-xs" onClick={() => drawCard(pIdx)}>Draw</button>}
            {isActive && <button className="btn text-xs" onClick={() => untapAll(pIdx)}>Untap All</button>}
            {isActive && !(onlineMode && pIdx !== onlinePlayerIndex) && <button className="btn text-xs" onClick={() => shuffleLibrary(pIdx)}>Shuffle</button>}
            {!(onlineMode && pIdx !== onlinePlayerIndex) && <button className="btn text-xs btn-gold" onClick={() => setShowTokenCreator(pIdx)}>+ Token</button>}
            {!(onlineMode && pIdx !== onlinePlayerIndex) && <button className="btn text-xs" onClick={() => millCards(pIdx, 1)}>Mill</button>}
            {!isActive && !(onlineMode && pIdx !== onlinePlayerIndex) && p.hand.some(c => canCastAtInstantSpeed(c) || getCyclingCost(c) || ((c.type_line || '').toLowerCase().includes('sorcery') && hasSorceryFlash(pIdx))) && (
              <button className="btn text-xs" style={{ borderColor: 'rgba(60,180,220,0.4)', color: '#60c8e8', background: 'rgba(60,180,220,0.08)' }}
                onClick={() => setInstantCasting({ pIdx })}>
                ⚡ Instant
              </button>
            )}
            <span style={{ width: 1, height: 16, background: 'rgba(255,255,255,0.1)', margin: '0 2px' }} />
            <button className="btn text-xs" style={p.graveyard.length > 0 ? { borderColor: 'rgba(180,80,180,0.3)', color: '#c080c0' } : {}}
              onClick={() => setViewingZone({ pIdx, zone: 'graveyard', title: `${p.name}'s Graveyard`, cards: p.graveyard })}>
              GY ({p.graveyard.length})
            </button>
            {(() => {
              const adventureInExile = p.exile.some(c => c.adventureCast);
              const foretoldInExile = p.exile.some(c => c.isForetold);
              const hasCards = p.exile.length > 0;
              return (
                <button className="btn text-xs" style={adventureInExile
                  ? { borderColor: 'rgba(60,160,220,0.5)', color: '#60b8e0', background: 'rgba(60,160,220,0.1)', boxShadow: '0 0 8px rgba(60,160,220,0.15)' }
                  : foretoldInExile
                  ? { borderColor: 'rgba(130,80,220,0.5)', color: '#b090e0', background: 'rgba(130,80,220,0.1)', boxShadow: '0 0 8px rgba(130,80,220,0.15)' }
                  : hasCards ? { borderColor: 'rgba(180,180,60,0.3)', color: '#c0c060' } : {}}
                  onClick={() => setViewingZone({ pIdx, zone: 'exile', title: `${p.name}'s Exile`, cards: p.exile })}>
                  Exile ({p.exile.length}){adventureInExile ? ' ✦' : ''}{foretoldInExile ? ' 🔮' : ''}
                </button>
              );
            })()}
            {(p.emblems || []).length > 0 && (
              <button className="btn text-xs" style={{ borderColor: 'rgba(255,200,60,0.5)', color: '#f0d040', background: 'rgba(255,200,60,0.1)', boxShadow: '0 0 8px rgba(255,200,60,0.15)' }}
                onClick={() => setViewingZone({ pIdx, zone: 'emblems', title: `${p.name}'s Emblems`, cards: (p.emblems || []).map(e => ({ id: e.id, name: e.name, oracle_text: e.text, type_line: 'Emblem', isEmblem: true, sourceImage: e.sourceImage })) })}>
                🏷️ Emblems ({p.emblems.length})
              </button>
            )}
            {!(onlineMode && pIdx !== onlinePlayerIndex) && (
              <button className="btn text-xs" style={{ borderColor: 'rgba(100,180,220,0.3)', color: '#70b8d8' }}
                onClick={() => setScryView({ pIdx, count: 3, mode: 'scry' })}>
                Scry
              </button>
            )}
            {isActive && !(onlineMode && pIdx !== onlinePlayerIndex) && (
              <button className="btn text-xs" style={{ borderColor: 'rgba(140,100,200,0.3)', color: '#b090e0' }}
                onClick={() => setScryView({ pIdx, count: 3, mode: 'surveil' })}>
                Surveil
              </button>
            )}
            <button className="btn text-xs" style={(!isActive || (onlineMode && pIdx !== onlinePlayerIndex)) ? { opacity: 0.5 } : {}}
              onClick={() => { if (onlineMode && pIdx !== onlinePlayerIndex) return; drawCard(pIdx); }}
              onContextMenu={(e) => {
